8題：基流與退水段", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第098題：基流與退水段", "number": "題海水文第098題", "question": "請說明「基流與退水段」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 基流來自地下水或壤中流補注，控制河川退水段。\n- 退水慢代表流域儲水或地下水補注較強。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 基流來自地下水或壤中流補注，控制河川退水段。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 退水慢代表流域儲水或地下水補注較強。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-269-坡地水文學-題海水文第099題：滯洪與沉砂差異", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第099題：滯洪與沉砂差異", "number": "題海水文第099題", "question": "請說明「滯洪與沉砂差異」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 滯洪削減洪峰，沉砂攔截泥砂。\n- 共構時沉砂容量不得侵占必要滯洪容量。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 滯洪削減洪峰，沉砂攔截泥砂。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 共構時沉砂容量不得侵占必要滯洪容量。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-270-坡地水文學-題海水文第100題：地下水排水", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第100題：地下水排水", "number": "題海水文第100題", "question": "請說明「地下水排水」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 降低地下水位與孔隙水壓可提高有效應力與邊坡安全。\n- 需注意反濾、防堵、出口保護與維修可達性。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 降低地下水位與孔隙水壓可提高有效應力與邊坡安全。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 需注意反濾、防堵、出口保護與維修可達性。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-271-植生工程-題海植生第001題：水力噴植", "year": "模擬", "subject": "植生工程", "title": "題海植生第001題：水力噴植", "number": "題海植生第001題", "question": "請說明「水力噴植」在坡地植生工程中之目的、適用條件、施     function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[ch]));
    }

    function inlineMd(text) {
      return escapeHtml(text)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    }

    function mdToHtml(md) {
      const lines = String(md || "").split(/\r?\n/);
      const blocks = [];
      let i = 0;
      while (i < lines.length) {
        if (!lines[i].trim()) { i++; continue; }
        if (/^\|.+\|$/.test(lines[i].trim()) && i + 1 < lines.length && /^\|?\s*:?-{3,}/.test(lines[i + 1].trim())) {
          const table = [];
          while (i < lines.length && /^\|.+\|$/.test(lines[i].trim())) {
            table.push(lines[i].trim());
            i++;
          }
          const rows = table.filter((_, idx) => idx !== 1).map(row => row.replace(/^\||\|$/g, "").split("|").map(cell => inlineMd(cell.trim())));
          const head = rows.shift() || [];
          blocks.push(`<table><thead><tr>${head.map(c => `<th>${c}</th>`).join("")}</tr></thead><tbody>${rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`);
          continue;
        }
        if (/^[-*]\s+/.test(lines[i].trim())) {
          const li = [];
          while (i < lines.length && /^[-*]\s+/.test(lines[i].trim())) {
            li.push(`<li>${inlineMd(lines[i].trim().replace(/^[-*]\s+/, ""))}</li>`);
            i++;
          }
          blocks.push(`<ul>${li.join("")}</ul>`);
          continue;
        }
        if (/^\d+\.\s+/.test(lines[i].trim())) {
          const li = [];
          while (i < lines.length && /^\d+\.\s+/.test(lines[i].trim())) {
            li.push(`<li>${inlineMd(lines[i].trim().replace(/^\d+\.\s+/, ""))}</li>`);
            i++;
          }
          blocks.push(`<ol>${li.join("")}</ol>`);
          continue;

      }

    }

      if (state.subject && item.subject !== state.subject) return false;
      if (!q) return true;
      return [item.year, item.source_label, item.subject, item.title, item.question, item.hint, item.brief, item.detail].join("\n").toLowerCase().includes(q);
    }

    function filtered() { return DATA.filter(matches); }

    function todayKey() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function hashText(text) {
      let hash = 2166136261;
      for (let i = 0; i < text.length; i++) {
        hash ^= text.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function confidenceValue(item) {
      return Number(confidence[item.id] || 0);
    }

    function weaknessWeight(item) {
      const score = confidenceValue(item);
      if (!score) return 3.5;
      return Math.max(1, 7 - score);
    }

    function weightedPick(pool, seed, used = new Set()) {
      const candidates = pool.filter(item => !used.has(item.id));
      if (!candidates.length) return null;
      const total = candidates.reduce((sum, item) => sum + weaknessWeight(item), 0);
      let target = (hashText(seed) % 1000000) / 1000000 * total;
      for (const item of candidates) {
        target -= weaknessWeight(item);
        if (target <= 0) return item;
      }
      return candidates[candidates.length - 1];
    }

    function dailyItems() {
      const base = DATA.filter(matches);
      const subjects = [...new Set(base.map(item => item.subject))].sort();
      const day = todayKey();
      const perSubject = Number(els.dailyCount.value || 5);
      const picked = [];
      const used = new Set();
      subjects.forEach(subject => {
        const pool = base.filter(item => item.subject === subject);
        for (let i = 0; i < Math.min(perSubject, pool.length); i++) {
          const item = weightedPick(pool, `${day}-${subject}-${i}`, used);
          if (item) {
            picked.push(item);
            used.add(item.id);
          }
        }
      });
      return picked;
    }

    function weakItems() {
      const base = DATA.filter(matches);
      const sorted = [...base].sort((a, b) => {
        const diff = weaknessWeight(b) - weaknessWeight(a);
        if (diff) return diff;
        return hashText(todayKey() + a.id) - hashText(todayKey() + b.id);
      });
      return sorted.slice(0, Math.min(30, sorted.length));
    }

    function answerHtml(item, open) {
      if (!open) return "";
      const showBrief = state.mode === "brief" || state.mode === "detail";
      const showDetail = state.mode === "detail";
      return `<div class="answer">
        ${showBrief ? `<div class="section-label">簡要答案（採分點）</div><div class="brief">${briefHtml(item.brief)}</div>` : ""}
        ${showDetail ? `<div class="section-label">詳細答案（申論條列版）</div><div class="detail">${examDetailHtml(item.detail)}</div>` : ""}
      </div>`;
    }

    function render() {
      const items = state.daily ? dailyItems() : (state.weak ? weakItems() : filtered());
      els.stats.textContent = state.daily
        ? `今日題海 ${items.length} 題 / 題庫共 ${DATA.length} 題`
        : (state.weak ? `弱點加強 ${items.length} 題 / 題庫共 ${DATA.length} 題` : `目前顯示 ${items.length} 題 / 共 ${DATA.length} 題`);
      if (!items.length) {
        els.list.innerHTML = `<div class="empty">找不到符合條件的題目。</div>`;
        return;
      }
      const dailyNote = state.daily
        ? `<div class="daily-note">今日題海：每科 ${escapeHtml(els.dailyCount.value)} 題，依今天日期固定抽題，並稍微偏向低信心題。明天會自動換題。</div>`
        : (state.weak ? `<div class="daily-note">弱點加強：依你的信心分數排序，低分與未評分題目會優先出現。</div>` : "");
      els.list.innerHTML = dailyNote + items.map((item, idx) => {
        const open = state.open.has(item.id) || state.mode !== "question";
        const briefLabel = open ? "收起答案" : "展開答案";
        const sourceClass = item.source_type === "mock" ? "source-mock" : "source-past";
        const yearPill = item.source_type === "mock" ? "" : `<span class="pill">${escapeHtml(item.year)} 年</span>`;
        const pointsPill = item.points ? `<span class="pill points-pill">${escapeHtml(item.points)}</span>` : "";
        const score = confidenceValue(item);
        const confidenceOptions = [0,1,2,3,4,5].map(v => `<option value="${v}" ${score === v ? "selected" : ""}>${v === 0 ? "未評分" : v + " 分"}</option>`).join("");
        return `<article class="card" data-id="${escapeHtml(item.id)}">
          <div class="qhead">
            <div class="badge">${idx + 1}</div>
            <div>
              <div class="meta"><span class="pill ${sourceClass}">${escapeHtml(item.source_label || "歷屆考古題")}</span>${yearPill}<span class="pill">${escapeHtml(item.subject)}</span><span class="pill">${escapeHtml(item.number)}</span>${pointsPill}</div>
              <div class="title">${escapeHtml(item.title)}</div>
              <div class="question">${escapeHtml(item.question)}</div>
              <div class="hint"><strong>作答提示：</strong>${escapeHtml(item.hint || "先寫結論，再條列原因、方法與注意事項。")}</div>
              <label class="confidence">信心分數
                <select data-action="confidence">${confidenceOptions}</select>
                <span>${score ? (score <= 2 ? "較不熟，後續會多出一點" : "已記錄") : "評分後可做弱點加強"}</span>
              </label>
            </div>
            <div class="points"></div>
          </div>
          <div class="toggle">
            <button data-action="toggle">${briefLabel}</button>
            <button data-action="brief">只看本題簡答</button>
            <button data-action="detail">看本題詳答</button>
          </div>
          ${answerHtml(item, open)}
        </article>`;
      }).join("");
    }

    els.search.addEventListener("input", e => { state.search = e.target.value; render(); });
    els.sourceType.addEventListener("change", e => { state.sourceType = e.target.value; render(); });
    els.year.addEventListener("change", e => { state.year = e.target.value; render(); });
    els.subject.addEventListener("change", e => { state.subject = e.target.value; render(); });
    document.querySelectorAll(".modebar [data-mode]").forEach(btn => {
      btn.addEventListener("click", () => {
        state.mode = btn.dataset.mode;
        document.querySelectorAll(".modebar [data-mode]").forEach(b => b.classList.toggle("active", b === btn));
        render();
      });
    });
    document.getElementById("dailyBtn").addEventListener("click", () => {
      state.daily = !state.daily;
      state.weak = false;
      state.open.clear();
      state.mode = "question";
      document.getElementById("dailyBtn").classList.toggle("active", state.daily);
      document.getElementById("weakBtn").classList.remove("active");
      document.querySelectorAll(".modebar [data-mode]").forEach(b => b.classList.toggle("active", b.dataset.mode === "question"));
      render();
    });
    document.getElementById("weakBtn").addEventListener("click", () => {
      state.weak = !state.weak;
      state.daily = false;
      state.open.clear();
      state.mode = "question";
      document.getElementById("weakBtn").classList.toggle("active", state.weak);
      document.getElementById("dailyBtn").classList.remove("active");
      document.querySelectorAll(".modebar [data-mode]").forEach(b => b.classList.toggle("active", b.dataset.mode === "question"));
      render();
    });
    els.dailyCount.addEventListener("change", () => {
      if (state.daily) {
        state.open.clear();
        render();
      }
    });
    document.getElementById("expandAll").addEventListener("click", () => {
      (state.daily ? dailyItems() : (state.weak ? weakItems() : filtered())).forEach(item => state.open.add(item.id));
      if (state.mode === "question") state.mode = "brief";
      document.querySelectorAll(".modebar [data-mode]").forEach(b => b.classList.toggle("active", b.dataset.mode === state.mode));
      render();
    });
    document.getElementById("collapseAll").addEventListener("click", () => {
      state.open.clear();
      state.mode = "question";
      document.querySelectorAll(".modebar [data-mode]").forEach(b => b.classList.toggle("active", b.dataset.mode === state.mode));
      render();
    });
    document.getElementById("randomBtn").addEventListener("click", () => {
      state.daily = false;
      state.weak = false;
      document.getElementById("dailyBtn").classList.remove("active");
      document.getElementById("weakBtn").classList.remove("active");
      const items = filtered();
      if (!items.length) return;
      const item = weightedPick(items, `${Date.now()}-${Math.random()}`) || items[Math.floor(Math.random() * items.length)];
      state.open.clear();
      state.open.add(item.id);
      state.mode = "brief";
      document.querySelectorAll(".modebar [data-mode]").forEach(b => b.classList.toggle("active", b.dataset.mode === "brief"));
      render();
      const card = document.querySelector(`[data-id="${CSS.escape(item.id)}"]`);
      card?.scrollIntoView({ behavior: "smooth", block: "center" });
    });
    document.getElementById("resetBtn").addEventListener("click", () => {
      state.sourceType = state.year = state.subject = state.search = "";
      state.daily = false;
      state.weak = false;
      document.getElementById("dailyBtn").classList.remove("active");
      document.getElementById("weakBtn").classList.remove("active");
      els.sourceType.value = els.year.value = els.subject.value = els.search.value = "";
      render();
    });
    els.list.addEventListener("change", e => {
      const select = e.target.closest("select[data-action='confidence']");
      if (!select) return;
      const card = select.closest(".card");
      const id = card?.dataset.id;
      if (!id) return;
      const value = Number(select.value);
      if (value) confidence[id] = value;
      else delete confidence[id];
      localStorage.setItem(confidenceKey, JSON.stringify(confidence));
      render();
      document.querySelector(`[data-id="${CSS.escape(id)}"]`)?.scrollIntoView({ block: "nearest" });
    });
    els.list.addEventListener("click", e => {
      const btn = e.target.closest("button[data-action]");
      if (!btn) return;
      const card = btn.closest(".card");
      const id = card?.dataset.id;
      const item = DATA.find(x => x.id === id);
      if (!item) return;
      if (btn.dataset.action === "toggle") {
        state.open.has(id) ? state.open.delete(id) : state.open.add(id);
      }
      if (btn.dataset.action === "brief") {
        state.open.add(id);
        state.mode = "brief";
        document.querySelectorAll(".modebar [data-mode]").forEach(b => b.classList.toggle("active", b.dataset.mode === "brief"));
      }
      if (btn.dataset.action === "detail") {
        state.open.add(id);
        state.mode = "detail";
        document.querySelectorAll(".modebar [data-mode]").forEach(b => b.classList.toggle("active", b.dataset.mode === "detail"));
      }
      render();
      document.querySelector(`[data-id="${CSS.escape(id)}"]`)?.scrollIntoView({ block: "nearest" });
    });
    render();
  </script>
</body>
</html>
