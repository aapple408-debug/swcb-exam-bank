\n\n測量計算題要注意單位與坐標方向。全站儀可由斜距、垂直角與方位角求三維坐標；水準測量以高程差與閉合差檢核；土方可用平均斷面、方格法、稜柱體公式或等高線面積法。UAV/SfM 題需說明航線規劃、控制點、特徵匹配、束制平差、密點雲、DSM/DTM 與正射影像。若題目圖表未抽出，需回原 PDF 讀取數值後代入。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "103-坡地水文學-第四題", "year": "103", "subject": "坡地水文學", "title": "第四題", "number": "第四題", "question": "四、某集水區排水面積大小、逕流係數 和流入時間如表二所示，其降雨強度 -延時公式 為 i = 2400 t+10 (mm/hr) ，t 單位為分鐘。假設人孔與人孔間之渠流時間皆為 5 分鐘，求 圖二出口之最大流量(cms)？（25分） 分區 面積（公頃） 逕流係數 流入時間（分鐘） A 5 0.8 5 B 5 0.5 15 C 5 0.6 5 D 5 0.5 5 E 5 0.8 25 L0 表一 圖一 出口表二 圖二", "brief": "此題需以集水區面積 3 公頃、坡面與河道流路分段計算集流時間，再由降雨強度公式或 IDF 曲線求設計雨強，最後以合理化公式 `Q=CIA/360` 計算洪峰。若要降低開發後洪峰，應降低 C 值、增加滯洪入滲並改善排水。", "detail": "**表格補充**\n\n| 步驟 | 內容 |\n|---|---|\n| 1 | 劃分坡面流與河道流 |\n| 2 | 分段求集流時間 |\n| 3 | 由 IDF 取設計雨強 |\n| 4 | 選逕流係數 C |\n| 5 | `Q=CIA/360` 求洪峰 |\n\n題目若給坡長、高差與土地利用，需分別求坡面流速與河道流速。面積用 ha、雨強用 mm/hr，計算結果為 cms。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "103-植生工程-第一題", "year": "103", "subject": "植生工程", "title": "第一題", "number": "第一題", "question": "一、臺灣鄉野溪流其不同河段因地形、坡度之植被各有不同生態特色，請問中游段兩岸 已有聚落及農田，其護岸應如何設計較能兼顧安全且同時維持生態綠化？有乾濕季 明顯之河岸應如何讓低水護岸能維持適宜 之生物棲地？請以簡圖及剖面圖舉例 說明之。（25分）", "brief": "植生工程的答案核心是立地條件與植物材料相配合：先改善排水與生育基盤，再選用適地、根系發達、耐逆境且不具入侵性的草灌木或喬木，最後以補植、灌溉、追肥與豪雨後修復確保覆蓋率與成活率。", "detail": "**表格補充**\n\n| 步驟 | 作答重點 |\n|---|---|\n| 立地調查 | 坡度、坡向、土壤、含水、pH、養分、沖蝕與穩定性 |\n| 基礎工 | 截排水、削坡、客土、土壤改良、網材或格框固定 |\n| 植物選擇 | 適地適種、根系發達、耐逆境、材料穩定、避免入侵 |\n| 導入方法 | 撒播、噴植、植生毯、植生袋、苗木、扦插 |\n| 養護 | 補植、灌溉、追肥、刈割、病蟲害與豪雨後修復 |\n\n植生工程不是單純播種，而是利用植物與基盤工程共同恢復坡面穩定與生態功能。崩塌地或道路邊坡需先處理排水與坡面穩定，再依土壤條件選擇草本、灌木或喬木。礦區與不良土壤須客土、調 pH、補有機質與養分。河溪護岸植栽需分區配置耐水、耐沖刷與根系發達植物。若為群落調查，應使用覆蓋度、密度、頻度、重要值、歧異度與相似性等指標評估。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "103-植生工程-第二題", "year": "103", "subject": "植生工程", "title": "第二題", "number": "第二題", "question": "二、臺灣許多都市正積極推動施工圍籬綠美化政策以提升市容、降低粉塵並降溫，請問 植生施工圍籬有那些設計要素？有那些植物較能適應都市工地微氣候，請以簡圖並 舉例說明之。（25分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "103-植生工程-第三題", "year": "103", "subject": "植生工程", "title": "第三題", "number": "第三題", "question": "三、高雄都會公園是昔時西青埔垃圾掩埋場復育再利用，其他都市如臺北山豬窟舊垃圾 掩埋場也均完成復育再利用。請問掩埋場之復育植生要考量那些立地條件？有那些 植物適合生長？如何確保植生綠化之成功率？（25分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "103-植生工程-第四題", "year": "103", "subject": "植生工程", "title": "第四題", "number": "第四題", "question": "四、為因應氣候暖化，降低熱島效應，臺灣各縣市已積極推動屋頂綠化（包括人工地盤 綠化及垂直綠化）。請問屋頂綠化有那些基礎工程應先施作？應考量那些立地條件？ 請簡單設計一個小學的長型教室如下圖之屋頂綠化（no scale），應可種植那些綠色 植物能兼具景觀綠化、生態與教學多元功能？（25分） N 女兒牆 E S W 樓梯 出口 (no scale) 屋 頂", "brief": "植生工程的答案核心是立地條件與植物材料相配合：先改善排水與生育基盤，再選用適地、根系發達、耐逆境且不具入侵性的草灌木或喬木，最後以補植、灌溉、追肥與豪雨後修復確保覆蓋率與成活率。", "detail": "**表格補充**\n\n| 步驟 | 作答重點 |\n|---|---|\n| 立地調查 | 坡度、坡向、土壤、含水、pH、養分、沖蝕與穩定性 |\n| 基礎工 | 截排水、削坡、客土、土壤改良、網材或格框固定 |\n| 植物選擇 | 適地適種、根系發達、耐逆境、材料穩定、避免入侵 |\n| 導入方法 | 撒播、噴植、植生毯、植生袋、苗木、扦插 |\n| 養護 | 補植、灌溉、追肥、刈割、病蟲害與豪雨後修復 |\n\n植生工程不是單純播種，而是利用植物與基盤工程共同恢復坡面穩定與生態功能。崩塌地或道路邊坡需先處理排水與坡面穩定，再依土壤條件選擇草本、灌木或喬木。礦區與不良土壤須客土、調 pH、補有機質與養分。河溪護岸植栽需分區配置耐水、耐沖刷與根系發達植物。若為群落調查，應使用覆蓋度、密度、頻度、重要值、歧異度與相似性等指標評估。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "103-水土保持工程-第一題", "year": "103", "subject": "水土保持工程", "title": "第一題", "number": "第一題", "question": "一、近年來頗多的集水區整體治理規劃工作在執行，請問集水區的土砂來源主要分為那 幾個部分？（5 分）其評估計算的方法為何？（10 分）應如何評估集水區防砂之整 治成效？（5分）", "brief": "野溪與土石流治理應採源頭減砂、通道控流、下游保全，並兼顧生態廊道與維護管理。", "detail": "**表格補充**\n\n| 區位 | 治理重點 |\n|---|---|\n| 發生區 | 崩塌源頭控制、山腹工、植生、排水 |\n| 流動區 | 固床、護岸、導流、透過型防砂 |\n| 堆積區 | 沉砂、攔阻、清淤、導流堤、保全 |\n| 生態面 | 保留孔隙、粗糙度、魚道與濱溪植生 |\n\n野溪工程須先判斷土砂來源、洪峰、河床坡度、粒徑與保全對象。防砂壩、固床工、護岸、沉砂池與導流堤應配合配置，不宜只做單點工程。生態護岸或預鑄護岸需兼顧抗沖刷、基礎護腳、反濾排水、孔隙與植生。施工與完工後清淤維護同樣重要。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "103-水土保持工程-第二題", "year": "103", "subject": "水土保持工程", "title": "第二題", "number": "第二題", "question": "二、土石流的整治為由水土保持機關辦理之工作項目，惟社會大眾常會誤將崩塌通報為 土石流，造成防災工作權責認定問題，請問何謂土石流？（5 分）其種類有那些？ （5分）又土石流防治應如何進行？（10分）試詳細說明之。", "brief": "野溪與土石流治理應採源頭減砂、通道控流、下游保全，並兼顧生態廊道與維護管理。", "detail": "**表格補充**\n\n| 區位 | 治理重點 |\n|---|---|\n| 發生區 | 崩塌源頭控制、山腹工、植生、排水 |\n| 流動區 | 固床、護岸、導流、透過型防砂 |\n| 堆積區 | 沉砂、攔阻、清淤、導流堤、保全 |\n| 生態面 | 保留孔隙、粗糙度、魚道與濱溪植生 |\n\n野溪工程須先判斷土砂來源、洪峰、河床坡度、粒徑與保全對象。防砂壩、固床工、護岸、沉砂池與導流堤應配合配置，不宜只做單點工程。生態護岸或預鑄護岸需兼顧抗沖刷、基礎護腳、反濾排水、孔隙與植生。施工與完工後清淤維護同樣重要。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "103-水土保持工程-第三題", "year": "103", "subject": "水土保持工程", "title": "第三題", "number": "第三題", "question": "三、近年自然生態工法課題頗受重視，請問何謂自然生態工法？（ 5 分）並請以自然生 態觀點說明傳統混凝防砂壩與整流工程之施設對環境的影響。（5 分）又自然生態 工法之野溪治理規劃設計原則為何？（10分）試詳細說明之。", "brief": "短期治理以保全聚落安全為優先，包括清疏堵塞河段、臨時導流、危險土砂攔阻、護岸搶修與警戒避難；長期治理則進行集水區源頭崩塌復育、防砂與固床系統、河道穩定、土地管理與監測維護。", "detail": "**表格補充**\n\n| 時程 | 措施 |\n|---|---|\n| 短期 | 清疏、臨時導流、警戒、保全工程 |\n| 中期 | 固床、護岸、防砂、沉砂空間 |\n| 長期 | 源頭治理、植生復育、監測、土地管理 |\n\n短期工程不可造成下游二次災害；長期規劃需由上游減砂、中游穩定輸移、下游保全三層次處理。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "103-水土保持工程-第四題", "year": "103", "subject": "水土保持工程", "title": "第四題", "number": "第四題", "question": "四、已知摩擦角ψ=30°、γ水上=1.8 t/m3、γ水下=1.5 t/m3、摩擦係數f = 0.2、γ混凝土=2.4 t/m3， 試求下圖之混凝土排水溝受到地下水上揚力的影響，（15分）又應如何改善？（5分） U: m 0.3 3.0 0.3 2.3 1.0 0.3 4.8 4.2", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "103-水土保持工程-第五題", "year": "103", "subject": "水土保持工程", "title": "第五題", "number": "第五題", "question": "五、有一總高度 5 m、基礎埋 ，且上邊坡垂直而下邊坡斜率為 1:0.3 之混凝土擋土牆（混凝土單位重為 2.3 t/m 3），土壤之單位重為 1.89 t/m 3，其 內摩擦角為 25°、凝聚力為 0.8 t/m 2，試檢算背填土坡度分別為 0°、20°時之完全排 水及長期暴雨時對擋土牆傾倒、安定性影響，（15分）又請問應如何改善？（5分）", "brief": "短期治理以保全聚落安全為優先，包括清疏堵塞河段、臨時導流、危險土砂攔阻、護岸搶修與警戒避難；長期治理則進行集水區源頭崩塌復育、防砂與固床系統、河道穩定、土地管理與監測維護。", "detail": "**表格補充**\n\n| 時程 | 措施 |\n|---|---|\n| 短期 | 清疏、臨時導流、警戒、保全工程 |\n| 中期 | 固床、護岸、防砂、沉砂空間 |\n| 長期 | 源頭治理、植生復育、監測、土地管理 |\n\n短期工程不可造成下游二次災害；長期規劃需由上游減砂、中游穩定輸移、下游保全三層次處理。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。"}, {"id": "103-水土保持規劃設計-第一題", "year": "103", "subject": "水土保持規劃設計", "title": "第一題", "number": "第一題", "question": "一、針對採石場之水土保持計畫，請詳述應進行那些調查項目以規劃採石場之採取深 度、採石量與採石後之殘坡穩定？（10分） 如以植生方法保護採石後之殘坡，請詳述其規劃設計原則與植生前期作業為何？ （10分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "103-水土保持規劃設計-第二題", "year": "103", "subject": "水土保持規劃設計", "title": "第二題", "number": "第二題", "question": "二、請詳述以鋼筋混凝土設計之滯洪池，其細部結構設計之流程為何？（10分） 在施工監造時，應該考慮那些重點與注意事項？（10分）", "brief": "水文計算先決定設計雨量、集流時間、逕流係數與集水面積，再求洪峰或歷線；滯洪量由入流與出流歷線最大累積差決定。", "detail": "**表格補充**\n\n| 題型 | 常用公式或方法 |\n|---|---|\n| 合理化公式 | `Q = C I A / 360`，A 用 ha、I 用 mm/hr |\n| 頻率分析 | 由重現期決定超越機率與頻率因子 |\n| 單位歷線 | 有效雨量乘單位歷線並依時間疊加 |\n| 滯洪量 | `dS/dt = I(t)-O(t)`，取最大蓄水量 |\n| 降雨損失 | φ 指數、入滲率或有效雨量計算 |\n\n作答時應先畫出水文流程：降雨、損失、有效雨量、逕流、洪峰與蓄洪。合理化公式適用於小集水區洪峰估算，需以集流時間對應設計降雨強度。單位歷線題則將各時段有效雨量乘以單位歷線並平移疊加。滯洪池題應比較開發前後或允許放流量，利用入流與出流歷線差額求最大蓄水量。若題目只有洪峰而無歷線，不能唯一決定滯洪體積，應說明需雨型或歷線資料。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "103-水土保持規劃設計-第三題", "year": "103", "subject": "水土保持規劃設計", "title": "第三題", "number": "第三題", "question": "三、針對大規模崩塌潛勢高之區位，請詳述如何進行緊急防災方案、避難處所選定與避 難路線等之調查與規劃？（20分）", "brief": "地滑地常見冠部裂縫、滑落崖、反坡台階、凹陷濕地、側裂縫、趾部隆起、湧水與樹木歪斜。除降雨與地震外，岩層順向、斷層破碎帶、深層風化或河流坡腳侵蝕等地質地形因素，可使地滑發展為大規模崩塌。", "detail": "**表格補充**\n\n| 地形特徵 | 意義 |\n|---|---|\n| 冠部裂縫/滑落崖 | 滑動體上緣張裂 |\n| 反坡台階 | 滑動塊體旋轉或錯動 |\n| 趾部隆起 | 下方受擠壓 |\n| 湧水濕地 | 地下水集中 |\n| 歪斜樹木 | 地表緩慢變形 |\n\n大規模崩塌通常需要弱面、地下水與足夠地形能量共同作用。坡腳被河流切蝕會移除支撐，是常見誘因。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "103-水土保持規劃設計-第四題", "year": "103", "subject": "水土保持規劃設計", "title": "第四題", "number": "第四題", "question": "四、請詳述如何應用航照、衛星影像、地理資訊系統（ GIS）與現地勘查等，進行崩塌 災害潛勢分區與分級？（20分）", "brief": "測量成果由觀測量轉為坐標、高程、面積或體積，並以閉合差、中誤差或檢核點確認精度。平面用方位角與距離求橫縱距，高程用水準或三角高程求高差，土方用方格、斷面、TIN 或等高線法計算。", "detail": "**表格補充**\n\n| 題型 | 作答重點 |\n|---|---|\n| 坐標/導線 | 方位角、橫距、縱距、閉合差與平差 |\n| 水準/高程 | 後視、前視、儀器高、閉合差 |\n| 土方 | 方格法、斷面法、等高線法或 TIN |\n| 航測/UAV | 控制點、空三、密點雲、DEM、正射、精度檢核 |\n| GIS | 圖層、屬性、坐標系統、資料庫與服務 |\n\n測量計算題要注意單位與坐標方向。全站儀可由斜距、垂直角與方位角求三維坐標；水準測量以高程差與閉合差檢核；土方可用平均斷面、方格法、稜柱體公式或等高線面積法。UAV/SfM 題需說明航線規劃、控制點、特徵匹配、束制平差、密點雲、DSM/DTM 與正射影像。若題目圖表未抽出，需回原 PDF 讀取數值後代入。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "103-水土保持規劃設計-第五題", "year": "103", "subject": "水土保持規劃設計", "title": "第五題", "number": "第五題", "question": "五、臺灣的廬山層常見板岩岩體（slate rock mass ）邊坡，請詳述板岩岩體邊坡一般有 那些弱面與這些弱面形成的機制為何？（10分） 如何評估岩體邊坡的破壞準則以利岩體邊坡穩定分析？（10分）", "brief": "岩體弱面包括層面、節理、劈理、片理、斷層、剪裂帶、裂隙與不整合面。弱面會降低岩體整體強度、造成各向異性並控制滑動、楔形破壞或傾倒破壞；評估整體強度需考慮弱面方向、間距、連續性、粗糙度、填充物、地下水與風化程度。", "detail": "**表格補充**\n\n| 弱面 | 影響 |\n|---|---|\n| 層面/片理 | 可能形成順向滑動面 |\n| 節理 | 切割岩體，降低完整性 |\n| 斷層破碎帶 | 強度低、透水高 |\n| 裂隙填泥 | 抗剪強度降低 |\n| 地下水 | 降低有效應力 |\n\n可用 RQD、RMR、Q-system、GSI 與現地節理調查評估岩體品質與強度。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "103-測量學-第一題", "year": "103", "subject": "測量學", "title": "第一題", "number": "第一題", "question": "一、試述測量工作原則上要遵循「從整體到局 部」、「先控制後碎部」之用意為何？ （25分）", "brief": "測量成果由觀測量轉為坐標、高程、面積或體積，並以閉合差、中誤差或檢核點確認精度。平面用方位角與距離求橫縱距，高程用水準或三角高程求高差，土方用方格、斷面、TIN 或等高線法計算。", "detail": "**表格補充**\n\n| 題型 | 作答重點 |\n|---|---|\n| 坐標/導線 | 方位角、橫距、縱距、閉合差與平差 |\n| 水準/高程 | 後視、前視、儀器高、閉合差 |\n| 土方 | 方格法、斷面法、等高線法或 TIN |\n| 航測/UAV | 控制點、空三、密點雲、DEM、正射、精度檢核 |\n| GIS | 圖層、屬性、坐標系統、資料庫與服務 |\n\n測量計算題要注意單位與坐標方向。全站儀可由斜距、垂直角與方位角求三維坐標；水準測量以高程差與閉合差檢核；土方可用平均斷面、方格法、稜柱體公式或等高線面積法。UAV/SfM 題需說明航線規劃、控制點、特徵匹配、束制平差、密點雲、DSM/DTM 與正射影像。若題目圖表未抽出，需回原 PDF 讀取數值後代入。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "103-測量學-第二題", "year": "103", "subject": "測量學", "title": "第二題", "number": "第二題", "question": "二、試述何謂直線定向？又測量中常用的標準方向有那三種？（25分）", "brief": "測量成果由觀測量轉為坐標、高程、面積或體積，並以閉合差、中誤差或檢核點確認精度。平面用方位角與距離求橫縱距，高程用水準或三角高程求高差，土方用方格、斷面、TIN 或等高線法計算。", "detail": "**表格補充**\n\n| 題型 | 作答重點 |\n|---|---|\n| 坐標/導線 | 方位角、橫距、縱距、閉合差與平差 |\n| 水準/高程 | 後視、前視、儀器高、閉合差 |\n| 土方 | 方格法、斷面法、等高線法或 TIN |\n| 航測/UAV | 控制點、空三、密點雲、DEM、正射、精度檢核 |\n| GIS | 圖層、屬性、坐標系統、資料庫與服務 |\n\n測量計算題要注意單位與坐標方向。全站儀可由斜距、垂直角與方位角求三維坐標；水準測量以高程差與閉合差檢核；土方可用平均斷面、方格法、稜柱體公式或等高線面積法。UAV/SfM 題需說明航線規劃、控制點、特徵匹配、束制平差、密點雲、DSM/DTM 與正射影像。若題目圖表未抽出，需回原 PDF 讀取數值後代入。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "103-測量學-第三題", "year": "103", "subject": "測量學", "title": "第三題", "number": "第三題", "question": "三、試述何謂地貌及地形圖圖式？又表示地物的符號分那幾類？另在地形圖上表示地貌 的主要方法為何？（25分）", "brief": "測量成果由觀測量轉為坐標、高程、面積或體積，並以閉合差、中誤差或檢核點確認精度。平面用方位角與距離求橫縱距，高程用水準或三角高程求高差，土方用方格、斷面、TIN 或等高線法計算。", "detail": "**表格補充**\n\n| 題型 | 作答重點 |\n|---|---|\n| 坐標/導線 | 方位角、橫距、縱距、閉合差與平差 |\n| 水準/高程 | 後視、前視、儀器高、閉合差 |\n| 土方 | 方格法、斷面法、等高線法或 TIN |\n| 航測/UAV | 控制點、空三、密點雲、DEM、正射、精度檢核 |\n| GIS | 圖層、屬性、坐標系統、資料庫與服務 |\n\n測量計算題要注意單位與坐標方向。全站儀可由斜距、垂直角與方位角求三維坐標；水準測量以高程差與閉合差檢核；土方可用平均斷面、方格法、稜柱體公式或等高線面積法。UAV/SfM 題需說明航線規劃、控制點、特徵匹配、束制平差、密點雲、DSM/DTM 與正射影像。若題目圖表未抽出，需回原 PDF 讀取數值後代入。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "103-測量學-第四題", "year": "103", "subject": "測量學", "title": "第四題", "number": "第四題", "question": "四、試述何謂航空攝影測量及地面攝影測量？另請說明航攝像片與地形圖在圖形表示上 有何區別？（25分）", "brief": "航空攝影測量由影像重疊與空三建立立體模型，適合產製正射影像與地表模型；空載光達以雷射直接量距，可取得點雲並部分穿透植被，較適合森林或複雜地形 DEM。", "detail": "**表格補充**\n\n| 項目 | 航空攝影測量 | 空載光達 |\n|---|---|---|\n| 資料 | 影像 | 雷射點雲 |\n| 優點 | 影像紋理佳、正射圖品質高 | 可穿透植被、地形點取得佳 |\n| 限制 | 植被遮蔽地面、需紋理 | 成本高、點雲需分類 |\n| DEM | 由影像匹配/立測 | 由地面點分類內插 |\n\n兩者可互補：攝影測量提供影像判釋與正射，LiDAR 提供高精度地形點。成果均需控制點、坐標系統與精度檢核。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "102-土壤物理與沖蝕-第一題", "year": "102", "subject": "土壤物理與沖蝕", "title": "第一題", "number": "第一題", "question": "一、降雨動能是用來評估土壤沖蝕降雨逕流因子（The rainfall and runoff factor ）的參數。 試說明估算一場降雨之動能需要那些水文資料？以及如何估算？（20分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "102-土壤物理與沖蝕-第二題", "year": "102", "subject": "土壤物理與沖蝕", "title": "第二題", "number": "第二題", "question": "二、通用土壤流失公式（The Universal Soil Loss Equation，簡稱 USLE）適用之最短坡長 為何？為何太短的坡長不適用？（20分）", "brief": "土壤流失量可用 `A=R K L S C P` 估算，R 為降雨沖蝕力、K 為土壤沖蝕性、LS 為坡長坡度、C 為覆蓋管理、P 為保育措施。若題目問產砂量，需再考慮泥砂遞移率、沉積與分區流失比例。", "detail": "**表格補充**\n\n| 因子 | 意義 | 作答重點 |\n|---|---|---|\n| R | 降雨沖蝕力 | 由降雨動能與短延時雨強表示 |\n| K | 土壤沖蝕性 | 受質地、有機質、構造、透水性影響 |\n| LS | 坡長坡度 | 坡長愈長、坡度愈陡，流失量愈大 |\n| C | 覆蓋管理 | 裸露地最大，植生與敷蓋可降低 |\n| P | 保育措施 | 等高、平台、截排水等可降低 |\n\n先界定計算對象為坡面片蝕與細溝沖蝕，再列 A = R K L S C P。開發前、中、後應分別選用不同坡長、坡度、覆蓋與保育措施因子。施工中因裸露、擾動與壓實，C 值通常最大；完工後若有建築、鋪面、植生與排水，坡面流失量可能下降但逕流量可能上升。若題目要求分段坡面，應由上游至下游累積坡長計算各段 LS 或土壤流失比例，最後用面積加權求全區平均。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；USLE 題重點是 A=R K LS C P，並分清楚 C 為覆蓋管理、P 為保育措施效果。"}, {"id": "102-土壤物理與沖蝕-第三題", "year": "102", "subject": "土壤物理與沖蝕", "title": "第三題", "number": "第三題", "question": "三、農民常被鼓勵在農地施作綠肥。試說明綠肥為何對控制土壤沖蝕有效益。（20分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "102-土壤物理與沖蝕-第四題", "year": "102", "subject": "土壤物理與沖蝕", "title": "第四題", "number": "第四題", "question": "四、沈砂池（sediment basin）常被用來控制沖蝕之泥砂流到下游地區之一種工法。試說 明一般沈砂池之工程應包含那些？（如進水口）（20分）", "brief": "野溪與土石流治理應採源頭減砂、通道控流、下游保全，並兼顧生態廊道與維護管理。", "detail": "**表格補充**\n\n| 區位 | 治理重點 |\n|---|---|\n| 發生區 | 崩塌源頭控制、山腹工、植生、排水 |\n| 流動區 | 固床、護岸、導流、透過型防砂 |\n| 堆積區 | 沉砂、攔阻、清淤、導流堤、保全 |\n| 生態面 | 保留孔隙、粗糙度、魚道與濱溪植生 |\n\n野溪工程須先判斷土砂來源、洪峰、河床坡度、粒徑與保全對象。防砂壩、固床工、護岸、沉砂池與導流堤應配合配置，不宜只做單點工程。生態護岸或預鑄護岸需兼顧抗沖刷、基礎護腳、反濾排水、孔隙與植生。施工與完工後清淤維護同樣重要。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "102-土壤物理與沖蝕-第五題", "year": "102", "subject": "土壤物理與沖蝕", "title": "第五題", "number": "第五題", "question": "五、非點源污染（Non-Point Source Pollution ）絶大部分來自於坡地集水區農地之土壤沖 蝕。試說明造成臺灣坡地集水區農地大量土壤沖蝕之原因及改善之法。（20分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "102-坡地水文學-第一題", "year": "102", "subject": "坡地水文學", "title": "第一題", "number": "第一題", "question": "一、如圖一所示之集水區總集水面積為400 平方公里，其主流上游具兩支流，且集水區最 下游處有一水庫。假設應用單位歷線進行集水區降雨－逕流演算之集水面積不得大於 150 平方公里。匯流點 A 上游之總集水面積為 280 平方公里，且各支流之集水面積 均小於 150 平方公里。假設該集水區發生一場暴雨事件，請考慮單位歷線逕流演算、 主流基流量 Q 0、主流之河道蓄水（ channel storage ）功能、水庫蓄水（ reservoir sto  "第四題", "number": "第四題", "question": "四、在無流量觀測站之地區，SCS曲線值（SCS Curve Number，CN）常被應用於計算總 降雨損失與總有效雨量。某集水區多為良好之植生覆蓋，其 SCS CN值為 60。 請參考圖三，繪圖說明該集水區之暴雨事件總降雨量與有效降雨量之關係曲線， 並在該曲線上註明初始損失量（Initial abstraction, Ia）。（10分） 該集水區發生一場總降雨量為213.36公釐（1英吋 = 25.4 公釐，1 inch = 25.4 mm ） 之暴雨事件，計算在該暴雨事件狀況下之總有效降雨量與初始損失量（均以公釐 表之）。（10分） （請接第三頁） Curves on this sheet are for the Case Ia=0.2S, so that 0.8SP 0.2S)(PQ 2 + −= Rainfall (P), inches Direct runoff (Q), inches 圖三 102年專門職業及技術人員高等考試建築師、技師、第二次 食品技師考試暨普通考試不動產經紀人、記帳士考試試題 代號：02850 等 別 ： 高等考試 類 科 ： 水土保持技師 科 目 ： 坡地水文學 全三頁 第三頁 Q Qp = 5.6576 cms 16.50 60 分鐘 圖四", "brief": "地表覆蓋可吸收雨滴動能、避免結皮、增加粗糙度、降低逕流速度並攔截泥砂。", "detail": "**表格補充**\n\n| 作用對象 | 覆蓋功能 |\n|---|---|\n| 雨濺沖蝕 | 吸收雨滴能量，避免團粒破碎與孔隙堵塞 |\n| 片蝕 | 增加地表粗糙度，降低薄層流速度 |\n| 細溝蝕 | 分散逕流，降低集中水流 |\n| 水分管理 | 減少蒸發，促進入滲與種子發芽 |\n\n裸露地表受雨滴撞擊後，土粒分散並堵塞孔隙，形成結皮，使入滲下降、逕流增加。敷蓋、枯落物、植生毯、草生覆蓋與作物殘株可先吸收雨滴動能，減少濺蝕；同時增加地表粗糙度，使逕流流速與剪應力降低。活體植生根系還能改善團粒、增加孔隙與抗剪強度，因此兼具短期防沖蝕與長期土壤改良效果。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "102-坡地水文學-第五題", "year": "102", "subject": "坡地水文學", "title": "第五題", "number": "第五題", "question": "五、一坡地社區開發需於社區之下游端設置滯洪池（detention pond ）。該社區開發後之 各項水文、地文特性為：設計暴雨重現期為 10 年，集水面積為 20 公頃，集流時間 （tc）為 15 分鐘，平均逕流係數 c = 0.75 ，降雨強度－延時－頻率（ Intensity- Duration-Frequency, IDF ）公式為 4.0 3.0 )6( 230 + = tr Ti ，其中 i（強度）， T（重現期）， tr（延時）之單位分別為公釐/小時，年與分鐘。某工程師令降雨延時等於集流時間， 並依據設計規範之要求，以合理化公式計算得尖峰流量如下： )/(7813.135 )615( 10230 )6( 230 4.0 3.0 4.0 3.0 hrmm tr Ti = + ×= + = 6576.5360 207813.13575.0 360 =××== ciAQp （立方米/秒） 該工程師又依據 SCS 三角形單位歷線之特性，計算尖峰流量發生時間為 cp ttrt 6.02 += 5.16156.02 15 =×+= （分鐘 ）， 單位歷線基期為 055.4467.2 == pb tt （分鐘）。但設計規範規定逕流歷線基期不足一小時者，需以一小時計之，故採用 歷線基期 tb = 60 分鐘，而得到該滯洪池之入流量直接逕流歷線如圖四所示，並以之 設計滯洪池。 請從有效降雨體積、流入滯洪池之總直接逕流體積、單位歷線之定義與SCS三角形單位歷 線之特性，詳細說明上述滯洪池入流量直接逕流歷線計算之錯誤或不合理之處。（20分）", "brief": "水文計算先決定設計雨量、集流時間、逕流係數與集水面積，再求洪峰或歷線；滯洪量由入流與出流歷線最大累積差決定。", "detail": "**表格補充**\n\n| 題型 | 常用公式或方法 |\n|---|---|\n| 合理化公式 | `Q = C I A / 360`，A 用 ha、I 用 mm/hr |\n| 頻率分析 | 由重現期決定超越機率與頻率因子 |\n| 單位歷線 | 有效雨量乘單位歷線並依時間疊加 |\n| 滯洪量 | `dS/dt = I(t)-O(t)`，取最大蓄水量 |\n| 降雨損失 | φ 指數、入滲率或有效雨量計算 |\n\n作答時應先畫出水文流程：降雨、損失、有效雨量、逕流、洪峰與蓄洪。合理化公式適用於小集水區洪峰估算，需以集流時間對應設計降雨強度。單位歷線題則將各時段有效雨量乘以單位歷線並平移疊加。滯洪池題應比較開發前後或允許放流量，利用入流與出流歷線差額求最大蓄水量。若題目只有洪峰而無歷線，不能唯一決定滯洪體積，應說明需雨型或歷線資料。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "102-植生工程-第一題", "year": "102", "subject": "植生工程", "title": "第一題", "number": "第一題", "question": "一、百喜草為農地地區常用植草覆蓋草種，試說明其品系來源、形態特性、栽植方法及 可配合農地水土保持方法之施作地點等。（20分）", "brief": "地表覆蓋可吸收雨滴動能、避免結皮、增加粗糙度、降低逕流速度並攔截泥砂。", "detail": "**表格補充**\n\n| 作用對象 | 覆蓋功能 |\n|---|---|\n| 雨濺沖蝕 | 吸收雨滴能量，避免團粒破碎與孔隙堵塞 |\n| 片蝕 | 增加地表粗糙度，降低薄層流速度 |\n| 細溝蝕 | 分散逕流，降低集中水流 |\n| 水分管理 | 減少蒸發，促進入滲與種子發芽 |\n\n裸露地表受雨滴撞擊後，土粒分散並堵塞孔隙，形成結皮，使入滲下降、逕流增加。敷蓋、枯落物、植生毯、草生覆蓋與作物殘株可先吸收雨滴動能，減少濺蝕；同時增加地表粗糙度，使逕流流速與剪應力降低。活體植生根系還能改善團粒、增加孔隙與抗剪強度，因此兼具短期防沖蝕與長期土壤改良效果。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "102-植生工程-第二題", "year": "102", "subject": "植生工程", "title": "第二題", "number": "第二題", "question": "二、何謂土壤袋植生？土壤袋植生所使用之袋體材料、土壤材料、植物材料如何設計與 規範？試分別說明之。（20分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "102-植生工程-第三題", "year": "102", "subject": "植生工程", "title": "第三題", "number": "第三題", "question": "三、何謂厚層噴植？厚層噴植常使用於那些地點？可配合那些坡面保護工程施作？如期 望噴植施工後快速達到坡面林木覆蓋之成效，應如何考量其植生基材之規範？試分 別說明之。（20分）", "brief": "地表覆蓋可吸收雨滴動能、避免結皮、增加粗糙度、降低逕流速度並攔截泥砂。", "detail": "**表格補充**\n\n| 作用對象 | 覆蓋功能 |\n|---|---|\n| 雨濺沖蝕 | 吸收雨滴能量，避免團粒破碎與孔隙堵塞 |\n| 片蝕 | 增加地表粗糙度，降低薄層流速度 |\n| 細溝蝕 | 分散逕流，降低集中水流 |\n| 水分管理 | 減少蒸發，促進入滲與種子發芽 |\n\n裸露地表受雨滴撞擊後，土粒分散並堵塞孔隙，形成結皮，使入滲下降、逕流增加。敷蓋、枯落物、植生毯、草生覆蓋與作物殘株可先吸收雨滴動能，減少濺蝕；同時增加地表粗糙度，使逕流流速與剪應力降低。活體植生根系還能改善團粒、增加孔隙與抗剪強度，因此兼具短期防沖蝕與長期土壤改良效果。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "102-植生工程-第四題", "year": "102", "subject": "植生工程", "title": "第四題", "number": "第四題", "question": "四、何謂打鐵（鋼筋）樁編柵？其常使用那些網柵材料？試分別就其材料性質、適用地 點、施工作業方法及相關應注意事項等，分別說明之。（20分）", "brief": "植生工程的答案核心是立地條件與植物材料相配合：先改善排水與生育基盤，再選用適地、根系發達、耐逆境且不具入侵性的草灌木或喬木，最後以補植、灌溉、追肥與豪雨後修復確保覆蓋率與成活率。", "detail": "**表格補充**\n\n| 步驟 | 作答重點 |\n|---|---|\n| 立地調查 | 坡度、坡向、土壤、含水、pH、養分、沖蝕與穩定性 |\n| 基礎工 | 截排水、削坡、客土、土壤改良、網材或格框固定 |\n| 植物選擇 | 適地適種、根系發達、耐逆境、材料穩定、避免入侵 |\n| 導入方法 | 撒播、噴植、植生毯、植生袋、苗木、扦插 |\n| 養護 | 補植、灌溉、追肥、刈割、病蟲害與豪雨後修復 |\n\n植生工程不是單純播種，而是利用植物與基盤工程共同恢復坡面穩定與生態功能。崩塌地或道路邊坡需先處理排水與坡面穩定，再依土壤條件選擇草本、灌木或喬木。礦區與不良土壤須客土、調 pH、補有機質與養分。河溪護岸植栽需分區配置耐水、耐沖刷與根系發達植物。若為群落調查，應使用覆蓋度、密度、頻度、重要值、歧異度與相似性等指標評估。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "102-植生工程-第五題", "year": "102", "subject": "植生工程", "title": "第五題", "number": "第五題", "question": "五、請試述下列名詞之意涵：（每小題 5分，共 20分） 棲息島（habitat islands） 綠覆率（ratio of green coverage） 土壤硬度（soil hardness） 草莖舖植（grass stem pavement）", "brief": "植生工程的答案核心是立地條件與植物材料相配合：先改善排水與生育基盤，再選用適地、根系發達、耐逆境且不具入侵性的草灌木或喬木，最後以補植、灌溉、追肥與豪雨後修復確保覆蓋率與成活率。", "detail": "**表格補充**\n\n| 步驟 | 作答重點 |\n|---|---|\n| 立地調查 | 坡度、坡向、土壤、含水、pH、養分、沖蝕與穩定性 |\n| 基礎工 | 截排水、削坡、客土、土壤改良、網材或格框固定 |\n| 植物選擇 | 適地適種、根系發達、耐逆境、材料穩定、避免入侵 |\n| 導入方法 | 撒播、噴植、植生毯、植生袋、苗木、扦插 |\n| 養護 | 補植、灌溉、追肥、刈割、病蟲害與豪雨後修復 |\n\n植生工程不是單純播種，而是利用植物與基盤工程共同恢復坡面穩定與生態功能。崩塌地或道路邊坡需先處理排水與坡面穩定，再依土壤條件選擇草本、灌木或喬木。礦區與不良土壤須客土、調 pH、補有機質與養分。河溪護岸植栽需分區配置耐水、耐沖刷與根系發達植物。若為群落調查，應使用覆蓋度、密度、頻度、重要值、歧異度與相似性等指標評估。", "source_type": "past", "source_label": "歷屆考古題", "points": "", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "102-水土保持工程-第一題", "year": "102", "subject": "水土保持工程", "title": "第一題", "number": "第一題", "question": "一、請試述下列名詞之意涵：（每小題 5分，共 25分） 整地（Tillage） 綠建築（Green buildings） 地工織物（Geotextile） 加勁椰纖毯（Composite coconut fiber reinforcement mat） 集水區整治率（Completion ratio）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "102-水土保持工程-第二題", "year": "102", "subject": "水土保持工程", "title": "第二題", "number": "第二題", "question": "二、山坡地集水區致災因素多以土砂為主，故整體治理對策應以「保土蓄水、減災避災」 措施為主軸，請詳述經由集水區的全面調查、彙整和分析，歸納出問題的本質和災害 的根本之後，採用工程和非工程措施交互使用，以研擬問題的解決之道。（25分）", "brief": "野溪與土石流治理應採源頭減砂、通道控流、下游保全，並兼顧生態廊道與維護管理。", "detail": "**表格補充**\n\n| 區位 | 治理重點 |\n|---|---|\n| 發生區 | 崩塌源頭控制、山腹工、植生、排水 |\n| 流動區 | 固床、護岸、導流、透過型防砂 |\n| 堆積區 | 沉砂、攔阻、清淤、導流堤、保全 |\n| 生態面 | 保留孔隙、粗糙度、魚道與濱溪植生 |\n\n野溪工程須先判斷土砂來源、洪峰、河床坡度、粒徑與保全對象。防砂壩、固床工、護岸、沉砂池與導流堤應配合配置，不宜只做單點工程。生態護岸或預鑄護岸需兼顧抗沖刷、基礎護腳、反濾排水、孔隙與植生。施工與完工後清淤維護同樣重要。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "102-水土保持工程-第三題", "year": "102", "subject": "水土保持工程", "title": "第三題", "number": "第三題", "question": "三、請詳述崩塌地處理之原則與方法。（25分）", "brief": "植生工程的答案核心是立地條件與植物材料相配合：先改善排水與生育基盤，再選用適地、根系發達、耐逆境且不具入侵性的草灌木或喬木，最後以補植、灌溉、追肥與豪雨後修復確保覆蓋率與成活率。", "detail": "**表格補充**\n\n| 步驟 | 作答重點 |\n|---|---|\n| 立地調查 | 坡度、坡向、土壤、含水、pH、養分、沖蝕與穩定性 |\n| 基礎工 | 截排水、削坡、客土、土壤改良、網材或格框固定 |\n| 植物選擇 | 適地適種、根系發達、耐逆境、材料穩定、避免入侵 |\n| 導入方法 | 撒播、噴植、植生毯、植生袋、苗木、扦插 |\n| 養護 | 補植、灌溉、追肥、刈割、病蟲害與豪雨後修復 |\n\n植生工程不是單純播種，而是利用植物與基盤工程共同恢復坡面穩定與生態功能。崩塌地或道路邊坡需先處理排水與坡面穩定，再依土壤條件選擇草本、灌木或喬木。礦區與不良土壤須客土、調 pH、補有機質與養分。河溪護岸植栽需分區配置耐水、耐沖刷與根系發達植物。若為群落調查，應使用覆蓋度、密度、頻度、重要值、歧異度與相似性等指標評估。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。"}, {"id": "102-水土保持工程-第四題", "year": "102", "subject": "水土保持工程", "title": "第四題", "number": "第四題", "question": "四、請詳述集水區防災區位研擬及治理優先順序。（25分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "102-水土保持規劃設計-第一題", "year": "102", "subject": "水土保持規劃設計", "title": "第一題", "number": "第一題", "question": "一、一寬闊渠道，每公尺寬之流量為3 cms，渠床縱坡為0.04，曼寧 n = 0.014 試求正常 水深為若干？（7 分）作用於渠床上之平均剪應力？（6 分）每 1000 m 長，每 1 m寬之渠流能量損耗為若干Kw？（6分）此渠流為臨界流或超臨界流？（6分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "102-水土保持規劃設計-第二題", "year": "102", "subject": "水土保持規劃設計", "title": "第二題", "number": "第二題", "question": "二、於土石流特定水土保持區，長期水土保持計畫每 5 年必須通盤檢討，試將水理檢討 與分析分成幾類？（5 分）其目的為何？（5 分）並將各類之檢討與分析的方法詳 細述之。（10分）", "brief": "短期治理以保全聚落安全為優先，包括清疏堵塞河段、臨時導流、危險土砂攔阻、護岸搶修與警戒避難；長期治理則進行集水區源頭崩塌復育、防砂與固床系統、河道穩定、土地管理與監測維護。", "detail": "**表格補充**\n\n| 時程 | 措施 |\n|---|---|\n| 短期 | 清疏、臨時導流、警戒、保全工程 |\n| 中期 | 固床、護岸、防砂、沉砂空間 |\n| 長期 | 源頭治理、植生復育、監測、土地管理 |\n\n短期工程不可造成下游二次災害；長期規劃需由上游減砂、中游穩定輸移、下游保全三層次處理。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "102-水土保持規劃設計-第三題", "year": "102", "subject": "水土保持規劃設計", "title": "第三題", "number": "第三題", "question": "三、何謂 Navier- Stokes equations 試將其方程式寫出，並描述各符號代表意義？（10 分） 再將各項代表之物理意義寫出？（10分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "d {"id": "102-測量學-第四題", "year": "102", "subject": "測量學", "title": "第四題", "number": "第四題", "question": "四、航照判識之程序有四：由簡入繁（系統化：運輸、灌溉等系統、…非農作物…）、 由博而專（大處著眼再及於微末）、由知到未知（引發聯想）、本性為先（如大小 與形狀等）。請依序舉例說明之。（每一程序為 5分，共 20分）", "brief": "測量成果由觀測量轉為坐標、高程、面積或體積，並以閉合差、中誤差或檢核點確認精度。平面用方位角與距離求橫縱距，高程用水準或三角高程求高差，土方用方格、斷面、TIN 或等高線法計算。", "detail": "**表格補充**\n\n| 題型 | 作答重點 |\n|---|---|\n| 坐標/導線 | 方位角、橫距、縱距、閉合差與平差 |\n| 水準/高程 | 後視、前視、儀器高、閉合差 |\n| 土方 | 方格法、斷面法、等高線法或 TIN |\n| 航測/UAV | 控制點、空三、密點雲、DEM、正射、精度檢核 |\n| GIS | 圖層、屬性、坐標系統、資料庫與服務 |\n\n測量計算題要注意單位與坐標方向。全站儀可由斜距、垂直角與方位角求三維坐標；水準測量以高程差與閉合差檢核；土方可用平均斷面、方格法、稜柱體公式或等高線面積法。UAV/SfM 題需說明航線規劃、控制點、特徵匹配、束制平差、密點雲、DSM/DTM 與正射影像。若題目圖表未抽出，需回原 PDF 讀取數值後代入。", "source_type": "past", "source_label": "歷屆考古題", "points": "", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "101-土壤物理與沖蝕-第一題", "year": "101", "subject": "土壤物理與沖蝕", "title": "第一題", "number": "第一題", "question": "一、說明何謂土壤構造（soil structure）？並說明土壤構造形成之過程和其在土壤保育上 之重要性。（20分）", "brief": "黏土礦物可依矽氧四面體與鋁氧八面體層狀結構分為 1:1 型、2:1 型與 2:1:1 型。高嶺石屬 1:1 型，膨脹性與 CEC 較低；蒙脫石屬 2:1 型，膨脹性、保水性與 CEC 高；伊萊石膨脹性中低；蛭石 CEC 高；綠泥石為 2:1:1 型。", "detail": "**表格補充**\n\n| 類型 | 代表 | 主要特性 |\n|---|---|---|\n| 1:1 | 高嶺石 | 膨脹小、CEC 低、較穩定 |\n| 2:1 膨脹型 | 蒙脫石 | 膨脹收縮大、保水與 CEC 高 |\n| 2:1 非膨脹型 | 伊萊石 | 鉀固定，膨脹較小 |\n| 2:1 高電荷 | 蛭石 | CEC 高，保肥力強 |\n| 2:1:1 | 綠泥石 | 層間有氫氧化物片，膨脹小 |\n\n黏土礦物結構控制比表面積、膨脹收縮、保水、陽離子交換容量與團粒穩定。2:1 型膨脹性黏土遇水膨脹、乾燥收縮，會影響孔隙、入滲與邊坡穩定；1:1 型較穩定但保肥力較低。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "101-土壤物理與沖蝕-第二題", "year": "101", "subject": "土壤物理與沖蝕", "title": "第二題", "number": "第二題", "question": "二、在做土壤保育規劃時土壤圖能提供那些有用資料？（20分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "101-土壤物理與沖蝕-第三題", "year": "101", "subject": "土壤物理與沖蝕", "title": "第三題", "number": "第三題", "question": "三、何謂土壤水分特性曲線？它在土壤水分移動上扮演何種角色？（20分）", "brief": "土壤水分與孔隙決定入滲、保水、排水與逕流。大孔隙促進入滲與通氣，小孔隙提高保水；表面結皮、壓實與高初始含水量會降低入滲並增加逕流，接近飽和時孔隙水壓上升且邊坡穩定性下降。", "detail": "**表格補充**\n\n| 概念 | 技師考試作答重點 |\n|---|---|\n| 入滲 | 水由地表進入土壤，受雨強、孔隙、初始含水量與表面結皮影響 |\n| 滲透/水力傳導 | 水在土體內受水頭梯度流動 |\n| 田間含水量 | 重力水排除後土壤保留水分 |\n| 凋萎點 | 植物無法再吸水恢復之含水量 |\n| 水分特性曲線 | 含水量與基質吸力關係，砂土曲線陡、黏土保水高 |\n\n土壤水分可用重量含水量、體積含水量、飽和度與水勢表示。砂土大孔隙多，入滲快、排水快、保水差；黏土微孔隙多，保水高但入滲與排水慢。土壤水分特性曲線可用壓力板、張力計、砂箱、離心法或露點水勢儀測得，並有乾濕過程不同的遲滯現象。坡地上若入滲不足，地表逕流與片蝕增加；若土體接近飽和，孔隙水壓上升、有效應力降低，可能誘發崩塌。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "101-土壤物理與沖蝕-第四題", "year": "101", "subject": "土壤物理與沖蝕", "title": "第四題", "number": "第四題", "question": "四、試說明形成 U型、V型、或 UV複合型沖蝕溝之土壤與地質特性。（20分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "101-土壤物理與沖蝕-第五題", "year": "101", "subject": "土壤物理與沖蝕", "title": "第五題", "number": "第五題", "question": "五、今擬開發一山坡地，試說明如何估算開發前、中、後之土壤流失量與泥砂產量。 （20分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "101-坡地水文學-第一題", "year": "101", "subject": "坡地水文學", "title": "第一題", "number": "第一題", "question": "一、請說明降雨從到達森林植生覆蓋良好之坡地集水區樹冠後，到成為溪流水期間發生 的地面上及地面下，水的水文儲存移動現象過程。（25分）", "brief": "地表覆蓋可吸收雨滴動能、避免結皮、增加粗糙度、降低逕流速度並攔截泥砂。", "detail": "**表格補充**\n\n| 作用對象 | 覆蓋功能 |\n|---|---|\n| 雨濺沖蝕 | 吸收雨滴能量，避免團粒破碎與孔隙堵塞 |\n| 片蝕 | 增加地表粗糙度，降低薄層流速度 |\n| 細溝蝕 | 分散逕流，降低集中水流 |\n| 水分管理 | 減少蒸發，促進入滲與種子發芽 |\n\n裸露地表受雨滴撞擊後，土粒分散並堵塞孔隙，形成結皮，使入滲下降、逕流增加。敷蓋、枯落物、植生毯、草生覆蓋與作物殘株可先吸收雨滴動能，減少濺蝕；同時增加地表粗糙度，使逕流流速與剪應力降低。活體植生根系還能改善團粒、增加孔隙與抗剪強度，因此兼具短期防沖蝕與長期土壤改良效果。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "101-坡地水文學-第二題", "year": "101", "subject": "坡地水文學", "title": "第二題", "number": "第二題", "question": "二、依學理用水平衡（Water balance）各項目說明： 坡地集水區森林覆蓋和水的年生 產量（annual water yield ）及低水流量（low flow）或低水基流量（low water base- flow）的關係。（9 分）集水區森林伐採去除後對年流量（水年生產量）的影響， 理由為何？（8分）如何維持低水流量？（8分）", "brief": "地表覆蓋可吸收雨滴動能、避免結皮、增加粗糙度、降低逕流速度並攔截泥砂。", "detail": "**表格補充**\n\n| 作用對象 | 覆蓋功能 |\n|---|---|\n| 雨濺沖蝕 | 吸收雨滴能量，避免團粒破碎與孔隙堵塞 |\n| 片蝕 | 增加地表粗糙度，降低薄層流速度 |\n| 細溝蝕 | 分散逕流，降低集中水流 |\n| 水分管理 | 減少蒸發，促進入滲與種子發芽 |\n\n裸露地表受雨滴撞擊後，土粒分散並堵塞孔隙，形成結皮，使入滲下降、逕流增加。敷蓋、枯落物、植生毯、草生覆蓋與作物殘株可先吸收雨滴動能，減少濺蝕；同時增加地表粗糙度，使逕流流速與剪應力降低。活體植生根系還能改善團粒、增加孔隙與抗剪強度，因此兼具短期防沖蝕與長期土壤改良效果。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "101-坡地水文學-第三題", "year": "101", "subject": "坡地水文學", "title": "第三題", "number": "第三題", "question": "三、用於比較土地利用改變（皆伐、造林……）前後不同時期，集水區水文特性（流量、含 砂量……）變化之試驗方法，有單一集水區（single watershed）和配對集水區（paired watershed）兩種方法；試說明此兩種方法之內容，並比較其優缺點。（25分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "101-坡地水文學-第四題", "year": "101", "subject": "坡地水文學", "title": "第四題", "number": "第四題", "question": "四、說明計算集水區平均雨量的方法。（25分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "101-植生工程-第一題", "year": "101", "subject": "植生工程", "title": "第一題", "number": "第一題", "question": "一、水土保持在國土保育中占有重要地位，臺灣多山，溪流短急，請舉一條臺灣經常有 土石沖刷問題之河川，說明不同河段之植群特色，以及其最適宜之水土保持植生策 略為何？請用剖面圖輔助說明之。（25分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "101-植生工程-第二題", "year": "101", "subject": "植生工程", "title": "第二題", "number": "第二題", "question": "二、臺灣山區多脆弱地質，許多山區公路與產業道路經常有崩塌情形。請問在易發生崩 塌路段所設置之明隧道其上方應用何種植生以達水土保持與景觀綠化之多重功效？ 請舉例說明之，並以圖示可用之工法。（25分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "101-植生工程-第三題", "year": "101", "subject": "植生工程", "title": "第三題", "number": "第三題", "question": "三、澎湖離島有特殊之地理氣候特色，地形及土壤組成特性，加以季風與鹽分因素，導致植 生綠化困難。請各舉一例說明在砂質海岸與市街聚落中該運用何種最適切（ best practice）之植生工法以確保植生之存活率？並舉例有那些適生植物可運用？（25分）", "brief": "風蝕顆粒運動包含懸浮、跳躍與表面蠕移；防治原則為降低風速、固定砂源、增加覆蓋與提高地表粗糙度。", "detail": "**表格補充**\n\n| 風蝕運動 | 顆粒特性 | 防治重點 |\n|---|---|---|\n| 懸浮 | 細粉砂、黏粒，可遠距離搬運 | 覆蓋裸露地、濕潤與防風 |\n| 跳躍 | 中砂為主，撞擊造成連鎖剝離 | 草帶、防風林、粗糙化 |\n| 蠕移/滾動 | 較粗顆粒沿地表移動 | 固砂、植生、障礙物 |\n\n風蝕常發生於乾燥、裸露、細粒且缺乏植被的地表。海岸、河口沙洲、裸露工區或乾燥農地均可能發生。防治上可設防風林、防風籬、草方格、植生帶、敷蓋、噴覆穩定劑或灑水管理。海岸植生需選耐鹽、耐風、耐砂埋植物，並以前線草本定砂、後方灌木喬木防風的分帶方式建立。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "101-植生工程-第四題", "year": "101", "subject": "植生工程", "title": "第四題", "number": "第四題", "question": "四、泥岩山區之植生有復育技術性與政策之議題。臺東利吉惡地形被指認為地質公園， 它是菲律賓海板塊與歐亞大陸板塊隱沒碰撞所積增而成的特殊無層理泥岩，亦屬花 東縱谷國家風景區。該區內原來設計之一觀景平臺及階梯均已嚴重沖蝕，且平臺基 礎有鬆動現象。請問其地景復育與景觀平臺之修復政策為何？並請詳述之。（25分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "101-水土保持工程-第一題", "year": "101", "subject": "水土保持工程", "title": "第一題", "number": "第一題", "question": "一、請比較加勁擋土結構與 RC 擋土結構之特性。若一河川護岸同時需考慮生態及耐沖 刷之特性，請問該如何將兩者搭配設計。（20分）", "brief": "野溪與土石流治理應採源頭減砂、通道控流、下游保全，並兼顧生態廊道與維護管理。", "detail": "**表格補充**\n\n| 區位 | 治理重點 |\n|---|---|\n| 發生區 | 崩塌源頭控制、山腹工、植生、排水 |\n| 流動區 | 固床、護岸、導流、透過型防砂 |\n| 堆積區 | 沉砂、攔阻、清淤、導流堤、保全 |\n| 生態面 | 保留孔隙、粗糙度、魚道與濱溪植生 |\n\n野溪工程須先判斷土砂來源、洪峰、河床坡度、粒徑與保全對象。防砂壩、固床工、護岸、沉砂池與導流堤應配合配置，不宜只做單點工程。生態護岸或預鑄護岸需兼顧抗沖刷、基礎護腳、反濾排水、孔隙與植生。施工與完工後清淤維護同樣重要。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "101-水土保持工程-第二題", "year": "101", "subject": "水土保持工程", "title": "第二題", "number": "第二題", "question": "二、土石流潛勢溪流寬 8.0 m，溪床坡度為 1/6，設計之清水流量為Qp = 50 m 3/s。溪床面 堆積土砂體積濃度為C = 0.6，土砂內摩擦角為 35°，土石流曼寧粗糙係數nD = 0.1， 土砂單位重（γs = 25.50 kN/m 3），渾水單位重（γw = 11.77 kN/m 3）。請計算土石流 的單位重、流量QD、深度及流速。若欲設置一鋼管格柵壩以防治土石流，請問該考 慮那些因素？（20分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "101-水土保持工程-第三題", "year": "101", "subject": "水土保持工程", "title": "第三題", "number": "第三題", "question": "三、深層崩塌與淺層崩塌的防治對策為何？有何差異？（20分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。"}, {"id": "101-水土保持工程-第四題", "year": "101", "subject": "水土保持工程", "title": "第四題", "number": "第四題", "question": "四、一矩形斷面小野溪寬 3.0 m，其設計流量為 1.85 m3/s，對應之水深為 0.5 m。若一農 路欲設計矩型橋涵以跨越此小野溪，請問其橋涵寬度至少需多寬，方不致於產生瓶 頸效應（choked condition ）？註：瓶頸效應係指該處會因斷面緊縮而產生臨界流。 （20分）", "brief": "野溪與土石流治理應採源頭減砂、通道控流、下游保全，並兼顧生態廊道與維護管理。", "detail": "**表格補充**\n\n| 區位 | 治理重點 |\n|---|---|\n| 發生區 | 崩塌源頭控制、山腹工、植生、排水 |\n| 流動區 | 固床、護岸、導流、透過型防砂 |\n| 堆積區 | 沉砂、攔阻、清淤、導流堤、保全 |\n| 生態面 | 保留孔隙、粗糙度、魚道與濱溪植生 |\n\n野溪工程須先判斷土砂來源、洪峰、河床坡度、粒徑與保全對象。防砂壩、固床工、護岸、沉砂池與導流堤應配合配置，不宜只做單點工程。生態護岸或預鑄護岸需兼顧抗沖刷、基礎護腳、反濾排水、孔隙與植生。施工與完工後清淤維護同樣重要。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "101-水土保持工程-第五題", "year": "101", "subject": "水土保持工程", "title": "第五題", "number": "第五題", "question": "五、有一堰塞湖之橫剖面如下圖所示，請由該圖評估其形成的原因，並說明該區過去是 否曾出現堰塞湖？未來是否仍可能再出現？請提出降低該堰塞湖風險的設計工法。 （20分） 還原帶 河床", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "101-水土保持規劃設計-第一題", "year": "101", "subject": "水土保持規劃設計", "title": "第一題", "number": "第一題", "question": "一、防砂壩洪水量估算之基準為何？（5分） 劃設特定水土保持區之目的為何？特定水土保持區長期水土保持計畫變更時機為 何？（10分） 土石流具有那些衝擊力？（5分） 寫出邊坡穩定規劃設計之四大項目。（5分） 當野溪土砂淤積極為嚴重時，為取得立竿見影之效果，可以實施何種措施？（5分）", "brief": "短期治理以保全聚落安全為優先，包括清疏堵塞河段、臨時導流、危險土砂攔阻、護岸搶修與警戒避難；長期治理則進行集水區源頭崩塌復育、防砂與固床系統、河道穩定、土地管理與監測維護。", "detail": "**表格補充**\n\n| 時程 | 措施 |\n|---|---|\n| 短期 | 清疏、臨時導流、警戒、保全工程 |\n| 中期 | 固床、護岸、防砂、沉砂空間 |\n| 長期 | 源頭治理、植生復育、監測、土地管理 |\n\n短期工程不可造成下游二次災害；長期規劃需由上游減砂、中游穩定輸移、下游保全三層次處理。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "30分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "101-水土保持規劃設計-第二題", "year": "101", "subject": "水土保持規劃設計", "title": "第二題", "number": "第二題", "question": "二、何謂坡地排水？為了避免地表逕流之肆意漫流，對一已知道路邊坡實施排水規劃時， 必須施作截流系統、橫向排水、縱向排水及道路排水系統等排水設施。試以簡圖配 置各排水設施並加以說明之。（20分）", "brief": "邊坡與擋土設計需檢核外力、地下水、滑動、傾倒、承載與整體穩定，並依規範安全係數。", "detail": "**表格補充**\n\n| 檢核項目 | 重點 |\n|---|---|\n| 滑動 | 抗滑力與水平推力比較 |\n| 傾倒 | 抗傾倒力矩與傾倒力矩比較 |\n| 承載 | 基底壓力不得超過容許承載力 |\n| 地下水 | 水壓與孔隙水壓會降低安全性 |\n| 整體穩定 | 潛在滑動面安全係數 |\n\n擋土牆須依土壓、水壓、超載與地震力計算外力，並檢核抗滑、抗傾倒、基礎承載力、偏心距與整體穩定。邊坡穩定則需先調查地形、地質、滑動面與地下水，再選擇削坡、排水、擋土、錨定、格梁、植生或坡腳保護。深層滑動區尤其應以地下排水降低孔隙水壓，並配合監測。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "101-水土保持規劃設計-第三題", "year": "101", "subject": "水土保持規劃設計", "title": "第三題", "number": "第三題", "question": "三、已知開發基地面積達 1.5 公頃，其中開挖整地面積為 0.95 公頃，完工後均已完成水 土保持處理。經通用土壤流失公式估算開發中及開發後之泥砂生產量，結果如下表 所示。試設計臨時性及永久性沉砂設施之容量。（20分） 開發階段 泥砂生產量（立方公尺） 開發中 400 開發後 55", "brief": "法規與規劃題應說明法定目的、適用對象、計畫內容、審查程序、設計原則與維護管理；精確條文需依最新法規核對。", "detail": "**表格補充**\n\n| 題型 | 作答架構 |\n|---|---|\n| 水土保持計畫 | 基地資料、環境調查、水文土砂、設施設計、施工維護 |\n| 法規程序 | 申請、審查、核定、開工、變更、完工與維護 |\n| 特定區 | 劃定目的、保護對象、管制事項、廢止條件 |\n| 簽證 | 技師對規劃、設計、監造或檢查負專業責任 |\n| 沉砂滯洪 | 容量、出流、清淤、維護與安全 |\n\n水土保持規劃設計須以基地調查為基礎，包含地形、坡度、地質、土壤、植生、水系、保全對象與災害潛勢。計畫內容要涵蓋開發前中後逕流、土壤流失、沉砂滯洪、排水、擋土、坡面保護、植生、施工中臨時防災與完工維護。法規題若問期限、規模或安全係數，應以考試當年度最新條文為準，答案可先寫原則並提醒核對。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "101-水土保持規劃設計-第四題", "year": "101", "subject": "水土保持規劃設計", "title": "第四題", "number": "第四題", "question": "四、寫出透過性壩（含梳子壩及開口壩）之五項功能。並說明為何於土石流發生段不宜 規劃設計透過性壩。（15分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "15分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "101-水土保持規劃設計-第五題", "year": "101", "subject": "水土保持規劃設計", "title": "第五題", "number": "第五題", "question": "五、為了緩和野溪泥砂沖刷而實施系列式固床工，已知底床坡度為 0.05，固床工以高出 河床 0.5 公尺進行設計，且計畫將底床坡度調整為0.03。試推估適當之固床工間距。 （15分）", "brief": "野溪與土石流治理應採源頭減砂、通道控流、下游保全，並兼顧生態廊道與維護管理。", "detail": "**表格補充**\n\n| 區位 | 治理重點 |\n|---|---|\n| 發生區 | 崩塌源頭控制、山腹工、植生、排水 |\n| 流動區 | 固床、護岸、導流、透過型防砂 |\n| 堆積區 | 沉砂、攔阻、清淤、導流堤、保全 |\n| 生態面 | 保留孔隙、粗糙度、魚道與濱溪植生 |\n\n野溪工程須先判斷土砂來源、洪峰、河床坡度、粒徑與保全對象。防砂壩、固床工、護岸、沉砂池與導流堤應配合配置，不宜只做單點工程。生態護岸或預鑄護岸需兼顧抗沖刷、基礎護腳、反濾排水、孔隙與植生。施工與完工後清淤維護同樣重要。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "15分", "hint": "野 ", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "100-土壤物理與沖蝕-第五題", "year": "100", "subject": "土壤物理與沖蝕", "title": "第五題", "number": "第五題", "question": "五、試說明雨滴撞擊在強度較低之土壤表面，較之撞擊在強度較高之土壤表面，會產生 那些不同之現象。（10分） 六、在坡地上之集中水流通常最先造成縱向之刷深，試說明其原因為何。（10分）", "brief": "地表覆蓋可吸收雨滴動能、避免結皮、增加粗糙度、降低逕流速度並攔截泥砂。", "detail": "**表格補充**\n\n| 作用對象 | 覆蓋功能 |\n|---|---|\n| 雨濺沖蝕 | 吸收雨滴能量，避免團粒破碎與孔隙堵塞 |\n| 片蝕 | 增加地表粗糙度，降低薄層流速度 |\n| 細溝蝕 | 分散逕流，降低集中水流 |\n| 水分管理 | 減少蒸發，促進入滲與種子發芽 |\n\n裸露地表受雨滴撞擊後，土粒分散並堵塞孔隙，形成結皮，使入滲下降、逕流增加。敷蓋、枯落物、植生毯、草生覆蓋與作物殘株可先吸收雨滴動能，減少濺蝕；同時增加地表粗糙度，使逕流流速與剪應力降低。活體植生根系還能改善團粒、增加孔隙與抗剪強度，因此兼具短期防沖蝕與長期土壤改良效果。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "100-坡地水文學-第一題", "year": "100", "subject": "坡地水文學", "title": "第一題", "number": "第一題", "question": "一、請詳細說明雨降到有良好森林及植生覆蓋的坡地時，雨水由上坡往下坡移動到成為 溪流水的水文過程（Hydrologic Processes）。（30分）", "brief": "地表覆蓋可吸收雨滴動能、避免結皮、增加粗糙度、降低逕流速度並攔截泥砂。", "detail": "**表格補充**\n\n| 作用對象 | 覆蓋功能 |\n|---|---|\n| 雨濺沖蝕 | 吸收雨滴能量，避免團粒破碎與孔隙堵塞 |\n| 片蝕 | 增加地表粗糙度，降低薄層流速度 |\n| 細溝蝕 | 分散逕流，降低集中水流 |\n| 水分管理 | 減少蒸發，促進入滲與種子發芽 |\n\n裸露地表受雨滴撞擊後，土粒分散並堵塞孔隙，形成結皮，使入滲下降、逕流增加。敷蓋、枯落物、植生毯、草生覆蓋與作物殘株可先吸收雨滴動能，減少濺蝕；同時增加地表粗糙度，使逕流流速與剪應力降低。活體植生根系還能改善團粒、增加孔隙與抗剪強度，因此兼具短期防沖蝕與長期土壤改良效果。", "source_type": "past", "source_label": "歷屆考古題", "points": "30分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "100-坡地水文學-第二題", "year": "100", "subject": "坡地水文學", "title": "第二題", "number": "第二題", "question": "二、集水區的地形因子中，那一項和流速、洪峰流量、土壤沖蝕及坡地穩定關係最密切？ 請說明之。（25分）", "brief": "水文計算先決定設計雨量、集流時間、逕流係數與集水面積，再求洪峰或歷線；滯洪量由入流與出流歷線最大累積差決定。", "detail": "**表格補充**\n\n| 題型 | 常用公式或方法 |\n|---|---|\n| 合理化公式 | `Q = C I A / 360`，A 用 ha、I 用 mm/hr |\n| 頻率分析 | 由重現期決定超越機率與頻率因子 |\n| 單位歷線 | 有效雨量乘單位歷線並依時間疊加 |\n| 滯洪量 | `dS/dt = I(t)-O(t)`，取最大蓄水量 |\n| 降雨損失 | φ 指數、入滲率或有效雨量計算 |\n\n作答時應先畫出水文流程：降雨、損失、有效雨量、逕流、洪峰與蓄洪。合理化公式適用於小集水區洪峰估算，需以集流時間對應設計降雨強度。單位歷線題則將各時段有效雨量乘以單位歷線並平移疊加。滯洪池題應比較開發前後或允許放流量，利用入流與出流歷線差額求最大蓄水量。若題目只有洪峰而無歷線，不能唯一決定滯洪體積，應說明需雨型或歷線資料。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "100-坡地水文學-第三題", "year": "100", "subject": "坡地水文學", "title": "第三題", "number": "第三題", "question": "三、請說明如何應用雨量資料、流量資料及區域洪水研究的結果來估算並決定不同重現 期（return period）的設計洪峰流量（peak flow）。（25分）", "brief": "水文計算先決定設計雨量、集流時間、逕流係數與集水面積，再求洪峰或歷線；滯洪量由入流與出流歷線最大累積差決定。", "detail": "**表格補充**\n\n| 題型 | 常用公式或方法 |\n|---|---|\n| 合理化公式 | `Q = C I A / 360`，A 用 ha、I 用 mm/hr |\n| 頻率分析 | 由重現期決定超越機率與頻率因子 |\n| 單位歷線 | 有效雨量乘單位歷線並依時間疊加 |\n| 滯洪量 | `dS/dt = I(t)-O(t)`，取最大蓄水量 |\n| 降雨損失 | φ 指數、入滲率或有效雨量計算 |\n\n作答時應先畫出水文流程：降雨、損失、有效雨量、逕流、洪峰與蓄洪。合理化公式適用於小集水區洪峰估算，需以集流時間對應設計降雨強度。單位歷線題則將各時段有效雨量乘以單位歷線並平移疊加。滯洪池題應比較開發前後或允許放流量，利用入流與出流歷線差額求最大蓄水量。若題目只有洪峰而無歷線，不能唯一決定滯洪體積，應說明需雨型或歷線資料。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "100-坡地水文學-第四題", "year": "100", "subject": "坡地水文學", "title": "第四題", "number": "第四題", "question": "四、請說明坡度因子及坡向因子對集水區水文特性和水土災害的影響。（20分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "100-植生工程-第一題", "year": "100", "subject": "植生工程", "title": "第一題", "number": "第一題", "question": "一、試說明植生工程之定義及內涵。臺灣氣候良好，可孕育四千多種維管束植物，請說 明植生工程施作時常引進外來植物之原因。（20分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "100-植生工程-第二題", "year": "100", "subject": "植生工程", "title": "第二題", "number": "第二題", "question": "二、何謂區域性水土保持？試說明區域性水土保持植生緩衝帶之配置原則。（20分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "100-植生工程-第三題", "year": "100", "subject": "植生工程", "title": "第三題", "number": "第三題", "question": "三、何謂頡抗作用（Antagonism）？石灰石礦區土壤鈣含量甚高，肥料三要素中何種元 素會被抑制吸收？並比較臺灣東部及南部石灰石礦採掘跡地植生復育之難易程度。 （20分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "100-植生工程-第四題", "year": "100", "subject": "植生工程", "title": "第四題", "number": "第四題", "question": "四、何謂初生演替（ Primary succession ）及次生演替（ Secondary succession ）？並舉例 說明植物間之相剋作用（Allelopathy）。（20分）", "brief": "植生工程的答案核心是立地條件與植物材料相配合：先改善排水與生育基盤，再選用適地、根系發達、耐逆境且不具入侵性的草灌木或喬木，最後以補植、灌溉、追肥與豪雨後修復確保覆蓋率與成活率。", "detail": "**表格補充**\n\n| 步驟 | 作答重點 |\n|---|---|\n| 立地調查 | 坡度、坡向、土壤、含水、pH、養分、沖蝕與穩定性 |\n| 基礎工 | 截排水、削坡、客土、土壤改良、網材或格框固定 |\n| 植物選擇 | 適地適種、根系發達、耐逆境、材料穩定、避免入侵 |\n| 導入方法 | 撒播、噴植、植生毯、植生袋、苗木、扦插 |\n| 養護 | 補植、灌溉、追肥、刈割、病蟲害與豪雨後修復 |\n\n植生工程不是單純播種，而是利用植物與基盤工程共同恢復坡面穩定與生態功能。崩塌地或道路邊坡需先處理排水與坡面穩定，再依土壤條件選擇草本、灌木或喬木。礦區與不良土壤須客土、調 pH、補有機質與養分。河溪護岸植栽需分區配置耐水、耐沖刷與根系發達植物。若為群落調查，應使用覆蓋度、密度、頻度、重要值、歧異度與相似性等指標評估。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "100-植生工程-第五題", "year": "100", "subject": "植生工程", "title": "第五題", "number": "第五題", "question": "五、臺灣北部為煤層主要分布區，採礦或坡地開發易產生酸性硫酸鹽土壤（ Acid sulfate soils），試說明：（20分） 酸性硫酸鹽土壤形成之機制。 整地時植生復育應注意之事項。", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "100-水土保持工程-第一題", "year": "100", "subject": "水土保持工程", "title": "第一題", "number": "第一題", "question": "一、民國 98 年 9 月莫拉克颱風對臺灣南部帶來嚴重之衝擊，尤其是溪流下游之土石淤 積量非常龐大，因此，河溪疏浚有其必要。試說明疏浚之對策及方法。（20分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "100-水土保持工程-第二題", "year": "100", "subject": "水土保持工程", "title": "第二題", "number": "第二題", "question": "二、防砂壩是水土保持工程中一種常用之構造物。試詳述防砂壩受到洪峰攻擊而導致破 壞之原因。（20分）", "brief": "水文計算先決定設計雨量、集流時間、逕流係數與集水面積，再求洪峰或歷線；滯洪量由入流與出流歷線最大累積差決定。", "detail": "**表格補充**\n\n| 題型 | 常用公式或方法 |\n|---|---|\n| 合理化公式 | `Q = C I A / 360`，A 用 ha、I 用 mm/hr |\n| 頻率分析 | 由重現期決定超越機率與頻率因子 |\n| 單位歷線 | 有效雨量乘單位歷線並依時間疊加 |\n| 滯洪量 | `dS/dt = I(t)-O(t)`，取最大蓄水量 |\n| 降雨損失 | φ 指數、入滲率或有效雨量計算 |\n\n作答時應先畫出水文流程：降雨、損失、有效雨量、逕流、洪峰與蓄洪。合理化公式適用於小集水區洪峰估算，需以集流時間對應設計降雨強度。單位歷線題則將各時段有效雨量乘以單位歷線並平移疊加。滯洪池題應比較開發前後或允許放流量，利用入流與出流歷線差額求最大蓄水量。若題目只有洪峰而無歷線，不能唯一決定滯洪體積，應說明需雨型或歷線資料。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "100-水土保持工程-第三題", "year": "100", "subject": "水土保持工程", "title": "第三題", "number": "第三題", "question": "三、試說明： 何謂丁壩？（5分） 丁壩之間距及坡度。（15分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "100-水土保持工程-第四題", "year": "100", "subject": "水土保持工程", "title": "第四題", "number": "第四題", "question": "四、擋土牆是水土保持工程中一種重要之構造物。試述擋土牆之種類及適用範圍，並繪 圖說明之。（20分）", "brief": "邊坡與擋土設計需檢核外力、地下水、滑動、傾倒、承載與整體穩定，並依規範安全係數。", "detail": "**表格補充**\n\n| 檢核項目 | 重點 |\n|---|---|\n| 滑動 | 抗滑力與水平推力比較 |\n| 傾倒 | 抗傾倒力矩與傾倒力矩比較 |\n| 承載 | 基底壓力不得超過容許承載力 |\n| 地下水 | 水壓與孔隙水壓會降低安全性 |\n| 整體穩定 | 潛在滑動面安全係數 |\n\n擋土牆須依土壓、水壓、超載與地震力計算外力，並檢核抗滑、抗傾倒、基礎承載力、偏心距與整體穩定。邊坡穩定則需先調查地形、地質、滑動面與地下水，再選擇削坡、排水、擋土、錨定、格梁、植生或坡腳保護。深層滑動區尤其應以地下排水降低孔隙水壓，並配合監測。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。"}, {"id": "100-水土保持工程-第五題", "year": "100", "subject": "水土保持工程", "title": "第五題", "number": "第五題", "question": "五、泰國曼谷今（2011）年之洪水長達三個月以上，已造成嚴重之經濟損失。試說明： （20分） 洪水發生之原因。 臺灣的城市是否會發生類似泰國曼谷之洪水？請詳述其原因。", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "100-水土保持規劃設計-第一題", "year": "100", "subject": "水土保持規劃設計", "title": "第一題", "number": "第一題", "question": "一、試回答下列問題： 試以表格列出山坡地之「坡度級別」、「級序」及「坡度（S）範圍」。（10分） 試說明使用坵塊法計算坡度之方法（步驟）。（10分）", "brief": "坵塊法將基地劃分為小坵塊，由各坵塊高差與水平距離求坡度後面積加權；等高線法以等高線總長、等高距與面積估算平均坡度。坵塊法適合細部分區判定，等高線法適合整體地形快速估算。", "detail": "**表格補充**\n\n| 方法 | 計算概念 | 適用 |\n|---|---|---|\n| 坵塊法 | 各坵塊坡度面積加權 | 分區、法規坡度判定 |\n| 等高線法 | `S≈等高距×等高線總長/面積` | 大範圍平均坡度 |\n| 差異 | 坵塊法較細，等高線法較概略 | 視資料精度選用 |\n\n兩法都需注意比例尺、等高距與地形複雜度。坡度分級管制時，應依規範指定方法計算。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "100-水土保持規劃設計-第二題", "year": "100", "subject": "水土保持規劃設計", "title": "第二題", "number": "第二題", "question": "二、河床質粒徑分析包含採樣孔粒徑調查分析及表面粒徑調查分析。請詳述採樣孔之河 床質粒徑分析方法。（15分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "15分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "100-水土保持規劃設計-第三題", "year": "100", "subject": "水土保持規劃設計", "title": "第三題", "number": "第三題", "question": "三、某一坡地開發區，其集水面積為 300 公頃，主流長為 1.5 公里，坡面長 240 公尺， 估計之三角單位歷線圖基期為 45 分鐘。開發前之洪峰流量為 100 cms，開發中之洪 峰流量為 125 cms，開發後之洪峰流量為 120 cms。請列式計算臨時性滯洪設施及永 久性滯洪設施之蓄洪量。（25分）", "brief": "水文計算先決定設計雨量、集流時間、逕流係數與集水面積，再求洪峰或歷線；滯洪量由入流與出流歷線最大累積差決定。", "detail": "**表格補充**\n\n| 題型 | 常用公式或方法 |\n|---|---|\n| 合理化公式 | `Q = C I A / 360`，A 用 ha、I 用 mm/hr |\n| 頻率分析 | 由重現期決定超越機率與頻率因子 |\n| 單位歷線 | 有效雨量乘單位歷線並依時間疊加 |\n| 滯洪量 | `dS/dt = I(t)-O(t)`，取最大蓄水量 |\n| 降雨損失 | φ 指數、入滲率或有效雨量計算 |\n\n作答時應先畫出水文流程：降雨、損失、有效雨量、逕流、洪峰與蓄洪。合理化公式適用於小集水區洪峰估算，需以集流時間對應設計降雨強度。單位歷線題則將各時段有效雨量乘以單位歷線並平移疊加。滯洪池題應比較開發前後或允許放流量，利用入流與出流歷線差額求最大蓄水量。若題目只有洪峰而無歷線，不能唯一決定滯洪體積，應說明需雨型或歷線資料。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "100-水土保持規劃設計-第四題", "year": "100", "subject": "水土保持規劃設計", "title": "第四題", "number": "第四題", "question": "四、試說明滯洪設施之規劃設計原則。（20分）", "brief": "水文計算先決定設計雨量、集流時間、逕流係數與集水面積，再求洪峰或歷線；滯洪量由入流與出流歷線最大累積差決定。", "detail": "**表格補充**\n\n| 題型 | 常用公式或方法 |\n|---|---|\n| 合理化公式 | `Q = C I A / 360`，A 用 ha、I 用 mm/hr |\n| 頻率分析 | 由重現期決定超越機率與頻率因子 |\n| 單位歷線 | 有效雨量乘單位歷線並依時間疊加 |\n| 滯洪量 | `dS/dt = I(t)-O(t)`，取最大蓄水量 |\n| 降雨損失 | φ 指數、入滲率或有效雨量計算 |\n\n作答時應先畫出水文流程：降雨、損失、有效雨量、逕流、洪峰與蓄洪。合理化公式適用於小集水區洪峰估算，需以集流時間對應設計降雨強度。單位歷線題則將各時段有效雨量乘以單位歷線並平移疊加。滯洪池題應比較開發前後或允許放流量，利用入流與出流歷線差額求最大蓄水量。若題目只有洪峰而無歷線，不能唯一決定滯洪體積，應說明需雨型或歷線資料。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "100-水土保持規劃設計-第五題", "year": "100", "subject": "水土保持規劃設計", "title": "第五題", "number": "第五題", "question": "五、試說明依水土保持法應劃定為特定水土保持區之地區。（20分）", "brief": "法規與規劃題應說明法定目的、適用對象、計畫內容、審查程序、設計原則與維護管理；精確條文需依最新法規核對。", "detail": "**表格補充**\n\n| 題型 | 作答架構 |\n|---|---|\n| 水土保持計畫 | 基地資料、環境調查、水文土砂、設施設計、施工維護 |\n| 法規程序 | 申請、審查、核定、開工、變更、完工與維護 |\n| 特定區 | 劃定目的、保護對象、管制事項、廢止條件 |\n| 簽證 | 技師對規劃、設計、監造或檢查負專業責任 |\n| 沉砂滯洪 | 容量、出流、清淤、維護與安全 |\n\n水土保持規劃設計須以基地調查為基礎，包含地形、坡度、地質、土壤、植生、水系、保全對象與災害潛勢。計畫內容要涵蓋開發前中後逕流、土壤流失、沉砂滯洪、排水、擋土、坡面保護、植生、施工中臨時防災與完工維護。法規題若問期限、規模或安全係數，應以考試當年度最新條文為準，答案可先寫原則並提醒核對。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "100-測量學-第一題", "year": "100", "subject": "測量學", "title": "第一題", "number": "第一題", "question": "一、某一山坡地欲加以整地，因此進行面積水準測量。已知每一小矩形面積為 30m×40m （如圖 1），下表中數字為測量完成且經平差後之各交點高程（與圖 1 對應點）， 試回答下列問題：（20分） 超出最低點以上之總土方量為何？ 施工基面高程為何？ 為達工程經濟效益最高之設計目標，則施工基面高程應符合之原則為何？ 已知水準原點 B.M.1，選定測站 S1需考慮之條件為何？ 當儀器架設於 S1進行測量時，應如何測量方可測得各交點高程？ 點號 A(m) B(m) C(m) D(m) 1 － 246.22 245.38 － 2 － 250.26 249.20 248.62 3 243.95 251.76 252.32 242.00 4 243.69 244.38 247.57 － 圖 1 40 m 40 m 40 m 30 m 30 m 30 m", "brief": "測量成果由
