  <style>

      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);

    .topbar { display: flex; gap: 18px; align-items: center; justify-content: space-between; }

    .stats { color: var(--muted); font-size: 14px; }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1.5fr) repeat(3, minmax(140px, .7fr)) auto auto;
      gap: 10px;
      margin-top: 14px;
      align-items: center;
    }

    }

      height: 34px;
      display: grid;

      background: #dcecff;
      color: #2563a8;
      font-weight: 800;
    }

      align-items: center;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .toggle {

      padding: 10px 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;

      color: #1f2f27;
    }
    .exam-lead {
      margin: 0 0 8px;
      font-weight: 700;
    }
    .exam-text {
      margin: 0 0 12px;
    }

      .qhead { grid-template-columns: 36px 1fr; }

    }
  </style>

  <script>
    const DATA = [{"id": "99-土壤物理與沖蝕-第一題", "year": "99", "subject": "土壤物理與沖蝕", "title": "第一題", "number": "第一題", "question": "一、試說明土壤在飽和與不飽和狀態下，水力傳導度（ hydraulic conductivity ）與質 地（texture）之相關性。（20分）", "brief": "土壤水分與孔隙決定入滲、保水、排水與逕流。大孔隙促進入滲與通氣，小孔隙提高保水；表面結皮、壓實與高初始含水量會降低入滲並增加逕流，接近飽和時孔隙水壓上升且邊坡穩定性下降。", "detail": "**表格補充**\n\n| 概念 | 技師考試作答重點 |\n|---|---|\n| 入滲 | 水由地表進入土壤，受雨強、孔隙、初始含水量與表面結皮影響 |\n| 滲透/水力傳導 | 水在土體內受水頭梯度流動 |\n| 田間含水量 | 重力水排除後土壤保留水分 |\n| 凋萎點 | 植物無法再吸水恢復之含水量 |\n| 水分特性曲線 | 含水量與基質吸力關係，砂土曲線陡、黏土保水高 |\n\n土壤水分可用重量含水量、體積含水量、飽和度與水勢表示。砂土大孔隙多，入滲快、排水快、保水差；黏土微孔隙多，保水高但入滲與排水慢。土壤水分特性曲線可用壓力板、張力計、砂箱、離心法或露點水勢儀測得，並有乾濕過程不同的遲滯現象。坡地上若入滲不足，地表逕流與片蝕增加；若土體接近飽和，孔隙水壓上升、有效應力降低，可能誘發崩塌。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "99-土壤物理與沖蝕-第二題", "year": "99", "subject": "土壤物理與沖蝕", "title": "第二題", "number": "第二題", "question": "二、依據水土保持技術規範第 35 條之規定，山坡地土壤流失量之估算得採用通用土壤 流失公式，試列出該公式並說明各因子之選定原則；又開挖整地土壤流失量推估， 其覆蓋與管理因子不得小於多少？水土保持處理因子不得小於多少？（20分）", "brief": "地表覆蓋可吸收雨滴動能、避免結皮、增加粗糙度、降低逕流速度並攔截泥砂。", "detail": "**表格補充**\n\n| 作用對象 | 覆蓋功能 |\n|---|---|\n| 雨濺沖蝕 | 吸收雨滴能量，避免團粒破碎與孔隙堵塞 |\n| 片蝕 | 增加地表粗糙度，降低薄層流速度 |\n| 細溝蝕 | 分散逕流，降低集中水流 |\n| 水分管理 | 減少蒸發，促進入滲與種子發芽 |\n\n裸露地表受雨滴撞擊後，土粒分散並堵塞孔隙，形成結皮，使入滲下降、逕流增加。敷蓋、枯落物、植生毯、草生覆蓋與作物殘株可先吸收雨滴動能，減少濺蝕；同時增加地表粗糙度，使逕流流速與剪應力降低。活體植生根系還能改善團粒、增加孔隙與抗剪強度，因此兼具短期防沖蝕與長期土壤改良效果。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "99-土壤物理與沖蝕-第三題", "year": "99", "subject": "土壤物理與沖蝕", "title": "第三題", "number": "第三題", "question": "三、試列舉出三種測量土壤水分含量（water content）與水分勢能（water potential）之方 法，並說明其適用範圍。（20分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "99-土壤物理與沖蝕-第四題", "year": "99", "subject": "土壤物理與沖蝕", "title": "第四題", "number": "第四題", "question": "四、試說明如何決定土壤夯實之最佳水分（Optimal moisture）。（20分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "99-土壤物理與沖蝕-第五題", "year": "99", "subject": "土壤物理與沖蝕", "title": "第五題", "number": "第五題", "question": "五、試述雨滴與逕流造成土壤沖蝕之機制。（20分）", "brief": "地表覆蓋可吸收雨滴動能、避免結皮、增加粗糙度、降低逕流速度並攔截泥砂。", "detail": "**表格補充**\n\n| 作用對象 | 覆蓋功能 |\n|---|---|\n| 雨濺沖蝕 | 吸收雨滴能量，避免團粒破碎與孔隙堵塞 |\n| 片蝕 | 增加地表粗糙度，降低薄層流速度 |\n| 細溝蝕 | 分散逕流，降低集中水流 |\n| 水分管理 | 減少蒸發，促進入滲與種子發芽 |\n\n裸露地表受雨滴撞擊後，土粒分散並堵塞孔隙，形成結皮，使入滲下降、逕流增加。敷蓋、枯落物、植生毯、草生覆蓋與作物殘株可先吸收雨滴動能，減少濺蝕；同時增加地表粗糙度，使逕流流速與剪應力降低。活體植生根系還能改善團粒、增加孔隙與抗剪強度，因此兼具短期防沖蝕與長期土壤改良效果。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "99-坡地水文學-第一題", "year": "99", "subject": "坡地水文學", "title": "第一題", "number": "第一題", "question": "一、請解釋下列名詞：（每小題 5分，共 30分） 雙累積曲線（Double mass curve） 前期降水指數（Antecedent precipitation index, API） 基流分離（Base-flow separation） 頻率分析（Frequency analysis） 安全出水量（Safety yield） 單位歷線（Unit hydrograph）", "brief": "測量成果由觀測量轉為坐標、高程、面積或體積，並以閉合差、中誤差或檢核點確認精度。平面用方位角與距離求橫縱距，高程用水準或三角高程求高差，土方用方格、斷面、TIN 或等高線法計算。", "detail": "**表格補充**\n\n| 題型 | 作答重點 |\n|---|---|\n| 坐標/導線 | 方位角、橫距、縱距、閉合差與平差 |\n| 水準/高程 | 後視、前視、儀器高、閉合差 |\n| 土方 | 方格法、斷面法、等高線法或 TIN |\n| 航測/UAV | 控制點、空三、密點雲、DEM、正射、精度檢核 |\n| GIS | 圖層、屬性、坐標系統、資料庫與服務 |\n\n測量計算題要注意單位與坐標方向。全站儀可由斜距、垂直角與方位角求三維坐標；水準測量以高程差與閉合差檢核；土方可用平均斷面、方格法、稜柱體公式或等高線面積法。UAV/SfM 題需說明航線規劃、控制點、特徵匹配、束制平差、密點雲、DSM/DTM 與正射影像。若題目圖表未抽出，需回原 PDF 讀取數值後代入。", "source_type": "past", "source_label": "歷屆考古題", "points": "", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "99-坡地水文學-第二題", "year": "99", "subject": "坡地水文學", "title": "第二題", "number": "第二題", "question": "二、某集水區有A、B、C及 X等四站，其年平均雨量分別為720 mm，760 mm，850 mm 及 700 mm；於某次暴雨中，已知 A，B，C三站之雨量紀錄分別為 35 mm，45 mm 及 55 mm ，而 X 站之雨量紀錄卻已遺失。試估算 X 站所記錄之該次暴雨雨量。 （25分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "99-坡地水文學-第三題", "year": "99", "subject": "坡地水文學", "title": "第三題", "number": "第三題", "question": "三、某場暴雨中，面積 100 km 2的流域於 150 分鐘內所得到的雨量資料如下表所示，並 已知Φ指數為 0.7 cm/hr，試計算其直接逕流量（cm）。（25分） 時間 （min） 0 30 60 90 120 150 降雨強度 （cm/hr） 0 2 2.6 5.3 2.7 0.8", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "99-坡地水文學-第四題", "year": "99", "subject": "坡地水文學", "title": "第四題", "number": "第四題", "question": "四、設某一雨量站八月份平均每四天發生雷雨一次，請依照二項式分佈求十天內至少有 六天發生雷雨之機率。（20分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "99-植生工程-第一題", "year": "99", "subject": "植生工程", "title": "第一題", "number": "第一題", "question": "一、以野溪治理工程完工後之周邊裸露土地為例，進行緩衝綠帶苗木栽植需考慮那些基 地土質與環境條件？規劃設計時，苗木材料種類與規格之選用、適宜栽植時期、植 栽密度與配置、栽植方法等，試分別說明之。（25分）", "brief": "植生工程的答案核心是立地條件與植物材料相配合：先改善排水與生育基盤，再選用適地、根系發達、耐逆境且不具入侵性的草灌木或喬木，最後以補植、灌溉、追肥與豪雨後修復確保覆蓋率與成活率。", "detail": "**表格補充**\n\n| 步驟 | 作答重點 |\n|---|---|\n| 立地調查 | 坡度、坡向、土壤、含水、pH、養分、沖蝕與穩定性 |\n| 基礎工 | 截排水、削坡、客土、土壤改良、網材或格框固定 |\n| 植物選擇 | 適地適種、根系發達、耐逆境、材料穩定、避免入侵 |\n| 導入方法 | 撒播、噴植、植生毯、植生袋、苗木、扦插 |\n| 養護 | 補植、灌溉、追肥、刈割、病蟲害與豪雨後修復 |\n\n植生工程不是單純播種，而是利用植物與基盤工程共同恢復坡面穩定與生態功能。崩塌地或道路邊坡需先處理排水與坡面穩定，再依土壤條件選擇草本、灌木或喬木。礦區與不良土壤須客土、調 pH、補有機質與養分。河溪護岸植栽需分區配置耐水、耐沖刷與根系發達植物。若為群落調查，應使用覆蓋度、密度、頻度、重要值、歧異度與相似性等指標評估。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "99-植生工程-第二題", "year": "99", "subject": "植生工程", "title": "第二題", "number": "第二題", "question": "二、崩塌可分為那些基本類型？試分別以豪雨、地震造成之崩塌為例，說明進行崩塌地 整治與植生工程規劃時，應考慮那些環境條件？可使用那些工程與植生方法？並就 其中某一植生工法，說明其規劃原則、適用地點及工法設計。（25分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "99-植生工程-第三題", "year": "99", "subject": "植生工程", "title": "第三題", "number": "第三題", "question": "三、臺灣地區主要應用之水土保持草類有那些？試舉五種常用草類，說明其中英文名稱、 根莖葉形態、植物材料來源、適用工法與範圍、栽植及繁殖方法等。（25分）", "brief": "植生工程的答案核心是立地條件與植物材料相配合：先改善排水與生育基盤，再選用適地、根系發達、耐逆境且不具入侵性的草灌木或喬木，最後以補植、灌溉、追肥與豪雨後修復確保覆蓋率與成活率。", "detail": "**表格補充**\n\n| 步驟 | 作答重點 |\n|---|---|\n| 立地調查 | 坡度、坡向、土壤、含水、pH、養分、沖蝕與穩定性 |\n| 基礎工 | 截排水、削坡、客土、土壤改良、網材或格框固定 |\n| 植物選擇 | 適地適種、根系發達、耐逆境、材料穩定、避免入侵 |\n| 導入方法 | 撒播、噴植、植生毯、植生袋、苗木、扦插 |\n| 養護 | 補植、灌溉、追肥、刈割、病蟲害與豪雨後修復 |\n\n植生工程不是單純播種，而是利用植物與基盤工程共同恢復坡面穩定與生態功能。崩塌地或道路邊坡需先處理排水與坡面穩定，再依土壤條件選擇草本、灌木或喬木。礦區與不良土壤須客土、調 pH、補有機質與養分。河溪護岸植栽需分區配置耐水、耐沖刷與根系發達植物。若為群落調查，應使用覆蓋度、密度、頻度、重要值、歧異度與相似性等指標評估。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "99-植生工程-第四題", "year": "99", "subject": "植生工程", "title": "第四題", "number": "第四題", "question": "四、植生群落調查分析，常使用那些指數或介量參數做為定量評估之依據？以重要值指 數為例，試說明其定義、目的與調查分析方法。如植生群落兼有上層喬木與地被植 物，重要值指數之調查分析應如何進行，試說明之。（25分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "99-水土保持工程-第一題", "year": "99", "subject": "水土保持工程", "title": "第一題", "number": "第一題", "question": "一、請說明集水區生態工法規劃之設計流程。（15分）", "brief": "野溪與土石流治理應採源頭減砂、通道控流、下游保全，並兼顧生態廊道與維護管理。", "detail": "**表格補充**\n\n| 區位 | 治理重點 |\n|---|---|\n| 發生區 | 崩塌源頭控制、山腹工、植生、排水 |\n| 流動區 | 固床、護岸、導流、透過型防砂 |\n| 堆積區 | 沉砂、攔阻、清淤、導流堤、保全 |\n| 生態面 | 保留孔隙、粗糙度、魚道與濱溪植生 |\n\n野溪工程須先判斷土砂來源、洪峰、河床坡度、粒徑與保全對象。防砂壩、固床工、護岸、沉砂池與導流堤應配合配置，不宜只做單點工程。生態護岸或預鑄護岸需兼顧抗沖刷、基礎護腳、反濾排水、孔隙與植生。施工與完工後清淤維護同樣重要。", "source_type": "past", "source_label": "歷屆考古題", "points": "15分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "99-水土保持工程-第二題", "year": "99", "subject": "水土保持工程", "title": "第二題", "number": "第二題", "question": "二、請任意列舉四種適用於蝕溝控制（Gully control）的臨時性壩，並分別繪製示意圖， 示意圖上需標註水流流向以及設計上需注意的尺寸與事項。各示意圖需包含壩之縱、 橫斷面。（40分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "40分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "99-水土保持工程-第三題", "year": "99", "subject": "水土保持工程", "title": "第三題", "number": "第三題", "question": "三、請闡述坡地水土保持方法之選用原則。（15分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "15分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "99-水土保持工程-第四題", "year": "99", "subject": "水土保持工程", "title": "第四題", "number": "第四題", "question": "四、請依填方材料、填方邊坡坡度、挖方所在基地的地質情況及挖方邊坡的坡度，分別 列表說明填方（10分）與挖方（12分）的最適高度，並簡單說明整坡的規劃設計原 則。（8分）", "brief": "邊坡與擋土設計需檢核外力、地下水、滑動、傾倒、承載與整體穩定，並依規範安全係數。", "detail": "**表格補充**\n\n| 檢核項目 | 重點 |\n|---|---|\n| 滑動 | 抗滑力與水平推力比較 |\n| 傾倒 | 抗傾倒力矩與傾倒力矩比較 |\n| 承載 | 基底壓力不得超過容許承載力 |\n| 地下水 | 水壓與孔隙水壓會降低安全性 |\n| 整體穩定 | 潛在滑動面安全係數 |\n\n擋土牆須依土壓、水壓、超載與地震力計算外力，並檢核抗滑、抗傾倒、基礎承載力、偏心距與整體穩定。邊坡穩定則需先調查地形、地質、滑動面與地下水，再選擇削坡、排水、擋土、錨定、格梁、植生或坡腳保護。深層滑動區尤其應以地下排水降低孔隙水壓，並配合監測。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "30分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "99-水土保持規劃設計-第一題", "year": "99", "subject": "水土保持規劃設計", "title": "第一題", "number": "第一題", "question": "一、梳子壩為土石流潛勢溪流常用之防治措施，試詳述其壩體開口設計時應考量那些 因素？此外，當防砂壩及梳子壩上游遭土砂 淤滿時，是否影響其功能？請詳述。 （15分）", "brief": "野溪與土石流治理應採源頭減砂、通道控流、下游保全，並兼顧生態廊道與維護管理。", "detail": "**表格補充**\n\n| 區位 | 治理重點 |\n|---|---|\n| 發生區 | 崩塌源頭控制、山腹工、植生、排水 |\n| 流動區 | 固床、護岸、導流、透過型防砂 |\n| 堆積區 | 沉砂、攔阻、清淤、導流堤、保全 |\n| 生態面 | 保留孔隙、粗糙度、魚道與濱溪植生 |\n\n野溪工程須先判斷土砂來源、洪峰、河床坡度、粒徑與保全對象。防砂壩、固床工、護岸、沉砂池與導流堤應配合配置，不宜只做單點工程。生態護岸或預鑄護岸需兼顧抗沖刷、基礎護腳、反濾排水、孔隙與植生。施工與完工後清淤維護同樣重要。", "source_type": "past", "source_label": "歷屆考古題", "points": "15分", "hint": "野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "99-水土保持規劃設計-第二題", "year": "99", "subject": "水土保持規劃設計", "title": "第二題", "number": "第二題", "question": "二、已知某開發基地開發前、後之洪峰流量，如下表所示。規劃設計永久性滯洪設施時， 試簡答或計算下列問題： 選定適當之滯洪設施入流及出流洪峰流量，並說明其依據。（8分） 滯洪設施基期採用 1.0小時，試計算滯洪設施之滯洪量。（5分） 已知滯洪設施出流開口斷面寬度 b= 26 cm，高度 h= 24 cm，試計算所需之滯洪水 深。（註：孔口係數=0 . 6）（8分） 設計蓄洪量為何？（4分） 洪峰流量 Q25 （立方公尺/秒，cms） 洪峰流量 Q50 （立方公尺/秒，cms）集水面積 （公頃） 開發前 開發後 開發前 開發後 0.8 0.229 0.290 0.251 0.318", "brief": "水文計算先決定設計雨量、集流時間、逕流係數與集水面積，再求洪峰或歷線；滯洪量由入流與出流歷線最大累積差決定。", "detail": "**表格補充**\n\n| 題型 | 常用公式或方法 |\n|---|---|\n| 合理化公式 | `Q = C I A / 360`，A 用 ha、I 用 mm/hr |\n| 頻率分析 | 由重現期決定超越機率與頻率因子 |\n| 單位歷線 | 有效雨量乘單位歷線並依時間疊加 |\n| 滯洪量 | `dS/dt = I(t)-O(t)`，取最大蓄水量 |\n| 降雨損失 | φ 指數、入滲率或有效雨量計算 |\n\n作答時應先畫出水文流程：降雨、損失、有效雨量、逕流、洪峰與蓄洪。合理化公式適用於小集水區洪峰估算，需以集流時間對應設計降雨強度。單位歷線題則將各時段有效雨量乘以單位歷線並平移疊加。滯洪池題應比較開發前後或允許放流量，利用入流與出流歷線差額求最大蓄水量。若題目只有洪峰而無歷線，不能唯一決定滯洪體積，應說明需雨型或歷線資料。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "99-水土保持規劃設計-第三題", "year": "99", "subject": "水土保持規劃設計", "title": "第三題", "number": "第三題", "question": "三、已知矩形斷面野溪河寬 12 公尺，上游集水區面積 1400 公頃。試就以下提供之相關 資料設計護岸高度。（註：洪峰流量=350 cms、設計河段溪流平均坡度 =1.5%、曼 寧粗糙係數=0 . 0 3 5）（15分）", "brief": "水文計算先決定設計雨量、集流時間、逕流係數與集水面積，再求洪峰或歷線；滯洪量由入流與出流歷線最大累積差決定。", "detail": "**表格補充**\n\n| 題型 | 常用公式或方法 |\n|---|---|\n| 合理化公式 | `Q = C I A / 360`，A 用 ha、I 用 mm/hr |\n| 頻率分析 | 由重現期決定超越機率與頻率因子 |\n| 單位歷線 | 有效雨量乘單位歷線並依時間疊加 |\n| 滯洪量 | `dS/dt = I(t)-O(t)`，取最大蓄水量 |\n| 降雨損失 | φ 指數、入滲率或有效雨量計算 |\n\n作答時應先畫出水文流程：降雨、損失、有效雨量、逕流、洪峰與蓄洪。合理化公式適用於小集水區洪峰估算，需以集流時間對應設計降雨強度。單位歷線題則將各時段有效雨量乘以單位歷線並平移疊加。滯洪池題應比較開發前後或允許放流量，利用入流與出流歷線差額求最大蓄水量。若題目只有洪峰而無歷線，不能唯一決定滯洪體積，應說明需雨型或歷線資料。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "15分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "99-水土保持規劃設計-第四題", "year": "99", "subject": "水土保持規劃設計", "title": "第四題", "number": "第四題", "question": "四、試說明防砂壩下游消能設施種類（三種） 、適用條件及其設計時應考量因素。（20分） 99年專門職業及技術人員高等考試建築師、技師 考試暨普通考試不動產經紀人、記帳士考試試題 代號：02830 等 別： 高等考試 類 科： 水土保持技師 科 目： 水土保持規劃設計（包括水土保持法規） 全一張 （背面） 出線 出流斷面 入流斷面 上游河段 中游河段 泥砂淤積河段 下游河段 挾砂水流出流歷線 土石流入流歷線 10 QD 1.5 t（小時）", "brief": "野溪與土石流治理應採源頭減砂、通道控流、下游保全，並兼顧生態廊道與維護管理。", "detail": "**表格補充**\n\n| 區位 | 治理重點 |\n|---|---|\n| 發生區 | 崩塌源頭控制、山腹工、植生、排水 |\n| 流動區 | 固床、護岸、導流、透過型防砂 |\n| 堆積區 | 沉砂、攔阻、清淤、導流堤、保全 |\n| 生態面 | 保留孔隙、粗糙度、魚道與濱溪植生 |\n\n野溪工程須先判斷土砂來源、洪峰、河床坡度、粒徑與保全對象。防砂壩、固床工、護岸、沉砂池與導流堤應配合配置，不宜只做單點工程。生態護岸或預鑄護岸需兼顧抗沖刷、基礎護腳、反濾排水、孔隙與植生。施工與完工後清淤維護同樣重要。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "99-水土保持規劃設計-第五題", "year": "99", "subject": "水土保持規劃設計", "title": "第五題", "number": "第五題", "question": "五、近年來，因颱風降雨作用而造成野溪土砂淤積致災事件屢見不鮮，除了與上游集水 區土砂生產過量有關外，亦與野溪局部河段形態相關。 試舉出並詳述因野溪形態而造成土砂淤積之原因，並詳述之。（10分） 如下圖所示，當上游以土石流形態流入，經中游河段後以一般挾砂水流形態自下 游流出，試推算在中游段土砂淤積量體？（15分） 註：上游河段溪床平均坡度 =15 度、靜止床面最大泥砂體積濃度=0.75 、內摩 擦角=3 5度、清水流洪峰流量=8 0cms。 下游河段出流洪峰流量=105cms、水體含砂率=5 %；泥砂顆粒密度=2.3 g/cm3。 QS t（分）", "brief": "水文計算先決定設計雨量、集流時間、逕流係數與集水面積，再求洪峰或歷線；滯洪量由入流與出流歷線最大累積差決定。", "detail": "**表格補充**\n\n| 題型 | 常用公式或方法 |\n|---|---|\n| 合理化公式 | `Q = C I A / 360`，A 用 ha、I 用 mm/hr |\n| 頻率分析 | 由重現期決定超越機率與頻率因子 |\n| 單位歷線 | 有效雨量乘單位歷線並依時間疊加 |\n| 滯洪量 | `dS/dt = I(t)-O(t)`，取最大蓄水量 |\n| 降雨損失 | φ 指數、入滲率或有效雨量計算 |\n\n作答時應先畫出水文流程：降雨、損失、有效雨量、逕流、洪峰與蓄洪。合理化公式適用於小集水區洪峰估算，需以集流時間對應設計降雨強度。單位歷線題則將各時段有效雨量乘以單位歷線並平移疊加。滯洪池題應比較開發前後或允許放流量，利用入流與出流歷線差額求最大蓄水量。若題目只有洪峰而無歷線，不能唯一決定滯洪體積，應說明需雨型或歷線資料。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "99-測量學-第一題", "year": "99", "subject": "測量學", "title": "第一題", "number": "第一題", "question": "一、試分別討論視準軸偏差及標尺傾斜對水準測量之影響，並說明如何減少及修正上述 兩類影響？（20分）", "brief": "測量成果由觀測量轉為坐標、高程、面積或體積，並以閉合差、中誤差或檢核點確認精度。平面用方位角與距離求橫縱距，高程用水準或三角高程求高差，土方用方格、斷面、TIN 或等高線法計算。", "detail": "**表格補充**\n\n| 題型 | 作答重點 |\n|---|---|\n| 坐標/導線 | 方位角、橫距、縱距、閉合差與平差 |\n| 水準/高程 | 後視、前視、儀器高、閉合差 |\n| 土方 | 方格法、斷面法、等高線法或 TIN |\n| 航測/UAV | 控制點、空三、密點雲、DEM、正射、精度檢核 |\n| GIS | 圖層、屬性、坐標系統、資料庫與服務 |\n\n測量計算題要注意單位與坐標方向。全站儀可由斜距、垂直角與方位角求三維坐標；水準測量以高程差與閉合差檢核；土方可用平均斷面、方格法、稜柱體公式或等高線面積法。UAV/SfM 題需說明航線規劃、控制點、特徵匹配、束制平差、密點雲、DSM/DTM 與正射影像。若題目圖表未抽出，需回原 PDF 讀取數值後代入。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "99-測量學-第二題", "year": "99", "subject": "測量學", "title": "第二題", "number": "第二題", "question": "二、採用全測站（ Total Station ）進行地形測量，測站 A 點坐標為（ E＝100.00 m， N＝100.00 m ，H＝20.00 m ），後視 B 點坐標為（ E＝50.00 m ，N＝50.00 m ， H＝22.00 m），今欲施測 C 點坐標，所觀測之 C 點水平角為 75°00′00″（自 B 點至 C點順鐘向之角度），斜距為 60.00 m， 天頂距為 85°00′00″，儀器高度為 1.65 m， 稜鏡中心高度為 1.20 m，試依此觀測數據計算 C點坐標（E，N，H）？（20分）", "brief": "測量成果由觀測量轉為坐標、高程、面積或體積，並以閉合差、中誤差或檢核點確認精度。平面用方位角與距離求橫縱距，高程用水準或三角高程求高差，土方用方格、斷面、TIN 或等高線法計算。", "detail": "**表格補充**\n\n| 題型 | 作答重點 |\n|---|---|\n| 坐標/導線 | 方位角、橫距、縱距、閉合差與平差 |\n| 水準/高程 | 後視、前視、儀器高、閉合差 |\n| 土方 | 方格法、斷面法、等高線法或 TIN |\n| 航測/UAV | 控制點、空三、密點雲、DEM、正射、精度檢核 |\n| GIS | 圖層、屬性、坐標系統、資料庫與服務 |\n\n測量計算題要注意單位與坐標方向。全站儀可由斜距、垂直角與方位角求三維坐標；水準測量以高程差與閉合差檢核；土方可用平均斷面、方格法、稜柱體公式或等高線面積法。UAV/SfM 題需說明航線規劃、控制點、特徵匹配、束制平差、密點雲、DSM/DTM 與正射影像。若題目圖表未抽出，需回原 PDF 讀取數值後代入。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "99-測量學-第三題", "year": "99", "subject": "測量學", "title": "第三題", "number": "第三題", "question": "三、針對全球定位系統（Global Positioning System, GPS）之測量，回答以下問題： 詳述 GPS定位原理。（10分） GDOP（ Geometric Dilution of Precision ）及 PDOP（ Positioning Dilution of Precision）是如何求算的？其數值大小與所對應之精度呈何種關係？（10分）", "brief": "GPS 以多顆衛星偽距或載波相位交會，至少四顆衛星可解算三維坐標與接收機鐘差。誤差來源有衛星軌道鐘差、電離層、對流層、多路徑、接收機雜訊與幾何 DOP；可用雙頻、差分/RTK、精密星曆、開闊測站與重複觀測降低。", "detail": "**表格補充**\n\n| 誤差 | 減弱方法 |\n|---|---|\n| 衛星軌道/鐘差 | 精密星曆、差分改正 |\n| 電離層 | 雙頻觀測 |\n| 對流層 | 模型改正、氣象資料 |\n| 多路徑 | 避開反射物、良好天線 |\n| 幾何 | 選 PDOP 佳時段 |\n\nGPS 定位由衛星已知坐標與訊號傳播時間求距離，以空間交會求接收機位置。工程測量常用靜態、快速靜態或 RTK，成果需標明坐標基準、高程基準與精度。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "99-測量學-第四題", "year": "99", "subject": "測量學", "title": "第四題", "number": "第四題", "question": "四、比較等高線（Contour lines ）、網格狀（Gridded ）之數值高程模型（Digital Elevation Models, DEM ）以及不規則三角網（Triangulated Irregular Network, TIN ） 之資料特性以及在地形表達上各自之優缺點？（20分）", "brief": "測量成果由觀測量轉為坐標、高程、面積或體積，並以閉合差、中誤差或檢核點確認精度。平面用方位角與距離求橫縱距，高程用水準或三角高程求高差，土方用方格、斷面、TIN 或等高線法計算。", "detail": "**表格補充**\n\n| 題型 | 作答重點 |\n|---|---|\n| 坐標/導線 | 方位角、橫距、縱距、閉合差與平差 |\n| 水準/高程 | 後視、前視、儀器高、閉合差 |\n| 土方 | 方格法、斷面法、等高線法或 TIN |\n| 航測/UAV | 控制點、空三、密點雲、DEM、正射、精度檢核 |\n| GIS | 圖層、屬性、坐標系統、資料庫與服務 |\n\n測量計算題要注意單位與坐標方向。全站儀可由斜距、垂直角與方位角求三維坐標；水準測量以高程差與閉合差檢核；土方可用平均斷面、方格法、稜柱體公式或等高線面積法。UAV/SfM 題需說明航線規劃、控制點、特徵匹配、束制平差、密點雲、DSM/DTM 與正射影像。若題目圖表未抽出，需回原 PDF 讀取數值後代入。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。"}, {"id": "99-測量學-第五題", "year": "99", "subject": "測量學", "title": "第五題", "number": "第五題", "question": "五、利用航空攝影測量技術，使用像片量測獲致該像點對應之物點三維坐標，其必備之 資料、條件及方法為何？（20分）", "brief": "測量成果由觀測量轉為坐標、高程、面積或體積，並以閉合差、中誤差或檢核點確認精度。平面用方位角與距離求橫縱距，高程用水準或三角高程求高差，土方用方格、斷面、TIN 或等高線法計算。", "detail": "**表格補充**\n\n| 題型 | 作答重點 |\n|---|---|\n| 坐標/導線 | 方位角、橫距、縱距、閉合差與平差 |\n| 水準/高程 | 後視、前視、儀器高、閉合差 |\n| 土方 | 方格法、斷面法、等高線法或 TIN |\n| 航測/UAV | 控制點、空三、密點雲、DEM、正射、精度檢核 |\n| GIS | 圖層、屬性、坐標系統、資料庫與服務 |\n\n測量計算題要注意單位與坐標方向。全站儀可由斜距、垂直角與方位角求三維坐標；水準測量以高程差與閉合差檢核；土方可用平均斷面、方格法、稜柱體公式或等高線面積法。UAV/SfM 題需說明航線規劃、控制點、特徵匹配、束制平差、密點雲、DSM/DTM 與正射影像。若題目圖表未抽出，需回原 PDF 讀取數值後代入。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "114-土壤物理與沖蝕-第一題：土壤生成因子", "year": "114", "subject": "土壤物理與沖蝕", "title": "第一題：土壤生成因子", "number": "第一題", "question": "一、請列舉說明影響土壤生成的重要因子，並說明各項因子對於土壤生成的 影響機制。（25 分）", "brief": "土壤生成主要受母質、氣候、生物、地形及時間五大因子控制，現代土壤學亦常加入人為活動。母質決定礦物與質地基礎；氣候控制風化、淋洗與有機質分解；生物提供有機質並促進團粒與養分循環；地形影響排水、侵蝕與堆積；時間決定土壤剖面發育程度；人為利用則可能加速侵蝕、壓實、酸化或改良土壤。", "detail": "土壤生成可用 Jenny 的 CLORPT 模式表示，即 S = f(cl, o, r, p, t)，其中 cl 為氣候，o 為生物，r 為地形，p 為母質，t 為時間。母質是土壤的起始材料，包含殘積母岩、沖積物、崩積物、火山灰或風積物等，會影響土壤礦物組成、砂粉黏比例、陽離子交換容量、排水性及可風化養分來源。例如玄武岩易形成較富鐵鎂之土壤，砂岩母質則常形成較粗質、保水保肥力較差之土壤。\n\n氣候因子主要透過溫度與降雨控制物理風化、化學風化、淋洗、氧化還原及有機質分解。高溫多雨地區風化與淋洗強烈，易形成酸性、鹽基飽和度低而鐵鋁氧化物較多的土壤；乾燥地區蒸發大於降雨，易有碳酸鹽、石膏或鹽分累積。生物因子包含植物、微生物、土壤動物及人類活動。植物根系可裂解母材、增加孔隙、提供枯落物；微生物分解有機質形成腐植質；蚯蚓等土壤動物促進混合與團粒化。\n\n地形因子影響水分分布與物質移動。坡頂常受沖蝕而土層較薄，坡腳或凹地因堆積與水分集中而土層較厚、含水較高；坡向影響日照、溫度與蒸散，進而影響植生與有機質累積。時間則代表土壤生成作用持續長短，年輕土壤剖面分化不明顯，發育較久者可形成 A、B、C 層，並有黏粒移動、淋澱、鐵鋁累積等特徵。人為活動如整地、耕作、施肥、灌溉、採礦與開發會快速改變土壤結構、水分、鹽分與沖蝕狀態，在坡地水土保持上尤其重要。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "114-土壤物理與沖蝕-第二題：風蝕顆粒運動與防治", "year": "114", "subject": "土壤物理與沖蝕", "title": "第二題：風蝕顆粒運動與防治", "number": "第二題", "question": "二、請詳述土砂顆粒在風蝕過程中的主要運動類型以及對應之風蝕防治原則。 （25 分）", "brief": "風蝕中土砂顆粒主要有懸浮、跳躍、表面滾動或蠕移三種運動。細粒易懸浮遠距離輸送，中砂多以跳躍方式移動並撞擊地表，較粗顆粒多沿地表滾動。防治原則為降低近地風速、增加地表覆蓋、提高土壤團粒穩定、增加地表粗糙度、控制裸露面積及維持適當含水量。", "detail": "風蝕發生須具備可蝕性土壤、乾燥鬆散表面、足夠風速及缺乏覆蓋等條件。顆粒運動可分為三類。第一為懸浮，通常為粒徑很細的粉砂與黏粒，被湍流帶入空氣中，可長距離輸送，是造成揚塵與空氣品質問題的重要來源。第二為跳躍，是風蝕最主要的土砂輸移方式，中等粒徑顆粒被風力抬升後呈彈跳運動，落地時會撞擊並打散其他土粒，形成連鎖剝離。第三為表面蠕移或滾動，較粗顆粒因不易懸浮，只在地表受風壓與跳躍顆粒撞擊而滾動。\n\n防治上應針對風蝕機制處理。降低風速可設防風林、防風籬、草帶、稻草束或地形屏障，使近地風速低於起動風速。增加覆蓋可用敷蓋、殘株覆蓋、草生覆蓋或臨時噴覆，直接阻隔風力與跳躍顆粒撞擊。提高土壤抗蝕性可增加有機質、避免過度整地、維持團粒結構及適度含水。增加地表粗糙度如壟作、粗整地、保留土塊，可縮短顆粒加速距離。大面積裸露地應分期施工，並優先處理迎風面、沙源區及道路堆置場。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "114-土壤物理與沖蝕-第三題：敷蓋與覆蓋之比較", "year": "114", "subject": "土壤物理與沖蝕", "title": "第三題：敷蓋與覆蓋之比較", "number": "第三題", "question": "三、請詳細說明敷蓋（Mulching）與覆蓋（Crop covering）之間在定義、實施 目的、常用材料、適用區位及維護管理等面向之差異。（25 分）", "brief": "敷蓋是將外加材料鋪設於土壤表面，例如稻草、木屑、椰纖、不織布、石礫或噴覆材料；覆蓋則偏向以作物或植生覆蓋地表，例如草生栽培、綠肥、覆蓋作物。敷蓋見效快，適合裸露坡面、施工期與植生未建立前；覆蓋具長期生態與根系固土效果，但需生長時間及養護。", "detail": "**表格補充**\n\n| 項目 | 敷蓋 Mulching | 覆蓋 Crop covering / vegetative cover |\n|---|---|---|\n| 定義 | 將外加材料鋪於土壤表面 | 以活體作物、草類或植生覆蓋地表 |\n| 主要目的 | 立即減少雨滴打擊、保水、防止表土沖失 | 長期降低沖蝕、根系固土、改善土壤 |\n| 常用材料 | 稻草、木屑、樹皮、椰纖毯、不織布、礫石、水力噴植纖維 | 草生、綠肥作物、覆蓋作物、草灌木 |\n| 適用區位 | 新整坡、裸露地、施工期、植生尚未成活區 | 果園、長期坡面、河岸緩衝帶、復育區 |\n| 優點 | 見效快、施工簡單、短期保護佳 | 長期穩定、生態功能佳、根系可增加抗蝕性 |\n| 缺點 | 易腐朽、被風吹或逕流沖失，需補充 | 需生長時間，受季節、水分與養護影響 |\n| 維護重點 | 固定、補鋪、檢查厚度與沖失 | 補播補植、刈割、灌溉、追肥與病蟲害管理 |\n\n敷蓋（mulching）係以外來或現地材料覆於土壤表面，目的在減少雨滴打擊、降低逕流速度、抑制蒸發、調節地溫、減少雜草及促進種子發芽。常用材料包括稻草、木片、樹皮、椰纖毯、稻草蓆、不織布、黃麻網、礫石及水力噴植材料。其適用於新整坡面、道路邊坡、崩塌裸露地、農地畦面及植生尚未成活區。維護重點為防止材料被風雨沖失、固定釘或網材鬆脫、厚度不足及腐爛後補充。\n\n覆蓋（crop covering 或 vegetative cover）係利用作物、草類、灌木或喬木形成活體覆蓋。其目的除減少雨滴能量與表面流外，還可由根系增加土壤抗剪強度、改善孔隙與入滲、增加有機質並促進生態復育。常見材料為百喜草、類地毯草、狗牙根、綠肥作物、豆科覆蓋作物及原生草灌木。覆蓋適合長期坡地保育、果園草生栽培、河岸緩衝帶及復育區。維護重點為播種季節、灌溉、追肥、補植、刈割及避免外來種過度競爭。二者可併用：施工初期以敷蓋立即保護，後續由植生覆蓋接替長期保育功能。\n\n**手冊補強：農藝保育、覆蓋與草生措施**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 覆蓋功能 | 降低雨滴動能、減少表面結皮、增加入滲、降低逕流流速並攔阻泥砂 |\n| 覆蓋材料 | 可用敷蓋材料、覆蓋作物、草生帶、殘株、植生毯或有機覆蓋物 |\n| 農地排水 | 農路、平台、山邊溝、縱橫向排水與安全出口須整體規劃 |\n| 草生措施 | 草溝、草帶與緩衝帶可分散逕流、增加粗糙度、過濾泥砂並改善入滲 |\n| 管理維護 | 需定期修剪、補植、清淤，避免草生帶被車輛破壞或被集中水流切穿 |\n\n農地與坡面沖蝕題可補手冊式結論：以農藝方法先減少土砂生產，再以排水與沉砂設施控制土砂輸出，效果比單靠末端沉砂池更穩定。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "114-土壤物理與沖蝕-第四題：土壤質地與沉降法", "year": "114", "subject": "土壤物理與沖蝕", "title": "第四題：土壤質地與沉降法", "number": "第四題", "question": "四、請說明土壤質地（Soil texture）的定義，以及應用沉降法（Sedimentation method）分析土壤質地的原理與慣用方法。（25 分）", "brief": "土壤質地指土壤中砂粒、坋粒及黏粒的相對比例。沉降法依據 Stokes 定律，顆粒在靜水中沉降速度與粒徑平方成正比，大顆粒先沉降、小顆粒後沉降。慣用方法包括比重計法與吸管法，先去除有機質及分散土粒，再依時間與深度量測懸浮濃度，換算各粒徑百分比並用質地三角圖分類。", "detail": "土壤質地是土壤細土部分中砂、坋、黏三種粒級的重量百分比組成，通常不含直徑大於 2 mm 的礫石。質地影響保水、排水、通氣、入滲、可耕性、養分保持、壓實敏感性與沖蝕性，是水土保持規劃的重要基本資料。砂土排水快但保水保肥差，黏土保水與交換容量高但排水慢、易收縮膨脹，壤土則多具較佳農業性質。\n\n沉降法的理論基礎為 Stokes 定律：v = [(ρs - ρw) g d²] / (18η)，其中 v 為沉降速度，ρs 與 ρw 分別為顆粒與水密度，d 為粒徑，η 為水黏滯係數。粒徑愈大沉降愈快，因此可在特定時間與深度量測仍懸浮的顆粒量，推得坋粒與黏粒比例。實驗上須先風乾、過篩、稱重，去除有機質與碳酸鹽等干擾，加入分散劑如六偏磷酸鈉，使團粒分散為單粒。比重計法以土壤懸浮液密度隨時間下降推算粒徑組成；吸管法則在特定深度取樣烘乾稱重。完成後計算砂、坋、黏百分比並利用 USDA 質地三角圖判定質地名稱。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "114-坡地水文學-第一題：名詞解釋", "year": "114", "subject": "坡地水文學", "title": "第一題：名詞解釋", "number": "第一題", "question": "一、請試述下列名詞之意涵：（每小題 4 分，共 20 分） 比流量（specific discharge） 土壤水分特徵曲線（soil water characteristic curve） 雙累積曲線（double mass curve） 臨前降雨指數（antecedent precipitation index） 儲水係數（coefficient of storage）", "brief": "比流量為單位面積流量；土壤水分特徵曲線表示含水量與基質吸力關係；雙累積曲線用於檢查雨量或流量資料一致性；臨前降雨指數表示降雨前集水區濕潤狀態；儲水係數表示含水層或集水區釋放或儲存水量的能力。", "detail": "**表格補充**\n\n| 名詞 | 考試答案關鍵 |\n|---|---|\n| 比流量 | 單位面積或單位斷面流量；可用於不同集水區流量比較 |\n| 土壤水分特徵曲線 | 含水量與基質吸力關係；用於判斷可用水、入滲與未飽和流 |\n| 雙累積曲線 | 檢查雨量或流量資料一致性；斜率改變代表資料條件改變 |\n| 臨前降雨指數 API | 表示降雨前集水區濕潤程度；前期雨量以遞減權重累加 |\n| 儲水係數 | 單位水頭變化可儲放之水量；影響地下水或集水區退水 |\n\n比流量 specific discharge 可指達西通量 q = Q/A，代表單位斷面面積通過的流量；若用於集水區，也常指單位集水面積產生的流量，可用於不同面積流域間比較。土壤水分特徵曲線為土壤含水量 θ 與基質勢或吸力 ψ 的關係曲線，受質地、構造、孔隙分布與遲滯現象影響，是判斷田間容水量、永久凋萎點與未飽和水流的重要依據。\n\n雙累積曲線是將某測站累積雨量或流量與鄰近參考站平均累積值作圖，若斜率改變，表示測站環境、儀器、觀測方式或資料品質可能改變，需修正資料。臨前降雨指數 API 用遞減權重表示前期降雨對土壤含水量與逕流反應的影響，常寫為 API_t = P_t + k API_{t-1}。儲水係數可指含水層單位面積在單位水頭變化下釋放或儲存的水量；在集水區水文中也可表示儲水量與出流量關係中控制退水速度的係數。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "114-坡地水文學-第二題：地面水與地下水平衡", "year": "114", "subject": "坡地水文學", "title": "第二題：地面水與地下水平衡", "number": "第二題", "question": "二、水文循環可以分為地面水與地下水兩大系統，請列出各自水平衡方程式 並加以說明之。（20 分）", "brief": "地面水系統可寫為 P = I + F + R + E + ΔS，或針對地表控制體寫成降雨、入流等於蒸發、入滲、逕流與蓄水變化之和。地下水系統可寫為 Rg + Gin = Gout + Qb + ETg + ΔSg，表示補注、地下水入流、地下水流出、基流、地下水蒸散與地下水儲量變化。", "detail": "水平衡的基本精神是「輸入 - 輸出 = 儲量變化」。地面水系統包含降雨、地表入流、截留、窪蓄、入滲、地表逕流與蒸發。可表示為 P + Qin = Qs + F + E + ΔSs，其中 P 為降雨，Qin 為上游或外部地表入流，Qs 為地表逕流出流，F 為入滲進入土壤或地下水的水量，E 為地表與水面蒸發，ΔSs 為地表蓄水變化。若考慮植生，降雨先經截留，截留水可蒸發回大氣，穿落雨與樹幹流才到達地面。\n\n地下水系統則以含水層或坡地地下水控制體為對象，可寫為 Rg + Gin = Gout + Qb + ETg + Pumping + ΔSg。Rg 為由入滲、河川滲漏或人工補注形成的地下水補注，Gin 與 Gout 為地下水側向入流與流出，Qb 為排入河川的基流或泉流，ETg 為地下水位淺處被植物或土壤蒸散消耗的水量，Pumping 為抽水，ΔSg 為地下水儲量變化。坡地水文分析時，地面水與地下水不可切割，因為入滲、壤中流、地下水補注與基流共同控制洪峰、退水及崩塌潛勢。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "114-坡地水文學-第三題：未飽和層與飽和層水流", "year": "114", "subject": "坡地水文學", "title": "第三題：未飽和層與飽和層水流", "number": "第三題", "question": "三、說明地表下水流在地下水位之上（未飽和層）與地下水位之下（飽和層） 的兩個區域，其水流流動機制有何不同？（請從驅動力、控制方程式、 主要影響因子等方面闡述）。（20 分）", "brief": "未飽和層中孔隙同時含水與空氣，水流受重力與毛管吸力共同控制，導水度隨含水量變化，常以 Richards 方程描述。飽和層孔隙充滿水，水流主要受水頭梯度控制，導水度近似為飽和水力傳導度，常以 Darcy 定律與地下水流方程描述。", "detail": "地下水位以上為未飽和層，孔隙中同時有水與空氣。其驅動力包含重力勢與基質勢，乾燥土壤因毛管吸力大，可吸引水分進入細孔隙；當含水量增加時，連通水膜增加，未飽和導水度上升。控制方程式通常為 Richards 方程，結合水分連續方程與 Darcy-Buckingham 定律。主要影響因子包含土壤水分特徵曲線、孔隙分布、初始含水量、入滲強度、植生根系與地表覆蓋。\n\n地下水位以下為飽和層，孔隙幾乎全被水充滿。水流驅動力主要為總水頭梯度，即壓力水頭與位置水頭之和的差異。流動可用 Darcy 定律 q = -K grad(h) 表示，其中 K 為飽和水力傳導度，h 為總水頭。若結合儲水係數與連續方程，可得地下水流控制方程。影響因子包含含水層厚度、孔隙率、滲透係數、裂隙、地層構造、邊界條件及補注排泄條件。坡地崩塌常與地下水位上升、孔隙水壓增加及有效應力降低有關。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "114-坡地水文學-第四題：邊坡地下水調查內容", "year": "114", "subject": "坡地水文學", "title": "第四題：邊坡地下水調查內容", "number": "第四題", "question": "四、邊坡地下水調查可提供作為崩塌區內邊坡穩定分析與治理工程規劃時 所需要的基本資料，試詳述邊坡地下水調查內容應包含那些？（20 分） 代號：02810 頁次：2－2", "brief": "調查內容應包含地形地質、地下水位、孔隙水壓、湧水位置、滲流方向、水位季節變化、降雨反應、含水層與隔水層分布、水質與示蹤、既有排水狀況及監測資料。成果用於邊坡穩定分析、排水工程配置及警戒管理。", "detail": "邊坡地下水調查首先需蒐集地形圖、地質圖、航照、崩塌歷史、雨量及既有鑽探資料，判斷坡面、坡腳、地形凹槽、斷層破碎帶、順向坡層面及可能滲流通道。現地調查應記錄湧水、濕地、泉點、滲水線、植生異常、坡面裂縫、地表陷落及排水設施失效位置。\n\n地下水觀測方面，可設置觀測井、水位管、開口式或振弦式孔隙水壓計，量測地下水位與孔隙水壓隨時間變化，並與降雨資料比對，以了解降雨入滲延遲、地下水位上升速率及退水特性。必要時進行抽水試驗、注水試驗、滲透試驗或示蹤試驗，以求得水力傳導度、地下水流向與補注來源。鑽探與地質調查應確認滑動面、破碎帶、含水層、隔水層、土岩界面與節理裂隙。調查成果應轉化為邊坡穩定分析所需的地下水位線、孔隙水壓分布與設計水位，並作為水平排水孔、截水溝、集水井、排水廊道及監測警戒系統設計依據。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "114-坡地水文學-第五題：單位歷線計算", "year": "114", "subject": "坡地水文學", "title": "第五題：單位歷線計算", "number": "第五題", "question": "五、下圖為某一集水區由 1 cm 有效降雨及 1 小時延時所形成之單位歷線 U(1, t) 。今有兩場降雨落於該集水區上，第一場降雨之雨量為 5.8 cm， 延時為 2 小時，降雨中斷 1 小時後，又降下第二場雨，其雨量為 3.9 cm， 延時為 1 小時。假設該集水區入滲指數（infiltration index）為 0.9 cm/hr， 河川基流量為 10 cms，試求： 該集水區之面積，以平方公里表示。（6 分） 兩場降雨降落於該集水區之平均逕流係數 C。（6 分） 由該兩場降雨所形成之河川流量歷線 Q(t)。（8 分）", "brief": "本題需由題圖讀取 1 cm、1 小時單位歷線 U(1,t) 各時段流量。有效雨量為第一場 5.8 cm、2 小時扣除入滲 0.9 cm/hr 後為 4.0 cm，平均分配為每小時 2.0 cm；第二場 3.9 cm、1 小時扣除 0.9 cm 後為 3.0 cm。直接逕流歷線為 2U(t) + 2U(t-1) + 3U(t-3)，總流量再加基流 10 cms。", "detail": "**表格補充**\n\n| 項目 | 公式或處理 | 結果 |\n|---|---|---|\n| 第一場總雨量 | `5.8 cm`，延時 `2 hr` | 每小時平均 `2.9 cm/hr` |\n| 第一場入滲損失 | `0.9 cm/hr × 2 hr` | `1.8 cm` |\n| 第一場有效雨量 | `5.8 - 1.8` | `4.0 cm`，分兩小時各 `2.0 cm` |\n| 第二場總雨量 | `3.9 cm`，延時 `1 hr` | `3.9 cm/hr` |\n| 第二場有效雨量 | `3.9 - 0.9` | `3.0 cm` |\n| 平均逕流係數 | `總有效雨量 / 總雨量 = 7.0 / 9.7` | `0.72` |\n| 直接逕流歷線 | `Qd(t)=2U(t)+2U(t-1)+3U(t-3)` | 需由原圖讀取 `U(t)` |\n| 總流量 | `Q(t)=Qd(t)+10 cms` | 加上基流 |\n\n第一小題集水區面積可由單位歷線體積求得。因 U(1,t) 為 1 cm 有效降雨形成之直接逕流歷線，故直接逕流體積 V 等於歷線面積，即 V = Σ[U(t) Δt]。又 1 cm 有效雨量在面積 A 上形成體積為 0.01A，因此 A = V / 0.01。若 U 以 cms、Δt 以秒計，A 的單位為平方公尺，再除以 10^6 轉為平方公里。本題須由原圖讀取 U(t) 各時段縱座標後計算。\n\n第二小題，第一場降雨總量 5.8 cm、延時 2 小時，入滲指數 0.9 cm/hr，損失為 1.8 cm，有效雨量為 4.0 cm，若平均分配，兩個 1 小時時段各 2.0 cm。第二場降雨 3.9 cm、延時 1 小時，損失 0.9 cm，有效雨量為 3.0 cm。總降雨量為 9.7 cm，總有效雨量為 7.0 cm，平均逕流係數 C = 7.0 / 9.7 = 0.72。\n\n第三小題利用線性疊加。令 U(t) 為 1 cm、1 小時單位歷線。第一場雨有兩個連續時段，分別產生 2U(t) 與 2U(t-1)。中斷 1 小時後第二場雨落在第三個小時之後，產生 3U(t-3)。直接逕流歷線 Qd(t) = 2U(t) + 2U(t-1) + 3U(t-3)。河川總流量 Q(t) = Qd(t) + 10 cms。正式計算時應依題圖建立表格，逐時段列出 U(t)、2U(t)、2U(t-1)、3U(t-3) 與合計值。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。\n\n**手冊補強：農藝保育、覆蓋與草生措施**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 覆蓋功能 | 降低雨滴動能、減少表面結皮、增加入滲、降低逕流流速並攔阻泥砂 |\n| 覆蓋材料 | 可用敷蓋材料、覆蓋作物、草生帶、殘株、植生毯或有機覆蓋物 |\n| 農地排水 | 農路、平台、山邊溝、縱橫向排水與安全出口須整體規劃 |\n| 草生措施 | 草溝、草帶與緩衝帶可分散逕流、增加粗糙度、過濾泥砂並改善入滲 |\n| 管理維護 | 需定期修剪、補植、清淤，避免草生帶被車輛破壞或被集中水流切穿 |\n\n農地與坡面沖蝕題可補手冊式結論：以農藝方法先減少土砂生產，再以排水與沉砂設施控制土砂輸出，效果比單靠末端沉砂池更穩定。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "114-植生工程-第一題：淨零排放與臺灣 2050 路徑", "year": "114", "subject": "植生工程", "title": "第一題：淨零排放與臺灣 2050 路徑", "number": "第一題", "question": "一、淨零排放（Net Zero）之意義為何？（10 分）並請詳細說明臺灣 2050 淨 零排放路徑。（15 分）", "brief": "淨零排放指人為溫室氣體排放量與移除量達成平衡，使淨排放量為零。臺灣 2050 淨零路徑以能源轉型、產業轉型、生活轉型、社會轉型為主軸，並以科技研發與氣候法制為治理基礎，推動再生能源、氫能、前瞻能源、電力系統與儲能、節能、碳捕捉利用封存、運具電動化、資源循環、自然碳匯及公正轉型等策略。", "detail": "淨零排放不是完全沒有排放，而是將能源、工業、農業、土地利用及廢棄物等部門的溫室氣體排放盡量降低，剩餘不可避免排放則由森林、土壤、海洋等自然碳匯或碳捕捉利用與封存等負排放技術抵換，使總排放與總移除平衡。其核心在於減量優先、移除補充，並需有長期監測與盤查制度。\n\n臺灣 2050 淨零路徑可從四大轉型說明。能源轉型包括擴大太陽光電、離岸風電、地熱、海洋能等再生能源，提升電網韌性與儲能，發展氫能與前瞻能源，並逐步降低化石燃料依賴。產業轉型包括製程改善、燃料替代、電氣化、循環經濟、低碳材料與碳捕捉利用封存。生活轉型包括建築節能、運具電動化、低碳運輸、綠色消費及廢棄物減量。社會轉型則重視公正轉型、就業調適、民眾參與及弱勢保護。就植生工程而言，森林經營、坡地植生復育、河川綠帶、土壤有機碳提升與生態綠網均可作為自然碳匯與氣候調適措施。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "114-植生工程-第二題：木本植物綠化防災功能", "year": "114", "subject": "植生工程", "title": "第二題：木本植物綠化防災功能", "number": "第二題", "question": "二、請詳細說明木本植物（灌木和喬木）的綠化防災功能。（25 分）", "brief": "木本植物可截留降雨、降低雨滴打擊、增加入滲、減少逕流、以根系補強土壤、降低表層崩塌、穩定岸坡、攔截落石與土砂，並提供生態棲地及微氣候調節。灌木適合快速覆蓋與坡面保護，喬木適合長期根系補強、遮蔭及生態結構建立。", "detail": "木本植物的防災功能可分為水文、力學、表面保護與生態功能。水文方面，樹冠可截留降雨，減少直接到達地表的雨滴動能；枯落物層可增加地表粗糙度、延緩逕流、促進入滲並減少片蝕。根系與土壤孔隙改善可增加滲透與蓄水，但在長延時豪雨下也須注意地下水位上升。\n\n力學方面，灌木與喬木根系可提供拉力補強，增加土壤抗剪強度，尤其對淺層崩塌與表土滑動有抑制效果。深根性喬木可穿入較深土層或裂隙，形成錨定作用；鬚根密集灌木可穩定表土與坡面。表面保護方面，枝葉、草灌層與枯落物可降低雨滴濺蝕、風蝕及地表逕流剪力。河岸或野溪邊坡上，木本植物根系可增加岸坡抗沖刷能力，枝幹亦可攔截漂流木、落石及小規模土砂。生態上，木本植物提供棲地、食物、遮蔭與廊道，並改善景觀及碳吸存。配置時應避免在不穩定深層滑動體上盲目種植大型喬木，以免增加自重或風倒擾動，應搭配排水、坡面工程及分期養護。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。\n\n**手冊補強：河岸植生、濕地與防風定砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 河岸植生 | 需依水位、流速、沖刷、坡度與土壤含水配置草本、灌木、喬木與柔性護岸材料 |\n| 濕地護岸 | 宜營造緩坡、多孔隙、多水深與水陸交界帶，兼顧水質淨化、棲地與安全 |\n| 海岸定砂 | 先定砂、後防風、再造林，植物需耐鹽、耐旱、耐風砂掩埋 |\n| 防風林 | 林帶密度、寬度、高度與樹種配置影響防風距離與減風效果 |\n| 維護管理 | 需防止外來種入侵、枯死裸露、沖刷破壞與人為踩踏破壞 |\n\n生態與植生題可補充：護岸或綠帶設計應同時考慮防災功能與棲地功能，避免只追求硬體穩定而造成棲地破碎。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "114-植生工程-第三題：超過臨界坡度裸露坡面之植生", "year": "114", "subject": "植生工程", "title": "第三題：超過臨界坡度裸露坡面之植生", "number": "第三題", "question": "三、請詳細說明當崩塌地裸露坡面超過臨界坡度時，應如何進行該坡面之植 生綠化工作？（25 分）", "brief": "超過臨界坡度時不可只靠撒播，須先確保坡面安全，採削坡整形、階段平台、截排水、坡面抗沖蝕材料與植生基材固定，再選用耐旱、耐瘠、根系發達且適地適種的草灌木。必要時採掛網噴植、植生袋、植生格框、客土噴植、錨定網材或與擋土、坡面保護工程合併。", "detail": "崩塌地裸露坡面若超過植生可自然附著與土壤可穩定停留的臨界坡度，首先應進行安全評估，確認是否有持續滑動、落石、湧水、沖蝕溝或坡腳淘刷。若坡面仍不穩定，應先以削坡減載、坡腳保護、擋土、格梁、錨定、截水溝、排水孔或地下排水降低破壞風險。排水是關鍵，坡頂須截流，坡面須分段導排，坡腳須安全出流。\n\n植生施工上，陡坡不宜單純撒播，應使用能固定基材的工法。例如鋼絲網、椰纖網、黃麻網、不織布或三維網固定坡面；客土噴植或厚層基材噴植提供種子發芽介質；植生袋、植生毯、植生格框或蜂巢格室可防止基材滑落；岩盤或極陡坡可用植生孔、植生槽或掛網噴植。植物選擇以先驅性、發芽快、根系密、耐旱耐瘠及與當地氣候相符為原則，初期可用草本快速覆蓋，中長期導入灌木與原生樹種。養護應包含補植、灌溉、追肥、病蟲害管理、網材檢查及豪雨後修復。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "114-植生工程-第四題：河川護岸植生方法與材料", "year": "114", "subject": "植生工程", "title": "第四題：河川護岸植生方法與材料", "number": "第四題", "question": "四、請詳細舉例說明河川護岸植生有那些可行方法與材料？（25 分）", "brief": "可行方法包括植生護坡、柳枝工、柴束工、植生袋、椰纖毯、植生格框、石籠或箱籠結合植生、砌石孔隙植生、緩坡化河岸與濱溪緩衝帶。材料可用原生草本、灌木、柳枝或耐水濕植物，並搭配石材、木樁、椰纖、土壤基材及可分解網材。", "detail": "河川護岸植生應依水位變動、流速、沖刷力、河岸坡度、土壤含水與生態需求分區配置。常水位附近需耐淹、耐沖刷植物，洪水位以上可配置草灌木與喬木。緩坡河岸可採草皮、植生毯、椰纖毯、種子噴播及濱溪緩衝帶；中等沖刷區可採植生袋、植生格框、木樁編柵、柴束工或柳枝扦插；流速較大或坡腳受沖刷處，可用石籠、箱籠、乾砌石或塊石護腳，並在孔隙填土植生。\n\n材料方面，植物應優先使用當地原生、根系發達、耐濕耐旱、萌芽力強且不具入侵性的種類。柳枝、構樹、山黃麻、五節芒、甜根子草、莎草類等可依地區適地選用。工程材料可用塊石、卵石、木樁、椰纖網、黃麻網、植生袋、客土與肥料。設計上應避免全斷面硬化，保留孔隙、緩坡、水陸交錯帶與粗糙度，以兼顧防災、魚蝦棲地及岸坡植被生長。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。\n\n**手冊補強：河岸植生、濕地與防風定砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 河岸植生 | 需依水位、流速、沖刷、坡度與土壤含水配置草本、灌木、喬木與柔性護岸材料 |\n| 濕地護岸 | 宜營造緩坡、多孔隙、多水深與水陸交界帶，兼顧水質淨化、棲地與安全 |\n| 海岸定砂 | 先定砂、後防風、再造林，植物需耐鹽、耐旱、耐風砂掩埋 |\n| 防風林 | 林帶密度、寬度、高度與樹種配置影響防風距離與減風效果 |\n| 維護管理 | 需防止外來種入侵、枯死裸露、沖刷破壞與人為踩踏破壞 |\n\n生態與植生題可補充：護岸或綠帶設計應同時考慮防災功能與棲地功能，避免只追求硬體穩定而造成棲地破碎。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "114-水土保持工程-第一題：擋土牆示意與鑑定勘查", "year": "114", "subject": "水土保持工程", "title": "第一題：擋土牆示意與鑑定勘查", "number": "第一題", "question": "一、請繪出重力式與非重力式等擋土牆之示意圖，（5 分）並說明此等坡地穩 定工程之擋土牆鑑定作業時現場勘查應紀錄那些項目？（10 分）", "brief": "重力式擋土牆靠自重抵抗土壓，包含混凝土、漿砌石、乾砌石及箱籠牆；非重力式擋土牆靠結構彎矩、拉力或地盤反力抵抗土壓，如懸臂式、扶壁式、板樁、錨定牆、加勁擋土牆。鑑定現勘應記錄牆體尺寸、傾斜、裂縫、位移、排水、背填土、基礎淘刷、周邊載重、地表水、地下水及破壞徵兆。", "detail": "作圖時，重力式可畫成上窄下寬梯形斷面，牆後為回填土，牆身靠自重提供抗滑與抗傾倒能力。非重力式可畫懸臂式 L 型或 T 型斷面，利用底版、牆身鋼筋混凝土彎矩及回填土重量抵抗土壓；或畫錨定牆，以錨拉力抵抗側向土壓。鑑定作業現勘須包含基本資料與破壞徵兆。基本資料如位置、牆型、長度、高度、厚度、材料、施工年代、牆頂與牆趾現況、背填土高度及上方建物或道路載重。\n\n結構狀況應記錄裂縫型態、寬度、方向、滲水、白華、鋼筋外露、混凝土剝落、砌石鬆動、箱籠腐蝕或變形。變位狀況需觀察牆身傾斜、鼓出、滑移、沉陷、牆趾隆起及伸縮縫錯動。排水狀況需檢查洩水孔是否堵塞、反濾層是否失效、牆後是否積水、坡頂截水是否完善。地盤與環境須記錄基礎淘刷、坡腳沖刷、地下水、地表逕流、植生根系、鄰近開挖及地震豪雨後變化。最後判斷可能破壞模式：滑動、傾倒、承載力不足、整體滑動或材料劣化。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。", "source_type": "past", "source_label": "歷屆考古題", "points": "15分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。"}, {"id": "114-水土保持工程-第二題：農路縱坡長度與避車道", "year": "114", "subject": "水土保持工程", "title": "第二題：農路縱坡長度與避車道", "number": "第二題", "question": "二、道路縱坡度之長度限制經驗公式為： 4 40L G 3.3      ，其中 L 為長度限制 （m），G 為縱坡度（%）。今有一道路在連續不同長度及縱坡度下，分別 為：（100 m、6%）、（100 m、7%），則再銜接縱坡度 5%之農路，其長度 應為多少？（10 分）再依農路設計規範相關避車道規定之最大間隔（如 400、300、150 m）、寬及長（2.5、20 m），請依行車設計速度說明並對 應各級農路之避車道配置為何？（10 分）", "brief": "依 L = [40 / (G + 3.3)]^4，6% 坡長限制約 342.22 m，7% 約 227.45 m，5% 約 539.42 m。已使用比例為 100/342.22 + 100/227.45 = 0.7319，剩餘可用比例 0.2681，因此後續 5% 農路可接長度約 0.2681 × 539.42 = 144.64 m。", "detail": "**表格補充**\n\n| 坡度 G | 長度限制公式 `L=[40/(G+3.3)]^4` | 長度限制 |\n|---:|---:|---:|\n| 6% | `[40/9.3]^4` | `342.22 m` |\n| 7% | `[40/10.3]^4` | `227.45 m` |\n| 5% | `[40/8.3]^4` | `539.42 m` |\n\n| 步驟 | 計算 | 結果 |\n|---|---:|---:|\n| 已使用比例 | `100/342.22 + 100/227.45` | `0.7319` |\n| 剩餘比例 | `1 - 0.7319` | `0.2681` |\n| 可再接 5% 長度 | `0.2681 × 539.42` | `144.64 m`，約 `145 m` |\n\n題示經驗式為 L = [40 / (G + 3.3)]^4。代入 G = 6%，得 L6 = [40 / 9.3]^4 = 342.22 m；代入 G = 7%，得 L7 = [40 / 10.3]^4 = 227.45 m；代入 G = 5%，得 L5 = [40 / 8.3]^4 = 539.42 m。連續不同縱坡可用累積使用率檢核，已使用率為 100/342.22 + 100/227.45 = 0.2922 + 0.4397 = 0.7319。剩餘使用率為 1 - 0.7319 = 0.2681。因此 5% 坡段可容許長度為 0.2681 × 539.42 = 144.64 m，約取 145 m。\n\n避車道配置方面，依農路設計規範應隨道路等級與設計速率調整間距。一般原則為設計速率高、交通量較大或視距較差路段，避車道間距應較短；設計速率低、交通量小者可較長。題目給定最大間隔 400、300、150 m，寬 2.5 m、長 20 m，可對應低速或低等級農路採 400 m，中等條件採 300 m，高速、陡坡、彎道多或視距不足路段採 150 m。避車道應設於視距良好、坡度較緩、路基穩定、不妨礙排水處，並避免設於急彎外側、崩塌潛勢區及排水集中處。\n\n**手冊補強：道路、農路與開挖整地**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 路線選擇 | 避免通過順向坡、崩塌地、湧水區及地質破碎帶，並減少大挖大填 |\n| 排水配置 | 山邊溝、路側溝、橫向排水、跌水消能與出口保護須配合道路縱坡配置 |\n| 邊坡保護 | 上邊坡重截水與護坡，下邊坡重填方穩定、排水與坡腳保護 |\n| 施工防災 | 土方工程應分期施工，裸露面即時覆蓋，臨時沉砂與臨時排水應先行完成 |\n| 維護管理 | 定期清理側溝、涵管、沉砂池與排水出口，豪雨後檢查沖刷、裂縫與邊坡變形 |\n\n道路水土保持答案可補一句總結：道路本身常成為集中逕流通道，因此設計重點不只在路面通行，還包括截水、導水、消能、沉砂與安全排放。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "114-水土保持工程-第三題：野溪清淤與疏通", "year": "114", "subject": "水土保持工程", "title": "第三題：野溪清淤與疏通", "number": "第三題", "question": "三、當颱風豪雨影響，有大量土砂入流野溪而出現短時間淤積溪床並形成堰 塞狀況，則相關清疏作業可區分為：清淤與疏通，請說明其可行水土保 持工程手段及相關處理對策為何？（20 分）", "brief": "清淤以移除淤積土砂、恢復通洪斷面及降低堰塞風險為主；疏通以打通阻塞水路、導引水流安全通過為主。工程手段包括臨時導流、分段開挖、河道整理、堆置土砂移除、固床、護岸、攔砂或透過型防砂設施、沉砂空間維持及下游保全。", "detail": "颱風豪雨後大量土砂進入野溪，短時間淤高河床，可能造成水流改道、溢淹、岸坡淘刷、橋涵堵塞及堰塞潰決。清淤重點是移除過量淤積物，使河道恢復必要通洪斷面與縱坡。作業時應先調查淤積範圍、粒徑、含水狀態、上游來砂量、下游保全對象及施工便道安全，再採分段、由下游往上游或依現地安全順序辦理。清出土砂應運至合法堆置場或作工程材料，不可任意堆於河道內或洪水位以下。\n\n疏通則以解除局部阻塞為主，例如橋涵口、急彎、崩塌堆積、漂流木堵塞或土砂壩塞。可先設臨時導流槽或安全排水口，避免一次切開造成突發沖刷。後續視需要配置固床工穩定河床坡降，護岸保護沖刷岸，透過型防砂壩或梳子壩攔阻大粒徑與漂流木，沉砂池提供堆砂空間。治理對策應兼顧短期搶通與長期土砂管理，包含監測雨量水位、定期清淤、保留必要輸砂通道及避免過度深挖造成下游沖刷或上游邊坡失穩。\n\n**手冊補強：野溪治理與土砂控制**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 治理目標 | 穩定流心、控制縱橫向沖刷、調節土砂、維持通洪斷面並保護下游保全對象 |\n| 處理順序 | 先判斷上游供砂、中游輸砂與下游淤積，再決定源頭減砂、溪床穩定、清淤疏通或沉砂防砂 |\n| 清淤疏通 | 緊急清疏以恢復通洪與降低堰塞風險；計畫清疏則應配合河床坡降、土砂來源與上下游穩定 |\n| 工程配置 | 固床工、防砂壩、護岸、護坦、跌水消能、導流與沉砂空間須整體配置，不宜只做局部硬化 |\n| 維護管理 | 豪雨後巡查淤積、淘刷、堵塞與構造物損壞，並建立清淤、補強及棄土去化計畫 |\n\n作答時可強調手冊式觀念：野溪治理不是單純把河道挖深或截彎取直，而是要維持水流、泥砂與河床坡降的動態平衡；若只清除下游淤積而未處理上游供砂與坡面沖蝕，災害會反覆發生。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "114-水土保持工程-第四題：曲流、岩層出露與生態工法", "year": "114", "subject": "水土保持工程", "title": "第四題：曲流、岩層出露與生態工法", "number": "第四題", "question": "四、野溪為何在水流沖刷下出現曲流地形，當其半徑、長度及寬度分別約為 30、40 及 10 m ，曲流段單側若有岩層出露，請說明將會於何側出現？ （5 分）又曲流段及其前後二側溪岸將採用：護岸（如混凝土、乾砌石、 箱籠）及固床工（如複式、踏步、石樑）等二種處理單元進行治理，在 最有利於魚蝦棲地與岸坡植被生長環境營造要求下，請以前述二種處理 單元中各擇一工法進行配置並說明其理由？（10 分） 代號：02830 頁次：2－2 地形轉折 農路邊溝 縱坡度14% 坡向：東 坡長70 m 坡寬60 m 洩水方向 計畫範圍 編號農路 崩塌地下陷區 崩塌地堆積區 地形轉折 農路邊溝 縱坡度14% 坡向：東 坡長70 m 坡寬60 m 洩水方向 計畫範圍 編號農路 崩塌地下陷區 崩塌地堆積區", "brief": "曲流因水流慣性與二次流造成外彎流速大、沖刷強，內彎流速小、易堆積。岩層出露通常出現在受沖刷較強的外彎攻擊坡。若要求魚蝦棲地與岸坡植被，可選箱籠護岸搭配踏步式或石樑固床工，因其孔隙多、粗糙度高、可植生且較能形成多樣流況。", "detail": "野溪水流受地形、河床材料差異與橫向擾動影響，會形成彎曲流路。曲流段中，水流主流線偏向外彎，外彎流速與剪應力較大，容易沖刷形成攻擊坡；內彎流速較小，泥砂易堆積形成點砂洲。因此若曲流段單側有岩層出露，多半位於外彎側，因覆土與鬆散材料被沖刷移除，露出基岩。\n\n工法配置若兼顧魚蝦棲地與岸坡植被，不宜優先採全混凝土光滑護岸。護岸可選箱籠或乾砌石護岸。箱籠可抵抗沖刷、適應部分變形，孔隙可提供小型生物棲息與植生根系穿透；乾砌石亦具孔隙與粗糙表面，但抗沖能力須依流速檢核。固床工可選踏步式或石樑固床工，踏步式可分散高差、降低流速並形成潭瀨；石樑可保留較自然河床粗糙度與縱向連續性。配置上外彎攻擊坡加強護岸與護腳，彎道前後設固床穩定河床，內彎盡量保留堆積灘地與植生帶。\n\n**手冊補強：野溪治理與土砂控制**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 治理目標 | 穩定流心、控制縱橫向沖刷、調節土砂、維持通洪斷面並保護下游保全對象 |\n| 處理順序 | 先判斷上游供砂、中游輸砂與下游淤積，再決定源頭減砂、溪床穩定、清淤疏通或沉砂防砂 |\n| 清淤疏通 | 緊急清疏以恢復通洪與降低堰塞風險；計畫清疏則應配合河床坡降、土砂來源與上下游穩定 |\n| 工程配置 | 固床工、防砂壩、護岸、護坦、跌水消能、導流與沉砂空間須整體配置，不宜只做局部硬化 |\n| 維護管理 | 豪雨後巡查淤積、淘刷、堵塞與構造物損壞，並建立清淤、補強及棄土去化計畫 |\n\n作答時可強調手冊式觀念：野溪治理不是單純把河道挖深或截彎取直，而是要維持水流、泥砂與河床坡降的動態平衡；若只清除下游淤積而未處理上游供砂與坡面沖蝕，災害會反覆發生。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。\n\n**手冊補強：道路、農路與開挖整地**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 路線選擇 | 避免通過順向坡、崩塌地、湧水區及地質破碎帶，並減少大挖大填 |\n| 排水配置 | 山邊溝、路側溝、橫向排水、跌水消能與出口保護須配合道路縱坡配置 |\n| 邊坡保護 | 上邊坡重截水與護坡，下邊坡重填方穩定、排水與坡腳保護 |\n| 施工防災 | 土方工程應分期施工，裸露面即時覆蓋，臨時沉砂與臨時排水應先行完成 |\n| 維護管理 | 定期清理側溝、涵管、沉砂池與排水出口，豪雨後檢查沖刷、裂縫與邊坡變形 |\n\n道路水土保持答案可補一句總結：道路本身常成為集中逕流通道，因此設計重點不只在路面通行，還包括截水、導水、消能、沉砂與安全排放。", "source_type": "past", "source_label": "歷屆考古題", "points": "15分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "114-水土保持工程-第五題：崩塌地茶園排水與整地", "year": "114", "subject": "水土保持工程", "title": "第五題：崩塌地茶園排水與整地", "number": "第五題", "question": "五、崩塌地之堆積區，其坡地現況（如附圖）擬設置茶園，今考量以坡地穩 定工程施作，需就全區進行安全排水規劃，現可配合處理單元有：⑴山 邊溝兼作業道、⑵永久性沉砂池、⑶浪型鋼版溝、⑷砌石溝（溝底及深 度 0.2～0.3 m，溝壁坡降 1：2，漿砌石溝面粗糙係數 0.025，可容許安全 流速 4.5 m/s）、⑸L 型溝；⑹乾砌石護坡，則請參考附圖標註各處理單元 之適當區位並說明理由，（10 分）另請估算在挖填平衡下全區開發整地 之挖方量及排水溝斷面應如何決定？（20 分）", "brief": "配置原則為坡頂截水、坡面分段排水、坡腳沉砂滯洪、安全出流。山邊溝兼作業道宜設於坡頂或上緣截排外來水；浪型鋼板溝可用於臨時或陡坡集中排水；砌石溝與 L 型溝用於永久排水與道路邊溝；永久沉砂池設於出口前；乾砌石護坡用於坡腳或沖刷邊坡。挖填平衡土方量需依附圖等高線或設計面高程計算；排水溝斷面以設計流量、曼寧公式與容許流速檢核。", "detail": "崩塌地堆積區設茶園時，最重要是避免農路邊溝或坡面逕流集中進入崩塌體。坡頂或上方地形轉折處應設山邊溝兼作業道，截取上方來水並導至安全出水口。坡面內部依茶園等高配置設砌石溝或 L 型溝，將坡面逕流分段收集，避免長坡長集中沖刷。陡坡或臨時施工排水可採浪型鋼板溝。坡腳或出口處設永久性沉砂池，攔截茶園開發與道路排水帶出的泥砂。崩塌地下陷區、堆積區邊緣或受沖刷坡腳可設乾砌石護坡，兼具排水與孔隙消能。\n\n挖填平衡之全區土方量需由原圖地形與設計面求得。一般可採方格法或三角網法：先建立現況高程與設計高程，計算各格點高差 h = H現況 - H設計；正值為挖方、負值為填方；每一方格以平均高差乘面積求體積，分別累計挖方與填方。若要求挖填平衡，應調整設計基面或茶園平台高程，使總挖方約等於總填方，並考慮鬆方、壓實係數與表土剝離量。排水溝斷面以設計流量 Q 決定，可用合理化公式 Q = CIA 求各分區流量，再以曼寧公式 Q = (1/n) A R^(2/3) S^(1/2) 試算斷面。砌石溝 n = 0.025，流速 V = Q/A 不得超過容許安全流速 4.5 m/s，並應檢核自由高、出流消能與沉砂池容量。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。\n\n**手冊補強：道路、農路與開挖整地**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 路線選擇 | 避免通過順向坡、崩塌地、湧水區及地質破碎帶，並減少大挖大填 |\n| 排水配置 | 山邊溝、路側溝、橫向排水、跌水消能與出口保護須配合道路縱坡配置 |\n| 邊坡保護 | 上邊坡重截水與護坡，下邊坡重填方穩定、排水與坡腳保護 |\n| 施工防災 | 土方工程應分期施工，裸露面即時覆蓋，臨時沉砂與臨時排水應先行完成 |\n| 維護管理 | 定期清理側溝、涵管、沉砂池與排水出口，豪雨後檢查沖刷、裂縫與邊坡變形 |\n\n道路水土保持答案可補一句總結：道路本身常成為集中逕流通道，因此設計重點不只在路面通行，還包括截水、導水、消能、沉砂與安全排放。", "source_type": "past", "source_label": "歷屆考古題", "points": "30分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "114-水土保持規劃設計-第一題：地質鑽探孔數與配置", "year": "114", "subject": "水土保持規劃設計", "title": "第一題：地質鑽探孔數與配置", "number": "第一題", "question": "一、請詳述進行地質鑽探時，鑽孔數量及配置原則。（25 分）", "brief": "鑽孔數量與配置應依基地面積、地形起伏、地質複雜度、構造物重要性、邊坡高度、潛在滑動面及設計階段決定。原則上應能掌握地層、地下水、弱面、破碎帶及滑動面，孔位宜布設於坡頂、坡面、坡腳、構造物位置、地形地質變化處及異常區。", "detail": "地質鑽探目的在取得設計所需的地層、岩性、風化程度、地下水位、力學參數及潛在破壞面。孔數不宜只按面積機械決定，而應依工程風險與地質變異調整。基地地質單純、構造物小且風險低者可較少；若有高邊坡、擋土牆、滯洪池、深開挖、順向坡、斷層破碎帶、崩塌地或重要保全對象，孔數應增加。\n\n配置上，鑽孔應能形成代表性剖面。邊坡工程宜沿可能滑動方向布設剖面，包含坡頂、坡面與坡腳，以判定土岩界面、地下水位及弱層延伸。擋土牆或基礎構造物宜於牆線、角隅、荷重集中處及地質變化處設孔。崩塌地應在冠部裂縫、滑動體中段、趾部隆起及穩定基盤外布孔，以判斷滑動面深度。鑽孔深度應穿過可能滑動面或基礎影響深度並進入穩定層。孔距與孔深應於初步成果後滾動修正，必要時加做標準貫入、岩心取樣、透水試驗、孔內水位觀測與傾斜管。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "114-水土保持規劃設計-第二題：朗金主動土壓力係數推導", "year": "114", "subject": "水土保持規劃設計", "title": "第二題：朗金主動土壓力係數推導", "number": "第二題", "question": "二、於圖 1 中標示深度 z 處之朗金主動土壓力的位置（ 0 與 h  是深度 z 的垂 直與橫向有效主應力，假設牆面垂直、回填土水平），並推導出圖 1 中的 朗金主動土壓力係數等於 21-sin tan (45 )1+sin 2       。（25 分） 圖 1", "brief": "朗金主動狀態下，土體側向伸張，使水平有效應力 σh' 為小主應力，垂直有效應力 σv' 為大主應力。由 Mohr-Coulomb 破壞準則 τf = σ' tanφ'，可得 Ka = σh'/σv' = (1 - sinφ') / (1 + sinφ') = tan²(45° - φ'/2)。", "detail": "**表格補充**\n\n| 條件 | 主動狀態 |\n|---|---|\n| 牆背 | 垂直 |\n| 回填 | 水平 |\n| 牆土摩擦 | 忽略 |\n| 大主應力 | `σ1' = σv'` |\n| 小主應力 | `σ3' = σh'` |\n| 破壞準則 | `τf = σ' tan φ'` |\n| 主動土壓係數 | `Ka = σh'/σv' = (1-sinφ')/(1+sinφ') = tan²(45°-φ'/2)` |\n| 土壓力分布 | `pa = Ka γ' z`，隨深度線性增加 |\n\n假設牆背垂直、回填土水平、牆土摩擦忽略，深度 z 處垂直有效應力 σv' = γ' z。主動土壓狀態表示牆體離開土體，土體水平膨脹，水平應力逐漸降低直到破壞。此時 σ1' = σv'，σ3' = σh'。在 Mohr 圓上，圓心 C = (σ1' + σ3')/2，半徑 R = (σ1' - σ3')/2。破壞時 Mohr 圓與 τ = σ' tanφ' 相切。\n\n無凝聚力土壤 c' = 0 時，主應力關係為 σ1'/σ3' = (1 + sinφ')/(1 - sinφ')。因此主動土壓力係數 Ka = σ3'/σ1' = σh'/σv' = (1 - sinφ')/(1 + sinφ')。又利用三角恆等式，tan²(45° - φ'/2) = (1 - sinφ')/(1 + sinφ')，故 Ka = tan²(45° - φ'/2)。主動土壓力隨深度線性增加，pa(z) = Ka γ' z；若有地下水或超載，需另加水壓或 Ka q。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "114-水土保持規劃設計-第三題：邊坡穩定分區工法", "year": "114", "subject": "水土保持規劃設計", "title": "第三題：邊坡穩定分區工法", "number": "第三題", "question": "三、邊坡穩定若依據區位（如坡頂、坡面和坡腳）進行處理時，請詳述各區 位可採用的適當工法之內容。（25 分）", "brief": "坡頂以截水、減載與限制開發為主；坡面以排水、坡面保護、植生、錨定與抗沖蝕為主；坡腳以防止淘刷、提供支撐與安全排水為主。工法需依破壞機制搭配，而非單一處理。", "detail": "坡頂區位常是入滲與外加荷重來源，適合採截水溝、導水溝、地表防滲、裂縫封填、限制堆載、建物退縮及削坡減載。若坡頂有農路或平台，須改善邊溝與出水口，避免水流集中入滲滑動體。坡面區位直接承受雨滴、逕流與淺層滑動影響，可採植生護坡、噴植、植生毯、掛網噴植、格框梁、錨定、土釘、水平排水孔、集水井、排水廊道或坡面明溝。若為岩坡，需處理節理落石，可用掛網、噴凝土、岩栓與落石防護。\n\n坡腳區位常控制整體穩定，若被河流或道路側溝淘刷，會誘發上方滑動。適合採護岸、護腳、固床工、擋土牆、排樁、地錨、趾部填壓或反壓土堤。若有地下水出露，需設盲溝、排水孔或集水設施。整體規劃應先判斷滑動面位置、地下水條件與保全對象，再採坡頂減水減載、坡面排水保護、坡腳支撐防淘刷的系統性組合。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "114-水土保持規劃設計-第四題：合理化公式設計滯洪池", "year": "114", "subject": "水土保持規劃設計", "title": "第四題：合理化公式設計滯洪池", "number": "第四題", "question": "四、請詳述以合理化公式規劃設計滯洪池的設計流程。（25 分） 正向應力 剪 應 力 ( )  tanf     h  0 ", "brief": "流程為劃定集水區、選定重現期、求集流時間、由 IDF 取降雨強度、決定開發前後逕流係數，以 Q = CIA 求洪峰，再依允許放流量設計出流口與滯洪容量，最後檢核水位、自由高、溢洪、排空時間、沉砂與維護。", "detail": "合理化公式 Q = C I A 適用於小集水區洪峰估算。設計滯洪池時，第一步為劃定開發基地及外來水集水範圍，調查土地利用、坡度、土壤、排水路與下游承受能力。第二步選定設計重現期，依相關規範或保全對象重要性決定。第三步計算集流時間 tc，可依坡面流、淺溝流及渠道流分段求和。第四步由當地 IDF 曲線取延時等於 tc 的降雨強度 I。\n\n第五步決定開發前、中、後逕流係數 C，分別求 Q前、Q中、Q後。滯洪設計通常以開發後洪峰不得超過開發前或下游允許放流量為原則。第六步設定出流口，如孔口、堰、管涵或閘門，建立水位-出流量關係。第七步以入流歷線與出流歷線差額估算所需滯洪容量；若只用合理化公式簡化，可採三角形或合理假設歷線推估蓄洪量。第八步檢核最高水位、池體邊坡穩定、自由高、緊急溢洪道、排空時間、沉砂空間、清淤通道、安全圍護及維護管理。若兼具沉砂功能，需避免沉砂淤積降低有效滯洪容量。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "114-測量學-第一題：土方、TIN 與雙線性內插", "year": "114", "subject": "測量學", "title": "第一題：土方、TIN 與雙線性內插", "number": "第一題", "question": "一、已知水準測量的樁位分布如下圖所示，且其三維座標(N, E, H) 之測量 結果分別為 A(190, 100, 10.90) 、B(160, 100, 9.90) 、C(130, 100, 9.80) 、 D(100, 100, 10.50)、E(160, 140, 10.50)、F(130, 140, 9.50)、G(100, 140, 9.50)、 H(160, 180, 11.0) 、I(130, 180, 10.0) ，單位為公尺。另外，在水準測量 網格內 有兩 個 未知高 程的 點 位，其 平面 座 標分別 為 P(170, 110) 、 Q(140, 165) 。（結果請計算到小數下兩位） 若計畫的標高為 10.00 公尺，請問該工程之土方數量是否不足或剩 餘？且其土方數量為多少？（8 分） 請以不規則三角網（TIN）內插法計算 P 點位的高程？（9 分） 請以雙線性內插法（Bilinear interpolation）計算 Q 點位的高程？（8 分）", "brief": "P 點若位於 A-B-E 三角形，以 TIN 平面內插得 HP = 10.38 m。Q 點位於 F-I-H-E 矩形，以雙線性內插得 HQ = 10.15 m。土方量須依原圖確認工程範圍與格網分割後，以各格點高程減計畫高程 10.00 m，採方格法或 TIN 法計算挖填體積。", "detail": "土方計算應先以計畫標高 10.00 m 為基準，計算各已知樁點高差 Δh = H現況 - 10.00。Δh > 0 為挖方，Δh < 0 為填方。再依圖示工程範圍，將格網分為矩形或三角形，對每一單元以平均高差乘面積計算體積。總挖方為所有正體積加總，總填方為負體積絕對值加總；比較兩者即可判斷土方剩餘或不足。由於抽文字未含完整圖形邊界，本小題精確土方量需回原 PDF 圖面確認各格面積與範圍。\n\nP 點 TIN 內插：若 P(170,110) 位於 A(190,100,10.90)、B(160,100,9.90)、E(160,140,10.50) 所成三角形，建立平面 H = aE + bN + c。代入三點解得 a = 0.015、b = 0.033333、c = 3.066667，因此 HP = 0.015(110) + 0.033333(170) + 3.066667 = 10.38 m。\n\nQ 點雙線性內插：Q(140,165) 位於 F(130,140,9.50)、I(130,180,10.00)、E(160,140,10.50)、H(160,180,11.00) 矩形內。令 x 為 E 坐標、y 為 N 坐標，t = (165-140)/(180-140)=0.625，u = (140-130)/(160-130)=0.3333。HQ = (1-t)(1-u)HF + t(1-u)HI + (1-t)uHE + tuHH = 10.15 m。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "114-測量學-第二題：AB 距離與垂直角誤差傳播", "year": "114", "subject": "測量學", "title": "第二題：AB 距離與垂直角誤差傳播", "number": "第二題", "question": "二、已知導線點 A 的三維座標為 AE 50.00 0.03 m  ， AN 100.00 0.04 m  ， AH 40.50 0.05 m  ； 導 線 點 B 的 三 維 座 標 為 BE 90.00 0.04 m  ， BN 70.00 0.03 m  ， BH 60.00 0.04 m  。今在 A 點設置全站儀，且儀器 高為i 1.00 0.02 m  ；另在 B 點豎立稜鏡，而稜鏡高為z 1.50 0.02 m  。 請問 AB 兩點的水平距離 ABd 及其中誤差 ABdm 為多少？（10 分） 請問儀器至稜鏡的垂直角 及其中誤差m 為多少？（15 分） 代號：02860 頁次：2－2", "brief": "ΔE = 40.00 m，ΔN = -30.00 m，水平距離 dAB = 50.00 m。因 ΔE 與 ΔN 的中誤差皆為 sqrt(0.03²+0.04²)=0.05 m，距離中誤差 md = 0.05 m。儀器至稜鏡高差 V = (60.00+1.50) - (40.50+1.00) = 20.00 m，垂直角 α = atan(20/50) = 21.80°，中誤差約 0.0719°，約 259 秒。", "detail": "**表格補充**\n\n| 項目 | 代入 | 結果 |\n|---|---:|---:|\n| `ΔE` | `90.00 - 50.00` | `40.00 m` |\n| `ΔN` | `70.00 - 100.00` | `-30.00 m` |\n| 水平距離 `d` | `sqrt(40²+30²)` | `50.00 m` |\n| `mΔE` | `sqrt(0.03²+0.04²)` | `0.05 m` |\n| `mΔN` | `sqrt(0.04²+0.03²)` | `0.05 m` |\n| 距離中誤差 | 誤差傳播 | `0.05 m` |\n| 視準高差 `V` | `(60.00+1.50)-(40.50+1.00)` | `20.00 m` |\n| 垂直角 `α` | `atan(20/50)` | `21.80°` |\n| 垂直角中誤差 | 誤差傳播 | `0.0719°`，約 `259\"` |\n\n水平距離 dAB = sqrt[(EB - EA)² + (NB - NA)²] = sqrt[(90-50)² + (70-100)²] = sqrt(40² + (-30)²) = 50.00 m。誤差傳播中，mΔE = sqrt(0.03² + 0.04²) = 0.05 m，mΔN = sqrt(0.04² + 0.03²) = 0.05 m。d 對 ΔE 與 ΔN 的偏導數分別為 ΔE/d 與 ΔN/d，因此 md² = (40/50)²(0.05²) + (-30/50)²(0.05²) = 0.0025，md = 0.05 m。\n\n垂直角以儀器視準點至稜鏡中心之高差計算。V = HB + z - HA - i = 60.00 + 1.50 - 40.50 - 1.00 = 20.00 m。α = atan(V/d) = atan(20/50) = 21.8014°。V 的中誤差 mV = sqrt(0.04² + 0.02² + 0.05² + 0.02²) = 0.07 m。α 對 V 的偏導為 d/(d²+V²)，對 d 的偏導為 -V/(d²+V²)。故 mα = sqrt{[50/2900]²(0.07²) + [20/2900]²(0.05²)} = 0.001255 rad = 0.0719° = 259 秒。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "114-測量學-第三題：大地座標與颱風距離", "year": "114", "subject": "測量學", "title": "第三題：大地座標與颱風距離", "number": "第三題", "question": "三、請回答下列問題。 何謂大地座標 ( , , )h  ，請說明大地座標系統的原點與其三個量的 定義。（12 分） 假設地球是一圓球，其半徑為 6371 公里。已知臺北市國父紀念館的座 標是東經 121 度 33 分 36 秒，北緯 25 度 2 分 24 秒。今有一侵臺的颱 風其中心位置在東經 124 度，北緯 22 度，且其侵臺路線是向北行至東 經 124 度，北緯 25.04 度，然後再向西侵襲國父紀念館。請問這個颱 風中心位置的行進距離大約多少公里？（13 分）", "brief": "大地座標 (φ, λ, h) 分別為大地緯度、大地經度與橢球高，原點及軸向由所採大地基準與參考橢球定義。颱風先由北緯 22° 沿東經 124° 北上至 25.04°，距離約 338.03 km；再沿北緯 25.04° 向西至東經 121.56°，距離約 245.82 km；合計約 583.85 km。", "detail": "大地座標系統以參考橢球及其與地球之定位關係為基礎。大地緯度 φ 為通過該點之橢球法線與赤道面的夾角；大地經度 λ 為該點子午面與本初子午面的夾角；橢球高 h 為地面點沿橢球法線至參考橢球面的距離。其原點、軸向及尺度由大地基準定義，例如地心坐標系以地球質心為原點，Z 軸指向地球自轉軸，X 軸指向本初子午面與赤道交線。\n\n距離計算題假設地球為半徑 R = 6371 km 的圓球。國父紀念館經度 121°33'36\" = 121.56°，緯度 25°2'24\" = 25.04°。第一段北行距離為 R Δφ = 6371 × (25.04 - 22)π/180 = 338.03 km。第二段沿緯線西行，經差為 124 - 121.56 = 2.44°，距離為 R cos25.04° Δλ = 6371 × cos25.04° × 2.44π/180 = 245.82 km。總行進距離約 338.03 + 245.82 = 583.85 km。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "114-測量學-第四題：電子測距與兩差", "year": "114", "subject": "測量學", "title": "第四題：電子測距與兩差", "number": "第四題", "question": "四、請回答下列問題。 電子測距儀是利用電磁波來量測距離的儀器，若依其技術原理來分 類，一般而言可分成兩大類。請說明這兩類電子測距的主要測距原理 及其優缺點。（12 分） 利用電子測距儀進行距離測量時，會受到兩差的影響。請說明何謂兩 差？其形成的原因為何？如何改正？（13 分）", "brief": "電子測距依原理可分為脈衝式與相位式。脈衝式量測電磁波往返時間，量程長但精度較低；相位式量測發射波與接收波相位差，精度高但需解週波不定值。距離測量的兩差通常指地球曲率差與大氣折光差，會影響視線高程或斜距改正，須依距離、折光係數與觀測條件修正。", "detail": "脈衝式電子測距儀發射短脈衝電磁波，量測訊號由儀器到反射稜鏡再返回的時間差 Δt，距離 D = cΔt/2。其優點是原理直觀、量程可較長，缺點是時間量測需極高解析度，短距離精度通常不如相位式。相位式測距儀發射連續調制波，量測發射波與回波之相位差，距離由整週波數加相位差換算。其優點是精度高、適合一般全站儀，缺點是需處理週波不定值，且受大氣、稜鏡常數與儀器常數影響。\n\n兩差為地球曲率差與大氣折光差。地球曲率使遠方點相對水平視線看起來較低，曲率改正約與距離平方成正比；大氣折光因光線穿過密度不均的大氣而向下彎曲，會抵銷部分曲率影響。水準或三角高程測量中，兩差會造成高差誤差，常合併改正為 C ≈ (1-k)D²/(2R)，其中 k 為折光係數，D 為水平距離，R 為地球半徑。改正方法包括前後視距相等、縮短視距、對向觀測、選擇穩定大氣時段、輸入氣象改正及採用儀器內建曲率折光改正。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。"}, {"id": "113-土壤物理與沖蝕-第一題：土壤構造與土壤結構", "year": "113", "subject": "土壤物理與沖蝕", "title": "第一題：土壤構造與土壤結構", "number": "第一題", "question": "一、何謂土壤構造（soil structure）與土壤結構（soil consistence），並說明其 重要性。（25 分）", "brief": "土壤構造是土粒排列成團粒、塊狀、柱狀、板狀等結構單元的型態；土壤結構或稠度是土壤在不同含水狀態下抵抗變形、破碎與耕作的性質。前者影響孔隙、通氣、入滲、根系伸展與抗蝕性；後者影響施工、耕作、壓實、邊坡穩定與植物生長。", "detail": "土壤構造 soil structure 指砂、坋、黏粒及有機質經膠結、絮凝、根系與微生物作用形成的團粒或結構體排列方式。常見型態包括粒狀、團粒狀、塊狀、柱狀、稜柱狀與板狀。良好團粒構造可增加大孔隙與連通孔隙，提升入滲、排水、通氣與根系發育，並因團粒穩定而減少雨滴打擊造成的分散與結皮。\n\n土壤結構或稠度 soil consistence 則指土壤在乾、濕、潮濕狀態下的黏著性、可塑性、硬度、脆性與抗破碎性。例如乾土可硬、鬆、脆，濕土可黏、可塑。其受黏粒含量、有機質、含水量、鹽分、交換性鈉與壓實程度影響。重要性在於判斷可耕性、施工含水量、壓實難易、邊坡表層抗沖蝕能力及植生根系穿透能力。水土保持上，良好構造與適當稠度可減少逕流與沖蝕；構造破壞或過度壓實則會降低入滲、增加洪峰與表土流失。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "113-土壤物理與沖蝕-第二題：砂土與黏土水分特徵曲線", "year": "113", "subject": "土壤物理與沖蝕", "title": "第二題：砂土與黏土水分特徵曲線", "number": "第二題", "question": "二、詳細說明砂土與黏土之土壤水分特徵曲線之差異，並解釋該曲線會受土 壤何種物理特性影響。（25 分）", "brief": "砂土孔隙大，在低吸力下即快速排水，曲線陡、保水量低；黏土孔隙細且比表面積大，在高吸力下仍保有較多水分，曲線較平緩、殘留含水量高。曲線受質地、孔隙分布、土壤構造、有機質、壓實、團粒、鹽分與乾濕遲滯影響。", "detail": "土壤水分特徵曲線描述體積含水量 θ 與基質吸力或基質勢 ψ 的關係。砂土以大孔隙為主，飽和時雖可含水，但當吸力稍微增加，大孔隙迅速排水，因此曲線下降快，田間容水量低，永久凋萎點也低，可用水量不一定高。黏土含大量微孔隙與高比表面積，水分受毛管力與吸附力束縛，需較大吸力才排出，因此在同一吸力下含水量通常高於砂土，曲線較緩。\n\n影響曲線的物理性質包括粒徑組成、孔隙大小分布、總孔隙率、土壤構造與團粒穩定性。壓實會減少大孔隙，使排水與通氣變差；有機質可增加團粒與保水能力；黏土礦物種類會影響吸附水與膨潤性。曲線也有遲滯現象，即乾燥過程與濕潤過程不同，原因包括孔隙瓶頸效應、接觸角差異與空氣滯留。坡地水文中，此曲線可用於推估入滲、未飽和導水度、植物可用水及降雨後孔隙水壓變化。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。"}, {"id": "113-土壤物理與沖蝕-第三題：土壤沖蝕間接量測", "year": "113", "subject": "土壤物理與沖蝕", "title": "第三題：土壤沖蝕間接量測", "number": "第三題", "question": "三、詳細說明土壤沖蝕的間接量測方法。（25 分）", "brief": "間接量測是不用直接逐量收集流失土壤，而以地形變化、泥砂濃度、沉積量、指標物或模型推估沖蝕量。方法包括逕流泥砂採樣、沉砂池淤積量、地形測量差分、侵蝕針、放射性核種示蹤、遙測影像判釋及 USLE/RUSLE 或 WEPP 等模式估算。", "detail": "土壤沖蝕直接量測如逕流小區收集土砂最準確，但成本高且代表性有限。間接量測可擴大空間尺度。第一類為泥砂輸出法，在集水區出口設量水堰或流量站，同步採集懸浮載與推移載，建立流量-含砂量關係，積分求產砂量，再配合泥砂遞移率推估坡面沖蝕。第二類為沉積量法，量測沉砂池、滯洪池、水庫或溝道淤積體積，乘以乾容重求土砂量，適合工程設施維護與集水區產砂估算。\n\n第三類為地形變化法，以水準測量、全站儀、RTK、LiDAR、UAV 或攝影測量建立不同時期 DEM，經差分得到侵蝕與堆積體積。第四類為侵蝕針或剖面量測，在坡面或溝岸設基準針，定期量測地表降低量。第五類為示蹤法，如 Cs-137、Pb-210 或稀土元素示蹤，利用土壤中指標物再分布推估長期侵蝕與沉積。第六類為模式推估，利用降雨、土壤、坡度、覆蓋與保育措施等資料估算潛在流失量。各法需注意尺度、時間代表性、沉積與再搬運，以及不確定性。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "113-土壤物理與沖蝕-第四題：沖蝕推估模式", "year": "113", "subject": "土壤物理與沖蝕", "title": "第四題：沖蝕推估模式", "number": "第四題", "question": "四、說明土壤沖蝕推估模式種類與其評估概念。（25 分）", "brief": "沖蝕模式可分為經驗式、概念式與物理機制式。經驗式如 USLE/RUSLE，以統計因子估算年平均土壤流失；概念式以簡化水文與泥砂過程描述集水區反應；物理式如 WEPP 依入滲、逕流、剪應力、剝離與輸砂能力模擬事件沖蝕。", "detail": "經驗模式由觀測資料迴歸而得，代表模式為 USLE：A = R K L S C P。R 為降雨沖蝕力，K 為土壤沖蝕性，LS 為坡長坡度，C 為覆蓋管理，P 為保育措施。其優點是資料需求少、易用，適合長期平均坡面片蝕與細溝沖蝕評估；缺點是不適合單場事件、溝蝕、崩塌及複雜輸砂過程。\n\n概念模式將集水區分成若干儲水或產砂單元，以參數化方式描述降雨-逕流-泥砂關係，常用於規劃與情境比較。物理機制模式則依守恆定律與力學過程描述入滲、逕流、土粒剝離、輸砂與沉積，例如 WEPP 可模擬坡面與小集水區事件沖蝕。選用模式時應先界定目的：若為坡面保育規劃可用 USLE/RUSLE；若為工程施工期或單場豪雨評估，宜採事件型或物理式模式；若涉及土石流、崩塌或河道輸砂，需另用相應模型並進行校驗。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "113-坡地水文學-第一題：雨量校正與降水因子", "year": "113", "subject": "坡地水文學", "title": "第一題：雨量校正與降水因子", "number": "第一題", "question": "一、請說明雨量資料校正的方法與影響降水的因子。（20 分）", "brief": "雨量資料校正包括一致性檢查、雙累積曲線、異常值檢核、測站遷移修正、風速低估修正、儀器誤差修正與鄰近站比對。降水受水氣來源、地形抬升、鋒面、對流、颱風、季風、海陸分布、高程、坡向與氣候變遷影響。", "detail": "雨量資料校正的目的是使長期序列具一致性與代表性。常用方法為雙累積曲線，將目標站累積雨量與鄰近穩定測站平均累積雨量作圖，若斜率改變，表示測站位置、儀器、觀測環境或方法改變，需依斜率比修正。異常值可用鄰近站比值、等雨量線、雷達雨量或氣象紀錄檢核。缺測或疑似錯誤資料應標記，不可任意平滑。另須考慮風造成雨量筒低估、蒸發損失、濕潤損失、濺出、儀器解析度及測站遮蔽。\n\n影響降水的因子包含大氣水氣含量、氣流抬升機制與凝結條件。地形雨由濕空氣遇山抬升形成，迎風坡雨量大、背風坡雨量小；對流雨常強度大、空間尺度小；鋒面雨範圍廣、延時較長；颱風雨受路徑、環流、地形及移速影響。坡地水文設計時，雨量資料品質會直接影響 IDF 曲線、設計洪峰、滯洪池容量與崩塌警戒判斷。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "113-坡地水文學-第二題：雨量補遺與等雨量線法", "year": "113", "subject": "坡地水文學", "title": "第二題：雨量補遺與等雨量線法", "number": "第二題", "question": "二、請說明常用的雨量資料補遺的方法與等雨量線法計算平均雨量。（20 分）", "brief": "補遺方法包括算術平均法、正常年雨量比值法、距離平方反比法、迴歸法及等雨量線法。等雨量線法是在流域圖上繪出相同雨量線，求各雨量帶面積，以面積加權平均計算流域平均雨量。", "detail": "當某雨量站缺測時，若鄰近站年平均雨量差異小，可用算術平均法，以鄰近站同時段雨量平均補遺。若各站正常年雨量差異大，應用正常年雨量比值法，即 Px = Nx/n Σ(Pi/Ni)，其中 Nx、Ni 為目標站與鄰站正常年雨量。距離平方反比法依測站距離給權，距離近者權重大。迴歸法則以歷史同期資料建立目標站與參考站關係，適合資料充足且相關性高者。\n\n等雨量線法計算平均雨量時，先將各站雨量標於流域圖，依地形、風向與雨量梯度繪製等雨量線。接著量測相鄰等雨量線間在流域內的面積 Ai，該帶代表雨量可取兩條等雨量線平均 Pi。流域平均雨量 Pbar = ΣAiPi / ΣAi。此法能反映地形與空間變化，適合山區與雨量分布不均地區，但結果受測站密度與繪線主觀性影響。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "113-坡地水文學-第三題：氣候變遷對坡地水文", "year": "113", "subject": "坡地水文學", "title": "第三題：氣候變遷對坡地水文", "number": "第三題", "question": "三、請說明氣候變遷對坡地水文過程可能造成的改變與因應措施。（20 分）", "brief": "氣候變遷可能使極端降雨強度增加、乾濕季差異擴大、颱風雨型改變、洪峰增大、基流不穩、地下水補注改變、土壤含水與崩塌機率上升。因應措施包括更新 IDF、提高設計韌性、分散滯洪、坡面覆蓋、排水改善、監測預警及土地使用管制。", "detail": "坡地水文對降雨強度與時空分布非常敏感。氣候變遷可能造成短延時強降雨增加，使入滲超過土壤容量，地表逕流與洪峰快速上升；長延時豪雨則使地下水位升高、孔隙水壓增加，降低邊坡安全係數。乾旱期延長會降低植生覆蓋與土壤團粒穩定，豪雨來臨時更易產生沖蝕。颱風路徑與梅雨型態改變也會影響集水區年水量、低水流量與土砂輸出。\n\n因應上，水文設計應重新檢討 IDF 曲線與重現期假設，必要時採氣候變遷增量或安全係數。工程面可設滯洪、沉砂、分散排水、坡頂截水、地下排水及生態滯留設施，並保留溢洪與超標事件通道。非工程面包括保育森林與植生覆蓋、限制高風險坡地開發、建立雨量水位與地滑監測、土石流警戒及社區避災。設計理念應由單一防洪標準轉為韌性與風險管理。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "113-坡地水文學-第四題：定流率抽水試驗", "year": "113", "subject": "坡地水文學", "title": "第四題：定流率抽水試驗", "number": "第四題", "question": "四、一個定流率抽水試驗，在距離 100 m 處的洩降(s)與時間(t)資料分別為洩 降 s = 1 m 於時間 t = 100 min 與洩降 s = 3 m 於時間 t = 1,000 min，已知 抽水率 Q 為 5 310 m3/day，試求流通係數（transmissivity）T 與儲水係數 （storage coefficient）S。（20 分） 定流率抽水試驗洩降公式    , 4 Qs r t W u T 2 4 r Su Tt 2 3 0.577216 ... 2 2! 3 3! x u e u uW u dx ln u ux          （ ）", "brief": "兩筆資料相差一個對數週期，洩降差 Δs = 2 m。依 Cooper-Jacob 直線法，T = 2.3Q/(4πΔs) = 457.57 m²/day。由 s = 2 log10(t/t0)，代入 t = 100 min、s = 1 m 得 t0 = 31.62 min = 0.02196 day。S = 2.25Tt0/r² = 0.00226。", "detail": "**表格補充**\n\n| 步驟 | 公式 | 代入 | 結果 |\n|---|---|---:|---:|\n| 洩降差 | `Δs = s2 - s1` | `3 - 1` | `2 m` |\n| 流通係數 | `T = 2.3Q/(4πΔs)` | `2.3×5000/(4π×2)` | `457.57 m²/day` |\n| 零洩降時間 | `s = Δs log10(t/t0)` | `1 = 2 log10(100/t0)` | `t0 = 31.62 min` |\n| 換算日 | `31.62 / 1440` |  | `0.02196 day` |\n| 儲水係數 | `S = 2.25Tt0/r²` | `2.25×457.57×0.02196/100²` | `0.00226` |\n\n題目給 Q = 5 × 10³ m³/day，r = 100 m。於半對數圖上，t = 100 min 時 s = 1 m，t = 1000 min 時 s = 3 m，時間增加一個 log cycle，洩降增加 Δs = 2 m。Cooper-Jacob 近似式斜率關係為 Δs = 2.3Q/(4πT)，故 T = 2.3Q/(4πΔs) = 2.3(5000)/(4π×2) = 457.57 m²/day。\n\n求儲水係數時，直線式可寫成 s = Δs log10(t/t0)。代入 s = 1 m、t = 100 min、Δs = 2 m，得 1 = 2 log10(100/t0)，所以 t0 = 100/10^0.5 = 31.62 min = 0.02196 day。由 t0 = r²S/(2.25T)，得 S = 2.25Tt0/r² = 2.25(457.57)(0.02196)/(100²) = 0.00226。答案：T 約 4.58 × 10² m²/day，S 約 2.26 × 10^-3。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "113-坡地水文學-第五題：落水頭滲透儀", "year": "113", "subject": "坡地水文學", "title": "第五題：落水頭滲透儀", "number": "第五題", "question": "五、請說明落水頭滲透儀與水力傳導係數計算公式，並請繪圖說明之。（20 分）", "brief": "落水頭試驗適用於細粒或低滲透土。水頭由 h1 降至 h2，經過時間 t，水力傳導係數 K = (aL/At) ln(h1/h2)，其中 a 為立管截面積，A 為試體截面積，L 為試體長度。", "detail": "落水頭滲透儀由細立管、土樣筒、濾石與量測水頭裝置組成。試驗時使土樣飽和，立管中水頭隨滲流通過土樣而下降。根據 Darcy 定律，瞬時流量 Q = KA(h/L)，而立管水量變化為 -a dh/dt。令兩者相等並積分，可得 K = (aL/At) ln(h1/h2)。若用常用對數，K = 2.303(aL/At) log10(h1/h2)。\n\n作答圖可畫垂直立管接於土樣上端，下端出水，標示 h1、h2、土樣長度 L、立管面積 a 與土樣面積 A。試驗注意土樣需完全飽和、避免側漏、控制溫度黏滯性、記錄時間與水頭讀數，並使水流符合層流與 Darcy 定律假設。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "113-植生工程-第一題：土壤硬度過低與過高", "year": "113", "subject": "植生工程", "title": "第一題：土壤硬度過低與過高", "number": "第一題", "question": "一、請詳細說明土壤硬度太低與太高時，植物生長各會遇到的問題及該採取 的基礎工。（25 分）", "brief": "硬度過低表示土體鬆軟、承載不足、易沖刷或滑動，植物根系不易固定，應採排水、壓實、表面固定、植生袋或格框等基礎工。硬度過高表示土壤壓實或硬盤，根系穿透困難、入滲差、通氣差，應採鬆土、打穴、客土、有機質改良、破除硬盤與保水措施。", "detail": "土壤硬度太低時，常見於新填土、崩積土、泥濘地、高含水土或細粒鬆散土。問題包括根系無法取得穩定支撐、坡面易受雨滴與逕流沖刷、基材滑落、幼苗倒伏、缺氧爛根及施工機具陷落。基礎工應先改善排水與坡面穩定，如設截水溝、盲溝、排水層、表面覆蓋、椰纖網、植生毯、植生袋、格框或輕度壓實，使植生基盤穩定。\n\n土壤硬度太高時，常見於壓實土、乾硬黏土、礫石地、道路邊坡或施工碾壓面。問題包括根系穿透受阻、孔隙少、入滲低、通氣差、逕流增加、幼苗缺水及養分吸收不良。基礎工可採深耕鬆土、鑿孔、打樁孔植生、客土覆蓋、有機質與堆肥改良、混入保水材料、破除硬盤、表面粗糙化及噴植基材。硬度過高或過低都應先調整為適合根系生長與坡面穩定的基盤。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "113-植生工程-第二題：走莖或匍匐莖禾草優點", "year": "113", "subject": "植生工程", "title": "第二題：走莖或匍匐莖禾草優點", "number": "第二題", "question": "二、部分禾草能長出走莖或匍匐莖（如百慕達草），有些禾草則無法長出這類 構造（如甜根子草）。請詳細說明與無走莖或匍匐莖的禾草相較之下，在 植生工程中使用能長出走莖或匍匐莖的禾草有何好處？（25 分）", "brief": "具走莖或匍匐莖禾草可快速水平擴展，節上生根，形成緻密草毯，覆蓋裸露地、減少雨滴打擊與逕流沖刷；受損後恢復快，可固定表土並抑制雜草。無走莖禾草多以叢生為主，覆蓋連續性與擴展速度較差。", "detail": "植生工程重視快速覆蓋與長期維持。百慕達草等具匍匐莖或走莖的禾草，能沿地表或近地表水平生長，莖節接觸土壤後可發根並長出新芽，因此能快速擴張，形成連續草皮。其優點是可降低裸露面比例，直接減少雨滴濺蝕；密集莖葉增加地表粗糙度，降低逕流流速；根莖交織可固定表土，提升抗沖蝕能力。\n\n此外，走莖型禾草在局部踩踏、沖刷或乾旱後，仍可由鄰近節點再生，恢復力強，養護成本較低。對坡面、道路邊坡、堤岸與施工裸露地尤其有利。相較之下，甜根子草等叢生型禾草雖可能根系深、耐逆境，但植株間空隙較大，早期覆蓋速度較慢。使用時仍應注意走莖草可能競爭過強，影響原生植物演替，故長期復育區宜搭配灌木、喬木及原生草種。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "113-植生工程-第三題：林地生物量與碳量調查", "year": "113", "subject": "植生工程", "title": "第三題：林地生物量與碳量調查", "number": "第三題", "question": "三、請詳細說明如何透過地面調查的方式，測得一塊 10 公頃林地中樹木的 生物量及所儲存的碳量。（25 分）", "brief": "先在 10 公頃林地設樣區或樣帶，量測樹種、胸徑、樹高、株數與木材密度，利用異速生長方程估算單株地上部生物量，再加總換算每公頃；地下部可用根冠比估算。碳量通常以乾重生物量乘碳含量 0.47 或 0.5。", "detail": "調查應先界定林地邊界並分層，如依林型、坡向、齡級或密度分區。可採系統抽樣或分層隨機抽樣設固定樣區，例如 20 m × 20 m 或 0.05 ha 樣區。每株達調查胸徑門檻的樹木記錄樹種、胸徑 DBH、樹高、冠幅與健康狀況，並量測樣區面積。必要時取木材密度或引用資料庫。\n\n單株地上部生物量以異速生長式估算，如 AGB = a(DBH)^b，或 AGB = f(DBH, H, ρ)。樣區內所有單株加總後除以樣區面積，換算為 Mg/ha，再乘以 10 ha 得全林地地上部生物量。地下部生物量可用根冠比估算，如 BGB = R × AGB。枯立木、倒木、枯落物與土壤有機碳若題目要求也應另設樣採樣。碳量 = 生物量乾重 × 碳含量，一般可用 0.47 或 0.5；若要換算二氧化碳當量，乘以 44/12。最後應說明抽樣誤差、方程式適用性與品質控制。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "113-植生工程-第四題：初生與次生演替之植生工程", "year": "113", "subject": "植生工程", "title": "第四題：初生與次生演替之植生工程", "number": "第四題", "question": "四、植生演替可分為初生與次生演替，請詳述面對即將發生初生或次生演替 的治理地區，各該如何進行植生工程。（25 分）", "brief": "初生演替地缺乏土壤與種源，植生工程以建立基盤、增加有機質、保水保肥、導入先驅植物與防沖蝕為主。次生演替地已有土壤或殘存種源，以保留既有植生、促進天然更新、控制外來種、補植目標樹種並降低干擾為主。", "detail": "**表格補充**\n\n| 項目 | 初生演替地 | 次生演替地 |\n|---|---|---|\n| 立地狀態 | 幾乎無土壤、無種子庫 | 土壤仍在，常有根株或種子庫 |\n| 例子 | 新崩岩盤、礦區裸露地、火山新生地 | 火災跡地、砍伐地、淺層崩塌地 |\n| 主要限制 | 缺土、缺水、缺有機質、基材不穩 | 競爭、外來種、沖蝕、干擾 |\n| 工程重點 | 先造土、保水、固定基材 | 保留表土與既有植生，輔助天然更新 |\n| 植物策略 | 先驅草本、耐旱耐瘠灌木 | 補植原生樹種、控制外來種 |\n| 目標 | 建立生育基盤 | 加速恢復穩定群落 |\n\n初生演替發生於新裸露、幾乎無土壤與生物繁殖體的地區，如新崩岩盤、火山噴發地、礦區裸露地或新形成堆積地。植生工程須先創造植物可生長環境，包括坡面穩定、客土或基材噴植、添加有機質與肥料、保水材料、微地形處理、敷蓋防沖蝕及導入耐旱耐瘠先驅草本、地衣苔蘚或灌木。目標是先建立覆蓋與土壤生成條件，再逐步導入灌木、喬木。\n\n次生演替發生於原有植生受干擾但土壤仍存在的地區，如火災跡地、砍伐地、淺層崩塌地、廢耕地。此時應優先保留殘存根株、種子庫與表土，減少二次擾動。工程上可補植原生樹種、控制銀合歡等外來入侵種、改善排水與沖蝕、設置護欄避免人畜干擾，利用天然更新加速復育。兩者差異在於初生演替需「先造土、造基盤」，次生演替則以「保留、輔助、導引」為主。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "113-水土保持工程-第一題：大規模崩塌潛勢風險評估", "year": "113", "subject": "水土保持工程", "title": "第一題：大規模崩塌潛勢風險評估", "number": "第一題", "question": "一、請詳述大規模崩塌潛勢區風險潛勢等級之評估方式。（15 分）", "brief": "評估包含危害度、暴露度與脆弱度。危害度看地質、坡度、地形、活動徵兆、降雨、地下水與歷史崩塌；暴露度看聚落、道路、橋梁、水庫及公共設施；脆弱度看保全對象耐受能力與避災能力。綜合後分級為高、中、低風險。", "detail": "大規模崩塌潛勢區評估首先以地形判釋與資料蒐集確認潛在滑動體，如冠部拉張裂縫、反坡、線狀凹地、滑落崖、趾部隆起、湧水及植生異常。危害度指崩塌發生可能性與規模，可由地質岩性、順向坡、斷層破碎帶、坡度坡高、集水條件、地下水、降雨觸發、地震及變形速率判斷。\n\n暴露度指崩塌影響範圍內保全對象，包括住戶、道路、橋梁、學校、部落、農地、水庫及溪流。脆弱度則評估保全對象受災後損失程度與應變能力，如建物型態、人口結構、替代道路、預警系統與避難路線。風險可表示為 Risk = Hazard × Exposure × Vulnerability。分級時可採指標加權、矩陣法或專家評分，並以現地調查與監測資料校正。高風險區應優先監測預警、避災撤離、排水治理與土地使用管制。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。", "source_type": "past", "source_label": "歷屆考古題", "points": "15分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。"}, {"id": "113-水土保持工程-第二題：預鑄護岸類型與適用", "year": "113", "subject": "水土保持工程", "title": "第二題：預鑄護岸類型與適用", "number": "第二題", "question": "二、國內外預鑄護岸種類眾多，請詳述主要類型及適用條件。（20 分）", "brief": "預鑄護岸包括連鎖磚、植生磚、混凝土塊、鉸接混凝土塊、箱籠、預鑄格框、消波塊及階梯式護岸。低流速且重視景觀植生者可用植生磚或格框；中高流速可用鉸接塊、連鎖塊或箱籠；沖刷強或坡腳需保護者應加護腳與反濾層。", "detail": "預鑄護岸優點是品質穩定、施工快速、可模組化維修。連鎖混凝土塊適用於中等流速、坡面需柔性變形與抗沖刷之處，塊體間互鎖可抵抗水流拖曳。植生磚或植生格框具有孔洞，可填土植生，適合流速較低、景觀與生態需求高的河岸或排水路。鉸接混凝土塊以鋼索或連接件串接，柔性較高，適合沉陷或局部變形可能較大的岸坡。\n\n箱籠或蛇籠屬透水柔性護岸，孔隙多、消能佳，適合野溪、坡腳保護及需生態孔隙之處，但需注意鋼線腐蝕與基礎淘刷。預鑄格梁或框格可搭配植生或塊石，適用坡面保護。消波塊或大型預鑄塊則用於高能量水流或海岸。選用時應依流速、水深、剪應力、岸坡坡度、基礎條件、漂流木、維修性與生態需求決定，並配置反濾層、排水與護腳。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "113-水土保持工程-第三題：預鑄護岸毀損與起動條件", "year": "113", "subject": "水土保持工程", "title": "第三題：預鑄護岸毀損與起動條件", "number": "第三題", "question": "三、請詳述預鑄護岸毀損原因有那些類型？（10 分）現有一預鑄緩坡護岸， 假設可以忽略土壓力之作用，只需考量預鑄塊受到水流剪應力（拖曳力） 作用之起動破壞問題。假設預鑄護岸緩坡斜面與水平面夾角為 θ，水流 平行於緩坡斜面水平軸，單一預鑄塊之體積為 V；預鑄塊之單位重為 γ； 水之單位重為 γw；As 為預鑄塊在水流方向之投影面積；An 為預鑄塊在斜 面法線方向之投影面積；CD 為阻力係數；CL 為升力係數；f 為靜摩擦係 數；u 為水流流速；ρw 為水體密度。請繪圖說明預鑄塊受力情形並利用 上述參數來表示預鑄塊之起動破壞條件式。（20 分）", "brief": "毀損原因包括基礎淘刷、反濾層流失、塊體重量不足、互鎖失效、浮力與升力、流速超標、漂流木撞擊、沉陷、施工不良及材料劣化。起動破壞可用水流拖曳力與升力造成之滑動檢核：當拖曳力大於可提供之摩擦阻抗與自重沿坡分力抵抗時即起動。", "detail": "單一預鑄塊受力包括自重 W = γV，浮力 B = γwV，有效重量 W' = (γ - γw)V。坡面與水平夾角為 θ，水流沿坡面方向作用。沿水流方向拖曳力 FD = 0.5ρwCDAsu²，法線方向升力 FL = 0.5ρwCLAnu²。有效法向力 N = W' cosθ - FL，若升力大，法向力降低，摩擦阻力減少。沿坡向之下滑分力可取 W' sinθ，方向視坡向與水流方向而定。\n\n若以順坡向起動滑動為例，抵抗力為摩擦 fN 加上可能的自重反向分力；保守表示可寫為起動條件 FD + W' sinθ ≥ f(W' cosθ - FL)。代入各力即：0.5ρwCDAsu² + (γ - γw)V sinθ ≥ f[(γ - γw)V cosθ - 0.5ρwCLAnu²]。若左側小於右側則安全。實務上還需檢核翻轉、吸出、塊體互鎖、反濾層與坡腳淘刷。", "source_type": "past", "source_label": "歷屆考古題", "points": "30分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "113-水土保持工程-第四題：陡坡排水渠道消能設施", "year": "113", "subject": "水土保持工程", "title": "第四題：陡坡排水渠道消能設施", "number": "第四題", "question": "四、請詳述陡坡排水渠道之主要消能設施種類、適用條件及優缺點。（20 分）", "brief": "消能設施包括跌水工、階梯式渠道、消力池、靜水池、擋水坎、粗糙化渠道、塊石或齒墩、跌水井及端部消能工。陡坡高差大可用階梯或跌水分段消能；出口流速高需消力池；空間不足可用粗糙化或齒墩，但需防堵塞與磨損。", "detail": "陡坡排水若不消能，流速過大會造成渠道磨損、出口淘刷與下游災害。跌水工適合局部高差，構造簡單、消能明確，但需保護跌水下游沖刷。階梯式渠道將總落差分成多段，使水流逐階耗能，適合長陡坡，但施工成本較高且需注意空氣摻入與跌落沖擊。消力池利用水躍消能，適合出口高速射流，設計須滿足共軛水深、池長與尾水條件。\n\n粗糙化渠道如塊石、肋條、齒墩或糙面襯砌，可增加曼寧粗糙係數、降低流速，兼具生態孔隙，但可能淤積或受漂流物堵塞。跌水井或豎井適合空間受限、需快速降水位處，但維護與安全要求高。選用時應依坡度、流量、落差、泥砂與漂流物、地質、維護及生態需求決定，並檢核渠道襯砌耐磨、出口護坦、側牆高度與安全溢流。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "113-水土保持工程-第五題：施工階段碳排與減碳", "year": "113", "subject": "水土保持工程", "title": "第五題：施工階段碳排與減碳", "number": "第五題", "question": "五、請詳述水土保持工程施工階段的碳排來源及減碳作法。（15 分）", "brief": "碳排來源包括水泥與鋼材等材料生產、機具燃油、土方運輸、施工用電、臨時設施、廢棄物處理及植生破壞造成碳匯損失。減碳作法包括減量設計、就地取材、低碳材料、土方平衡、縮短運距、電動或高效率機具、預鑄化、再生材料、植生復育與碳盤查。", "detail": "水土保持工程施工碳排可分為材料、運輸、施工與土地擾動。材料端以水泥、混凝土、鋼筋、鋼材、瀝青及預鑄品碳排較高。運輸端包括土方、材料與廢棄物車輛燃油。施工端包括挖土機、吊車、壓路機、泵浦、發電機與抽水設備。土地擾動則包含清除植生、表土流失與土壤有機碳損失。\n\n減碳應從設計源頭開始，避免過度設計，採用生態工程、柔性工法、植生護坡或砌石替代部分混凝土。土方應以挖填平衡、現地利用、縮短運距為原則。材料可選低碳水泥、再生粒料、再生鋼材、預鑄構件與耐久性較佳材料。施工管理可使用高效率機具、怠速管理、電動機具、最佳施工動線與工期管理。完工後以植生復育、森林或草地碳匯、維護延壽與碳盤查追蹤整體效益。", "source_type": "past", "source_label": "歷屆考古題", "points": "15分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "113-水土保持規劃設計-第一題：生態檢核保育策略", "year": "113", "subject": "水土保持規劃設計", "title": "第一題：生態檢核保育策略", "number": "第一題", "question": "一、為減輕公共工程對生態環境造成之負面影響，進行工程生態檢核工作， 請說明生態檢核之生態保育策略。（25 分）", "brief": "生態保育策略依序為迴避、縮小、減輕、補償。先避開重要棲地與敏感區；無法避開時縮小工程範圍；施工中減輕干擾、控制污染與保留廊道；最後對不可避免損失進行棲地復育或補償。", "detail": "生態檢核目的在工程全生命週期納入生態保育。規劃設計階段應先盤點保育類物種、重要棲地、溪流廊道、濕地、老樹、繁殖季與外來種。最高原則為迴避，如調整線形、位置、工法或施工時程，避開核心棲地與敏感季節。第二為縮小，即縮減開挖範圍、施工便道、堆置區與硬化面積，保留原有植被與自然河床。\n\n第三為減輕，包含設置沉砂與濁水控制、維持生態基流、保留魚道或動物通道、夜間照明管制、降低噪音、分階段施工、表土保存及外來種防治。第四為補償，對不可避免的棲地損失，採原地或異地復育、補植原生種、創造濕地或河岸緩衝帶。施工與維護階段需監測保育措施成效，並依結果調整。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "113-水土保持規劃設計-第二題：農塘灌溉水量決定", "year": "113", "subject": "水土保持規劃設計", "title": "第二題：農塘灌溉水量決定", "number": "第二題", "question": "二、把水留住並持續灌溉，不僅是農業的當前挑戰，也是因應氣候變遷的前 哨戰，請說明農塘規劃設計時其灌溉水量如何決定。（25 分）", "brief": "灌溉水量由作物需水量、有效雨量、灌溉面積、土壤保水、灌溉效率、輸水損失、輪灌制度與枯旱期需求決定。可由 ETc = Kc ETo 求作物蒸發散，再扣除有效雨量與土壤可用水，換算農塘所需供水量。", "detail": "農塘規劃需先確定服務灌溉面積、作物種類、栽培期、灌溉制度與保證供水標準。作物需水量可由參考蒸發散 ETo 乘作物係數 Kc 得 ETc。田間淨灌溉需求 NIR = ETc - Pe - ΔS，其中 Pe 為有效雨量，ΔS 為土壤水分可利用變化。若為水稻等作物，還需考慮滲漏、田面水深與整田泡田用水。\n\n農塘總供水需求需除以灌溉效率，即 GIR = NIR / Ea，Ea 包含輸水、配水與田間施灌效率。還需考慮蒸發損失、滲漏損失、淤積減少庫容、枯旱連續日數及氣候變遷增量。若農塘兼具防災滯洪，需保留防洪庫容，不可全部作灌溉水。最後以水量平衡模擬入流、降雨、蒸發、滲漏、取水與溢流，決定有效庫容與操作水位。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "113-水土保持規劃設計-第三題：沉砂設施容量設計", "year": "113", "subject": "水土保持規劃設計", "title": "第三題：沉砂設施容量設計", "number": "第三題", "question": "三、請就水土保持技術規範，說明水土保持計畫中沉砂設施容量設計原則。 （25 分）", "brief": "沉砂設施容量應能容納開發或施工期間預估土砂量，並考慮清淤頻率、安全係數、有效沉降空間、滯洪共構時庫容分配及維護管理。設計土砂量可由土壤流失估算、集水區產砂、施工裸露面與逕流條件推估。", "detail": "水土保持計畫中沉砂設施的功能是攔截開發或施工造成的泥砂，避免下游排水路、河川、農塘或保全對象淤積。容量設計首先應估算集水區土砂來源，包括裸露面沖蝕、道路邊坡、臨時堆土、溝蝕與崩塌。可利用 USLE/RUSLE 或規範建議方法估算土壤流失量，再依泥砂遞移率與設計期間換算需攔截量。\n\n沉砂池有效容量應包含沉砂容量、必要水深、進出口消能與安全餘裕。若與滯洪池共構，沉砂容量不得侵占必要滯洪容量，應設清淤高程、分隔或前池。設計還須確保水流停留時間足夠，使目標粒徑能沉降；進口需消能並避免短流，出口需防止再懸浮。維護上應設置清淤道路、量測標尺、清淤頻率與豪雨後檢查制度。法規數值與係數應依最新水土保持技術規範核對。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "113-水土保持規劃設計-第四題：農塘水量平衡", "year": "113", "subject": "水土保持規劃設計", "title": "第四題：農塘水量平衡", "number": "第四題", "question": "四、有一農塘平均水面面積為 1.5 ha ，農塘堤岸頂之平均高程為 101.10 m ， 今遭遇一場延時 5 天之降雨，降雨前農塘水面之高程為 100.03 m，降雨 期間流入農塘之平均流量為 1.0 cms 、流出農塘之平均流量為 1.1 cms ， 降雨期間觀測之總降雨量為 450 cm、總蒸發量為 60 cm，請就以上資料 分析該農塘是否有改善需求。（25 分）", "brief": "農塘面積 1.5 ha = 15,000 m²，5 天為 432,000 秒。流入流出淨量為 (1.0 - 1.1) × 432,000 = -43,200 m³。降雨 450 cm、蒸發 60 cm，淨降雨體積為 (4.5 - 0.6) × 15,000 = 58,500 m³。總蓄水增加 15,300 m³，水位上升 1.02 m，最後水位 101.05 m，距堤頂 101.10 m 僅 0.05 m，改善需求明顯。", "detail": "**表格補充**\n\n| 項目 | 計算 | 結果 |\n|---|---:|---:|\n| 面積 | `1.5 ha` | `15,000 m²` |\n| 延時 | `5 days` | `432,000 sec` |\n| 流量淨變化 | `(1.0 - 1.1) × 432000` | `-43,200 m³` |\n| 淨降雨深 | `4.5 - 0.6` | `3.9 m` |\n| 淨降雨體積 | `3.9 × 15000` | `58,500 m³` |\n| 蓄水變化 | `58,500 - 43,200` | `15,300 m³` |\n| 水位上升 | `15300 / 15000` | `1.02 m` |\n| 降雨後水位 | `100.03 + 1.02` | `101.05 m` |\n| 剩餘出水高 | `101.10 - 101.05` | `0.05 m` |\n\n結論：剩餘出水高僅約 `5 cm`，對波浪、尖峰入流與估算誤差而言明顯不足，應改善溢洪、庫容或堤岸安全。\n\n以水量平衡式 ΔS = Qin - Qout + P A - E A。平均水面面積 A = 1.5 ha = 15,000 m²，延時 5 天 = 432,000 秒。流量項：Qin - Qout = 1.0 - 1.1 = -0.1 cms，因此 5 天淨流出量為 -0.1 × 432,000 = -43,200 m³。降雨深 450 cm = 4.5 m，蒸發深 60 cm = 0.6 m，淨降雨深為 3.9 m，體積為 3.9 × 15,000 = 58,500 m³。\n\n故 ΔS = 58,500 - 43,200 = 15,300 m³。水位變化 Δh = ΔS/A = 15,300/15,000 = 1.02 m。降雨前水位 100.03 m，降雨後水位約 101.05 m。堤頂平均高程 101.10 m，剩餘出水高僅 0.05 m。此自由高不足以應付波浪、風浪爬高、降雨不均、入流尖峰及估算誤差，故農塘有改善需求。改善方向包括增加溢洪道能力、降低常水位、增加滯洪容量、堤岸加高補強、改善進出流控制及清淤恢復庫容。若題目原單位應為 mm 而非 cm，需依原題單位重新核算。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理
