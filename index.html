\n| 水準/高程 | 後視、前視、儀器高、閉合差 |\n| 土方 | 方格法、斷面法、等高線法或 TIN |\n| 航測/UAV | 控制點、空三、密點雲、DEM、正射、精度檢核 |\n| GIS | 圖層、屬性、坐標系統、資料庫與服務 |\n\n測量計算題要注意單位與坐標方向。全站儀可由斜距、垂直角與方位角求三維坐標；水準測量以高程差與閉合差檢核；土方可用平均斷面、方格法、稜柱體公式或等高線面積法。UAV/SfM 題需說明航線規劃、控制點、特徵匹配、束制平差、密點雲、DSM/DTM 與正射影像。若題目圖表未抽出，需回原 PDF 讀取數值後代入。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-001-土壤物理與沖蝕-第一題：土壤壓實對坡地入滲與逕流沖蝕之影響", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "第一題：土壤壓實對坡地入滲與逕流沖蝕之影響", "number": "第一題", "question": "某山坡地果園因長期機械行駛造成表土壓實，降雨時坡面逕流明顯增加並產生細溝沖蝕。請說明土壤壓實對孔隙、入滲、逕流與沖蝕之影響，並提出改善及水土保持處理方法。", "brief": "- 土壤壓實會使總孔隙率及大孔隙減少，飽和透水係數與入滲率下降，雨水較易形成地表逕流。\n- 逕流增加會提高坡面剪應力與搬運能力，造成雨濺、片蝕及細溝沖蝕。\n- 改善方法包括深耕或鬆土、增施有機質、草生覆蓋、減少機械行駛、等高作業、截排水與緩衝帶配置。", "detail": "一、土壤壓實之物理影響\n- 機械重複行駛會壓縮土壤團粒間孔隙，使容重增加、總孔隙率降低。\n- 大孔隙減少最明顯，導致排水、通氣及根系伸展受阻。\n- 土壤結構變差後，表面易形成結皮，進一步降低降雨入滲。\n\n二、對入滲、逕流與沖蝕之影響\n- 入滲率降低時，降雨強度一旦超過入滲能力，即形成超滲逕流。\n- 地表逕流量與流速增加，坡面剪應力增大，容易由片蝕發展為細溝沖蝕。\n- 若坡面缺乏覆蓋，雨滴動能會打散團粒並堵塞表土孔隙，使沖蝕惡化。\n\n三、改善與水土保持方法\n- 土壤改良可採深耕、心土破碎、增施堆肥或有機質，提高團粒穩定與孔隙連通。\n- 經營管理上應固定農機行駛路徑，避免雨後或土壤過濕時進場。\n- 工程與植生措施包括等高耕作、草生帶、坡面敷蓋、截水溝、排水溝及坡腳沉砂設施。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：土壤生成因子、土壤質地、入滲與沖蝕防治", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "mock-002-土壤物理與沖蝕-第二題：土壤容重、含水量與孔隙率計算", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "第二題：土壤容重、含水量與孔隙率計算", "number": "第二題", "question": "以體積 200 cm³ 之採土環採得濕土重 340 g，烘乾後乾土重 280 g，土粒密度為 2.65 g/cm³。試求土壤質量含水量、容重、孔隙率及體積含水量，並說明其水土保持意義。", "brief": "- 質量含水量 w = (340-280)/280 = 21.4%。\n- 容重 ρb = 280/200 = 1.40 g/cm³；孔隙率 n = 1-1.40/2.65 = 47.2%。\n- 體積含水量 θv = 水體積/總體積 = 60/200 = 30.0%。容重偏高時入滲與根系生長較差，坡面逕流與沖蝕風險增加。", "detail": "一、計算表\n| 項目 | 公式 | 結果 |\n|---|---:|---:|\n| 質量含水量 | `(340-280)/280` | `21.4%` |\n| 容重 | `280/200` | `1.40 g/cm³` |\n| 孔隙率 | `1-1.40/2.65` | `47.2%` |\n| 體積含水量 | `(340-280)/200` | `30.0%` |\n\n二、計算說明\n- 濕土重 340 g、乾土重 280 g，水重為 60 g，水密度約 1 g/cm³，因此水體積約 60 cm³。\n- 質量含水量為水重除以乾土重，即 60/280 = 0.214。\n- 容重為乾土重除以採樣體積，即 280/200 = 1.40 g/cm³。\n- 孔隙率由土粒密度與容重求得，n = 1 - ρb/ρs = 1 - 1.40/2.65 = 0.472。\n\n三、水土保持意義\n- 容重較高表示土壤可能較壓實，大孔隙及入滲能力降低。\n- 孔隙率與體積含水量可用來判斷土壤蓄水、通氣與飽和程度。\n- 坡地管理上可利用覆蓋、有機質改良及減少機械壓實，降低逕流與沖蝕。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：土壤含水量、容重、孔隙率計算", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "mock-003-土壤物理與沖蝕-第三題：USLE 土壤流失量與覆蓋改善效果", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "第三題：USLE 土壤流失量與覆蓋改善效果", "number": "第三題", "question": "某裸露坡面面積 1.2 ha，R=800、K=0.035、LS=1.8、C=1.0、P=1.0。若改採草生覆蓋使 C 降為 0.08，並設等高排水使 P 降為 0.6，試計算改善前後年土壤流失量及減少率。", "brief": "- USLE：A = R K LS C P。\n- 改善前 A = 800×0.035×1.8×1×1 = 50.4 t/ha/yr，全區 60.48 t/yr。\n- 改善後 A = 800×0.035×1.8×0.08×0.6 = 2.419 t/ha/yr，全區 2.90 t/yr，減少率約 95.2%。", "detail": "一、公式與代入\n- 通用土壤流失公式為 `A = R K LS C P`。\n- 改善前：`A0 = 800×0.035×1.8×1.0×1.0 = 50.4 t/ha/yr`。\n- 面積 1.2 ha，故總流失量 `50.4×1.2 = 60.48 t/yr`。\n\n二、改善後計算\n- 草生覆蓋使 `C=0.08`，等高排水使 `P=0.6`。\n- `A1 = 800×0.035×1.8×0.08×0.6 = 2.419 t/ha/yr`。\n- 全區總流失量 `2.419×1.2 = 2.90 t/yr`。\n\n三、改善效果\n- 減少率 `=(60.48-2.90)/60.48×100% = 95.2%`。\n- 結果顯示坡面覆蓋與逕流分散是降低坡面沖蝕的關鍵。\n- 實務上仍應配合截排水、坡腳沉砂與施工期臨時防災，以避免短期暴雨造成集中沖刷。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：USLE、覆蓋管理與坡長坡度", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；USLE 題重點是 A=R K LS C P，並分清楚 C 為覆蓋管理、P 為保育措施效果。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "mock-004-土壤物理與沖蝕-第四題：裸露坡面沖蝕型態與防治", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "第四題：裸露坡面沖蝕型態與防治", "number": "第四題", "question": "請比較雨濺沖蝕、片狀沖蝕、細溝沖蝕與溝蝕之形成機制、現地特徵及防治方法。", "brief": "- 雨濺沖蝕由雨滴動能打散團粒；片狀沖蝕為薄層逕流均勻帶走表土；細溝沖蝕為逕流集中形成小溝；溝蝕則為溝槽擴大且一般耕作不易消除。\n- 防治原則為降低雨滴動能、增加覆蓋、分散逕流、縮短坡長、穩定排水路及設沉砂設施。\n- 工程與植生應配合使用，避免只在坡腳處理而未處理坡面逕流來源。", "detail": "一、沖蝕型態比較\n| 型態 | 形成機制 | 現地特徵 |\n|---|---|---|\n| 雨濺沖蝕 | 雨滴打擊使團粒破碎飛濺 | 表土封閉、結皮、泥點附著 |\n| 片狀沖蝕 | 薄層逕流搬運細粒 | 表土均勻變薄、不易立即察覺 |\n| 細溝沖蝕 | 逕流集中切割坡面 | 可見小溝，耕作可暫時整平 |\n| 溝蝕 | 集中水流長期下切與側蝕 | 溝深大，耕作不易消除 |\n\n二、防治方法\n- 雨濺與片蝕應優先以草生覆蓋、敷蓋、植生毯、噴植或殘株覆蓋降低雨滴動能。\n- 細溝沖蝕應以等高耕作、截水溝、坡面排水、分段平台及草溝分散逕流。\n- 溝蝕需設跌水、固床、護岸、排水出口消能及沉砂設施，並處理上游來水。\n\n三、作答結論\n- 沖蝕防治須由坡面源頭減砂、坡面逕流控制及坡腳沉砂三層次處理。\n- 若只清除下游淤砂而不控制坡面裸露與集中逕流，災害會反覆發生。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：風蝕、雨濺、片蝕與細溝沖蝕", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。"}, {"id": "mock-005-土壤物理與沖蝕-第五題：砂土、壤土與黏土之水土保持特性", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "第五題：砂土、壤土與黏土之水土保持特性", "number": "第五題", "question": "請比較砂土、壤土與黏土在入滲、保水、抗蝕、工程施工及植生復育上之差異，並說明坡地水土保持規劃應如何因應。", "brief": "- 砂土入滲快但保水保肥差，乾燥鬆散時易受風蝕或沖刷；黏土保水高但入滲慢，易產生逕流、膨縮與邊坡穩定問題；壤土通氣、保水與施工性較平衡。\n- 坡地規劃應依質地調整排水、覆蓋、土壤改良、植生材料與施工時機。\n- 砂土重點在保水與覆蓋，黏土重點在排水與避免擾動，壤土則重在維持團粒結構。", "detail": "一、三類土壤比較\n| 土壤 | 入滲 | 保水 | 主要問題 |\n|---|---|---|---|\n| 砂土 | 快 | 低 | 保肥差、乾燥鬆散、植生不易 |\n| 壤土 | 中等 | 中等 | 最適農作與植生，但仍需防蝕 |\n| 黏土 | 慢 | 高 | 逕流大、膨縮、施工黏滯、排水差 |\n\n二、水土保持因應\n- 砂土坡面宜增加有機質、敷蓋、草生覆蓋與保水材料，並避免裸露受風雨侵蝕。\n- 黏土坡面應重視截排水、地下排水、施工含水量控制及坡面防滑。\n- 壤土應維持團粒結構，避免壓實，並以植生覆蓋及等高排水降低沖蝕。\n\n三、植生復育重點\n- 砂土可選耐旱、根系發達之草種與灌木，並搭配客土或土壤改良。\n- 黏土需避免積水缺氧，可選耐濕植物並改善排水。\n- 坡地復育不能只看肥力，還要同時考慮入滲、排水、抗蝕與根系固土能力。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：土壤質地、沉降法與水土保持特性", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-006-坡地水文學-第一題：農塘水量平衡與溢流風險", "year": "模擬", "subject": "坡地水文學", "title": "第一題：農塘水量平衡與溢流風險", "number": "第一題", "question": "某農塘平均水面面積為 2.0 ha，降雨前水位高程為 98.20 m，堤頂高程為 99.30 m。某場暴雨歷時 3 天，總降雨量 320 mm、總蒸發量 30 mm，平均入流量 0.80 cms、平均出流量 0.55 cms。試計算暴雨後水位及剩餘出水高，並判斷是否需改善。", "brief": "- 面積 A = 2.0 ha = 20,000 m²；3 天 = 259,200 秒。\n- 流量淨入流體積 `(0.80-0.55)×259200 = 64,800 m³`；淨降雨體積 `(0.32-0.03)×20000 = 5,800 m³`。\n- 總蓄水增加 70,600 m³，水位上升 `70600/20000 = 3.53 m`，暴雨後水位 101.73 m，高於堤頂 99.30 m，明顯溢流，需改善溢洪與出流能力。", "detail": "一、水量平衡式\n- `ΔS = (Qin-Qout)t + (P-E)A`。\n- A = 2.0 ha = 20,000 m²；t = 3×24×3600 = 259,200 秒。\n\n二、計算表\n| 項目 | 計算 | 結果 |\n|---|---:|---:|\n| 流量淨變化 | `(0.80-0.55)×259200` | `64,800 m³` |\n| 淨降雨深 | `0.32-0.03` | `0.29 m` |\n| 淨降雨體積 | `0.29×20000` | `5,800 m³` |\n| 蓄水增加 | `64800+5800` | `70,600 m³` |\n| 水位上升 | `70600/20000` | `3.53 m` |\n| 暴雨後水位 | `98.20+3.53` | `101.73 m` |\n\n三、判斷與改善\n- 堤頂高程 99.30 m，暴雨後推估水位 101.73 m，已超過堤頂 2.43 m，代表必然溢流或計算條件下出流能力嚴重不足。\n- 改善方向包括增設或擴大溢洪道、降低常水位、增加滯洪庫容、清淤恢復容量、改善出流控制及加強堤體安全。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：水量平衡、農塘水位變化", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "mock-007-坡地水文學-第二題：合理化公式洪峰流量計算", "year": "模擬", "subject": "坡地水文學", "title": "第二題：合理化公式洪峰流量計算", "number": "第二題", "question": "某坡地開發基地面積 18 ha，開發前逕流係數 0.45，開發後逕流係數 0.80。若設計降雨強度為 95 mm/hr，試以合理化公式計算開發前後洪峰流量與增加量。", "brief": "- 合理化公式 `Q = C I A / 360`，A 用 ha、I 用 mm/hr。\n- 開發前 `Q0 = 0.45×95×18/360 = 2.14 cms`。\n- 開發後 `Q1 = 0.80×95×18/360 = 3.80 cms`，增加量 1.66 cms。", "detail": "一、公式\n- 合理化公式適用於小集水區洪峰估算，`Q = C I A / 360`。\n- 其中 `Q` 為 cms，`C` 為逕流係數，`I` 為 mm/hr，`A` 為 ha。\n\n二、計算\n| 狀態 | C | 計算 | 洪峰流量 |\n|---|---:|---:|---:|\n| 開發前 | 0.45 | `0.45×95×18/360` | `2.14 cms` |\n| 開發後 | 0.80 | `0.80×95×18/360` | `3.80 cms` |\n| 增加量 |  | `3.80-2.14` | `1.66 cms` |\n\n三、工程意義\n- 開發後不透水面增加，使洪峰流量增加約 78%。\n- 水土保持計畫應以滯洪池、透水鋪面、植生滯留、排水分散及沉砂設施降低下游衝擊。\n- 若作為正式設計，仍須依集流時間選取相對應設計降雨強度。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：合理化公式、集流時間、洪峰流量", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "mock-008-坡地水文學-第三題：Horton 入滲與有效降雨判斷", "year": "模擬", "subject": "坡地水文學", "title": "第三題：Horton 入滲與有效降雨判斷", "number": "第三題", "question": "某集水區入滲能力可表示為 f(t)=10+40e^{-0.6t} mm/hr，t 以 hr 計。若一場降雨強度固定為 35 mm/hr，歷時 3 hr，試計算 t=0、1、2、3 hr 之入滲能力，並說明何時開始產生超滲逕流。", "brief": "- f(0)=50 mm/hr，f(1)=31.95 mm/hr，f(2)=22.05 mm/hr，f(3)=16.61 mm/hr。\n- 降雨強度 35 mm/hr，當 f(t)<35 時會產生超滲逕流。\n- 解 `10+40e^{-0.6t}=35` 得 t=0.783 hr，約 47 分鐘後開始產生超滲逕流。", "detail": "一、入滲能力計算\n| 時間 t(hr) | 公式 | f(t) mm/hr |\n|---:|---:|---:|\n| 0 | `10+40e^0` | `50.00` |\n| 1 | `10+40e^-0.6` | `31.95` |\n| 2 | `10+40e^-1.2` | `22.05` |\n| 3 | `10+40e^-1.8` | `16.61` |\n\n二、超滲起始時間\n- 降雨強度 i = 35 mm/hr。\n- 令 `10+40e^{-0.6t}=35`，得 `40e^{-0.6t}=25`。\n- `e^{-0.6t}=0.625`，`t=-ln(0.625)/0.6 = 0.783 hr`，約 47 分鐘。\n\n三、水文意義\n- 初期入滲能力大於降雨強度，雨水多可入滲。\n- 約 47 分鐘後，入滲能力低於降雨強度，超出部分形成地表逕流。\n- 坡地若缺乏覆蓋或排水分散，後期逕流會造成片蝕、細溝沖蝕與下游洪峰增加。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：Horton 入滲與有效雨量", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-009-坡地水文學-第四題：設計洪水超越機率", "year": "模擬", "subject": "坡地水文學", "title": "第四題：設計洪水超越機率", "number": "第四題", "question": "某排水設施以 25 年重現期洪水設計。試求任一年發生超越設計洪水之機率，以及未來 10 年內至少發生一次超越設計洪水之機率。", "brief": "- 25 年重現期之年超越機率 p = 1/25 = 0.04。\n- 10 年內至少一次超越機率 `1-(1-p)^10 = 1-0.96^10 = 33.52%`。\n- 重現期不是每 25 年必發生一次，而是長期平均年超越機率為 4%。", "detail": "一、年超越機率\n- 重現期 `T = 25 年`。\n- 年超越機率 `p = 1/T = 1/25 = 0.04 = 4%`。\n\n二、設計年限風險\n- 10 年內完全不超越之機率為 `(1-p)^10 = 0.96^10 = 0.6648`。\n- 至少超越一次之機率為 `1-0.6648 = 0.3352`，即 33.52%。\n\n三、工程說明\n- 重現期是統計平均概念，並非固定週期。\n- 設施使用年限越長，遭遇超設計洪水的累積風險越高。\n- 重要保全對象、下游聚落或高風險設施應採較高重現期或增加安全餘裕。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：重現期、超越機率、風險", "points": "15分", "hint": "水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "mock-010-坡地水文學-第五題：單位歷線疊加計算", "year": "模擬", "subject": "坡地水文學", "title": "第五題：單位歷線疊加計算", "number": "第五題", "question": "某集水區 1 cm、1 hr 單位歷線如下：時間 0、1、2、3、4、5 hr 之流量分別為 0、8、18、12、5、0 cms。若連續兩小時有效降雨分別為 2 cm 與 1.5 cm，試求直接逕流歷線。", "brief": "- 第一小時 2 cm 產生 `2U(t)`，第二小時 1.5 cm 產生 `1.5U(t-1)`。\n- 逐時相加後，0-6 hr 直接逕流為 0、16、48、51、28、7.5、0 cms。\n- 尖峰直接逕流量為 51 cms，發生於第 3 hr。", "detail": "一、疊加原理\n- 單位歷線具有比例性與疊加性。\n- 2 cm 有效雨量之逕流為單位歷線乘 2。\n- 第二小時 1.5 cm 有效雨量需延後 1 hr，再乘 1.5 後與第一場相加。\n\n二、計算表\n| 時間 hr | U(t) | 2U(t) | 1.5U(t-1) | Qd |\n|---:|---:|---:|---:|---:|\n| 0 | 0 | 0 | 0 | 0 |\n| 1 | 8 | 16 | 0 | 16 |\n| 2 | 18 | 36 | 12 | 48 |\n| 3 | 12 | 24 | 27 | 51 |\n| 4 | 5 | 10 | 18 | 28 |\n| 5 | 0 | 0 | 7.5 | 7.5 |\n| 6 | 0 | 0 | 0 | 0 |\n\n三、結論\n- 直接逕流歷線為 0、16、48、51、28、7.5、0 cms。\n- 尖峰流量為 51 cms，發生在第 3 hr。\n- 此題作答重點是時間平移，不能只把雨量總和 3.5 cm 直接乘單位歷線。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：單位歷線疊加", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-011-植生工程-第一題：陡坡裸露地之植生復育", "year": "模擬", "subject": "植生工程", "title": "第一題：陡坡裸露地之植生復育", "number": "第一題", "question": "某崩塌地坡面坡度陡、土層薄且局部有岩盤出露，豪雨後常有表土沖刷。請說明此類坡面進行植生復育前應先處理哪些工程問題，並提出適用植生方法。", "brief": "- 陡坡裸露地不可只撒播種子，應先處理坡面穩定、截排水、坡面抗沖蝕與植生基盤固定。\n- 可採削坡整形、階段平台、掛網噴植、植生基材噴附、植生袋、木樁編柵及坡腳保護。\n- 植物宜選耐旱、耐瘠、根系發達且適地適種之草本、灌木與先驅樹種。", "detail": "一、復育前工程處理\n- 先確認坡面是否仍有滑動、落石或集中滲流，必要時進行削坡、坡面清理與坡腳穩定。\n- 上方應設截水溝，坡面設分段排水，避免逕流直接沖刷植生基材。\n- 土層薄或岩盤出露處須以掛網、錨釘、客土袋或植生基材固定。\n\n二、適用植生方法\n- 緩至中坡可用噴植、植生毯、草籽噴播與敷蓋。\n- 陡坡可採掛網噴植、厚層基材噴附、植生袋、木樁編柵或格框植生。\n- 坡腳與排水出口應配合石籠、砌石或消能設施，避免植生坡面被淘刷。\n\n三、植物選擇\n- 初期以快速覆蓋草種穩定表土，中長期導入深根灌木與先驅樹種。\n- 植物需耐旱、耐瘠、抗風、根系發達，並優先採用適地鄉土種。\n- 維護期需補播、補植、施肥或灌溉，直到覆蓋率與成活率達設計要求。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：坡面植生、臨界坡度與基盤穩定", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "mock-012-植生工程-第二題：河溪護岸植生設計", "year": "模擬", "subject": "植生工程", "title": "第二題：河溪護岸植生設計", "number": "第二題", "question": "請說明河溪護岸植生設計應考量之水理、土壤及生態條件，並列舉可採用之植生材料與施工方法。", "brief": "- 河溪護岸植生須考量洪水位、流速、沖刷、坡度、土壤含水、日照、棲地連續性及維護可及性。\n- 高流速或常受沖刷處不可只靠草本，應結合石籠、砌石、木樁、植生袋或格框。\n- 植生材料可用草本、挺水植物、灌木、柳枝扦插、椰纖毯、植生袋與本土河岸植物。", "detail": "一、設計考量\n- 水理條件包括常水位、洪水位、流速、剪應力、彎道外側沖刷及漂流木撞擊。\n- 土壤條件包括粒徑、含水、透水性、岸坡穩定與植生基盤厚度。\n- 生態條件包括棲地連續、遮蔭、水陸交界、外來種控制及施工期避開繁殖季。\n\n二、植生材料與方法\n| 材料或方法 | 適用位置 | 功能 |\n|---|---|---|\n| 草本覆蓋 | 高灘地、緩坡 | 快速覆蓋、防雨濺 |\n| 柳枝扦插 | 濕潤岸坡 | 發根固土、柔性護岸 |\n| 植生袋 | 岸坡或坡腳 | 固土、提供植生基盤 |\n| 石籠植生 | 中高流速處 | 抗沖刷兼具孔隙棲地 |\n| 椰纖毯 | 表土易沖刷處 | 暫時保護與保濕 |\n\n三、施工與維護\n- 施工應先穩定坡腳，再處理坡面植生，避免坡腳淘刷造成整體失敗。\n- 植栽後需補植、除草、灌溉及檢查沖刷破壞。\n- 生態工程不是完全不用硬體，而是依水理風險配置柔性與剛性材料。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：河溪護岸植栽、生態工程", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "mock-013-植生工程-第三題：鄉土植物與外來植物在植生工程之比較", "year": "模擬", "subject": "植生工程", "title": "第三題：鄉土植物與外來植物在植生工程之比較", "number": "第三題", "question": "請比較鄉土植物與外來植物在坡地植生工程之優缺點，並說明植物選定時應考量哪些條件。", "brief": "- 鄉土植物適應當地氣候、病蟲害與生態系，較有利於長期穩定與棲地恢復。\n- 外來植物可能生長快、覆蓋迅速，但有入侵、排擠原生種或維護管理問題。\n- 植物選定應考量根系、耐旱耐瘠、覆蓋速度、坡度、土壤、水分、海拔、維護及生態風險。", "detail": "一、比較表\n| 項目 | 鄉土植物 | 外來植物 |\n|---|---|---|\n| 適應性 | 對當地氣候與土壤適應佳 | 視物種而定，可能需較多維護 |\n| 生態性 | 有利棲地與生物多樣性 | 可能造成入侵或排擠 |\n| 覆蓋速度 | 部分較慢 | 常有快速覆蓋物種 |\n| 長期穩定 | 通常較佳 | 可能短期有效但長期風險高 |\n\n二、植物選定條件\n- 根系需能固土，草本重表土保護，灌木與喬木重深層根系補強。\n- 需耐旱、耐瘠、耐風、耐沖刷，並符合坡向、海拔、土壤及水分條件。\n- 應避免具入侵性或需高維護之物種。\n\n三、工程應用\n- 初期可用快速覆蓋草種降低沖蝕，中後期導入鄉土灌木與樹種建立穩定群落。\n- 裸露坡面、河岸、道路邊坡及崩塌地應依風險選擇不同植物組合。\n- 植生工程應重視後續養護，否則即使初期成活，仍可能因乾旱或沖刷失敗。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：鄉土植物與外來植物比較", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "mock-014-植生工程-第四題：不良土壤之植生客土與土壤改良", "year": "模擬", "subject": "植生工程", "title": "第四題：不良土壤之植生客土與土壤改良", "number": "第四題", "question": "坡地工程基地為酸性強、土層薄且石礫含量高之不良土壤，請說明植生客土與土壤改良之處理方法及注意事項。", "brief": "- 不良土壤植生前應改善酸鹼度、土層厚度、保水保肥能力與根系生長空間。\n- 植生客土可提供種子發芽及根系初期生長基盤；土壤改良可加入有機質、石灰、堆肥、保水材與肥料。\n- 陡坡客土須配合掛網、植生毯、格框或噴附材料固定，避免暴雨沖失。", "detail": "一、問題判斷\n- 酸性過強會影響養分有效性及根系生長，石礫多會降低保水保肥能力。\n- 土層薄時植物根系無法深入，乾旱及暴雨後容易死亡或被沖刷。\n- 若未先改善基盤，只撒播種子通常成效不佳。\n\n二、處理方法\n- 植生客土可採客土袋、厚層基材噴附、格框填土或植生槽填土。\n- 酸性土可依土壤檢測結果施用石灰資材調整 pH。\n- 加入堆肥、有機質、保水材料及緩效肥，提高團粒、保水與肥力。\n\n三、注意事項\n- 客土厚度須符合植物根系需求，且材料不得含有害物質或外來入侵種子。\n- 坡面應先排水與穩定，避免客土層受集中逕流沖失。\n- 施工後需灌溉、補植、追肥與覆蓋率檢查。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：植生材料導入、植生基盤與土壤改良", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "mock-015-植生工程-第五題：颱風後坡地植生風倒之處理", "year": "模擬", "subject": "植生工程", "title": "第五題：颱風後坡地植生風倒之處理", "number": "第五題", "question": "颱風後某坡地道路兩側大量樹木風倒，並造成排水溝阻塞與邊坡裸露。請說明公部門應採取之緊急應變、復原及長期防範措施。", "brief": "- 緊急階段應先排除道路與排水阻塞、處理危木、維持排水通暢並防止二次災害。\n- 復原階段應清理倒木、修復排水與坡面保護、補植適地樹種並加強裸露面覆蓋。\n- 長期防範應建立樹木健檢、風險分級、適地適種、多層次林相與災後巡檢制度。", "detail": "一、緊急應變\n- 優先清除阻塞道路、橋涵與排水溝之倒木，恢復交通與排水。\n- 處理危木、懸掛枝及不穩定根盤，避免傷人與二次崩落。\n- 裸露坡面可先用帆布、草蓆、臨時排水與砂包防止暴雨沖刷。\n\n二、復原措施\n- 檢查排水溝、截水溝、跌水與沉砂設施是否受堵塞或破壞。\n- 坡面裸露處應補做敷蓋、植生毯、噴植或植生袋。\n- 補植應選抗風、深根、適地之鄉土樹種，避免單一樹種大量栽植。\n\n三、長期管理\n- 建立道路邊坡與公共綠地樹木健康檢查制度。\n- 高風險路段可降低樹冠風阻、改善根域土壤、增加多層次植被。\n- 颱風前後應有巡檢、通報、搶修與維護紀錄，以降低重複災害。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：風倒木、災後植生復原", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "mock-016-水土保持工程-第一題：野溪淤積之清淤與後續治理", "year": "模擬", "subject": "水土保持工程", "title": "第一題：野溪淤積之清淤與後續治理", "number": "第一題", "question": "颱風後某野溪上游大量土砂淤積於固床工及橋梁附近，影響通洪斷面。請說明可行之清淤、疏通工程手段及後續防治對策。", "brief": "- 清淤可用機械挖除、人工輔助、臨時導流及分區施工，優先恢復橋涵、固床工與通洪瓶頸斷面。\n- 疏通應維持河道穩定坡降，不可過度下挖造成基礎淘刷。\n- 後續應設沉砂、固床、護岸、坡面減砂及定期巡檢清淤制度。", "detail": "一、清淤與疏通\n- 先調查淤積範圍、粒徑、通洪瓶頸、橋墩基礎與保全對象。\n- 機械清淤適用於可進場河段，人工清理適用於橋涵、孔口或敏感區。\n- 施工時需設臨時導流、濁水控制及棄土去化，不得任意堆置於河道內。\n\n二、工程注意\n- 清淤高程應以恢復設計通洪斷面為原則，不宜任意深挖。\n- 固床工上下游應避免淘刷，必要時補強護坦、護腳或消能設施。\n- 橋梁附近清淤須注意橋墩基礎安全。\n\n三、後續治理\n- 上游坡面崩塌或裸露地應做源頭減砂。\n- 中游可設固床、防砂或沉砂設施調節土砂。\n- 下游應建立定期巡檢、豪雨後清淤與預警通報制度。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：野溪清淤、疏通與防砂設施", "points": "20分", "hint": "野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-017-水土保持工程-第二題：矩形排水溝通水能力檢核", "year": "模擬", "subject": "水土保持工程", "title": "第二題：矩形排水溝通水能力檢核", "number": "第二題", "question": "某矩形混凝土排水溝寬 1.2 m、水深 0.8 m、坡度 3%，曼寧 n=0.015。試計算其滿流水力半徑、流速與流量，並判斷若容許流速為 5 m/s 是否需消能。", "brief": "- A = 1.2×0.8 = 0.96 m²；P = 1.2+2×0.8 = 2.8 m；R = 0.343 m。\n- V = (1/0.015)×0.343^(2/3)×sqrt(0.03) = 5.66 m/s。\n- Q = VA = 5.66×0.96 = 5.43 cms；因 V > 5 m/s，需設消能或降低坡度/增加粗糙度。", "detail": "一、斷面計算\n| 項目 | 計算 | 結果 |\n|---|---:|---:|\n| 面積 | `1.2×0.8` | `0.96 m²` |\n| 濕周 | `1.2+2×0.8` | `2.8 m` |\n| 水力半徑 | `0.96/2.8` | `0.343 m` |\n\n二、曼寧式\n- `V = (1/n)R^(2/3)S^(1/2)`。\n- `V = (1/0.015)×0.343^(2/3)×0.03^0.5 = 5.66 m/s`。\n- `Q = VA = 5.66×0.96 = 5.43 cms`。\n\n三、判斷\n- 容許流速為 5 m/s，而計算流速 5.66 m/s，超過容許值。\n- 應設跌水、消能池、粗糙化渠底、階梯式渠道或調整坡度。\n- 出口需做防沖刷與沉砂處理，避免高速水流破壞下游。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：矩形渠道、曼寧公式與消能", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "mock-018-水土保持工程-第三題：擋土牆安定檢核項目", "year": "模擬", "subject": "水土保持工程", "title": "第三題：擋土牆安定檢核項目", "number": "第三題", "question": "請說明重力式擋土牆設計時需考慮之主要作用力及安定檢核項目。若牆背排水不良，對安全性有何影響？", "brief": "- 主要作用力包括牆重、主動土壓、被動土壓、超載、水壓、地震力及基底反力。\n- 安定檢核包括抗滑、抗傾倒、承載力、偏心距、基底拉力及整體邊坡穩定。\n- 排水不良會增加牆背水壓與孔隙水壓，使水平推力增加、有效抗剪強度降低，安全係數下降。", "detail": "一、主要作用力\n- 牆體自重提供抗滑與抗傾倒力矩。\n- 牆背土壓與超載側壓是主要不利水平力。\n- 地下水壓、上浮力及地震力會增加不利作用，設計時不可忽略。\n\n二、安定檢核\n| 項目 | 檢核內容 |\n|---|---|\n| 抗滑 | 抗滑力是否大於水平推力 |\n| 抗傾倒 | 抗傾倒力矩是否大於傾倒力矩 |\n| 承載 | 基底最大壓力是否小於容許承載力 |\n| 偏心 | 合力是否落於合理範圍，避免基底拉力 |\n| 整體穩定 | 牆體與後方坡體是否沿潛在滑動面破壞 |\n\n三、排水不良影響\n- 牆背水壓會直接增加水平推力，使抗滑與抗傾倒安全係數降低。\n- 孔隙水壓升高會降低土壤有效應力與抗剪強度。\n- 因此擋土牆需設反濾層、排水層、洩水孔、集排水管及牆頂截水措施。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：擋土牆安定分析", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "mock-019-水土保持工程-第四題：土石流設計流量估算", "year": "模擬", "subject": "水土保持工程", "title": "第四題：土石流設計流量估算", "number": "第四題", "question": "某土石流潛勢溪流清水洪峰流量 Qw = 30 cms，土石流土砂體積濃度 Cd = 0.40。若以混合物流量 Qd = Qw/(1-Cd) 估算土石流設計流量，試求 Qd，並說明工程設計意義。", "brief": "- Qd = Qw/(1-Cd) = 30/(1-0.40) = 50 cms。\n- 土石流流量大於清水洪峰，因混合物包含水與土砂體積。\n- 防砂壩、導流堤、沉砂池與橋涵通洪斷面應考慮土砂濃度、粒徑、漂流木及堵塞風險。", "detail": "一、計算\n- 已知清水洪峰流量 `Qw = 30 cms`，土砂體積濃度 `Cd = 0.40`。\n- 混合物流量 `Qd = Qw/(1-Cd)`。\n- `Qd = 30/(1-0.40) = 30/0.60 = 50 cms`。\n\n二、工程意義\n- 土石流不是單純清水流，流量、密度、衝擊力及堵塞風險都較高。\n- 若仍以清水洪峰設計，可能低估通洪斷面與防砂容量。\n- 設計需同時考慮計畫土砂量、流速、衝擊力、沉積範圍與下游保全對象。\n\n三、治理方向\n- 上游以源頭減砂與崩塌地處理降低供砂。\n- 中游可配置防砂壩、梳子壩、固床工與導流設施。\n- 下游需檢核橋涵斷面、沉砂空間、警戒避難及維護清淤。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：土石流設計流量、含砂濃度", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "mock-020-水土保持工程-第五題：山區道路排水與邊坡保護", "year": "模擬", "subject": "水土保持工程", "title": "第五題：山區道路排水與邊坡保護", "number": "第五題", "question": "山區道路新闢工程常造成上邊坡開挖、下邊坡填方及路面集中排水。請說明其主要水土保持問題及工程對策。", "brief": "- 主要問題包括開挖邊坡崩塌、填方邊坡滑動、路面逕流集中、排水出口沖刷、施工裸露地沖蝕及下游泥砂淤積。\n- 工程對策包括截水溝、路側溝、橫向排水、跌水消能、擋土牆、坡面保護、植生復育與沉砂設施。\n- 施工順序應先排水與臨時防災，再大面積開挖填築。", "detail": "一、主要問題\n- 上邊坡開挖會切斷坡腳支撐，若地質破碎或排水不良，易發生崩塌。\n- 下邊坡填方若壓實不足或排水不良，容易滑動或沖刷。\n- 道路路面使逕流集中，排水出口若無消能，會造成下游溝蝕。\n\n二、工程對策\n- 上方設截水溝攔截坡外水，路側設排水溝並分段排放。\n- 橫向排水涵管出口需設跌水、消能池、護坦或砌石防沖。\n- 邊坡可用擋土牆、格梁、噴植、植生毯、石籠護腳及坡面排水。\n\n三、施工與維護\n- 施工中應分區分期開挖，裸露面即時覆蓋或噴植。\n- 沉砂池與臨時排水應在土方工程前先完成。\n- 完工後需定期清淤、檢查排水出口及補修坡面植生。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：道路排水、坡面穩定與施工中防災", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "mock-021-水土保持規劃設計-第一題：山坡地開發水土保持計畫內容", "year": "模擬", "subject": "水土保持規劃設計", "title": "第一題：山坡地開發水土保持計畫內容", "number": "第一題", "question": "某山坡地擬開發為休閒農場，請說明水土保持計畫應包含之主要章節與規劃設計重點。", "brief": "- 水土保持計畫應包含基地基本資料、環境調查、開發內容、水文分析、土砂估算、排水、沉砂滯洪、邊坡穩定、植生、施工中防災及維護管理。\n- 規劃重點為開發前中後逕流不致危害下游，土砂能被攔截，邊坡安全且施工期有臨時防災。\n- 計畫需明確圖說、設計計算、施工順序、檢查維護及監測管理。", "detail": "一、基本資料與調查\n- 包含基地位置、面積、土地使用、坡度、地質、土壤、植生、水系、道路及保全對象。\n- 需調查災害潛勢，例如崩塌、土石流、順向坡、排水不良及下游淹水。\n\n二、規劃設計內容\n- 水文分析應估算開發前、中、後逕流量與設計洪峰。\n- 土砂分析應估算施工期與完工後土壤流失，配置沉砂設施。\n- 工程設施包括排水、滯洪、沉砂、擋土、護坡、道路邊溝及植生。\n\n三、施工與維護\n- 施工中應先完成臨時排水與沉砂，再進行土方開挖。\n- 完工後需提出維護管理計畫，包括清淤、巡檢、植生補植與災後修復。\n- 設計圖說與計算書需能證明設施容量、安全係數及下游不受不利影響。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：水土保持計畫內容", "points": "25分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-022-水土保持規劃設計-第二題：沉砂滯洪共構設計原則", "year": "模擬", "subject": "水土保持規劃設計", "title": "第二題：沉砂滯洪共構設計原則", "number": "第二題", "question": "開發基地因空間有限，擬將沉砂池與滯洪池垂直共構。請說明其設計原則、容量配置及維護注意事項。", "brief": "- 沉砂滯洪共構須分別計算沉砂容量與滯洪容量，不得互相占用。\n- 下層通常配置沉砂空間，上層配置滯洪空間，並明確標示清淤高程、滯洪水位及溢洪高程。\n- 需注意出流口防堵塞、清淤可達性、短流防止、溢洪安全及定期維護。", "detail": "一、功能分工\n- 沉砂池負責降低流速，使泥砂沉降，減少下游淤積。\n- 滯洪池負責暫存逕流，削減開發後洪峰。\n- 共構時兩者功能都不能被犧牲。\n\n二、容量配置\n- 沉砂容量應依施工期或完工後計畫土砂量、清淤頻率與安全係數決定。\n- 滯洪容量應依入出流歷線或規範方法求得。\n- 沉砂淤積至清淤線時，仍應保留必要滯洪容量及安全自由高。\n\n三、維護注意\n- 出流孔口與涵管應避免被泥砂、漂流木或垃圾堵塞。\n- 需設清淤道路、作業平台、排泥方式與安全防護。\n- 豪雨前後應巡檢淤積高度，必要時立即清淤。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：沉砂滯洪設施容量", "points": "20分", "hint": "水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-023-水土保持規劃設計-第三題：開發前後增加逕流體積估算", "year": "模擬", "subject": "水土保持規劃設計", "title": "第三題：開發前後增加逕流體積估算", "number": "第三題", "question": "某基地面積 10 ha，設計暴雨量 450 mm，開發前逕流係數 0.50，開發後逕流係數 0.85。若以增加逕流體積估算永久滯洪需求，試求所需滯洪量。", "brief": "- 面積 A = 10 ha = 100,000 m²；雨量 P = 450 mm = 0.45 m。\n- 增加逕流係數 ΔC = 0.85-0.50 = 0.35。\n- 滯洪量 V = ΔC×P×A = 0.35×0.45×100000 = 15,750 m³。", "detail": "一、計算\n| 項目 | 數值 |\n|---|---:|\n| 面積 A | `100,000 m²` |\n| 設計雨量 P | `0.45 m` |\n| 逕流係數增加 ΔC | `0.35` |\n| 增加逕流體積 | `15,750 m³` |\n\n二、公式說明\n- 增加逕流體積法可寫為 `V = (C後-C前) P A`。\n- 代入得 `V = (0.85-0.50)×0.45×100000 = 15,750 m³`。\n\n三、設計注意\n- 此法屬體積估算，正式設計仍應檢核入出流歷線、允許放流量與溢洪安全。\n- 若施工中裸露狀態逕流係數更高，臨時滯洪量可能大於永久滯洪量。\n- 滯洪池還需預留沉砂、自由高及維護清淤空間。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：滯洪量估算", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-024-水土保持規劃設計-第四題：水土保持計畫變更設計判斷", "year": "模擬", "subject": "水土保持規劃設計", "title": "第四題：水土保持計畫變更設計判斷", "number": "第四題", "question": "某基地施工中擬將原核定排水溝出口改至另一側既有道路側溝，並宣稱排水斷面不變。請問是否應辦理變更設計？理由為何？", "brief": "- 原則上應辦理變更設計，因排水出口改變會影響下游承受水路、逕流路徑、沖刷位置及保全對象。\n- 即使排水斷面不變，放流點與下游影響已改變，屬主要水土保持設施功能與配置變更。\n- 需重新檢核下游側溝容量、出口消能、防沖刷、地役權或管理權責及施工中防災。", "detail": "一、判斷\n- 水土保持計畫核定內容包含排水系統配置、路線、出口與下游承受水體。\n- 將出口改至另一側道路側溝，已改變放流位置及下游影響範圍。\n- 因此不宜視為單純斷面不變的小修正，原則上應辦理變更設計。\n\n二、需檢核項目\n- 既有道路側溝是否有足夠容量承受設計流量。\n- 出口是否會沖刷路基、邊坡或鄰地。\n- 放流是否影響下游保全對象、排水權責及維護管理。\n\n三、作答結論\n- 若主管機關認定屬不影響安全功能之微調，仍須監造技師認定安全無虞並留存紀錄。\n- 但本題涉及排水出口改變，通常應提送變更設計，經核准後再施工。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：變更設計、監造技師安全認定", "points": "20分", "hint": "水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-025-水土保持規劃設計-第五題：坡地災害潛勢與風險評估", "year": "模擬", "subject": "水土保持規劃設計", "title": "第五題：坡地災害潛勢與風險評估", "number": "第五題", "question": "請說明如何評估集水區內坡地災害潛勢與風險，並提出水土保持規劃上之因應策略。", "brief": "- 災害潛勢評估應調查地形、坡度、地質、土壤、土地利用、降雨、水系、崩塌、土石流及保全對象。\n- 風險可視為危害度、暴露度與脆弱度之組合。\n- 規劃策略包括避開高風險區、源頭減砂、排水改善、邊坡穩定、沉砂滯洪、監測預警與維護管理。", "detail": "一、調查與資料蒐集\n- 基本資料包括 DEM、坡度坡向、地質構造、土壤、土地利用、植生覆蓋及歷史災害。\n- 水文資料包括降雨強度、累積雨量、集流時間、河道坡度及排水瓶頸。\n- 保全對象包括住戶、道路、橋梁、農地、公共設施及下游聚落。\n\n二、潛勢與風險評估\n- 危害度評估災害發生可能性與規模，例如崩塌、土石流、沖刷或淹水。\n- 暴露度評估人員、設施與土地是否位於影響範圍內。\n- 脆弱度評估承受災害之能力，例如建物、道路、排水與避難條件。\n\n三、規劃因應\n- 高風險區應優先迴避開發或降低開發強度。\n- 工程措施包括截排水、地下排水、擋土、護坡、防砂、沉砂滯洪及橋涵改善。\n- 非工程措施包括監測預警、避難路線、土地使用管制、巡檢維護及災後復原計畫。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "參考主題：坡地災害潛勢與風險評估", "points": "25分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-026-水土保持工程-補充題一：透過性與非透過性防砂壩比較", "year": "模擬", "subject": "水土保持工程", "title": "補充題一：透過性與非透過性防砂壩比較", "number": "補充題一", "question": "請比較透過性防砂壩與非透過性防砂壩在功能、適用條件、設計重點、生態影響及維護管理上之差異，並說明野溪治理時如何選用。", "brief": "- 透過性防砂壩以土砂調節與選擇性攔阻為主，平時允許水流與部分土砂通過，洪水或土石流時攔阻巨礫、漂流木與大粒徑材料。\n- 非透過性防砂壩以攔蓄土砂、抬高溪床、固定溪床與減緩縱坡為主，防災效果直接，但較易造成淤滿、壩下沖刷與生態阻隔。\n- 選用時須看土砂供給、保全對象、溪床沖淤、漂流木、維護能力及生態連通需求，必要時採系列配置。", "detail": "一、比較表\n| 項目 | 透過性防砂壩 | 非透過性防砂壩 |\n|---|---|---|\n| 功能 | 調節土砂、攔阻巨礫與漂流木 | 攔蓄土砂、固床、減緩縱坡 |\n| 適用 | 需維持部分通砂與生態連通之溪流 | 需快速穩定溪床或保護下游之河段 |\n| 設計 | 開口尺寸、構件強度、堵塞風險、衝擊力 | 壩體穩定、溢洪口、壩基淘刷、計畫淤砂量 |\n| 生態 | 較可維持溪流連續性 | 較易造成縱向阻隔 |\n| 維護 | 檢查開口堵塞與構件變形 | 檢查淤滿、壩下沖刷與壩體裂縫 |\n\n二、選用原則\n- 若溪流仍需維持輸砂與生物移動，且主要問題為巨礫、漂流木或土石流尖峰，可優先考慮透過性防砂壩。\n- 若下游保全對象緊鄰，且溪床下切或岸坡不穩需快速固床，非透過性防砂壩較具直接效果。\n- 實務上常以系列防砂壩、固床工、護岸、沉砂空間與生物通道配合，而非單一構造物解決全部問題。\n\n三、作答結論\n- 透過性防砂壩偏調節，非透過性防砂壩偏攔蓄與固床。\n- 選用應兼顧防災、安全、土砂平衡、生態連通與維護可行性。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "補充知識庫：透過性防砂壩、非透過性防砂壩", "points": "25分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-027-水土保持工程-補充題二：生物通道設計重點", "year": "模擬", "subject": "水土保持工程", "title": "補充題二：生物通道設計重點", "number": "補充題二", "question": "野溪治理工程常因防砂壩、固床工或跌水造成溪流縱向阻隔。請說明生物通道設置目的、設計原則及維護管理注意事項。", "brief": "- 生物通道目的在維持魚類、蝦蟹及兩棲類上下游移動，降低構造物造成的縱向阻隔。\n- 設計需控制坡度與流速，提供足夠水深、休息池、粗糙底床、低流量通道及安全進出口。\n- 維護應檢查淤積、漂流木堵塞、入口高程變化與沖刷破壞。", "detail": "一、設置目的\n- 防砂壩、固床工、跌水與護岸可能造成水位落差、流速過大或枯水期斷流，使水生生物無法遷移。\n- 生物通道可恢復溪流縱向連續性，讓魚類、蝦蟹、兩棲類與底棲生物有通行路徑。\n\n二、設計原則\n- 坡度不宜過陡，流速需低於目標生物可通行能力。\n- 需有足夠水深與連續水流，枯水期仍應有低流量通道。\n- 可設休息池、粗糙底床、石塊、孔隙與岸邊植生，增加躲藏與停留空間。\n\n三、維護管理\n- 豪雨後檢查入口是否被淤砂或漂流木堵塞。\n- 檢查通道內是否沖刷、破損或水流改道。\n- 若壩前後高程改變，需調整入口與出口，使通道仍能連續接水。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "補充知識庫：水土保持單元叢書03－生物通道", "points": "20分", "hint": "野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-028-水土保持工程-補充題三：野溪預鑄護岸之設計與維護", "year": "模擬", "subject": "水土保持工程", "title": "補充題三：野溪預鑄護岸之設計與維護", "number": "補充題三", "question": "請說明野溪預鑄護岸之適用情境、主要設計檢核項目、生態友善配置及維護管理重點。", "brief": "- 預鑄護岸可快速保護溪岸及坡腳，適用於施工空間受限或需穩定品質之野溪治理。\n- 設計需檢核基腳埋深、抗滑抗傾倒、背填排水、反濾層、接縫、沖刷深度及上下游銜接。\n- 可用孔隙、粗糙表面、植生槽與階梯式配置提升生態友善性，豪雨後需檢查位移、掏空及背填流失。", "detail": "一、適用情境\n- 野溪彎道外側、農路溪岸、橋梁上下游或岸坡受側向侵蝕處，可用護岸保護坡腳。\n- 預鑄構件品質較易控制，現場組裝時間短，適合施工期受限之河段。\n\n二、設計檢核\n- 基腳須埋入可能沖刷深度以下，避免溪床下刷造成護岸掏空。\n- 需檢核抗滑、抗傾倒、背填排水、反濾層與牆後土壓。\n- 上下游銜接與護腳保護很重要，避免保護段末端形成局部沖刷。\n\n三、生態與維護\n- 可採粗糙表面、多孔隙、植生槽、階梯式配置與自然底質銜接。\n- 豪雨後檢查塊體位移、接縫張裂、基腳淘刷、背填流失及下游沖刷。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "補充知識庫：野溪預鑄護岸", "points": "20分", "hint": "野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-029-水土保持規劃設計-補充題四：潛在大規模崩塌調查與監測", "year": "模擬", "subject": "水土保持規劃設計", "title": "補充題四：潛在大規模崩塌調查與監測", "number": "補充題四", "question": "某山區聚落上方坡面疑似有潛在大規模崩塌，請說明應進行之調查項目、監測配置、警戒管理與治理方向。", "brief": "- 調查應包含地形地質、歷史災害、航照判釋、裂縫、陷落、湧水、道路變形與保全對象。\n- 監測可配置雨量計、地下水位計、孔隙水壓計、裂縫計、地表伸縮計、傾斜計、GNSS 或孔內傾斜管。\n- 管理上需建立警戒值、巡查制度、避難路線及治理優先順序；治理可採截排水、地下排水、坡腳保護與局部補強。", "detail": "一、調查項目\n- 蒐集地形圖、地質圖、航照、DEM、歷史災害、土地利用及保全對象。\n- 現地調查冠部裂縫、陷落、隆起、湧水、樹木歪斜、道路變形與擋土牆裂縫。\n- 判斷潛在滑動範圍、滑動方向、地下水條件與可能影響區。\n\n二、監測配置\n- 雨量計用於掌握觸發條件，地下水位計與孔隙水壓計用於判斷水壓變化。\n- 裂縫計、伸縮計、傾斜計、GNSS 與孔內傾斜管可掌握位移速率與深部滑動面。\n- 監測資料應與降雨、地下水與位移速率聯合判讀。\n\n三、警戒與治理\n- 依位移速率、累積雨量、地下水位及歷史事件設定警戒值。\n- 先建立避難路線、通報機制與保全對象清冊。\n- 治理可採地表截排水、地下排水、坡腳保護、減載、擋土或局部錨定補強。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "補充知識庫：潛在大規模崩塌調查及觀測", "points": "25分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-030-土壤物理與沖蝕-補充題五：坡地果園農地水土保持配置", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "補充題五：坡地果園農地水土保持配置", "number": "補充題五", "question": "某坡地果園坡面裸露且農路排水集中，豪雨後產生細溝沖蝕及下游淤砂。請提出農地水土保持改善配置與維護管理方式。", "brief": "- 坡面先以草生栽培、敷蓋、等高作業與覆蓋作物降低雨滴打擊及逕流。\n- 工程上配置山邊溝、截水溝、平台排水、跌水消能、沉砂池與安全排水出口。\n- 農路應設側溝、橫向排水與出口消能；維護上需清淤、補植、修補沖刷與豪雨後巡查。", "detail": "一、問題診斷\n- 裸露坡面使雨滴打擊與片狀沖蝕增加，逕流集中後形成細溝。\n- 農路常截集坡面水，若出口未消能，會把逕流集中排至下游造成沖刷與淤砂。\n\n二、改善配置\n- 農藝措施包括草生栽培、覆蓋作物、敷蓋、等高耕作與減少裸露。\n- 坡面工程包括山邊溝、截水溝、平台階段、排水溝、跌水與沉砂池。\n- 農路需設側溝、橫向排水、出口消能與沉砂設施。\n\n三、維護管理\n- 豪雨前後檢查排水溝、跌水、沉砂池與農路出口。\n- 定期清淤、補植草生帶、修補沖刷溝，避免排水設施被土砂堵塞。\n- 作答結論：農地水保應先減少坡面產砂，再控制排水路徑與末端沉砂。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "補充知識庫：農地水土保持方法實例圖冊", "points": "20分", "hint": "水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-031-土壤物理與沖蝕-每日練習一：降雨動能與坡面沖蝕防治", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "每日練習一：降雨動能與坡面沖蝕防治", "number": "每日練習一", "question": "暴雨後某裸露整地坡面出現表土結皮、泥水逕流及細溝。請說明雨滴動能、入滲降低與逕流剪應力如何造成坡面沖蝕，並提出防治方法。", "brief": "- 雨滴打擊會破壞團粒、使細粒堵塞孔隙並形成表土結皮，導致入滲率下降。\n- 入滲降低後地表逕流增加，逕流剪應力及搬運能力提高，沖蝕由片蝕發展為細溝沖蝕。\n- 防治應以覆蓋、草生、敷蓋、截排水、分散逕流、沉砂與施工期臨時防災配合。", "detail": "一、沖蝕機制\n- 雨滴動能直接打散土壤團粒，使表土細粒懸浮並堵塞孔隙。\n- 表面結皮使入滲能力降低，當降雨強度大於入滲率即形成超滲逕流。\n- 逕流集中後剪應力增加，先造成片狀沖蝕，再切割形成細溝。\n\n二、防治方法\n- 源頭減砂：植生覆蓋、敷蓋、植生毯、噴植或臨時覆蓋。\n- 逕流控制：截水溝、分段排水、草溝、坡面粗糙化與平台階段。\n- 末端處理：沉砂池、濁水沉澱、出口消能及豪雨後清淤。\n\n三、作答結論\n- 坡面沖蝕防治應先降低雨滴打擊，再分散逕流，最後攔截輸出泥砂。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "每日練習：雨滴打擊、片蝕與細溝沖蝕", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "mock-032-土壤物理與沖蝕-每日練習二：土壤沖蝕指標計算", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "每日練習二：土壤沖蝕指標計算", "number": "每日練習二", "question": "某坡面 R=650、K=0.04、LS=2.2。裸露時 C=1.0、P=1.0；若改採草生覆蓋 C=0.10、等高處理 P=0.60。請用 USLE 計算改善前後年土壤流失量及減少率。", "brief": "- 改善前 A0 = 650×0.04×2.2×1.0×1.0 = 57.2 ton/ha/yr。\n- 改善後 A1 = 650×0.04×2.2×0.10×0.60 = 3.432 ton/ha/yr。\n- 減少率 = (57.2-3.432)/57.2 = 94.0%。", "detail": "一、公式\n- USLE：`A = R K LS C P`。\n- R 為降雨沖蝕指數，K 為土壤可蝕性，LS 為坡長坡度因子，C 為覆蓋管理，P 為保育措施。\n\n二、代入計算\n- `A0 = 650×0.04×2.2×1.0×1.0 = 57.2 ton/ha/yr`。\n- `A1 = 650×0.04×2.2×0.10×0.60 = 3.432 ton/ha/yr`。\n- `減少率 = (57.2-3.432)/57.2×100% = 94.0%`。\n\n三、工程意義\n- 草生覆蓋主要降低 C 值，等高處理主要降低 P 值。\n- 答案需補上單位與防治效果，才像完整計算題。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "每日練習：USLE 概念計算", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；USLE 題重點是 A=R K LS C P，並分清楚 C 為覆蓋管理、P 為保育措施效果。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "mock-033-土壤物理與沖蝕-每日練習三：土壤壓實與坡地管理", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "每日練習三：土壤壓實與坡地管理", "number": "每日練習三", "question": "坡地農場長期機械作業後，表土容重上升且降雨時逕流增加。請說明土壤壓實對孔隙、通氣、入滲、根系與沖蝕之影響，並提出改善方法。", "brief": "- 壓實使容重增加、總孔隙率及大孔隙減少，通氣、排水與入滲能力下降。\n- 入滲降低會增加地表逕流與坡面剪應力，使片蝕及細溝沖蝕風險升高。\n- 改善方法包括深耕鬆土、有機質改良、固定農機路徑、草生覆蓋及截排水配置。", "detail": "一、物理影響\n- 壓實壓縮團粒間孔隙，使容重增加、孔隙率下降。\n- 大孔隙減少會降低排水、通氣及根系伸展能力。\n\n二、沖蝕影響\n- 入滲率下降後，降雨較易轉為地表逕流。\n- 逕流量與流速增加後，坡面沖刷與泥砂搬運能力上升。\n\n三、改善方法\n- 農藝上採深耕、有機質改良、草生與敷蓋。\n- 管理上固定農機動線，避免雨後進場。\n- 工程上設截水溝、草溝、沉砂池與農路排水出口消能。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "每日練習：容重、孔隙與入滲", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-034-坡地水文學-每日練習四：合理化公式洪峰流量", "year": "模擬", "subject": "坡地水文學", "title": "每日練習四：合理化公式洪峰流量", "number": "每日練習四", "question": "某小集水區面積 36 ha，逕流係數 C=0.55，設計降雨強度 I=90 mm/hr。試以合理化公式 Q=CIA/360 計算洪峰流量，並說明公式適用限制。", "brief": "- 合理化公式 `Q=CIA/360`，其中 A 用 ha、I 用 mm/hr，Q 為 cms。\n- Q = 0.55×90×36/360 = 4.95 cms。\n- 適用於小集水區，並假設降雨強度均勻、歷時不小於集流時間。", "detail": "一、計算\n- `Q = C I A / 360`。\n- `Q = 0.55×90×36/360 = 4.95 cms`。\n\n二、參數意義\n- C 代表降雨轉為逕流之比例，受土地利用、坡度、土壤及不透水率影響。\n- I 應採與集流時間相對應之設計降雨強度。\n\n三、限制\n- 合理化公式較適用小流域。\n- 不適合直接描述完整入出流歷線、滯洪演算或大型集水區空間變異。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "每日練習：洪峰流量計算", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；USLE 題重點是 A=R K LS C P，並分清楚 C 為覆蓋管理、P 為保育措施效果。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-035-坡地水文學-每日練習五：入滲與逕流形成機制", "year": "模擬", "subject": "坡地水文學", "title": "每日練習五：入滲與逕流形成機制", "number": "每日練習五", "question": "請比較超滲逕流、飽和逕流與壤中流之形成條件，並說明其對坡地洪峰與崩塌潛勢之影響。", "brief": "- 超滲逕流發生於降雨強度大於入滲能力，常見於裸露、壓實或結皮土壤。\n- 飽和逕流發生於土壤蓄水已滿或地下水位接近地表之區域。\n- 壤中流沿土層或不透水層側向流動，會延長退水並可能提高坡體孔隙水壓。", "detail": "一、類型比較\n| 類型 | 形成條件 | 水文影響 |\n|---|---|---|\n| 超滲逕流 | 降雨強度大於入滲率 | 洪峰快、沖蝕強 |\n| 飽和逕流 | 土壤飽和或地下水位高 | 產流面積擴大 |\n| 壤中流 | 水沿土層界面側向流動 | 退水延長、坡體含水增加 |\n\n二、坡地影響\n- 超滲逕流較易造成坡面沖蝕與泥砂輸出。\n- 飽和逕流常使集水區產流面積擴大，增加洪峰。\n- 壤中流與地下水位上升可能提高孔隙水壓，降低邊坡穩定。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "每日練習：坡地逕流", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。"}, {"id": "mock-036-坡地水文學-每日練習六：滯洪池水量平衡", "year": "模擬", "subject": "坡地水文學", "title": "每日練習六：滯洪池水量平衡", "number": "每日練習六", "question": "某滯洪池於 2 小時暴雨期間平均入流 1.20 cms，平均出流 0.75 cms，降雨直接落於池面增加水量 900 m³，蒸發及滲漏忽略不計。試估算所需暫存容量。", "brief": "- 入出流差為 1.20-0.75 = 0.45 cms。\n- 2 小時為 7200 秒，入出流差造成暫存量 0.45×7200 = 3240 m³。\n- 加上池面降雨 900 m³，所需暫存容量約 4140 m³。", "detail": "一、水量平衡\n- `ΔS = (Qin-Qout)t + P池面 - 損失`。\n- 本題蒸發及滲漏忽略，因此只計入出流差與池面降雨。\n\n二、計算\n- `Qin-Qout = 1.20-0.75 = 0.45 cms`。\n- `t = 2×3600 = 7200 sec`。\n- `ΔS = 0.45×7200 + 900 = 4140 m³`。\n\n三、設計提醒\n- 正式設計仍需檢核自由高、溢洪路、沉砂容量與出流口防堵。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "每日練習：滯洪容量計算", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "mock-037-植生工程-每日練習七：噴植工法材料與適用條件", "year": "模擬", "subject": "植生工程", "title": "每日練習七：噴植工法材料與適用條件", "number": "每日練習七", "question": "請說明水力噴植或客土噴植常用材料、適用坡面條件、施工注意事項及驗收維護重點。", "brief": "- 常用材料包括種子、肥料、保水材、黏著劑、纖維覆蓋材、客土及土壤改良材。\n- 水力噴植適用於坡面土壤尚可、坡度較緩之裸露地；客土噴植適用於土壤貧瘠或岩質坡面。\n- 施工後需注意降雨沖刷、發芽率、覆蓋率、補播補植、灌溉與病蟲害管理。", "detail": "一、材料\n- 種子選擇應配合氣候、坡向、土壤與復育目標。\n- 纖維、黏著劑與保水材可增加附著、保濕並減少降雨沖刷。\n- 客土與改良材可改善貧瘠坡面之發芽基盤。\n\n二、適用條件\n- 水力噴植適合表土條件尚可之坡面。\n- 客土噴植適合岩盤、礫質或肥力不足坡面。\n- 坡度過陡或湧水嚴重時，需先做基礎穩定與排水。\n\n三、驗收維護\n- 檢查覆蓋率、成活率、沖刷溝與裸露斑。\n- 必要時補播、追肥、灌溉、修補排水與補強坡面保護。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "每日練習：坡面植生復育", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "mock-038-植生工程-每日練習八：坡地植物選擇原則", "year": "模擬", "subject": "植生工程", "title": "每日練習八：坡地植物選擇原則", "number": "每日練習八", "question": "坡地植生工程中，請說明草本、灌木與喬木之功能差異，並提出植物選擇原則。", "brief": "- 草本植物建立快，可迅速覆蓋地表、降低雨滴打擊與表面沖蝕。\n- 灌木根系較深，可增加坡面粗糙度與中層固土效果。\n- 喬木具長期生態與景觀功能，但重量、風倒及初期養護需求須評估。", "detail": "一、功能差異\n| 類型 | 主要功能 | 注意事項 |\n|---|---|---|\n| 草本 | 快速覆蓋、防止表土沖蝕 | 需刈割與補播 |\n| 灌木 | 根系固土、增加粗糙度 | 初期需養護 |\n| 喬木 | 長期穩定、生態景觀 | 需考慮風倒與坡體負荷 |\n\n二、選擇原則\n- 優先選擇適地適種、耐旱耐瘠、根系發達且非侵略性強之外來種。\n- 應兼顧發芽速度、覆蓋能力、根系深度、維護成本與生態功能。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "每日練習：植物材料選擇", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "mock-039-植生工程-每日練習九：河岸緩衝帶功能", "year": "模擬", "subject": "植生工程", "title": "每日練習九：河岸緩衝帶功能", "number": "每日練習九", "question": "請說明河岸植生緩衝帶對沖蝕控制、水質保護、生態棲地與維護管理之功能。", "brief": "- 河岸緩衝帶可降低逕流流速、過濾泥砂與營養鹽，減少非點源污染。\n- 根系可穩定岸坡並增加土壤抗沖蝕能力。\n- 植生帶亦提供遮蔭、落葉有機質、棲地與生物廊道，但需避免被集中水流切穿。", "detail": "一、水土保持功能\n- 植生增加地表粗糙度，使逕流減速並促進沉降。\n- 根系提高土壤抗剪與抗沖能力，降低河岸崩塌與側蝕。\n\n二、水質與生態功能\n- 可攔截泥砂、肥料與農藥，降低非點源污染。\n- 提供遮蔭、棲地、廊道及水陸交錯帶生態功能。\n\n三、維護\n- 需定期補植、移除阻塞、避免車輛破壞。\n- 若集中水流穿越，應設分散流或草溝修復。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "每日練習：河岸植生與非點源污染", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-040-水土保持工程-每日練習十：跌水工與消能設施", "year": "模擬", "subject": "水土保持工程", "title": "每日練習十：跌水工與消能設施", "number": "每日練習十", "question": "坡地排水溝出口因高差大而沖刷下游坡腳。請說明跌水工與消能設施設置目的、常見型式及設計注意事項。", "brief": "- 跌水工可分段降低水流能量，避免陡坡排水直接沖刷下游。\n- 常見型式包括階梯式跌水、跌水井、消能池、護坦、砌石或粗糙化渠底。\n- 設計需檢核流量、流速、跌差、尾水、基礎淘刷、出口銜接與維護清淤。", "detail": "一、目的\n- 控制高差，使水流能量分段釋放。\n- 避免排水出口形成沖刷坑、掏空坡腳或破壞下游溝床。\n\n二、型式\n- 階梯式渠道適合長陡坡排水。\n- 消能池與護坦適合排水出口。\n- 砌石、粗糙化或塊石可提高糙率並分散流速。\n\n三、設計注意\n- 需檢核設計流量、容許流速、自由高、尾水條件及基礎保護。\n- 出口不得直接排向未保護土坡，且需留清淤與巡檢空間。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "每日練習：排水出口防沖刷", "points": "20分", "hint": "水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "mock-041-水土保持工程-每日練習十一：擋土牆排水設計", "year": "模擬", "subject": "水土保持工程", "title": "每日練習十一：擋土牆排水設計", "number": "每日練習十一", "question": "請說明擋土牆牆背排水不良對土壓與安定之影響，並列出牆背排水與反濾設計重點。", "brief": "- 排水不良會使牆背水壓增加，水平推力變大，抗滑與抗傾倒安全係數降低。\n- 孔隙水壓升高會降低回填土有效應力與抗剪強度。\n- 應設反濾層、排水層、洩水孔、集排水管、牆頂截水及出口防堵維護。", "detail": "一、安全影響\n- 靜水壓直接增加牆背水平力。\n- 孔隙水壓降低土體有效應力，使抗剪強度下降。\n- 長期滲流也可能帶走細粒，造成背填流失或牆後陷落。\n\n二、排水設計\n- 牆背設透水材料或排水板，配合集排水管導出。\n- 洩水孔需有足夠間距與出口保護。\n- 反濾層需防止細粒流失並避免排水材料堵塞。\n\n三、維護\n- 定期檢查洩水孔是否堵塞、牆面是否滲水、牆後是否沉陷。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "每日練習：擋土牆安全", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "mock-042-水土保持工程-每日練習十二：沉砂池設計與清淤", "year": "模擬", "subject": "水土保持工程", "title": "每日練習十二：沉砂池設計與清淤", "number": "每日練習十二", "question": "請說明沉砂池之功能、容量配置、進出水設計及維護清淤注意事項。", "brief": "- 沉砂池功能為降低流速，使泥砂沉降，減少下游淤積與濁水輸出。\n- 容量需考慮計畫土砂量、清淤頻率、安全餘裕及是否與滯洪共構。\n- 進出口需避免短流、沖刷與堵塞，並保留清淤道路與作業空間。", "detail": "一、功能\n- 沉砂池攔截施工期或坡面逕流所帶出泥砂。\n- 可保護下游排水溝、農地、道路與河道不被淤塞。\n\n二、設計重點\n- 容量依土砂產量、降雨條件與清淤頻率配置。\n- 進水應有消能，池內避免短流，出水口需防止浮渣與泥砂直接排出。\n- 若與滯洪池共構，沉砂容量不得侵占必要滯洪容量。\n\n三、維護\n- 豪雨前後巡檢淤積高度。\n- 清淤道路、棄土去化及安全防護需事先規劃。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "每日練習：沉砂設施", "points": "20分", "hint": "水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "mock-043-水土保持規劃設計-每日練習十三：施工中水土保持防災", "year": "模擬", "subject": "水土保持規劃設計", "title": "每日練習十三：施工中水土保持防災", "number": "每日練習十三", "question": "山坡地開發施工中裸露面積大，請說明施工中水土保持防災之原則、臨時設施與管理重點。", "brief": "- 施工中防災原則為先排水、先沉砂、分區分期施工、裸露面即時保護。\n- 臨時設施包括臨時截水溝、排水溝、沉砂池、土袋、覆蓋、防沖刷出口與臨時滯洪。\n- 管理上需訂定豪雨前巡檢、停工標準、清淤、緊急搶修與監造紀錄。", "detail": "一、防災原則\n- 土方施工前先完成臨時排水與沉砂設施。\n- 避免全區同時裸露，應分區分期施工。\n- 裸露坡面應立即敷蓋、噴植或設臨時保護。\n\n二、臨時設施\n- 上方截水、場內導水、出口消能與末端沉砂需形成連續系統。\n- 土堆應覆蓋並設周邊排水，避免雨水直接沖刷。\n\n三、管理重點\n- 豪雨前清淤檢查，豪雨後修復沖刷。\n- 監造技師應留存巡查、照片與修正紀錄。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "每日練習：施工階段管理", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-044-水土保持規劃設計-每日練習十四：開發基地排水出口審查", "year": "模擬", "subject": "水土保持規劃設計", "title": "每日練習十四：開發基地排水出口審查", "number": "每日練習十四", "question": "水土保持計畫審查時，若基地排水出口銜接既有道路側溝，應檢核哪些項目？請列出理由。", "brief": "- 需檢核既有側溝通水能力、坡度、斷面、淤積狀況及下游瓶頸。\n- 需檢核出口消能、防沖刷、放流位置、地權或管理權責及保全對象。\n- 若開發後洪峰增加，需設滯洪、分流或改善下游排水，不能只看基地內設施。", "detail": "一、水理檢核\n- 檢查側溝是否可承受設計流量與開發後增加逕流。\n- 檢查下游是否有瓶頸、涵管不足、轉彎沖刷或既有淤積。\n\n二、安全檢核\n- 出口須設消能與防沖刷，避免破壞路基或鄰地。\n- 放流點需確認權責、維護單位與保全對象。\n\n三、規劃結論\n- 水土保持計畫不能只證明基地內排水足夠，還要證明下游可安全承受。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "每日練習：計畫審查與下游承受能力", "points": "20分", "hint": "水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-045-水土保持規劃設計-每日練習十五：集水區治理優先順序", "year": "模擬", "subject": "水土保持規劃設計", "title": "每日練習十五：集水區治理優先順序", "number": "每日練習十五", "question": "某集水區同時有上游崩塌、野溪淤積、中游橋涵瓶頸及下游聚落淹水。請說明治理優先順序與規劃策略。", "brief": "- 優先保護生命財產與關鍵基礎設施，先處理下游保全對象及橋涵瓶頸安全。\n- 上游以崩塌地處理、截排水、植生復育與源頭減砂降低土砂供給。\n- 中下游以野溪清淤、固床、防砂、滯洪沉砂、橋涵改善與警戒避難整合。", "detail": "一、問題診斷\n- 上游崩塌代表土砂來源，中游橋涵瓶頸代表輸砂與通洪限制，下游聚落淹水代表保全風險。\n- 治理需由源頭、通道、保全對象三層次分析。\n\n二、優先順序\n- 先確保下游聚落、道路、橋梁等保全對象安全。\n- 再處理橋涵瓶頸與野溪淤積，恢復必要通洪斷面。\n- 長期則做上游崩塌地穩定與植生復育，降低土砂來源。\n\n三、規劃策略\n- 工程措施包括截排水、固床、防砂、護岸、沉砂滯洪與橋涵改善。\n- 非工程措施包括監測預警、避難路線、土地使用管理與定期巡檢清淤。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "每日練習：集水區整體規劃", "points": "25分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-046-土壤物理與沖蝕-題海一：砂土、壤土與黏土之沖蝕特性", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "題海一：砂土、壤土與黏土之沖蝕特性", "number": "題海一", "question": "請比較砂土、壤土與黏土在入滲、保水、抗沖蝕、壓實敏感性及水土保持處理上之差異。", "brief": "- 砂土入滲快但保水保肥差，顆粒易被逕流搬運，需增加有機質與覆蓋。\n- 壤土通常保水、通氣與作物生長較均衡，但裸露坡面仍會產生片蝕與細溝。\n- 黏土保水強但入滲慢、易結皮與壓實，需改善排水、團粒與覆蓋。", "detail": "一、比較\n| 質地 | 入滲 | 保水 | 沖蝕特性 | 對策 |\n|---|---|---|---|---|\n| 砂土 | 快 | 低 | 易搬運、保肥差 | 覆蓋、有機質、草生 |\n| 壤土 | 中 | 中 | 裸露時仍易片蝕 | 等高、覆蓋、排水 |\n| 黏土 | 慢 | 高 | 易結皮、逕流大 | 改良團粒、排水、敷蓋 |\n\n二、作答結論\n- 土壤質地會同時影響入滲、逕流與可蝕性，防治需依土壤特性配置農藝與工程措施。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：土壤質地與沖蝕", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。"}, {"id": "mock-047-土壤物理與沖蝕-題海二：通用土壤流失公式因子說明", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "題海二：通用土壤流失公式因子說明", "number": "題海二", "question": "請說明 USLE 公式 A=RKLSCP 中各因子之意義，並說明水土保持措施如何降低 C 值與 P 值。", "brief": "- R 為降雨沖蝕力，K 為土壤可蝕性，LS 為坡長坡度，C 為覆蓋管理，P 為保育措施。\n- 增加植生、敷蓋、殘株覆蓋與草生可降低 C 值。\n- 等高耕作、平台階段、分散排水、草溝與保育耕作可降低 P 值。", "detail": "一、因子說明\n- `A=RKLSCP`，A 為年平均土壤流失量。\n- R、K、LS 多屬自然或地形條件，C、P 是治理與經營較能控制的因子。\n\n二、降低方式\n- C 值靠覆蓋與管理降低，例如草生、敷蓋、覆蓋作物。\n- P 值靠保育工法降低，例如等高、平台、截排水與草溝。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：USLE 因子", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；USLE 題重點是 A=R K LS C P，並分清楚 C 為覆蓋管理、P 為保育措施效果。"}, {"id": "mock-048-土壤物理與沖蝕-題海三：逕流係數變化與開發衝擊", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "題海三：逕流係數變化與開發衝擊", "number": "題海三", "question": "山坡地開發後不透水面增加，請說明逕流係數上升對洪峰、土壤沖蝕、滯洪與沉砂設計之影響。", "brief": "- 逕流係數上升會使同一降雨下直接逕流增加，洪峰變大且到達時間縮短。\n- 坡面與排水出口流速增加，易造成沖刷、細溝、排水溝破壞及下游淤積。\n- 設計上需增加滯洪、沉砂、消能、防沖刷與下游通水能力檢核。", "detail": "一、水文影響\n- 開發使入滲減少、地表逕流增加，洪峰量與洪峰流速均提高。\n- 集流時間縮短會使排水系統承受更尖銳的洪峰。\n\n二、工程影響\n- 滯洪池削減洪峰，沉砂池攔截施工期與完工後土砂。\n- 排水出口需設消能與護坦，並檢核下游側溝或河道容量。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：開發前後逕流", "points": "20分", "hint": "水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "mock-049-土壤物理與沖蝕-題海四：細溝沖蝕與溝蝕之判別", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "題海四：細溝沖蝕與溝蝕之判別", "number": "題海四", "question": "請比較細溝沖蝕與溝蝕之形成原因、現地特徵、危害及防治方式。", "brief": "- 細溝沖蝕為坡面逕流集中後形成小溝，一般耕作或整平仍可暫時消除。\n- 溝蝕為集中水流長期下切與側蝕形成較大溝槽，通常一般耕作無法消除。\n- 防治需由上游截水、坡面覆蓋、分散逕流、固床跌水、護岸與沉砂配合。", "detail": "一、比較\n| 項目 | 細溝沖蝕 | 溝蝕 |\n|---|---|---|\n| 規模 | 小 | 大且深 |\n| 原因 | 坡面逕流集中 | 長期集中下切與側蝕 |\n| 處理 | 覆蓋、等高、草溝 | 固床、跌水、護岸、沉砂 |\n\n二、結論\n- 若只填平溝槽而不處理來水來源，溝蝕會反覆發生。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：沖蝕型態", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。"}, {"id": "mock-050-土壤物理與沖蝕-題海五：有機質對水土保持之功能", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "題海五：有機質對水土保持之功能", "number": "題海五", "question": "請說明增加土壤有機質對團粒穩定、孔隙、入滲、保水、抗沖蝕與植生復育之影響。", "brief": "- 有機質可促進團粒形成，提高團粒穩定度，減少雨滴打散與表土結皮。\n- 有機質改善孔隙連通與保水能力，使入滲增加、逕流減少。\n- 有機質也能提升肥力與微生物活性，有利植生建立與長期坡面穩定。", "detail": "一、土壤物理功能\n- 提高團粒穩定與孔隙連通，降低容重與壓實危害。\n- 增加入滲與保水，減少超滲逕流。\n\n二、水保功能\n- 減少片蝕與細溝沖蝕。\n- 提升植生發芽與覆蓋速度，是農藝保育的重要基礎。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：土壤改良", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "mock-051-坡地水文學-題海六：集流時間之意義與影響", "year": "模擬", "subject": "坡地水文學", "title": "題海六：集流時間之意義與影響", "number": "題海六", "question": "請說明集流時間之定義、影響因子及其在設計降雨強度與洪峰流量估算上之重要性。", "brief": "- 集流時間為集水區最遠點逕流到達出口所需時間。\n- 受流路長度、坡度、地表粗糙度、土地利用、排水路及逕流型態影響。\n- 合理化公式中設計降雨強度通常取與集流時間相同歷時之強度，集流時間越短洪峰越尖銳。", "detail": "一、定義\n- 集流時間代表整個集水區開始共同貢獻出口流量所需時間。\n- 它是洪峰估算與設計降雨選取的重要參數。\n\n二、影響\n- 開發後不透水面與排水溝增加，常使集流時間縮短。\n- 集流時間縮短會提高設計降雨強度與洪峰流量。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：集流時間", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "mock-052-坡地水文學-題海七：降雨歷線與逕流歷線關係", "year": "模擬", "subject": "坡地水文學", "title": "題海七：降雨歷線與逕流歷線關係", "number": "題海七", "question": "請說明降雨歷線、有效降雨、逕流歷線、洪峰流量與基流之關係。", "brief": "- 降雨扣除截留、入滲、窪蓄等損失後形成有效降雨。\n- 有效降雨經集水區匯流形成直接逕流歷線，歷線最高點為洪峰流量。\n- 河川流量包含直接逕流與基流，坡地地下水與壤中流會影響退水段。", "detail": "一、形成過程\n- 總降雨先經損失扣除，剩餘部分形成有效降雨。\n- 有效降雨透過坡面流、溝渠流與河道流匯集成逕流歷線。\n\n二、判讀重點\n- 洪峰大小受降雨強度、集流時間、土地利用與土壤含水狀態影響。\n- 退水段受基流、地下水與流域儲水控制。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：水文歷線", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "mock-053-坡地水文學-題海八：前期降雨對崩塌之影響", "year": "模擬", "subject": "坡地水文學", "title": "題海八：前期降雨對崩塌之影響", "number": "題海八", "question": "請說明前期降雨如何影響坡地土壤含水量、地下水位、孔隙水壓、逕流反應及崩塌發生機率。", "brief": "- 前期降雨使土壤含水量增加、基質吸力降低，後續降雨較易形成逕流。\n- 地下水位上升與孔隙水壓增加會降低有效應力與抗剪強度。\n- 因此崩塌警戒常需同時考慮短延時強降雨與累積雨量。", "detail": "一、水文影響\n- 土壤接近飽和時入滲容量下降，產流反應加快。\n- 壤中流與地下水補注使坡體含水提高。\n\n二、穩定影響\n- 孔隙水壓升高使有效應力下降。\n- 抗剪強度降低後，安全係數可能小於 1 而發生滑動。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：前期降雨與地下水", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。"}, {"id": "mock-054-坡地水文學-題海九：滯洪與沉砂功能比較", "year": "模擬", "subject": "坡地水文學", "title": "題海九：滯洪與沉砂功能比較", "number": "題海九", "question": "請比較滯洪池與沉砂池之功能、設計指標及維護管理重點。", "brief": "- 滯洪池主要削減洪峰與延緩出流；沉砂池主要降低流速並攔截泥砂。\n- 滯洪設計重點為入出流歷線、允許放流量、容量與溢洪安全。\n- 沉砂設計重點為沉降時間、計畫土砂量、短流防止與清淤空間。", "detail": "一、比較\n| 項目 | 滯洪池 | 沉砂池 |\n|---|---|---|\n| 功能 | 削減洪峰 | 攔截泥砂 |\n| 指標 | 容量、出流、自由高 | 土砂量、沉降、清淤 |\n| 維護 | 出流口、防堵、溢洪 | 清淤、短流、入口消能 |\n\n二、共構提醒\n- 共構時沉砂容量不得侵占必要滯洪容量，並應標示清淤高程。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：水砂管理", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-055-坡地水文學-題海十：地下水排水與邊坡穩定", "year": "模擬", "subject": "坡地水文學", "title": "題海十：地下水排水與邊坡穩定", "number": "題海十", "question": "請說明地下水排水工程對邊坡穩定之作用機制，並列舉常見排水方式。", "brief": "- 地下水排水可降低地下水位與孔隙水壓，提高有效應力及抗剪強度。\n- 常見方式包括水平排水孔、盲溝、集水井、截水溝及坡面排水。\n- 設計需注意反濾、防堵、出水口保護、維修可達性與長期監測。", "detail": "一、作用機制\n- 孔隙水壓下降後，有效應力增加，土體抗剪強度提高。\n- 排水也能減少滲流力與坡面湧水造成的沖刷。\n\n二、工程方式\n- 地表排水攔截外來水。\n- 地下排水降低坡體內水壓。\n- 出水口需安全導排，避免形成新的沖刷源。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：地下水與穩定", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "mock-056-植生工程-題海十一：植生工程施工失敗原因", "year": "模擬", "subject": "植生工程", "title": "題海十一：植生工程施工失敗原因", "number": "題海十一", "question": "坡面植生工程完工後覆蓋率不佳，請分析可能原因並提出改善對策。", "brief": "- 可能原因包括坡面太陡、土壤貧瘠、種子不適地、施工季節不當、降雨沖刷及養護不足。\n- 改善需先穩定坡面與排水，再補充客土、有機質、適地植物與敷蓋保護。\n- 後續應追肥、灌溉、補播補植、修補沖刷溝並檢查排水。", "detail": "一、失敗原因\n- 立地條件不良：土壤薄、肥力低、坡度陡或湧水。\n- 施工條件不當：季節、材料配比、覆蓋厚度或固定不足。\n- 維護不足：缺水、病蟲害、沖刷後未補修。\n\n二、改善對策\n- 先處理排水與坡面穩定，再進行植生。\n- 補客土、保水材、有機質與敷蓋，選用適地植物。\n- 建立養護期巡檢與補植制度。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：植生養護", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "mock-057-植生工程-題海十二：植生護坡與工程護坡配合", "year": "模擬", "subject": "植生工程", "title": "題海十二：植生護坡與工程護坡配合", "number": "題海十二", "question": "請說明植生護坡與格框、擋土、排水等工程設施如何配合，以提高坡面穩定與抗沖蝕能力。", "brief": "- 工程設施提供初期結構穩定與排水控制，植生提供長期覆蓋、根系固土與生態功能。\n- 格框內可填土噴植，擋土牆需設牆背排水，坡面需先導排集中水。\n- 若坡體仍滑動或湧水未處理，單靠植生難以成功。", "detail": "一、配合原則\n- 先穩定坡體與排水，再做植生復育。\n- 工程處理外力與水，植生處理表層沖蝕與長期恢復。\n\n二、常見配置\n- 格框加植生可控制坡面表土。\n- 擋土牆加牆背排水可降低水壓。\n- 截水溝與草溝可避免集中水沖刷植生坡面。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：植生與工程整合", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "mock-058-植生工程-題海十三：原生種與外來種之選用", "year": "模擬", "subject": "植生工程", "title": "題海十三：原生種與外來種之選用", "number": "題海十三", "question": "請比較原生種與外來速生草種在坡地植生工程中之優缺點，並說明選用原則。", "brief": "- 原生種適應本地生態、長期穩定性佳，但初期建立可能較慢。\n- 外來速生草種發芽快、覆蓋迅速，但可能有入侵、生態競爭或後續退化問題。\n- 選用應兼顧初期防蝕、長期演替、生態風險、維護成本與材料取得。", "detail": "一、比較\n| 項目 | 原生種 | 外來速生種 |\n|---|---|---|\n| 優點 | 生態適應佳、長期穩定 | 發芽快、初期覆蓋佳 |\n| 缺點 | 初期較慢 | 入侵或競爭風險 |\n\n二、選用原則\n- 可採初期草本快速覆蓋，後續導入原生草灌木。\n- 避免使用具高入侵風險物種。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：生態植生", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "mock-059-植生工程-題海十四：草溝之功能與設計", "year": "模擬", "subject": "植生工程", "title": "題海十四：草溝之功能與設計", "number": "題海十四", "question": "請說明草溝在坡地水土保持中之功能、適用條件、設計注意與維護管理。", "brief": "- 草溝可導排淺層逕流、降低流速、增加入滲並過濾泥砂。\n- 適用於流量不大、坡度較緩且可維持植生之排水路。\n- 設計需注意縱坡、斷面、容許流速、植生覆蓋及出口消能，維護需修剪補植與清淤。", "detail": "一、功能\n- 草溝兼具排水、減速、沉砂與植生保護功能。\n- 相較硬式溝渠，草溝生態與景觀效果較佳。\n\n二、注意事項\n- 流量過大或坡度過陡時易被切穿，需改採硬式溝或加消能。\n- 需定期修剪、補植與清除淤積。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：草溝與排水", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-060-植生工程-題海十五：植生工程驗收指標", "year": "模擬", "subject": "植生工程", "title": "題海十五：植生工程驗收指標", "number": "題海十五", "question": "請列舉植生工程完工後可用之驗收與成效評估指標，並說明維護管理方法。", "brief": "- 驗收指標包括覆蓋率、成活率、裸露面積、沖刷溝、植物生長勢及排水設施完整性。\n- 成效評估可觀察泥砂流出量、坡面穩定、植生演替與維護需求。\n- 維護包括補播補植、追肥、灌溉、刈割、病蟲害防治及排水修復。", "detail": "一、驗收指標\n- 覆蓋率與成活率是基本量化指標。\n- 裸露斑、沖刷溝與崩落點可反映防蝕是否有效。\n- 排水溝與坡面保護是否完整也應列入檢查。\n\n二、維護方法\n- 乾旱期灌溉、雨季後補修沖刷。\n- 必要時補播、補植、追肥與病蟲害管理。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：驗收與維護", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-061-水土保持工程-題海十六：山邊溝設計重點", "year": "模擬", "subject": "水土保持工程", "title": "題海十六：山邊溝設計重點", "number": "題海十六", "question": "請說明山邊溝之功能、設置位置、設計檢核及常見失敗原因。", "brief": "- 山邊溝設於坡面上方或邊界，用以截排坡外來水，避免逕流進入開發面或農地。\n- 設計需檢核流量、斷面、坡度、流速、自由高、出口消能與下游承受能力。\n- 常見失敗原因為斷面不足、淤塞、出口沖刷、坡度過陡或未定期維護。", "detail": "一、功能與位置\n- 攔截坡外水是山邊溝的主要功能。\n- 位置宜設於開發區或農地上方邊界，並安全導至排水系統。\n\n二、檢核\n- 以設計流量檢核通水能力與容許流速。\n- 出口需消能，避免把災害轉移到下游。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：截排水工程", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "mock-062-水土保持工程-題海十七：野溪清淤工程注意事項", "year": "模擬", "subject": "水土保持工程", "title": "題海十七：野溪清淤工程注意事項", "number": "題海十七", "question": "野溪淤積影響通洪，請說明清淤前調查、施工注意及後續治理配套。", "brief": "- 清淤前需調查淤積範圍、粒徑、通洪瓶頸、橋涵基礎、保全對象與棄土去化。\n- 施工需注意臨時導流、濁水控制、不得任意深挖與避免破壞固床護岸基礎。\n- 後續應做源頭減砂、固床、防砂、護岸、沉砂與定期巡檢清淤制度。", "detail": "一、清淤前調查\n- 確認淤積高程、河床坡降、橋涵斷面與基礎安全。\n- 棄土位置不可影響河道或再被沖回。\n\n二、施工與配套\n- 不宜過度下挖，避免造成床面不穩與基礎淘刷。\n- 清淤只是恢復通洪，長期仍需處理上游土砂來源。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：野溪治理", "points": "20分", "hint": "野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-063-水土保持工程-題海十八：石籠工程之功能與限制", "year": "模擬", "subject": "水土保持工程", "title": "題海十八：石籠工程之功能與限制", "number": "題海十八", "question": "請說明石籠在護岸、護腳或擋土工程中之優點、限制與設計施工注意事項。", "brief": "- 石籠具透水、柔性、可適應小變形及施工快速等優點。\n- 可用於護岸、護腳、坡腳保護、消能及低矮擋土。\n- 限制包括鋼線腐蝕、基礎淘刷、填石粒徑不當、變形過大及維護需求。", "detail": "一、優點\n- 透水性佳，可降低水壓。\n- 柔性構造可適應不均勻沉陷，並提供孔隙生態空間。\n\n二、注意事項\n- 基礎需防淘刷，必要時設護坦或埋入。\n- 填石粒徑、網材防蝕與綁紮品質會影響耐久性。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：柔性構造物", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "mock-064-水土保持工程-題海十九：農路排水改善", "year": "模擬", "subject": "水土保持工程", "title": "題海十九：農路排水改善", "number": "題海十九", "question": "坡地農路豪雨時成為集中逕流路徑並沖刷路基，請提出水土保持改善方法。", "brief": "- 農路應設路側溝、橫向排水、集水井、出口消能與沉砂設施。\n- 路面應避免長距離集中排水，可分段排放至穩定排水路。\n- 邊坡需護坡、植生、擋土或石籠護腳，並定期清淤巡檢。", "detail": "一、問題\n- 農路截集坡面水後，若未分段排放，常形成高速集中流。\n- 出口無消能會沖刷路基與下邊坡。\n\n二、對策\n- 設側溝與橫向排水，縮短集水長度。\n- 出口設跌水、消能、護坦或砌石。\n- 配合沉砂池與植生護坡。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：農路水保", "points": "20分", "hint": "水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "mock-065-水土保持工程-題海二十：固床工配置原則", "year": "模擬", "subject": "水土保持工程", "title": "題海二十：固床工配置原則", "number": "題海二十", "question": "請說明固床工之功能、配置原則、設計注意事項及可能造成之下游沖刷問題。", "brief": "- 固床工功能為控制溪床下切、穩定縱坡、保護橋梁或護岸基礎。\n- 配置需考慮溪床坡降、沖刷深度、兩岸銜接、上下游落差與系列化布置。\n- 若未設消能與護坦，固床工下游可能形成跌水沖刷與淘刷坑。", "detail": "一、功能\n- 固定床面高程，防止下切向上游延伸。\n- 保護橋墩、護岸基礎與坡腳。\n\n二、注意事項\n- 壩下需設護坦或消能，避免局部沖刷。\n- 兩岸銜接需防繞流，基礎需埋入穩定層。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：溪床穩定", "points": "20分", "hint": "野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "mock-066-水土保持規劃設計-題海二十一：水土保持計畫審查重點", "year": "模擬", "subject": "水土保持規劃設計", "title": "題海二十一：水土保持計畫審查重點", "number": "題海二十一", "question": "請說明水土保持計畫審查時，應從哪些面向判斷其設計是否完整且安全。", "brief": "- 需審查基地條件、坡度地質、排水系統、沉砂滯洪、邊坡穩定、植生及施工中防災。\n- 水文與土砂計算需有合理參數、設計流量、容量檢核及下游承受能力。\n- 圖說、施工順序、維護管理、監測與緊急應變也必須完整。", "detail": "一、技術審查\n- 看水文、土砂、邊坡與排水計算是否合理。\n- 確認設施位置、尺寸、容量與上下游銜接。\n\n二、管理審查\n- 施工中臨時防災、維護清淤、巡檢與監造紀錄需明確。\n- 下游保全對象與承受能力不可忽略。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：計畫審查", "points": "25分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-067-水土保持規劃設計-題海二十二：土地利用變更與水保風險", "year": "模擬", "subject": "水土保持規劃設計", "title": "題海二十二：土地利用變更與水保風險", "number": "題海二十二", "question": "坡地由林地變更為露營區或休閒農場，可能增加哪些水土保持風險？請提出規劃對策。", "brief": "- 風險包括植生移除、裸露地沖蝕、不透水面增加、逕流集中、邊坡開挖及道路排水問題。\n- 對策包括降低開發強度、保留植生緩衝帶、分區施工、滯洪沉砂、截排水與坡面保護。\n- 需檢核下游排水承受能力、緊急避難、維護管理與豪雨後巡查。", "detail": "一、風險\n- 土地覆蓋改變會提高逕流係數與土砂輸出。\n- 道路與平台常形成集中排水，增加沖刷與淹水風險。\n\n二、規劃對策\n- 保留原有植生與河岸緩衝帶。\n- 設置排水、滯洪、沉砂、護坡與施工中臨時防災。\n- 建立維護、巡查與災害應變。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：坡地開發", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-068-水土保持規劃設計-題海二十三：保全對象與風險排序", "year": "模擬", "subject": "水土保持規劃設計", "title": "題海二十三：保全對象與風險排序", "number": "題海二十三", "question": "請說明水土保持治理規劃中如何辨識保全對象，並依風險排序決定治理優先順序。", "brief": "- 保全對象包括住戶、道路、橋梁、學校、公共設施、農地、水源及下游聚落。\n- 風險可由危害度、暴露度與脆弱度評估。\n- 優先治理高危害、高暴露且避難困難之區位，並兼顧工程可行性與維護能力。", "detail": "一、辨識保全對象\n- 利用現地調查、地籍、航照、災害紀錄與訪談確認影響範圍。\n- 保全對象不只住戶，也包括道路、橋涵與重要公共設施。\n\n二、風險排序\n- 危害度代表災害發生可能與規模。\n- 暴露度代表人與設施是否位於影響區。\n- 脆弱度代表承受與避難能力。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：風險評估", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-069-水土保持規劃設計-題海二十四：完工後維護管理計畫", "year": "模擬", "subject": "水土保持規劃設計", "title": "題海二十四：完工後維護管理計畫", "number": "題海二十四", "question": "請說明水土保持設施完工後維護管理計畫應包含哪些內容，並說明其重要性。", "brief": "- 內容應包含巡檢頻率、清淤、植生養護、排水檢查、滯洪沉砂容量檢查及災後修復。\n- 需明確管理單位、紀錄方式、異常通報、預算與責任分工。\n- 水土保持設施若缺乏維護，常因淤塞、堵塞、沖刷或植生退化而失效。", "detail": "一、計畫內容\n- 排水溝、沉砂池、滯洪池、護岸、擋土牆與植生坡面均需定期巡檢。\n- 豪雨前後應加強清淤、修補與安全檢查。\n\n二、重要性\n- 水保設施是長期運作系統，不是完工即結束。\n- 維護不足會讓小問題累積成災害。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：維護管理", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-070-水土保持規劃設計-題海二十五：氣候變遷下坡地水保調適", "year": "模擬", "subject": "水土保持規劃設計", "title": "題海二十五：氣候變遷下坡地水保調適", "number": "題海二十五", "question": "面對極端降雨增加，坡地水土保持規劃應如何調整設計與管理策略？", "brief": "- 應檢討設計降雨、洪峰流量、滯洪沉砂容量、排水自由高與溢洪安全。\n- 規劃上需增加韌性，包括分散排水、保留滯洪空間、源頭減砂與生態緩衝。\n- 管理上需強化監測預警、巡檢維護、避難計畫與災後快速修復。", "detail": "一、設計調整\n- 檢討降雨強度與重現期假設。\n- 排水與滯洪設施需考慮超設計事件之安全溢流路徑。\n\n二、管理調適\n- 建立雨量、水位、位移與土砂監測。\n- 加強土地使用管制、保全對象避難與維護管理。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "題海戰術：氣候變遷調適", "points": "25分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-071-土壤物理與沖蝕-題海土壤第001題：USLE 覆蓋改善計算", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "題海土壤第001題：USLE 覆蓋改善計算", "number": "題海土壤第001題", "question": "某坡面 R=525、K=0.027、LS=1.35，裸露時 C=1.0、P=1.0。若改採草生覆蓋 C=0.05，並配合等高處理 P=0.55，試以 USLE 計算改善前後年土壤流失量及減少率。", "brief": "- 改善前 A0=R K LS C P=525×0.027×1.35×1×1=19.14 ton/ha/yr。\n- 改善後 A1=525×0.027×1.35×0.05×0.55=0.53 ton/ha/yr。\n- 減少率=(A0-A1)/A0×100%=97.2%，顯示覆蓋與等高處理可大幅降低坡面沖蝕。", "detail": "一、公式\n- USLE：`A = R K LS C P`。\n- C 代表覆蓋管理，P 代表保育措施，兩者是坡地經營最能調整的因子。\n\n二、計算\n- `A0 = 19.14 ton/ha/yr`。\n- `A1 = 0.53 ton/ha/yr`。\n- `減少率 = 97.2%`。\n\n三、工程判讀\n- 答案需補上單位與防治效果；若仍高於容許流失量，應再加強覆蓋、截排水、平台或沉砂設施。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；USLE 題重點是 A=R K LS C P，並分清楚 C 為覆蓋管理、P 為保育措施效果。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "mock-072-土壤物理與沖蝕-題海土壤第002題：含水量、容重與孔隙率", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "題海土壤第002題：含水量、容重與孔隙率", "number": "題海土壤第002題", "question": "以體積 110 cm3 之採土環取得濕土重 188 g，烘乾後乾土重 151 g，土粒密度 2.65 g/cm3。試求質量含水量、容重、孔隙率與體積含水量，並說明水土保持意義。", "brief": "- 水重=37 g，質量含水量 w=37/151=24.5%。\n- 容重 ρb=151/110=1.37 g/cm3；孔隙率 n=1-ρb/ρs=48.2%。\n- 體積含水量 θv=37/110=33.6%；容重偏高時代表壓實、入滲降低且逕流沖蝕風險提高。", "detail": "一、計算表\n| 項目 | 公式 | 結果 |\n|---|---:|---:|\n| 質量含水量 | `37/151` | `24.5%` |\n| 容重 | `151/110` | `1.37 g/cm3` |\n| 孔隙率 | `1-1.37/2.65` | `48.2%` |\n| 體積含水量 | `37/110` | `33.6%` |\n\n二、水保意義\n- 容重與孔隙率可判斷壓實程度、入滲能力與根系環境。\n- 坡地若容重高且孔隙率低，降雨較易形成地表逕流與細溝沖蝕。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "mock-073-土壤物理與沖蝕-題海土壤第003題：雨滴打擊與表土結皮", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "題海土壤第003題：雨滴打擊與表土結皮", "number": "題海土壤第003題", "question": "請說明「雨滴打擊與表土結皮」在坡地水土保持上的意義，並提出可行防治或改善方法。", "brief": "- 雨滴動能會打散團粒，使細粒堵塞孔隙形成結皮，入滲下降後逕流增加。\n- 以敷蓋、草生、植生毯與施工期覆蓋降低雨滴能量。\n- 作答時應由作用機制、現地徵象、工程或農藝對策及維護管理四面向回答。", "detail": "一、作用機制\n- 雨滴動能會打散團粒，使細粒堵塞孔隙形成結皮，入滲下降後逕流增加。\n- 應說明其如何影響入滲、逕流、剪應力或土粒剝離。\n\n二、防治方法\n- 以敷蓋、草生、植生毯與施工期覆蓋降低雨滴能量。\n- 必要時配合沉砂、消能及豪雨後巡檢。\n\n三、結論\n- 坡面沖蝕防治應先源頭減砂，再控制逕流，最後處理輸出泥砂。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "mock-074-土壤物理與沖蝕-題海土壤第004題：砂土、壤土與黏土沖蝕特性", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "題海土壤第004題：砂土、壤土與黏土沖蝕特性", "number": "題海土壤第004題", "question": "請說明「砂土、壤土與黏土沖蝕特性」在坡地水土保持上的意義，並提出可行防治或改善方法。", "brief": "- 砂土入滲快但保水差；壤土性質均衡；黏土易結皮且逕流大。\n- 依質地配置覆蓋、有機質、排水與草生措施。\n- 作答時應由作用機制、現地徵象、工程或農藝對策及維護管理四面向回答。", "detail": "一、作用機制\n- 砂土入滲快但保水差；壤土性質均衡；黏土易結皮且逕流大。\n- 應說明其如何影響入滲、逕流、剪應力或土粒剝離。\n\n二、防治方法\n- 依質地配置覆蓋、有機質、排水與草生措施。\n- 必要時配合沉砂、消能及豪雨後巡檢。\n\n三、結論\n- 坡面沖蝕防治應先源頭減砂，再控制逕流，最後處理輸出泥砂。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "mock-075-土壤物理與沖蝕-題海土壤第005題：細溝沖蝕與溝蝕比較", "year": "模  "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-121-土壤物理與沖蝕-題海土壤第051題：USLE 覆蓋改善計算", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "題海土壤第051題：USLE 覆蓋改善計算", "number": "題海土壤第051題", "question": "某坡面 R=650、K=0.027、LS=2.10，裸露時 C=1.0、P=1.0。若改採草生覆蓋 C=0.04，並配合等高處理 P=0.60，試以 USLE 計算改善前後年土壤流失量及減少率。", "brief": "- 改善前 A0=R K LS C P=650×0.027×2.10×1×1=36.85 ton/ha/yr。\n- 改善後 A1=650×0.027×2.10×0.04×0.60=0.88 ton/ha/yr。\n- 減少率=(A0-A1)/A0×100%=97.6%，顯示覆蓋與等高處理可大幅降低坡面沖蝕。", "detail": "一、公式\n- USLE：`A = R K LS C P`。\n- C 代表覆蓋管理，P 代表保育措施，兩者是坡地經營最能調整的因子。\n\n二、計算\n- `A0 = 36.85 ton/ha/yr`。\n- `A1 = 0.88 ton/ha/yr`。\n- `減少率 = 97.6%`。\n\n三、工程判讀\n- 答案需補上單位與防治效果；若仍高於容許流失量，應再加強覆蓋、截排水、平台或沉砂設施。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；USLE 題重點是 A=R K LS C P，並分清楚 C 為覆蓋管理、P 為保育措施效果。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "mock-122-土壤物理與沖蝕-題海土壤第052題：含水量、容重與孔隙率", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "題海土壤第052題：含水量、容重與孔隙率", "number": "題海土壤第052題", "question": "以體積 160 cm3 之採土環取得濕土重 228 g，烘乾後乾土重 181 g，土粒密度 2.65 g/cm3。試求質量含水量、容重、孔隙率與體積含水量，並說明水土保持意義。", "brief": "- 水重=47 g，質量含水量 w=47/181=26.0%。\n- 容重 ρb=181/160=1.13 g/cm3；孔隙率 n=1-ρb/ρs=57.3%。\n- 體積含水量 θv=47/160=29.4%；容重偏高時代表壓實、入滲降低且逕流沖蝕風險提高。", "detail": "一、計算表\n| 項目 | 公式 | 結果 |\n|---|---:|---:|\n| 質量含水量 | `47/181` | `26.0%` |\n| 容重 | `181/160` | `1.13 g/cm3` |\n| 孔隙率 | `1-1.13/2.65` | `57.3%` |\n| 體積含水量 | `47/160` | `29.4%` |\n\n二、水保意義\n- 容重與孔隙率可判斷壓實程度、入滲能力與根系環境。\n- 坡地若容重高且孔隙率低，降雨較易形成地表逕流與細溝沖蝕。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "mock-123-土壤物理與沖蝕-題海土壤第053題：雨滴打擊與表土結皮", "year": "模擬", "subject": "土壤物理與沖蝕", "title": "題海土壤第053題：雨滴打擊與表土結皮", "number": "題海土壤第053題", "question": "請說明「雨滴打擊與表土結皮」在坡地水土保持上的意義，並 文第002題：滯洪池水量平衡", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第002題：滯洪池水量平衡", "number": "題海水文第002題", "question": "某滯洪池暴雨期間平均入流 0.88 cms，平均出流 0.49 cms，歷時 1.75 小時，池面降雨直接增加 340 m3，蒸發滲漏忽略。試估算暫存容量。", "brief": "- 入出流差=0.88-0.49=0.39 cms。\n- 暫存量=(0.39)×1.75×3600+340=2797 m3。\n- 設計上仍需加自由高、沉砂容量、溢洪路與出口防堵檢核。", "detail": "一、公式\n- `ΔS=(Qin-Qout)t + P池面 - 損失`。\n- 本題損失忽略。\n\n二、計算與判讀\n- `ΔS=2797 m3`。\n- 若為水土保持計畫，應另以入出流歷線檢核洪峰削減效果。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "mock-173-坡地水文學-題海水文第003題：集流時間", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第003題：集流時間", "number": "題海水文第003題", "question": "請說明「集流時間」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 集水區最遠點逕流到達出口所需時間，會影響設計降雨強度與洪峰流量。\n- 開發後不透水面與排水溝增加常使集流時間縮短。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 集水區最遠點逕流到達出口所需時間，會影響設計降雨強度與洪峰流量。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 開發後不透水面與排水溝增加常使集流時間縮短。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-174-坡地水文學-題海水文第004題：超滲逕流與飽和逕流", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第004題：超滲逕流與飽和逕流", "number": "題海水文第004題", "question": "請說明「超滲逕流與飽和逕流」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 超滲逕流由降雨強度大於入滲率造成，飽和逕流由土壤蓄水已滿造成。\n- 二者都會增加洪峰與坡面沖蝕，但形成位置與治理重點不同。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 超滲逕流由降雨強度大於入滲率造成，飽和逕流由土壤蓄水已滿造成。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 二者都會增加洪峰與坡面沖蝕，但形成位置與治理重點不同。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-175-坡地水文學-題海水文第005題：壤中流與崩塌", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第005題：壤中流與崩塌", "number": "題海水文第005題", "question": "請說明「壤中流與崩塌」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 壤中流沿土層界面側向流動，可能提高坡體含水與孔隙水壓。\n- 需配合地下排水、截水與地下水監測。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 壤中流沿土層界面側向流動，可能提高坡體含水與孔隙水壓。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 需配合地下排水、截水與地下水監測。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-176-坡地水文學-題海水文第006題：前期降雨指數", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第006題：前期降雨指數", "number": "題海水文第006題", "question": "請說明「前期降雨指數」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 前期降雨會提高土壤含水量，使後續降雨更容易產生逕流與崩塌。\n- 警戒管理需同時看短延時強降雨與累積雨量。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 前期降雨會提高土壤含水量，使後續降雨更容易產生逕流與崩塌。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 警戒管理需同時看短延時強降雨與累積雨量。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-177-坡地水文學-題海水文第007題：雙累積曲線", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第007題：雙累積曲線", "number": "題海水文第007題", "question": "請說明「雙累積曲線」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 雙累積曲線用於檢查雨量或流量資料一致性。\n- 斜率改變可能代表儀器、環境或觀測方式改變。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 雙累積曲線用於檢查雨量或流量資料一致性。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 斜率改變可能代表儀器、環境或觀測方式改變。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-178-坡地水文學-題海水文第008題：基流與退水段", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第008題：基流與退水段", "number": "題海水文第008題", "question": "請說明「基流與退水段」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 基流來自地下水或壤中流補注，控制河川退水段。\n- 退水慢代表流域儲水或地下水補注較強。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 基流來自地下水或壤中流補注，控制河川退水段。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 退水慢代表流域儲水或地下水補注較強。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-179-坡地水文學-題海水文第009題：滯洪與沉砂差異", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第009題：滯洪與沉砂差異", "number": "題海水文第009題", "question": "請說明「滯洪與沉砂差異」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 滯洪削減洪峰，沉砂攔截泥砂。\n- 共構時沉砂容量不得侵占必要滯洪容量。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 滯洪削減洪峰，沉砂攔截泥砂。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 共構時沉砂容量不得侵占必要滯洪容量。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-180-坡地水文學-題海水文第010題：地下水排水", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第010題：地下水排水", "number": "題海水文第010題", "question": "請說明「地下水排水」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 降低地下水位與孔隙水壓可提高有效應力與邊坡安全。\n- 需注意反濾、防堵、出口保護與維修可達性。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 降低地下水位與孔隙水壓可提高有效應力與邊坡安全。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 需注意反濾、防堵、出口保護與維修可達性。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-181-坡地水文學-題海水文第011題：合理化公式洪峰流量", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第011題：合理化公式洪峰流量", "number": "題海水文第011題", "question": "某小集水區面積 18 ha，逕流係數 C=0.41，設計降雨強度 I=70 mm/hr。試以合理化公式計算洪峰流量，並說明適用限制。", "brief": "- `Q=CIA/360=0.41×70×18/360=1.44 cms`。\n- 合理化公式適用於小集水區，且降雨歷時應不小於集流時間。\n- 正式設計仍應檢核下游通水能力、出口消能與安全自由高。", "detail": "一、計算\n- `Q = 1.44 cms`。\n- A 採 ha、I 採 mm/hr 時分母為 360。\n\n二、限制\n- 假設降雨均勻且整個集水區同時貢獻逕流。\n- 大型集水區、滯洪演算或空間降雨差異大時不宜單獨使用。" 坡地水文學", "title": "題海水文第018題：基流與退水段", "number": "題海水文第018題", "question": "請說明「基流與退水段」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 基流來自地下水或壤中流補注，控制河川退水段。\n- 退水慢代表流域儲水或地下水補注較強。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 基流來自地下水或壤中流補注，控制河川退水段。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 退水慢代表流域儲水或地下水補注較強。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-189-坡地水文學-題海水文第019題：滯洪與沉砂差異", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第019題：滯洪與沉砂差異", "number": "題海水文第019題", "question": "請說明「滯洪與沉砂差異」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 滯洪削減洪峰，沉砂攔截泥砂。\n- 共構時沉砂容量不得侵占必要滯洪容量。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 滯洪削減洪峰，沉砂攔截泥砂。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 共構時沉砂容量不得侵占必要滯洪容量。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-190-坡地水文學-題海水文第020題：地下水排水", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第020題：地下水排水", "number": "題海水文第020題", "question": "請說明「地下水排水」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 降低地下水位與孔隙水壓可提高有效應力與邊坡安全。\n- 需注意反濾、防堵、出口保護與維修可達性。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 降低地下水位與孔隙水壓可提高有效應力與邊坡安全。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 需注意反濾、防堵、出口保護與維修可達性。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-191-坡地水文學-題海水文第021題：合理化公式洪峰流量", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第021題：合理化公式洪峰流量", "number": "題海水文第021題", "question": "某小集水區面積 21 ha，逕流係數 C=0.44，設計降雨強度 I=75 mm/hr。試以合理化公式計算洪峰流量，並說明適用限制。", "brief": "- `Q=CIA/360=0.44×75×21/360=1.92 cms`。\n- 合理化公式適用於小集水區，且降雨歷時應不小於集流時間。\n- 正式設計仍應檢核下游通水能力、出口消能與安全自由高。", "detail": "一、計算\n- `Q = 1.92 cms`。\n- A 採 ha、I 採 mm/hr 時分母為 360。\n\n二、限制\n- 假設降雨均勻且整個集水區同時貢獻逕流。\n- 大型集水區、滯洪演算或空間降雨差異大時不宜單獨使用。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；USLE 題重點是 A=R K LS C P，並分清楚 C 為覆蓋管理、P 為保育措施效果。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-192-坡地水文學-題海水文第022題：滯洪池水量平衡", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第022題：滯洪池水量平衡", "number": "題海水文第022題", "question": "某滯洪池暴雨期間平均入流 1.04 cms，平均出流 0.57 cms，歷時 2.25 小時，池面降雨直接增加 420 m3，蒸發滲漏忽略。試估算暫存容量。", "brief": "- 入出流差=1.04-0.57=0.47 cms。\n- 暫存量=(0.47)×2.25×3600+420=4227 m3。\n- 設計上仍需加自由高、沉砂容量、溢洪路與出口防堵檢核。", "detail": "一、公式\n- `ΔS=(Qin-Qout)t + P池面 - 損失`。\n- 本題損失忽略。\n\n二、計算與判讀\n- `ΔS=4227 m3`。\n- 若為水土保持計畫，應另以入出流歷線檢核洪峰削減效果。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "mock-193-坡地水文學-題海水文第023題：集流時間", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第023題：集流時間", "number": "題海水文第023題", "question": "請說明「集流時間」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 集水區最遠點逕流到達出口所需時間，會影響設計降雨強度與洪峰流量。\n- 開發後不透水面與排水溝增加常使集流時間縮短。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 集水區最遠點逕流到達出口所需時間，會影響設計降雨強度與洪峰流量。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 開發後不透水面與排水溝增加常使集流時間縮短。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-194-坡地水文學-題海水文第024題：超滲逕流與飽和逕流", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第024題：超滲逕流與飽和逕流", "number": "題海水文第024題", "question": "請說明「超滲逕流與飽和逕流」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 超滲逕流由降雨強度大於入滲率造成，飽和逕流由土壤蓄水已滿造成。\n- 二者都會增加洪峰與坡面沖蝕，但形成位置與治理重點不同。\n- 作答時應 、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-198-坡地水文學-題海水文第028題：基流與退水段", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第028題：基流與退水段", "number": "題海水文第028題", "question": "請說明「基流與退水段」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 基流來自地下水或壤中流補注，控制河川退水段。\n- 退水慢代表流域儲水或地下水補注較強。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 基流來自地下水或壤中流補注，控制河川退水段。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 退水慢代表流域儲水或地下水補注較強。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-199-坡地水文學-題海水文第029題：滯洪與沉砂差異", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第029題：滯洪與沉砂差異", "number": "題海水文第029題", "question": "請說明「滯洪與沉砂差異」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 滯洪削減洪峰，沉砂攔截泥砂。\n- 共構時沉砂容量不得侵占必要滯洪容量。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 滯洪削減洪峰，沉砂攔截泥砂。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 共構時沉砂容量不得侵占必要滯洪容量。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-200-坡地水文學-題海水文第030題：地下水排水", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第030題：地下水排水", "number": "題海水文第030題", "question": "請說明「地下水排水」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 降低地下水位與孔隙水壓可提高有效應力與邊坡安全。\n- 需注意反濾、防堵、出口保護與維修可達性。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 降低地下水位與孔隙水壓可提高有效應力與邊坡安全。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 需注意反濾、防堵、出口保護與維修可達性。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "水理工程題要交代通水能力、安全高、 , "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-249-坡地水文學-題海水文第079題：滯洪與沉砂差異", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第079題：滯洪與沉砂差異", "number": "題海水文第079題", "question": "請說明「滯洪與沉砂差異」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 滯洪削減洪峰，沉砂攔截泥砂。\n- 共構時沉砂容量不得侵占必要滯洪容量。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 滯洪削減洪峰，沉砂攔截泥砂。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 共構時沉砂容量不得侵占必要滯洪容量。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-250-坡地水文學-題海水文第080題：地下水排水", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第080題：地下水排水", "number": "題海水文第080題", "question": "請說明「地下水排水」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 降低地下水位與孔隙水壓可提高有效應力與邊坡安全。\n- 需注意反濾、防堵、出口保護與維修可達性。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 降低地下水位與孔隙水壓可提高有效應力與邊坡安全。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 需注意反濾、防堵、出口保護與維修可達性。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-251-坡地水文學-題海水文第081題：合理化公式洪峰流量", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第081題：合理化公式洪峰流量", "number": "題海水文第081題", "question": "某小集水區面積 39 ha，逕流係數 C=0.38，設計降雨強度 I=105 mm/hr。試以合理化公式計算洪峰流量，並說明適用限制。", "brief": "- `Q=CIA/360=0.38×105×39/360=4.32 cms`。\n- 合理化公式適用於小集水區，且降雨歷時應不小於集流時間。\n- 正式設計仍應檢核下游通水能力、出口消能與安全自由高。", "detail": "一、計算\n- `Q = 4.32 cms`。\n- A 採 ha、I 採 mm/hr 時分母為 360。\n\n二、限制\n- 假設降雨均勻且整個集水區同時貢獻逕流。\n- 大型集水區、滯洪演算或空間降雨差異大時不宜單獨使用。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；USLE 題重點是 A=R K LS C P，並分清楚 C 為覆蓋管理、P 為保育措施效果。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-252-坡地水文學-題海水文第082題：滯洪池水量平衡", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第082題：滯洪池水量平衡", "number": "題海水文第082題", "question": "某滯洪池暴雨期間平均入流 1.52 cms，平均出流 0.81 cms，歷時 2.50 小時，池面降雨直接增加 660 m3，蒸發滲漏忽略。試估算暫存容量。", "brief": "- 入出流差=1.52-0.81=0.71 cms。\n- 暫存量=(0.71)×2.50×3600+660=7050 m3。\n- 設計上仍需加自由高、沉砂容量、溢洪路與出口防堵檢核。", "detail": "一、公式\n- `ΔS=(Qin-Qout)t + P池面 - 損失`。\n- 本題損失忽略。\n\n二、計算與判讀\n- `ΔS=7050 m3`。\n- 若為水土保持計畫，應另以入出流歷線檢核洪峰削減效果。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "mock-253-坡地水文學-題海水文第083題：集流時間", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第083題：集流時間", "number": "題海水文第083題", "question": "請說明「集流時間」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 集水區最遠點逕流到達出口所需時間，會影響設計降雨強度與洪峰流量。\n- 開發後不透水面與排水溝增加常使集流時間縮短。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 集水區最遠點逕流到達出口所需時間，會影響設計降雨強度與洪峰流量。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 開發後不透水面與排水溝增加常使集流時間縮短。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-254-坡地水文學-題海水文第084題：超滲逕流與飽和逕流", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第084題：超滲逕流與飽和逕流", "number": "題海水文第084題", "question": "請說明「超滲逕流與飽和逕流」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 超滲逕流由降雨強度大於入滲率造成，飽和逕流由土壤蓄水已滿造成。\n- 二者都會增加洪峰與坡面沖蝕，但形成位置與治理重點不同。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 超滲逕流由降雨強度大於入滲率造成，飽和逕流由土壤蓄水已滿造成。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 二者都會增加洪峰與坡面沖蝕，但形成位置與治理重點不同。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-255-坡地水文學-題海水文第085題：壤中流與崩塌", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第085題：壤中流與崩塌", "number": "題海水文第085題", "question": "請說明「壤中流與崩塌」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 壤中流沿土層界面側向流動，可能提高坡體含水與孔隙水壓。\n- 需配合地下排水、截水與地下水監測。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 壤中流沿土層界面側向流動，可能提高坡體含水與孔隙水壓。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 需配合地下排水、截水與地下水監測。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-256-坡地水文學-題海水文第086題：前期降雨指數", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第086題：前期降雨指數", "number": "題海水文第086題", "question": "請說明「前期降雨指數」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 前期降雨會提高土壤含水量，使後續降雨更容易產生逕流與崩塌。\n- 警戒管理需同時看短延時強降雨與累積雨量。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 前期降雨會提高土壤含水量，使後續降雨更容易產生逕流與崩塌。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 警戒管理需同時看短延時強降雨與累積雨量。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-257-坡地水文學-題海水文第087題：雙累積曲線", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第087題：雙累積曲線", "number": "題海水文第087題", "question": "請說明「雙累積曲線」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 雙累積曲線用於檢查雨量或流量資料一致性。\n- 斜率改變可能代表儀器、環境或觀測方式改變。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 雙累積曲線用於檢查雨量或流量資料一致性。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 斜率改變可能代表儀器、環境或觀測方式改變。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-258-坡地水文學-題海水文第088題：基流與退水段", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第088題：基流與退水段", "number": "題海水文第088題", "question": "請說明「基流與退水段」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 基流來自地下水或壤中流補注，控制河川退水段。\n- 退水慢代表流域儲水或地下水補注較強。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 基流來自地下水或壤中流補注，控制河川退水段。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 退水慢代表流域儲水或地下水補注較強。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-259-坡地水文學-題海水文第089題：滯洪與沉砂差異", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第089題：滯洪與沉砂差異", "number": "題海水文第089題", "question": "請說明「滯洪與沉砂差異」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 滯洪削減洪峰，沉砂攔截泥砂。\n- 共構時沉砂容量不得侵占必要滯洪容量。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 滯洪削減洪峰，沉砂攔截泥砂。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 共構時沉砂容量不得侵占必要滯洪容量。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-260-坡地水文學-題海水文第090題：地下水排水", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第090題：地下水排水", "number": "題海水文第090題", "question": "請說明「地下水排水」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 降低地下水位與孔隙水壓可提高有效應力與邊坡安全。\n- 需注意反濾、防堵、出口保護與維修可達性。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 降低地下水位與孔隙水壓可提高有效應力與邊坡安全。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 需注意反濾、防堵、出口保護與維修可達性。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-261-坡地水文學-題海水文第091題：合理化公式洪峰流量", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第091題：合理化公式洪峰流量", "number": "題海水文第091題", "question": "某小集水區面積 42 ha，逕流係數 C=0.41，設計降雨強度 I=110 mm/hr。試以合理化公式計算洪峰流量，並說明適用限制。", "brief": "- `Q=CIA/360=0.41×110×42/360=5.26 cms`。\n- 合理化公式適用於小集水區，且降雨歷時應不小於集流時間。\n- 正式設計仍應檢核下游通水能力、出口消能與安全自由高。", "detail": "一、計算\n- `Q = 5.26 cms`。\n- A 採 ha、I 採 mm/hr 時分母為 360。\n\n二、限制\n- 假設降雨均勻且整個集水區同時貢獻逕流。\n- 大型集水區、滯洪演算或空間降雨差異大時不宜單獨使用。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；USLE 題重點是 A=R K LS C P，並分清楚 C 為覆蓋管理、P 為保育措施效果。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-262-坡地水文學-題海水文第092題：滯洪池水量平衡", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第092題：滯洪池水量平衡", "number": "題海水文第092題", "question": "某滯洪池暴雨期間平均入流 1.60 cms，平均出流 0.85 cms，歷時 1.50 小時，池面降雨直接增加 700 m3，蒸發滲漏忽略。試估算暫存容量。", "brief": "- 入出流差=1.60-0.85=0.75 cms。\n- 暫存量=(0.75)×1.50×3600+700=4750 m3。\n- 設計上仍需加自由高、沉砂容量、溢洪路與出口防堵檢核。", "detail": "一、公式\n- `ΔS=(Qin-Qout)t + P池面 - 損失`。\n- 本題損失忽略。\n\n二、計算與判讀\n- `ΔS=4750 m3`。\n- 若為水土保持計畫，應另以入出流歷線檢核洪峰削減效果。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "mock-263-坡地水文學-題海水文第093題：集流時間", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第093題：集流時間", "number": "題海水文第093題", "question": "請說明「集流時間」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 集水區最遠點逕流到達出口所需時間，會影響設計降雨強度與洪峰流量。\n- 開發後不透水面與排水溝增加常使集流時間縮短。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 集水區最遠點逕流到達出口所需時間，會影響設計降雨強度與洪峰流量。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 開發後不透水面與排水溝增加常使集流時間縮短。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "source_type": "mock", "source_label": "Codex 模擬題", "source_note": "Codex 題海自創題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "mock-264-坡地水文學-題海水文第094題：超滲逕流與飽和逕流", "year": "模擬", "subject": "坡地水文學", "title": "題海水文第094題：超滲逕流與飽和逕流", "number": "題海水文第094題", "question": "請說明「超滲逕流與飽和逕流」之定義、形成機制或水文意義，並說明其在坡地水土保持規劃上的應用。", "brief": "- 超滲逕流由降雨強度大於入滲率造成，飽和逕流由土壤蓄水已滿造成。\n- 二者都會增加洪峰與坡面沖蝕，但形成位置與治理重點不同。\n- 作答時應連結洪峰、入滲、地下水、邊坡穩定或排水設計。", "detail": "一、定義與機制\n- 超滲逕流由降雨強度大於入滲率造成，飽和逕流由土壤蓄水已滿造成。\n- 需交代輸入、輸出與儲水變化之關係。\n\n二、規劃應用\n- 二者都會增加洪峰與坡面沖蝕，但形成位置與治理重點不同。\n- 可用於排水、滯洪、邊坡穩定、警戒或維護管理。\n\n三、結論\n- 坡地水文題應把降雨、入滲、逕流、地下水與工程設計串成完整系統。", "sou
