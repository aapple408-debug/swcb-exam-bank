制，再列排水、減載、擋土、錨定與植生等處理。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "106-植生工程-第三題", "year": "106", "subject": "植生工程", "title": "第三題", "number": "第三題", "question": "三、邊坡崩塌破壞深度多位於植物根圈以下，試以此現象說明植生對邊坡穩定之正面與 負面的影響。（20 分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "106-植生工程-第四題", "year": "106", "subject": "植生工程", "title": "第四題", "number": "第四題", "question": "四、舉例說明火燒適存植物 （Fire adapted plant） ，並寫出集水區防火綠帶之植物種類及其 配置原則。 （20 分）", "brief": "火燒適存植物具有厚樹皮、地下芽、萌蘗力強、耐熱種子或火後快速更新能力。集水區防火綠帶宜選含水量高、低油脂、枝葉不易燃、萌芽力強的植物，配置於道路、稜線、聚落周邊與林地交界，形成低燃料量隔離帶。", "detail": "**表格補充**\n\n| 配置原則 | 內容 |\n|---|---|\n| 位置 | 道路、稜線、聚落邊界、林火易入侵處 |\n| 植物 | 含水高、低油脂、耐修剪 |\n| 結構 | 降低連續可燃物，喬灌草分層管理 |\n| 維護 | 清除枯枝落葉、定期修剪 |\n\n防火綠帶不是單純種樹，而是降低燃料連續性與火焰傳播速度。植物選擇需搭配維護，否則枯落物累積仍會成為燃料。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。\n\n**手冊補強：河岸植生、濕地與防風定砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 河岸植生 | 需依水位、流速、沖刷、坡度與土壤含水配置草本、灌木、喬木與柔性護岸材料 |\n| 濕地護岸 | 宜營造緩坡、多孔隙、多水深與水陸交界帶，兼顧水質淨化、棲地與安全 |\n| 海岸定砂 | 先定砂、後防風、再造林，植物需耐鹽、耐旱、耐風砂掩埋 |\n| 防風林 | 林帶密度、寬度、高度與樹種配置影響防風距離與減風效果 |\n| 維護管理 | 需防止外來種入侵、枯死裸露、沖刷破壞與人為踩踏破壞 |\n\n生態與植生題可補充：護岸或綠帶設計應同時考慮防災功能與棲地功能，避免只追求硬體穩定而造成棲地破碎。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "106-植生工程-第五題", "year": "106", "subject": "植生工程", "title": "第五題", "number": "第五題", "question": "五、試述竹林邊坡之破壞機制；並說明竹林崩塌地在植生工程規劃設計上應注意的事 項。（20 分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "106-水土保持工程-第一題", "year": "106", "subject": "水土保持工程", "title": "第一題", "number": "第一題", "question": "一、試繪圖並詳述防砂壩三種防砂量之具體內涵。 （25 分）", "brief": "野溪與土石流治理應採源頭減砂、通道控流、下游保全，並兼顧生態廊道與維護管理。", "detail": "**表格補充**\n\n| 區位 | 治理重點 |\n|---|---|\n| 發生區 | 崩塌源頭控制、山腹工、植生、排水 |\n| 流動區 | 固床、護岸、導流、透過型防砂 |\n| 堆積區 | 沉砂、攔阻、清淤、導流堤、保全 |\n| 生態面 | 保留孔隙、粗糙度、魚道與濱溪植生 |\n\n野溪工程須先判斷土砂來源、洪峰、河床坡度、粒徑與保全對象。防砂壩、固床工、護岸、沉砂池與導流堤應配合配置，不宜只做單點工程。生態護岸或預鑄護岸需兼顧抗沖刷、基礎護腳、反濾排水、孔隙與植生。施工與完工後清淤維護同樣重要。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。\n\n**手冊補強：野溪治理與土砂控制**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 治理目標 | 穩定流心、控制縱橫向沖刷、調節土砂、維持通洪斷面並保護下游保全對象 |\n| 處理順序 | 先判斷上游供砂、中游輸砂與下游淤積，再決定源頭減砂、溪床穩定、清淤疏通或沉砂防砂 |\n| 清淤疏通 | 緊急清疏以恢復通洪與降低堰塞風險；計畫清疏則應配合河床坡降、土砂來源與上下游穩定 |\n| 工程配置 | 固床工、防砂壩、護岸、護坦、跌水消能、導流與沉砂空間須整體配置，不宜只做局部硬化 |\n| 維護管理 | 豪雨後巡查淤積、淘刷、堵塞與構造物損壞，並建立清淤、補強及棄土去化計畫 |\n\n作答時可強調手冊式觀念：野溪治理不是單純把河道挖深或截彎取直，而是要維持水流、泥砂與河床坡降的動態平衡；若只清除下游淤積而未處理上游供砂與坡面沖蝕，災害會反覆發生。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "106-水土保持工程-第二題", "year": "106", "subject": "水土保持工程", "title": "第二題", "number": "第二題", "question": "二、為排洩多砂之集中逕流而設計一座 混凝土內面工之矩形溝渠，已知清水流洪峰流量 為 10.5 cms，溝渠坡度為 5.8%，試設計適宜之溝渠通水斷面。（註：混凝土內面工曼 寧粗糙係數＝0.012；最大容許流速＝6.1 m/sec）（20 分）", "brief": "本題以曼寧式及最大容許流速共同控制。所需最小通水面積 `Amin = Q/Vmax = 10.5/6.1 = 1.72 m²`。又 `V = (1/n)R^(2/3)S^(1/2) ≤ 6.1`，得 `R ≤ [(6.1×0.012)/sqrt(0.058)]^(3/2)=0.168 m`。若採矩形渠，可取水深 `y = 0.15 m`、底寬 `b = 13.0 m`，則 `A = 1.95 m²`、`R = 0.147 m`、曼寧容量約 `10.88 cms`，設計流速 `10.5/1.95 = 5.38 m/s`，可通過 `Q = 10.5 cms` 且未超過容許流速；但斷面過寬過淺，實務宜配合跌水、消能或粗糙化。", "detail": "**表格補充**\n\n| 項目 | 計算 | 結果 |\n|---|---:|---:|\n| 設計流量 | 題示 | `10.5 cms` |\n| 最大容許流速 | 題示 | `6.1 m/s` |\n| 最小面積 | `Amin=Q/Vmax=10.5/6.1` | `1.72 m²` |\n| 曼寧水力半徑限制 | `R≤[(Vmax n)/sqrt(S)]^(3/2)` | `0.168 m` |\n| 試選水深 | `y=0.15 m` |  |\n| 試選底寬 | `b=13.0 m` |  |\n| 面積 | `A=by=13.0×0.15` | `1.95 m²` |\n| 濕周 | `P=b+2y=13.0+0.3` | `13.3 m` |\n| 水力半徑 | `R=A/P` | `0.146 m` |\n| 曼寧流速 | `V=(1/0.012)R^(2/3)sqrt(0.058)` | `約 5.57 m/s` |\n\n矩形混凝土內面工以曼寧式設計：`Q = (1/n) A R^(2/3) S^(1/2)`，其中 `n=0.012`、`S=0.058`。題目同時給最大容許流速 `Vmax=6.1 m/s`，因此不能只用水理最經濟斷面，因為在 5.8% 陡坡上，光滑混凝土渠道之正常流速會偏高。\n\n先由流速限制求最小面積：`Amin = Q/Vmax = 10.5/6.1 = 1.721 m²`。再由曼寧流速式限制水力半徑：`V = (1/n)R^(2/3)S^(1/2) ≤ 6.1`，故 `R ≤ [(6.1×0.012)/sqrt(0.058)]^(3/2) = 0.168 m`。\n\n試選矩形斷面 `y = 0.15 m`、`b = 13.0 m`，則 `A = 1.95 m²`，`P = 13.0+2×0.15 = 13.3 m`，`R = 1.95/13.3 = 0.147 m`。曼寧流速 `V = (1/0.012)(0.147)^(2/3)sqrt(0.058) = 5.58 m/s < 6.1 m/s`，可通過流量 `Q = VA = 5.58×1.95 = 10.88 cms > 10.5 cms`。以設計流量檢核斷面平均流速，`10.5/1.95 = 5.38 m/s`，亦小於 6.1 m/s。\n\n結論：可採矩形渠底寬約 `13.0 m`、水深 `0.15 m` 以上，另加安全出水高。惟此斷面過寬過淺，工程實務上通常不宜只靠光滑混凝土明渠解決，應配合跌水工、消能池、粗糙化內面工、階梯式渠道或分段排水，以控制流速與沖刷。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "106-水土保持工程-第三題", "year": "106", "subject": "水土保持工程", "title": "第三題", "number": "第三題", "question": "三、已知土石流平均流速（ DU ）公式可表為 2/32/1]})1([sin sin{5 2 D s w dd is D hCCa g dU       式中， Dh ＝土石流流深； λ＝固體泥砂顆粒之線性濃度（ linear concentration of solid）， 1]1)/[(  dm CC ； mC ＝靜止土體最大泥砂體積濃度； dC ＝土石流泥砂 體積濃度； sd ＝土石流泥砂顆粒粒徑（ m ）； ia ＝常數。試詳述應用上式推估土石流 平均流速時存在的盲點為何？（20 分）", "brief": "河道排水與輸砂平衡表示水流輸送能力、泥砂供給、粒徑與河床坡度之間會相互調整；若任一因子改變，河道將沖刷或淤積直到趨近新平衡。", "detail": "**表格補充**\n\n| 因子 | 意義 | 對河道平衡的影響 |\n|---|---|---|\n| `Qw` 水流流量 | 提供輸砂動能 | 增加時輸砂能力提高，可能沖刷下切 |\n| `Qs` 輸砂量 | 上游供給泥砂 | 增加時若輸送不足會淤積、坡度變陡 |\n| `D50` 代表粒徑 | 河床材料粗細 | 粒徑愈大，起動所需剪力愈高 |\n| `S` 河床坡度 | 提供重力能量 | 坡度變陡可提高輸砂能力 |\n| 平衡狀態 | 輸砂能力約等於供砂量 | 不沖不淤或沖淤在可接受範圍內 |\n\n河道形態可視為流量、泥砂量、粒徑與坡度共同調整的結果。常見關係可寫成輸砂能力與水流流量及坡度成正比，並受粒徑控制；當上游供砂量 Qs 增加或粒徑 D50 變粗時，河道需較大坡度或較大流量才能輸送，否則會發生淤積。若水流流量 Qw 增加而供砂不足，水流能量過剩，可能沖刷河床或淘刷岸坡。野溪治理時，固床工、防砂壩、清疏與護岸都會改變坡度、粒徑或供砂條件，因此需維持上下游土砂連續與通洪能力，避免上游淤積、下游刷深或構造物破壞。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。\n\n**手冊補強：野溪治理與土砂控制**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 治理目標 | 穩定流心、控制縱橫向沖刷、調節土砂、維持通洪斷面並保護下游保全對象 |\n| 處理順序 | 先判斷上游供砂、中游輸砂與下游淤積，再決定源頭減砂、溪床穩定、清淤疏通或沉砂防砂 |\n| 清淤疏通 | 緊急清疏以恢復通洪與降低堰塞風險；計畫清疏則應配合河床坡降、土砂來源與上下游穩定 |\n| 工程配置 | 固床工、防砂壩、護岸、護坦、跌水消能、導流與沉砂空間須整體配置，不宜只做局部硬化 |\n| 維護管理 | 豪雨後巡查淤積、淘刷、堵塞與構造物損壞，並建立清淤、補強及棄土去化計畫 |\n\n作答時可強調手冊式觀念：野溪治理不是單純把河道挖深或截彎取直，而是要維持水流、泥砂與河床坡降的動態平衡；若只清除下游淤積而未處理上游供砂與坡面沖蝕，災害會反覆發生。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "106-水土保持工程-第四題", "year": "106", "subject": "水土保持工程", "title": "第四題", "number": "第四題", "question": "四、試詳述地滑地之地形特徵？除了降雨和地震因素外，試舉出一個重要的因素，使地 滑地得以形成大規模崩塌。（20 分）", "brief": "地滑地常見冠部裂縫、滑落崖、反坡台階、凹陷濕地、側裂縫、趾部隆起、湧水與樹木歪斜。除降雨與地震外，岩層順向、斷層破碎帶、深層風化或河流坡腳侵蝕等地質地形因素，可使地滑發展為大規模崩塌。", "detail": "**表格補充**\n\n| 地形特徵 | 意義 |\n|---|---|\n| 冠部裂縫/滑落崖 | 滑動體上緣張裂 |\n| 反坡台階 | 滑動塊體旋轉或錯動 |\n| 趾部隆起 | 下方受擠壓 |\n| 湧水濕地 | 地下水集中 |\n| 歪斜樹木 | 地表緩慢變形 |\n\n大規模崩塌通常需要弱面、地下水與足夠地形能量共同作用。坡腳被河流切蝕會移除支撐，是常見誘因。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。"}, {"id": "106-水土保持工程-第五題", "year": "106", "subject": "水土保持工程", "title": "第五題", "number": "第五題", "question": "五、何謂泥砂遞移率（sediment delivery ratio, SDR）？其與集水區保育治理措施有何關 係？（15 分）", "brief": "河道排水與輸砂平衡表示水流輸送能力、泥砂供給、粒徑與河床坡度之間會相互調整；若任一因子改變，河道將沖刷或淤積直到趨近新平衡。", "detail": "**表格補充**\n\n| 因子 | 意義 | 對河道平衡的影響 |\n|---|---|---|\n| `Qw` 水流流量 | 提供輸砂動能 | 增加時輸砂能力提高，可能沖刷下切 |\n| `Qs` 輸砂量 | 上游供給泥砂 | 增加時若輸送不足會淤積、坡度變陡 |\n| `D50` 代表粒徑 | 河床材料粗細 | 粒徑愈大，起動所需剪力愈高 |\n| `S` 河床坡度 | 提供重力能量 | 坡度變陡可提高輸砂能力 |\n| 平衡狀態 | 輸砂能力約等於供砂量 | 不沖不淤或沖淤在可接受範圍內 |\n\n河道形態可視為流量、泥砂量、粒徑與坡度共同調整的結果。常見關係可寫成輸砂能力與水流流量及坡度成正比，並受粒徑控制；當上游供砂量 Qs 增加或粒徑 D50 變粗時，河道需較大坡度或較大流量才能輸送，否則會發生淤積。若水流流量 Qw 增加而供砂不足，水流能量過剩，可能沖刷河床或淘刷岸坡。野溪治理時，固床工、防砂壩、清疏與護岸都會改變坡度、粒徑或供砂條件，因此需維持上下游土砂連續與通洪能力，避免上游淤積、下游刷深或構造物破壞。\n\n**手冊補強：野溪治理與土砂控制**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 治理目標 | 穩定流心、控制縱橫向沖刷、調節土砂、維持通洪斷面並保護下游保全對象 |\n| 處理順序 | 先判斷上游供砂、中游輸砂與下游淤積，再決定源頭減砂、溪床穩定、清淤疏通或沉砂防砂 |\n| 清淤疏通 | 緊急清疏以恢復通洪與降低堰塞風險；計畫清疏則應配合河床坡降、土砂來源與上下游穩定 |\n| 工程配置 | 固床工、防砂壩、護岸、護坦、跌水消能、導流與沉砂空間須整體配置，不宜只做局部硬化 |\n| 維護管理 | 豪雨後巡查淤積、淘刷、堵塞與構造物損壞，並建立清淤、補強及棄土去化計畫 |\n\n作答時可強調手冊式觀念：野溪治理不是單純把河道挖深或截彎取直，而是要維持水流、泥砂與河床坡降的動態平衡；若只清除下游淤積而未處理上游供砂與坡面沖蝕，災害會反覆發生。", "source_type": "past", "source_label": "歷屆考古題", "points": "15分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "106-水土保持規劃設計-第一題", "year": "106", "subject": "水土保持規劃設計", "title": "第一題", "number": "第一題", "question": "一、試述下列地區長期水土保持計畫之擬定重點： ①水庫集水區； ②主要河川集水區； ③海岸、湖泊沿岸、水道兩岸；④沙丘地、沙灘。 （20 分）", "brief": "短期治理以保全聚落安全為優先，包括清疏堵塞河段、臨時導流、危險土砂攔阻、護岸搶修與警戒避難；長期治理則進行集水區源頭崩塌復育、防砂與固床系統、河道穩定、土地管理與監測維護。", "detail": "**表格補充**\n\n| 時程 | 措施 |\n|---|---|\n| 短期 | 清疏、臨時導流、警戒、保全工程 |\n| 中期 | 固床、護岸、防砂、沉砂空間 |\n| 長期 | 源頭治理、植生復育、監測、土地管理 |\n\n短期工程不可造成下游二次災害；長期規劃需由上游減砂、中游穩定輸移、下游保全三層次處理。\n\n**手冊補強：河岸植生、濕地與防風定砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 河岸植生 | 需依水位、流速、沖刷、坡度與土壤含水配置草本、灌木、喬木與柔性護岸材料 |\n| 濕地護岸 | 宜營造緩坡、多孔隙、多水深與水陸交界帶，兼顧水質淨化、棲地與安全 |\n| 海岸定砂 | 先定砂、後防風、再造林，植物需耐鹽、耐旱、耐風砂掩埋 |\n| 防風林 | 林帶密度、寬度、高度與樹種配置影響防風距離與減風效果 |\n| 維護管理 | 需防止外來種入侵、枯死裸露、沖刷破壞與人為踩踏破壞 |\n\n生態與植生題可補充：護岸或綠帶設計應同時考慮防災功能與棲地功能，避免只追求硬體穩定而造成棲地破碎。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "106-水土保持規劃設計-第二題", "year": "106", "subject": "水土保持規劃設計", "title": "第二題", "number": "第二題", "question": "二、小華想開發建設一個山坡地休閒農場，在水土保持計畫審核通過，拿到水土保持施 工許可證後，在不變更原有滯洪體積情況下，想要將滯洪池從原規劃的位置往園區 中央移動 50 公尺 ， 請問小華需不需要辦理水土保持計畫變更 ， 其理由為何？ （20 分）", "brief": "需要辦理水土保持計畫變更。滯洪池位置屬水土保持設施配置與排水系統之一部分，即使滯洪體積不變，移動 50 m 仍可能改變集水分區、入流路徑、出流位置、下游承受點、施工影響及安全維護條件，並非單純尺寸微調。除非主管機關認定屬不影響安全與功能之小幅調整並同意免變更，否則應提送變更設計。", "detail": "**表格補充**\n\n| 判斷項目 | 移動滯洪池可能影響 |\n|---|---|\n| 集水分區 | 原本進入滯洪池之逕流可能改變 |\n| 排水路徑 | 入流溝、出流溝、溢洪道位置及坡度改變 |\n| 下游安全 | 放流點與承受水路可能不同 |\n| 施工安全 | 開挖、擋土、邊坡保護及臨時防災配置改變 |\n| 維護管理 | 清淤道路、安全圍護與檢查動線改變 |\n\n水土保持計畫經核定後，義務人應依核定內容施工。滯洪池不是單一容量數字而已，而是包含位置、高程、集水範圍、入流設施、出流設施、溢洪安全、排水銜接、沉砂清淤及維護管理等整體功能。將滯洪池由原位置移往園區中央 50 m，即使宣稱不改變滯洪體積，也可能造成原核定排水系統、下游放流點及施工中防災配置改變。\n\n因此，本題原則上應辦理水土保持計畫變更設計，並重新檢核開發前後逕流、滯洪容量、允許放流量、入出流渠道、溢洪路徑、沉砂功能、邊坡穩定與施工安全。若要主張免變更，必須由承辦監造技師確認不影響安全、不降低原核定功能、不改變主要設施配置與下游排水承受條件，並經主管機關同意；否則不得自行移設。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "106-水土保持規劃設計-第三題", "year": "106", "subject": "水土保持規劃設計", "title": "第三題", "number": "第三題", "question": "三、試述礦區的水土保持問題，以及如何規劃排除礦區之地表逕流量、入滲水量、地下 水量及窪蓄水量。（20 分）", "brief": "礦區水土保持問題包括裸露坡面、廢石堆不穩、酸性或污染排水、重金屬、表土缺乏、逕流集中、入滲造成邊坡失穩與下游淤積。規劃上須分別處理地表逕流截排、入滲控制、地下水導排與窪蓄沉砂。", "detail": "**表格補充**\n\n| 水量 | 規劃處理 |\n|---|---|\n| 地表逕流 | 截水溝、排水路、沉砂池 |\n| 入滲水 | 覆蓋、防滲、坡面保護 |\n| 地下水 | 盲溝、水平排水孔、集水井 |\n| 窪蓄水 | 回填整平、排水出口、滯洪沉砂 |\n\n礦區治理需先分清清水與污水，避免外水進入污染區；廢石堆需穩定坡度與護坡，酸性排水需中和或收集處理，植生需客土與土壤改良。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。\n\n**手冊補強：農藝保育、覆蓋與草生措施**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 覆蓋功能 | 降低雨滴動能、減少表面結皮、增加入滲、降低逕流流速並攔阻泥砂 |\n| 覆蓋材料 | 可用敷蓋材料、覆蓋作物、草生帶、殘株、植生毯或有機覆蓋物 |\n| 農地排水 | 農路、平台、山邊溝、縱橫向排水與安全出口須整體規劃 |\n| 草生措施 | 草溝、草帶與緩衝帶可分散逕流、增加粗糙度、過濾泥砂並改善入滲 |\n| 管理維護 | 需定期修剪、補植、清淤，避免草生帶被車輛破壞或被集中水流切穿 |\n\n農地與坡面沖蝕題可補手冊式結論：以農藝方法先減少土砂生產，再以排水與沉砂設施控制土砂輸出，效果比單靠末端沉砂池更穩定。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "106-水土保持規劃設計-第四題", "year": "106", "subject": "水土保持規劃設計", "title": "第四題", "number": "第四題", "question": "四、有一條野溪經常遭受颱風侵襲，其上游集水區在前幾次颱風過後，產生多處崩塌地， 河道也有大量淤積土砂，為了保障野溪下游多處聚落安全，請擬定這條野溪治理的 短期和長期規劃原則。 （20 分）", "brief": "短期治理以保全聚落安全為優先，包括清疏堵塞河段、臨時導流、危險土砂攔阻、護岸搶修與警戒避難；長期治理則進行集水區源頭崩塌復育、防砂與固床系統、河道穩定、土地管理與監測維護。", "detail": "**表格補充**\n\n| 時程 | 措施 |\n|---|---|\n| 短期 | 清疏、臨時導流、警戒、保全工程 |\n| 中期 | 固床、護岸、防砂、沉砂空間 |\n| 長期 | 源頭治理、植生復育、監測、土地管理 |\n\n短期工程不可造成下游二次災害；長期規劃需由上游減砂、中游穩定輸移、下游保全三層次處理。\n\n**手冊補強：野溪治理與土砂控制**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 治理目標 | 穩定流心、控制縱橫向沖刷、調節土砂、維持通洪斷面並保護下游保全對象 |\n| 處理順序 | 先判斷上游供砂、中游輸砂與下游淤積，再決定源頭減砂、溪床穩定、清淤疏通或沉砂防砂 |\n| 清淤疏通 | 緊急清疏以恢復通洪與降低堰塞風險；計畫清疏則應配合河床坡降、土砂來源與上下游穩定 |\n| 工程配置 | 固床工、防砂壩、護岸、護坦、跌水消能、導流與沉砂空間須整體配置，不宜只做局部硬化 |\n| 維護管理 | 豪雨後巡查淤積、淘刷、堵塞與構造物損壞，並建立清淤、補強及棄土去化計畫 |\n\n作答時可強調手冊式觀念：野溪治理不是單純把河道挖深或截彎取直，而是要維持水流、泥砂與河床坡降的動態平衡；若只清除下游淤積而未處理上游供砂與坡面沖蝕，災害會反覆發生。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "106-水土保持規劃設計-第五題", "year": "106", "subject": "水土保持規劃設計", "title": "第五題", "number": "第五題", "question": "五、宜蘭縣新寮地區一塊面積 3 公頃，包含一條山溝和兩側山坡之集水區。貫穿該集水 區之唯一山溝漫地流長度為 50 公尺，河道長度為 200 公尺，河道高差為 10 公尺。 現欲在兩側山坡地規劃農場種植作物（逕流係數 ＝0.72），且各設計一條寬淺拋物線 形斷面草溝宣洩逕流，該溝溝寬 2 公尺，溝底設計坡度 10%，當設計水深為 0.2 公尺 時，請問下列三種草種 （百喜草，n＝0.067；假儉草，n＝0.055；類地毯草，n＝0.05） 中，何者最合適採用。 （20 分） C T t Bt ATHG I I )( )log(25 60   225 60 )094.029.25( P PI  A B C G H 年平均雨量 P(mm) 11.19436 55 0.49043 0.49507 0.35098 4192.2", "brief": "草溝糙度係數會隨植生高度、密度、倒伏程度與水深而變化。低水深時水流穿過草叢，阻力大、糙度高；水深增加並淹沒植生後，相對粗糙度降低，糙度係數可能下降。草溝可降速、滯流、促進沉積並保護溝床。", "detail": "**表格補充**\n\n| 條件 | 糙度變化 |\n|---|---|\n| 草高且密 | 糙度大 |\n| 水深小於草高 | 阻力最大 |\n| 水深遠大於草高 | 相對糙度降低 |\n| 草倒伏 | 糙度降低但仍護床 |\n| 維護刈割 | 可控制通洪能力 |\n\n草溝設計需兼顧通洪與防蝕。糙度高可降低流速與沖刷，但也會抬高水位；若流量大，需檢核安全流速與溢流。\n\n**手冊補強：野溪治理與土砂控制**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 治理目標 | 穩定流心、控制縱橫向沖刷、調節土砂、維持通洪斷面並保護下游保全對象 |\n| 處理順序 | 先判斷上游供砂、中游輸砂與下游淤積，再決定源頭減砂、溪床穩定、清淤疏通或沉砂防砂 |\n| 清淤疏通 | 緊急清疏以恢復通洪與降低堰塞風險；計畫清疏則應配合河床坡降、土砂來源與上下游穩定 |\n| 工程配置 | 固床工、防砂壩、護岸、護坦、跌水消能、導流與沉砂空間須整體配置，不宜只做局部硬化 |\n| 維護管理 | 豪雨後巡查淤積、淘刷、堵塞與構造物損壞，並建立清淤、補強及棄土去化計畫 |\n\n作答時可強調手冊式觀念：野溪治理不是單純把河道挖深或截彎取直，而是要維持水流、泥砂與河床坡降的動態平衡；若只清除下游淤積而未處理上游供砂與坡面沖蝕，災害會反覆發生。\n\n**手冊補強：農藝保育、覆蓋與草生措施**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 覆蓋功能 | 降低雨滴動能、減少表面結皮、增加入滲、降低逕流流速並攔阻泥砂 |\n| 覆蓋材料 | 可用敷蓋材料、覆蓋作物、草生帶、殘株、植生毯或有機覆蓋物 |\n| 農地排水 | 農路、平台、山邊溝、縱橫向排水與安全出口須整體規劃 |\n| 草生措施 | 草溝、草帶與緩衝帶可分散逕流、增加粗糙度、過濾泥砂並改善入滲 |\n| 管理維護 | 需定期修剪、補植、清淤，避免草生帶被車輛破壞或被集中水流切穿 |\n\n農地與坡面沖蝕題可補手冊式結論：以農藝方法先減少土砂生產，再以排水與沉砂設施控制土砂輸出，效果比單靠末端沉砂池更穩定。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "106-測量學-第一題", "year": "106", "subject": "測量學", "title": "第一題", "number": "第一題", "question": "一、在 20m 網格的數值地形模型（Digital Terrain Model, DTM）中，某一個方格的4 個格點 高程及其標準偏差（standard deviation）分別為 Z1=56.78m0.30m、Z2=57.70m0.30m、 Z3=58.82m0.30m、Z4=57.80m0.30m，如圖所示，其中，方格邊長X=Y==20m， 符號 Z zˆ 的 Z、 zˆ 分別表示高程及其標準偏差，若以公式 %1002 13   zzs 來計算 此方格的平均坡度，假設 Z1、Z2、Z3、Z4 均彼此獨立不相關且為無誤差之常數，則 以百分比（%）表示的此方格之平均坡度及其標準偏差為何？（20 分）", "brief": "坵塊法將基地劃分為小坵塊，由各坵塊高差與水平距離求坡度後面積加權；等高線法以等高線總長、等高距與面積估算平均坡度。坵塊法適合細部分區判定，等高線法適合整體地形快速估算。", "detail": "**表格補充**\n\n| 方法 | 計算概念 | 適用 |\n|---|---|---|\n| 坵塊法 | 各坵塊坡度面積加權 | 分區、法規坡度判定 |\n| 等高線法 | `S≈等高距×等高線總長/面積` | 大範圍平均坡度 |\n| 差異 | 坵塊法較細，等高線法較概略 | 視資料精度選用 |\n\n兩法都需注意比例尺、等高距與地形複雜度。坡度分級管制時，應依規範指定方法計算。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "106-測量學-第二題", "year": "106", "subject": "測量學", "title": "第二題", "number": "第二題", "question": "二、在一條寬且深的河流兩側分別各有一個點 I、II，水準儀無法設置於 I、II 之間的河流 區，今欲使用水準測量方法來求得 I、II 兩點的高程差，請說明此時的水準測量之施 測步驟並寫出相關的計算公式。（20 分）", "brief": "寬深河流兩岸高程差可用交互水準測量。先在 I 岸設站讀 I、II 標尺，再到 II 岸設站反向讀 I、II 標尺，兩次高差取平均，可消除視準軸誤差、地球曲率與折光造成的長視距誤差。", "detail": "**表格補充**\n\n| 觀測 | 目的 |\n|---|---|\n| I 岸設站 | 讀近尺 I、遠尺 II |\n| II 岸設站 | 讀近尺 II、遠尺 I |\n| 高差平均 | 消除長視距系統誤差 |\n| 條件 | 兩次儀器至兩尺距離互換 |\n\n交互水準適用於河流、峽谷等無法等距設站處。兩次觀測應在短時間內完成，避免折光變化。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "106-測量學-第三題", "year": "106", "subject": "測量學", "title": "第三題", "number": "第三題", "question": "三、航照判釋可以由垂直空照像片（vertical aerial photo）的像片比例尺（photo scale）和 地表覆蓋物（land cover）在像片上的成像大小來推算其對應的實際地面邊長或面積， 進而協助地表覆蓋物之判讀、辨識、分類。請說明空照像片的像片比例尺 S 之定義 及估算 S 的各種可行做法。（20 分）", "brief": "地表覆蓋可吸收雨滴動能、避免結皮、增加粗糙度、降低逕流速度並攔截泥砂。", "detail": "**表格補充**\n\n| 作用對象 | 覆蓋功能 |\n|---|---|\n| 雨濺沖蝕 | 吸收雨滴能量，避免團粒破碎與孔隙堵塞 |\n| 片蝕 | 增加地表粗糙度，降低薄層流速度 |\n| 細溝蝕 | 分散逕流，降低集中水流 |\n| 水分管理 | 減少蒸發，促進入滲與種子發芽 |\n\n裸露地表受雨滴撞擊後，土粒分散並堵塞孔隙，形成結皮，使入滲下降、逕流增加。敷蓋、枯落物、植生毯、草生覆蓋與作物殘株可先吸收雨滴動能，減少濺蝕；同時增加地表粗糙度，使逕流流速與剪應力降低。活體植生根系還能改善團粒、增加孔隙與抗剪強度，因此兼具短期防沖蝕與長期土壤改良效果。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "106-測量學-第四題", "year": "106", "subject": "測量學", "title": "第四題", "number": "第四題", "question": "四、某一家測量廠商提出 「導線點水準測量」 的作業構想，擬 以直接水準測量 來施測導 線點的高程。請說明這樣的導線點必須具備的條件及其理由。（20 分）", "brief": "導線點若要兼作水準點，必須位置穩定、不易受施工破壞、點位可供水準尺垂直立尺、前後視通視良好，且具有明確永久標誌。否則導線點雖可供平面控制，未必適合直接水準測量高程控制。", "detail": "**表格補充**\n\n| 條件 | 理由 |\n|---|---|\n| 點位穩固 | 避免沉陷造成高程變動 |\n| 可立尺 | 水準尺需垂直穩定 |\n| 通視佳 | 便於前後視平衡 |\n| 永久標示 | 可供複測與施工引用 |\n\n導線點常設於便於角距觀測處，但水準點更重視垂直穩定與立尺條件。若不符，應另設水準點或附設高程標。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "106-測量學-第五題", "year": "106", "subject": "測量學", "title": "第五題", "number": "第五題", "question": "五、衛星定位測量獲得的高程與水土保持之調查、規劃、設計、監造、試驗、鑑定、施 工等各種業務需要的高程不同，請說明這兩種高程不同之處並說明將衛星定位測量 獲得的高程轉換為水土保持需要的高程之處理步驟。（20 分） Z3 Z2 Z1 Z4 Y X", "brief": "衛星定位得到的是橢球高 h，水土保持工程通常使用正高或水準高 H。兩者差異為大地起伏 N，關係式為 `H = h - N`。需利用大地起伏模型、已知水準點套合或 GNSS/水準聯測，將橢球高轉為工程可用高程。", "detail": "**表格補充**\n\n| 高程 | 基準 | 用途 |\n|---|---|---|\n| 橢球高 h | 參考橢球 | GNSS 原始高程 |\n| 正高 H | 大地水準面 | 工程設計、水流坡降 |\n| 大地起伏 N | 橢球至大地水準面差 | `H=h-N` |\n\n若直接把 GNSS 橢球高用於排水、坡度或土方，會造成系統誤差。工程成果需標明高程基準並做轉換檢核。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "105-土壤物理與沖蝕-第一題", "year": "105", "subject": "土壤物理與沖蝕", "title": "第一題", "number": "第一題", "question": "一、一個長 8 cm、直徑 6 cm 採樣金屬環之土壤濕重 335 g，烘乾重 295 g，若土粒密度 為 2.65 g/cm3，試計算土壤總體密度（bulk density）、質量含水量（mass wetness）、土 壤孔隙率（porosity）及空氣孔隙率（air-filled porosity）。（20分）", "brief": "金屬環體積 V=π×3²×8=226.19 cm³；烘乾土重 295 g，總體密度 ρb=295/226.19=1.30 g/cm³。重量含水量 w=(335-295)/295=13.6%；孔隙率 n=1-ρb/ρs=1-1.30/2.65=50.8%；水體積約 40 cm³，飽和度 S=40/(226.19-295/2.65)=34.8%。", "detail": "**表格補充**\n\n| 項目 | 公式 | 結果 |\n|---|---:|---:|\n| 金屬環體積 | `π×3²×8` | `226.19 cm³` |\n| 總體密度 | `295/226.19` | `1.30 g/cm³` |\n| 重量含水量 | `(335-295)/295` | `13.6%` |\n| 孔隙率 | `1-1.30/2.65` | `50.8%` |\n| 飽和度 | `40/(226.19-295/2.65)` | `34.8%` |\n\n土壤環體積由直徑與長度求得，乾土重除以總體積即總體密度。水重為濕重減乾重，假設水密度為 1 g/cm³，可得水體積。固體體積為乾土重除以顆粒密度，孔隙體積為總體積減固體體積，飽和度為水體積除以孔隙體積。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "105-土壤物理與沖蝕-第二題", "year": "105", "subject": "土壤物理與沖蝕", "title": "第二題", "number": "第二題", "question": "二、試說明地表逕流移動土砂顆粒之力學機制。（20分）", "brief": "地表逕流搬運土砂主要由水流剪應力、拖曳力與升力克服顆粒自重、摩擦與黏聚力而起動；起動後顆粒以滾動、滑動、跳躍及懸浮方式運移，當水流輸砂能力下降即沉積。", "detail": "**表格補充**\n\n| 階段 | 力學機制 |\n|---|---|\n| 起動 | 水流剪應力超過臨界剪應力 |\n| 搬運 | 滾動、滑動、跳躍、懸浮 |\n| 分選 | 細粒較易懸浮，粗粒多為床載 |\n| 沉積 | 流速或坡度下降，輸砂能力降低 |\n\n逕流對床面顆粒施加剪應力 τ=γRS 或近似與水深、坡度有關。當 τ 大於臨界剪應力時，顆粒開始移動。細粒受紊流擴散可懸浮，砂粒多跳躍，礫石多滾動或滑動。坡度、流量、水深、粒徑、密度、顆粒嵌合與黏聚力共同決定輸砂能力。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "105-土壤物理與沖蝕-第三題", "year": "105", "subject": "土壤物理與沖蝕", "title": "第三題", "number": "第三題", "question": "三、請依照土壤構造說明黏土礦物的分類及特性。（20分）", "brief": "黏土礦物可依矽氧四面體與鋁氧八面體層狀結構分為 1:1 型、2:1 型與 2:1:1 型。高嶺石屬 1:1 型，膨脹性與 CEC 較低；蒙脫石屬 2:1 型，膨脹性、保水性與 CEC 高；伊萊石膨脹性中低；蛭石 CEC 高；綠泥石為 2:1:1 型。", "detail": "**表格補充**\n\n| 類型 | 代表 | 主要特性 |\n|---|---|---|\n| 1:1 | 高嶺石 | 膨脹小、CEC 低、較穩定 |\n| 2:1 膨脹型 | 蒙脫石 | 膨脹收縮大、保水與 CEC 高 |\n| 2:1 非膨脹型 | 伊萊石 | 鉀固定，膨脹較小 |\n| 2:1 高電荷 | 蛭石 | CEC 高，保肥力強 |\n| 2:1:1 | 綠泥石 | 層間有氫氧化物片，膨脹小 |\n\n黏土礦物結構控制比表面積、膨脹收縮、保水、陽離子交換容量與團粒穩定。2:1 型膨脹性黏土遇水膨脹、乾燥收縮，會影響孔隙、入滲與邊坡穩定；1:1 型較穩定但保肥力較低。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。"}, {"id": "105-土壤物理與沖蝕-第四題", "year": "105", "subject": "土壤物理與沖蝕", "title": "第四題", "number": "第四題", "question": "四、請說明坡地防蝕方法中分段截流之涵義、處理原理及處理方法。（20分）", "brief": "分段截流是將長坡面逕流以截水溝、平台、草溝或橫向排水分段攔截並安全導排，以縮短有效坡長、降低流速與剪應力，防止片蝕發展為細溝或溝蝕。", "detail": "**表格補充**\n\n| 項目 | 答案 |\n|---|---|\n| 涵義 | 將長坡面逕流分段截取 |\n| 原理 | 縮短坡長、降低流速、分散流量 |\n| 方法 | 截水溝、平台階段、草溝、橫向排水、跌水消能 |\n| 注意 | 出水口需消能並接至安全排水系統 |\n\n坡長愈長，坡面流量與能量愈大。分段截流透過橫向設施將逕流導離坡面或分散至穩定排水路，降低沖蝕能力。設計時應避免截流後集中沖刷，需配合沉砂、跌水、護坦與植生。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "105-土壤物理與沖蝕-第五題", "year": "105", "subject": "土壤物理與沖蝕", "title": "第五題", "number": "第五題", "question": "五、試說明地表覆蓋之材料種類及防止沖蝕功能。（20分）", "brief": "地表覆蓋可吸收雨滴動能、避免結皮、增加粗糙度、降低逕流速度並攔截泥砂。", "detail": "**表格補充**\n\n| 作用對象 | 覆蓋功能 |\n|---|---|\n| 雨濺沖蝕 | 吸收雨滴能量，避免團粒破碎與孔隙堵塞 |\n| 片蝕 | 增加地表粗糙度，降低薄層流速度 |\n| 細溝蝕 | 分散逕流，降低集中水流 |\n| 水分管理 | 減少蒸發，促進入滲與種子發芽 |\n\n裸露地表受雨滴撞擊後，土粒分散並堵塞孔隙，形成結皮，使入滲下降、逕流增加。敷蓋、枯落物、植生毯、草生覆蓋與作物殘株可先吸收雨滴動能，減少濺蝕；同時增加地表粗糙度，使逕流流速與剪應力降低。活體植生根系還能改善團粒、增加孔隙與抗剪強度，因此兼具短期防沖蝕與長期土壤改良效果。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。\n\n**手冊補強：農藝保育、覆蓋與草生措施**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 覆蓋功能 | 降低雨滴動能、減少表面結皮、增加入滲、降低逕流流速並攔阻泥砂 |\n| 覆蓋材料 | 可用敷蓋材料、覆蓋作物、草生帶、殘株、植生毯或有機覆蓋物 |\n| 農地排水 | 農路、平台、山邊溝、縱橫向排水與安全出口須整體規劃 |\n| 草生措施 | 草溝、草帶與緩衝帶可分散逕流、增加粗糙度、過濾泥砂並改善入滲 |\n| 管理維護 | 需定期修剪、補植、清淤，避免草生帶被車輛破壞或被集中水流切穿 |\n\n農地與坡面沖蝕題可補手冊式結論：以農藝方法先減少土砂生產，再以排水與沉砂設施控制土砂輸出，效果比單靠末端沉砂池更穩定。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "105-坡地水文學-第一題", "year": "105", "subject": "坡地水文學", "title": "第一題", "number": "第一題", "question": "一、山坡地的開發中，砍除原有之樹林，整地做成平台階段，並種植果樹，試述有那些 水文循環的因子受到影響，並說明對降雨逕流關係及水源涵養的改變。（20分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "105-坡地水文學-第二題", "year": "105", "subject": "坡地水文學", "title": "第二題", "number": "第二題", "question": "二、下圖為一般對河道及野溪渠道的排水與輸砂平衡模式的描述，說明圖中表達的意義 及各因子的關係。（QS： 輸砂量；D50： 泥沙代表粒徑；QW： 水流流量；S： 平衡坡度） （20分） SQDQ W50S ⋅∝⋅", "brief": "河道排水與輸砂平衡表示水流輸送能力、泥砂供給、粒徑與河床坡度之間會相互調整；若任一因子改變，河道將沖刷或淤積直到趨近新平衡。", "detail": "**表格補充**\n\n| 因子 | 意義 | 對河道平衡的影響 |\n|---|---|---|\n| `Qw` 水流流量 | 提供輸砂動能 | 增加時輸砂能力提高，可能沖刷下切 |\n| `Qs` 輸砂量 | 上游供給泥砂 | 增加時若輸送不足會淤積、坡度變陡 |\n| `D50` 代表粒徑 | 河床材料粗細 | 粒徑愈大，起動所需剪力愈高 |\n| `S` 河床坡度 | 提供重力能量 | 坡度變陡可提高輸砂能力 |\n| 平衡狀態 | 輸砂能力約等於供砂量 | 不沖不淤或沖淤在可接受範圍內 |\n\n河道形態可視為流量、泥砂量、粒徑與坡度共同調整的結果。常見關係可寫成輸砂能力與水流流量及坡度成正比，並受粒徑控制；當上游供砂量 Qs 增加或粒徑 D50 變粗時，河道需較大坡度或較大流量才能輸送，否則會發生淤積。若水流流量 Qw 增加而供砂不足，水流能量過剩，可能沖刷河床或淘刷岸坡。野溪治理時，固床工、防砂壩、清疏與護岸都會改變坡度、粒徑或供砂條件，因此需維持上下游土砂連續與通洪能力，避免上游淤積、下游刷深或構造物破壞。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "105-坡地水文學-第三題", "year": "105", "subject": "坡地水文學", "title": "第三題", "number": "第三題", "question": "三、分別說明入滲（ infiltration）與滲漏（percolation）的定義、運動機制與影響因子。 （20分）", "brief": "入滲是水由地表進入土壤表層，受雨強、表面狀態與初始含水量控制；滲漏是水進入土壤後在重力與基質勢作用下向下通過未飽和層，最後可能補注地下水。入滲決定地表逕流是否產生，滲漏決定土層內水分再分布與地下水補注。", "detail": "**表格補充**\n\n| 項目 | 入滲 | 滲漏 |\n|---|---|---|\n| 位置 | 地表界面 | 土壤剖面內 |\n| 方向 | 由地表進入土壤 | 多向下移動 |\n| 控制 | 雨強、結皮、孔隙、含水量 | 重力、基質勢、導水度 |\n| 水文意義 | 影響超滲逕流 | 影響地下水補注與土壤蓄水 |\n\n入滲能力若小於降雨強度，超過部分形成地表逕流；滲漏則發生於水已進入土壤之後，其速率受未飽和導水度、土壤質地、構造與含水量控制。砂土入滲與滲漏快，黏土慢；壓實與結皮會降低入滲。\n\n**手冊補強：農藝保育、覆蓋與草生措施**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 覆蓋功能 | 降低雨滴動能、減少表面結皮、增加入滲、降低逕流流速並攔阻泥砂 |\n| 覆蓋材料 | 可用敷蓋材料、覆蓋作物、草生帶、殘株、植生毯或有機覆蓋物 |\n| 農地排水 | 農路、平台、山邊溝、縱橫向排水與安全出口須整體規劃 |\n| 草生措施 | 草溝、草帶與緩衝帶可分散逕流、增加粗糙度、過濾泥砂並改善入滲 |\n| 管理維護 | 需定期修剪、補植、清淤，避免草生帶被車輛破壞或被集中水流切穿 |\n\n農地與坡面沖蝕題可補手冊式結論：以農藝方法先減少土砂生產，再以排水與沉砂設施控制土砂輸出，效果比單靠末端沉砂池更穩定。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "105-坡地水文學-第四題", "year": "105", "subject": "坡地水文學", "title": "第四題", "number": "第四題", "question": "四、在逕流量的估算中，如何計算集流時間?說明其定義及可能的影響因子。並說明各個 因子如何影響集流時間。（20分）", "brief": "集流時間是集水區最遠水力點之逕流到達出口所需時間，通常為坡面流、淺溝流與渠道流時間總和。坡長愈長、坡度愈緩、地表愈粗糙或入滲滯留愈大，集流時間愈長；排水路順直、鋪面化與坡度增加會縮短集流時間並提高洪峰。", "detail": "**表格補充**\n\n| 因子 | 對集流時間影響 |\n|---|---|\n| 流路長度 | 愈長則愈大 |\n| 坡度 | 愈陡則流速快、時間短 |\n| 地表粗糙度 | 粗糙度大則時間長 |\n| 土地利用 | 不透水鋪面使時間短 |\n| 排水系統 | 人工渠道化使集流加快 |\n\n計算時可依規範選用 Kirpich、Kerby、NRCS 或分段流速法。集流時間用於選定設計降雨強度，若低估集流時間，可能高估雨強；若高估，則可能低估洪峰。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "105-坡地水文學-第五題", "year": "105", "subject": "坡地水文學", "title": "第五題", "number": "第五題", "question": "五、有一旋轉灑水器能將水平均噴灑在半徑 r的圓周內，假設土壤的飽和滲透係數與未飽 和狀態下的滲漏能力均為 1 ft/day，當灑水面積為 400 ft2時，則灑水器的流量如何設 定，可以最快灌溉又不致產生地表逕流。（不考慮毛細管作用）（20分） sediment size coarse fine flat steep stream slope", "brief": "灑水器題由面積 A=πr² 求半徑，再比較灑水強度與土壤飽和滲透係數 1 ft/day。若灑水強度小於或等於入滲能力，水可全部入滲；若超過，超過部分形成地表逕流。", "detail": "**表格補充**\n\n| 步驟 | 公式 |\n|---|---|\n| 半徑 | `r=sqrt(A/π)` |\n| 灑水強度 | `i=供水流量/灑水面積` |\n| 入滲判斷 | `i <= Ks` 無超滲逕流；`i > Ks` 產生逕流 |\n| 逕流量 | `(i-Ks)×A` |\n\n題目若給供水流量，需先統一為 ft/day 或 ft³/day，再除以 400 ft² 得灑水強度。土壤滲漏能力為 1 ft/day，表示最大可入滲水深；超過者即為地表逕流。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "105-植生工程-第一題", "year": "105", "subject": "植生工程", "title": "第一題", "number": "第一題", "question": "一、山區自然步道設計必須因地制宜，並考量坡度之合宜性，請試述臺灣山區地質破碎 帶區其步道上邊坡與下邊坡之植生工法何者為 適切？其排水應如何處理？請以簡圖 說明之。（25分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "105-植生工程-第二題", "year": "105", "subject": "植生工程", "title": "第二題", "number": "第二題", "question": "二、人工濕地兼具水質淨化、景觀與生態棲地營造等多元功能，請以簡圖試述如何營造 適合多元棲地之濕地護岸？（25分）", "brief": "多元棲地濕地護岸應採緩坡化與分帶植生，包含深水區、淺水區、挺水植物帶、濕草帶與高灘灌木帶，並用卵石、木樁、植生袋或椰纖毯形成孔隙與緩衝。", "detail": "**表格補充**\n\n| 分區 | 功能 | 材料/植栽 |\n|---|---|---|\n| 深水區 | 提供魚類避難與沉澱 | 深潭、粗石 |\n| 淺水區 | 兩棲、水生昆蟲棲地 | 緩坡、卵石 |\n| 挺水植物帶 | 淨化水質、攔泥 | 香蒲、蘆葦、莎草 |\n| 濕草帶 | 過濾逕流 | 草本、植生毯 |\n| 高灘灌木帶 | 遮蔭與生態廊道 | 水柳、九芎等 |\n\n護岸不宜全混凝土化，應保留水陸交錯、粗糙度與孔隙。水流側需抗沖刷，背水側可加寬緩衝帶。維護上需控制外來種、淤積與水位變動。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。\n\n**手冊補強：河岸植生、濕地與防風定砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 河岸植生 | 需依水位、流速、沖刷、坡度與土壤含水配置草本、灌木、喬木與柔性護岸材料 |\n| 濕地護岸 | 宜營造緩坡、多孔隙、多水深與水陸交界帶，兼顧水質淨化、棲地與安全 |\n| 海岸定砂 | 先定砂、後防風、再造林，植物需耐鹽、耐旱、耐風砂掩埋 |\n| 防風林 | 林帶密度、寬度、高度與樹種配置影響防風距離與減風效果 |\n| 維護管理 | 需防止外來種入侵、枯死裸露、沖刷破壞與人為踩踏破壞 |\n\n生態與植生題可補充：護岸或綠帶設計應同時考慮防災功能與棲地功能，避免只追求硬體穩定而造成棲地破碎。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "105-植生工程-第三題", "year": "105", "subject": "植生工程", "title": "第三題", "number": "第三題", "question": "三、近來因應極端氣候變遷，對於超大颱風所造成之巨量行道樹與綠地植被風倒或折傷 （如今年的金門），請試述公部門應有的防範、緊急應變與善後處理措施為何？（25分）", "brief": "公部門對颱風造成樹木風倒應分為事前防範、災時應變與災後復原。事前健檢、修枝、支撐、選種與更新；災時排除危木、維持道路救災動線；災後分類扶正、修剪、移除、補植並檢討樹種與植穴環境。", "detail": "**表格補充**\n\n| 階段 | 措施 |\n|---|---|\n| 防範 | 樹木健檢、風險分級、修枝、支撐、改善植穴 |\n| 應變 | 封路警戒、移除倒木、優先搶通救災路線 |\n| 善後 | 扶正、修剪、移除危木、補植、資源化利用 |\n| 長期 | 適地適種、增加根域、避免頭重腳輕 |\n\n風倒常與根域不足、樹冠過密、病腐、植穴太小與樹種不適有關。災後不應只補種同種同位置，而應改善土壤、排水、根系空間與樹種配置。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "105-植生工程-第四題", "year": "105", "subject": "植生工程", "title": "第四題", "number": "第四題", "question": "四、海岸防風林與沙丘保護係海岸復育之重點，請試述有那些適生防風樹種與定砂植生 工法？（25分）", "brief": "風蝕顆粒運動包含懸浮、跳躍與表面蠕移；防治原則為降低風速、固定砂源、增加覆蓋與提高地表粗糙度。", "detail": "**表格補充**\n\n| 風蝕運動 | 顆粒特性 | 防治重點 |\n|---|---|---|\n| 懸浮 | 細粉砂、黏粒，可遠距離搬運 | 覆蓋裸露地、濕潤與防風 |\n| 跳躍 | 中砂為主，撞擊造成連鎖剝離 | 草帶、防風林、粗糙化 |\n| 蠕移/滾動 | 較粗顆粒沿地表移動 | 固砂、植生、障礙物 |\n\n風蝕常發生於乾燥、裸露、細粒且缺乏植被的地表。海岸、河口沙洲、裸露工區或乾燥農地均可能發生。防治上可設防風林、防風籬、草方格、植生帶、敷蓋、噴覆穩定劑或灑水管理。海岸植生需選耐鹽、耐風、耐砂埋植物，並以前線草本定砂、後方灌木喬木防風的分帶方式建立。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。\n\n**手冊補強：河岸植生、濕地與防風定砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 河岸植生 | 需依水位、流速、沖刷、坡度與土壤含水配置草本、灌木、喬木與柔性護岸材料 |\n| 濕地護岸 | 宜營造緩坡、多孔隙、多水深與水陸交界帶，兼顧水質淨化、棲地與安全 |\n| 海岸定砂 | 先定砂、後防風、再造林，植物需耐鹽、耐旱、耐風砂掩埋 |\n| 防風林 | 林帶密度、寬度、高度與樹種配置影響防風距離與減風效果 |\n| 維護管理 | 需防止外來種入侵、枯死裸露、沖刷破壞與人為踩踏破壞 |\n\n生態與植生題可補充：護岸或綠帶設計應同時考慮防災功能與棲地功能，避免只追求硬體穩定而造成棲地破碎。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "105-水土保持工程-第一題", "year": "105", "subject": "水土保持工程", "title": "第一題", "number": "第一題", "question": "一、試述蝕溝控制和防砂壩常用之消能設施種類及其適用條件。（20分）", "brief": "野溪與土石流治理應採源頭減砂、通道控流、下游保全，並兼顧生態廊道與維護管理。", "detail": "**表格補充**\n\n| 區位 | 治理重點 |\n|---|---|\n| 發生區 | 崩塌源頭控制、山腹工、植生、排水 |\n| 流動區 | 固床、護岸、導流、透過型防砂 |\n| 堆積區 | 沉砂、攔阻、清淤、導流堤、保全 |\n| 生態面 | 保留孔隙、粗糙度、魚道與濱溪植生 |\n\n野溪工程須先判斷土砂來源、洪峰、河床坡度、粒徑與保全對象。防砂壩、固床工、護岸、沉砂池與導流堤應配合配置，不宜只做單點工程。生態護岸或預鑄護岸需兼顧抗沖刷、基礎護腳、反濾排水、孔隙與植生。施工與完工後清淤維護同樣重要。\n\n**手冊補強：野溪治理與土砂控制**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 治理目標 | 穩定流心、控制縱橫向沖刷、調節土砂、維持通洪斷面並保護下游保全對象 |\n| 處理順序 | 先判斷上游供砂、中游輸砂與下游淤積，再決定源頭減砂、溪床穩定、清淤疏通或沉砂防砂 |\n| 清淤疏通 | 緊急清疏以恢復通洪與降低堰塞風險；計畫清疏則應配合河床坡降、土砂來源與上下游穩定 |\n| 工程配置 | 固床工、防砂壩、護岸、護坦、跌水消能、導流與沉砂空間須整體配置，不宜只做局部硬化 |\n| 維護管理 | 豪雨後巡查淤積、淘刷、堵塞與構造物損壞，並建立清淤、補強及棄土去化計畫 |\n\n作答時可強調手冊式觀念：野溪治理不是單純把河道挖深或截彎取直，而是要維持水流、泥砂與河床坡降的動態平衡；若只清除下游淤積而未處理上游供砂與坡面沖蝕，災害會反覆發生。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "105-水土保持工程-第二題", "year": "105", "subject": "水土保持工程", "title": "第二題", "number": "第二題", "question": "二、當出流歷線之尖峰流量位於入流歷線退水肢時，在不使用抽水機情況下，滯洪池可 以有幾種型式？（5分）請分別說明這幾類滯洪池在入流歷線基期相同條件下，滯洪 期間及其滯洪量之相對大小。（10分）如果水土保持技術規範之滯洪基期為入流歷線 基期，且為滯洪期間時，這幾類滯洪池之滯洪 期間及其滯洪量和水土保持技術規範 之滯洪相關規定相比較，又是如何？（5分）", "brief": "不使用抽水機之滯洪池可分為自由出流式、孔口或涵管控制式、堰流控制式及複合出流式。出流控制越嚴格，滯洪期間越長、所需滯洪量越大。滯洪量以 `S(t)=∫[I(t)-O(t)]dt` 的最大值決定；若規範以入流歷線基期作為滯洪基期，仍須檢核延後出流不造成下游不利影響。", "detail": "**表格補充**\n\n| 型式 | 出流控制 | 滯洪期間 | 滯洪量特性 |\n|---|---|---|---|\n| 自由出流或明渠出口式 | 出口限制小，水位上升即排出 | 較短 | 較小，削峰能力有限 |\n| 孔口、涵管控制式 | 低水位即受孔口控制 | 中等至較長 | 較大，削峰效果較佳 |\n| 堰流控制式 | 水位超過堰頂後出流 | 視堰頂高而定 | 堰頂高時前期蓄水較多 |\n| 複合出流式 | 孔口加堰或多孔口分段控制 | 可依設計調整 | 可兼顧小洪水排放與大洪水安全溢流 |\n\n滯洪池不使用抽水機時，主要靠重力出流及水位差控制出流。基本連續方程式為 `dS/dt = I(t)-O(t)`，其中 `I(t)` 為入流歷線、`O(t)` 為出流歷線、`S(t)` 為池內蓄水量，所需滯洪量為累積差值的最大值：`Smax = max ∫[I(t)-O(t)]dt`。\n\n若出流歷線尖峰出現在入流歷線退水肢，代表滯洪池已將洪峰延後，削減尖峰但延長退水時間。在入流歷線基期相同下，自由出流式滯洪期間最短、池容最小；孔口或涵管控制式因出流受限，滯洪期間較長、池容較大；複合式可依孔口及溢洪堰配置調整出流歷線。若水土保持技術規範以入流歷線基期作為滯洪基期，則出流延長至基期後的尾水仍須確認不使下游流量超過允許放流量，並檢核溢洪安全、淤積容量、清淤維護及緊急排洪能力。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "105-水土保持工程-第三題", "year": "105", "subject": "水土保持工程", "title": "第三題", "number": "第三題", "question": "三、請敘述擋土牆設計需考慮之作用力，以及擋土牆之安定分析。（15分）當闢建山區道 路，為避免開挖面積過大或邊坡較陡峻時，有何規劃設計可以提升擋土牆之抗滑力？ （5分）", "brief": "擋土牆設計作用力包括牆體自重、主動土壓、被動土壓、超載、地下水壓、地震力、上浮力及施工臨時荷重。安定分析至少檢核抗滑、抗傾倒、基礎承載力、偏心距與整體穩定。山區道路若需提高抗滑力，可加寬基礎、設剪力榫、增加入土深、利用階梯式基礎嵌入岩盤、設錨桿或地錨，並改善排水降低水壓。", "detail": "**表格補充**\n\n| 安定項目 | 常用檢核式 | 判斷重點 |\n|---|---|---|\n| 抗滑 | `FSs = 抗滑力 / 水平推力` | 基底摩擦、凝聚力、剪力榫及被動土壓提供抗滑 |\n| 抗傾倒 | `FSo = 抗傾倒力矩 / 傾倒力矩` | 合力應落於基底中三分之一附近 |\n| 承載力 | `qmax = V/B(1+6e/B)` | 最大基底壓力不得超過容許承載力 |\n| 偏心距 | `e = B/2 - xR` | `|e|` 不宜超過 `B/6`，避免基底拉力 |\n| 整體穩定 | 圓弧或非圓弧滑動分析 | 牆體、基礎與後方邊坡不可整體滑動 |\n\n擋土牆設計應先建立受力圖。主要作用力包括牆體自重 `W`、牆背主動土壓 `Pa`、牆前被動土壓 `Pp`、地表超載造成之側壓、地下水壓、地震慣性力、基底反力、施工臨時荷重及排水不良時的孔隙水壓。一般設計常保守忽略牆前被動土壓，或僅取部分折減值。\n\n抗滑檢核為 `FSs = R/P`，其中 `R` 可包括基底摩擦力 `V tanδ`、基底凝聚力 `cB`、剪力榫及折減後被動土壓；`P` 為牆背水平推力。抗傾倒檢核為 `FSo = Mr/Mo`，比較牆重與垂直力所產生之抗傾倒力矩及土壓、水壓產生之傾倒力矩。承載檢核需由合力位置求偏心距 `e`，再算 `qmax`、`qmin`，確認不超過容許承載力且基底不產生拉力。\n\n山區道路開挖面積受限、邊坡陡峻時，提高抗滑力的設計方法包括：加寬基礎以增加自重與摩擦力；基底做成階梯式或嵌入穩定岩盤；設置剪力榫增加被動抗力；增加入土深但須注意開挖擾動；牆背設排水層、洩水孔及截水溝降低水壓；必要時採錨定式擋土牆、地錨、岩栓或加筋土結構。若基地有軟弱層或順向坡，應先改善基礎或改採深基礎、排樁、地錨與排水聯合工法。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。\n\n**手冊補強：道路、農路與開挖整地**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 路線選擇 | 避免通過順向坡、崩塌地、湧水區及地質破碎帶，並減少大挖大填 |\n| 排水配置 | 山邊溝、路側溝、橫向排水、跌水消能與出口保護須配合道路縱坡配置 |\n| 邊坡保護 | 上邊坡重截水與護坡，下邊坡重填方穩定、排水與坡腳保護 |\n| 施工防災 | 土方工程應分期施工，裸露面即時覆蓋，臨時沉砂與臨時排水應先行完成 |\n| 維護管理 | 定期清理側溝、涵管、沉砂池與排水出口，豪雨後檢查沖刷、裂縫與邊坡變形 |\n\n道路水土保持答案可補一句總結：道路本身常成為集中逕流通道，因此設計重點不只在路面通行，還包括截水、導水、消能、沉砂與安全排放。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "105-水土保持工程-第四題", "year": "105", "subject": "水土保持工程", "title": "第四題", "number": "第四題", "question": "四、新北市一條寬度 3 m，溪床坡降 6%，曼寧粗糙係數 0.035 之野溪，如果設計滿足排 洪流量 30 cms 之矩形排水道，試問該排水道之設計水深與流速各是多少？如果在該 排水道下游端銜接一座寬度 3 m，曼寧粗糙係數 0.015之矩形斷面箱涵，請問該箱涵 不發生水躍現象且能夠安全通過該設計排洪流 量之最小設計坡降以及設計高度（出 水高以設計水深 10%計）為何？（20分）", "brief": "野溪與土石流治理應採源頭減砂、通道控流、下游保全，並兼顧生態廊道與維護管理。", "detail": "**表格補充**\n\n| 區位 | 治理重點 |\n|---|---|\n| 發生區 | 崩塌源頭控制、山腹工、植生、排水 |\n| 流動區 | 固床、護岸、導流、透過型防砂 |\n| 堆積區 | 沉砂、攔阻、清淤、導流堤、保全 |\n| 生態面 | 保留孔隙、粗糙度、魚道與濱溪植生 |\n\n野溪工程須先判斷土砂來源、洪峰、河床坡度、粒徑與保全對象。防砂壩、固床工、護岸、沉砂池與導流堤應配合配置，不宜只做單點工程。生態護岸或預鑄護岸需兼顧抗沖刷、基礎護腳、反濾排水、孔隙與植生。施工與完工後清淤維護同樣重要。\n\n**手冊補強：野溪治理與土砂控制**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 治理目標 | 穩定流心、控制縱橫向沖刷、調節土砂、維持通洪斷面並保護下游保全對象 |\n| 處理順序 | 先判斷上游供砂、中游輸砂與下游淤積，再決定源頭減砂、溪床穩定、清淤疏通或沉砂防砂 |\n| 清淤疏通 | 緊急清疏以恢復通洪與降低堰塞風險；計畫清疏則應配合河床坡降、土砂來源與上下游穩定 |\n| 工程配置 | 固床工、防砂壩、護岸、護坦、跌水消能、導流與沉砂空間須整體配置，不宜只做局部硬化 |\n| 維護管理 | 豪雨後巡查淤積、淘刷、堵塞與構造物損壞，並建立清淤、補強及棄土去化計畫 |\n\n作答時可強調手冊式觀念：野溪治理不是單純把河道挖深或截彎取直，而是要維持水流、泥砂與河床坡降的動態平衡；若只清除下游淤積而未處理上游供砂與坡面沖蝕，災害會反覆發生。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "105-水土保持工程-第五題", "year": "105", "subject": "水土保持工程", "title": "第五題", "number": "第五題", "question": "五、在規劃生態工程時，經常使用砌石邊坡不封底之作法，因此設計護岸高度時會出現 邊坡和底床曼寧粗糙係數不同之現象。假設全 斷面上之任何斷面平均流速等於全斷 面流速，而且全斷面上之任何斷面能量坡降等於全斷面能量坡降時，試以深寬比 （h/B）和邊坡底床曼寧粗糙係數比（n S /nB）兩個參數推導全斷面複合曼寧粗糙係數（ne）。 （15分）當矩形整流工程邊坡底床曼寧粗糙係數比為1.44，深寬比各為0.1和 0.6時之 全斷面複合曼寧粗糙係數與底床曼寧粗糙係數比值（ne /nB）各為多少？（5 分）", "brief": "矩形渠道底床與邊壁粗糙係數不同時，可用濕周加權式 `ne = [(PB nB^(3/2)+PS nS^(3/2))/(PB+PS)]^(2/3)`。矩形斷面 `PB=B`、`PS=2h`，故 `ne/nB = [(1+2(h/B)(nS/nB)^(3/2))/(1+2h/B)]^(2/3)`。當 `nS/nB=1.44` 時，`h/B=0.1` 得 `ne/nB=1.079`；`h/B=0.6` 得 `ne/nB=1.250`。", "detail": "**表格補充**\n\n| 深寬比 `h/B` | 計算式 | `ne/nB` |\n|---:|---|---:|\n| `0.1` | `[(1+2×0.1×1.44^(3/2))/(1+2×0.1)]^(2/3)` | `1.079` |\n| `0.6` | `[(1+2×0.6×1.44^(3/2))/(1+2×0.6)]^(2/3)` | `1.250` |\n\n本題假設矩形渠道底床寬 `B`、水深 `h`，底床粗糙係數為 `nB`，兩側邊壁粗糙係數為 `nS`。依題意，全斷面與各分區之平均流速相同，且能量坡降相同，可採濕周加權的複合曼寧粗糙係數：\n\n`ne = [(Σ Pi ni^(3/2))/P]^(2/3)`\n\n其中底床濕周 `PB = B`，兩側邊壁濕周合計 `PS = 2h`，總濕周 `P = B+2h`。代入得：\n\n`ne = [(B nB^(3/2)+2h nS^(3/2))/(B+2h)]^(2/3)`\n\n兩邊除以 `nB`：\n\n`ne/nB = [(1+2(h/B)(nS/nB)^(3/2))/(1+2h/B)]^(2/3)`\n\n題目給 `nS/nB = 1.44`。當 `h/B=0.1`，`ne/nB = [(1+0.2×1.44^(3/2))/(1.2)]^(2/3)=1.079`。當 `h/B=0.6`，`ne/nB = [(1+1.2×1.44^(3/2))/(2.2)]^(2/3)=1.250`。因此，水深越大時，邊壁濕周占比越高，複合粗糙係數越接近邊壁粗糙係數。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "105-水土保持規劃設計-第一題", "year": "105", "subject": "水土保持規劃設計", "title": "第一題", "number": "第一題", "question": "一、容易引起集水區發生土砂災害與侵蝕的地質因子有那些？（20分）", "brief": "易致災地質因子包括破碎岩層、斷層剪裂帶、順向坡、軟硬互層、厚層崩積土、風化深厚、節理發達、透水與不透水層交界及易崩解泥岩頁岩。這些因子會降低岩土強度、集中地下水並增加崩塌與土砂供給。", "detail": "**表格補充**\n\n| 地質因子 | 致災機制 |\n|---|---|\n| 斷層破碎帶 | 強度低、滲流集中 |\n| 順向坡 | 層面成滑動面 |\n| 軟硬互層 | 差異侵蝕與地下水滯留 |\n| 厚崩積土 | 鬆散、易飽和滑動 |\n| 泥岩頁岩 | 遇水軟化、崩解 |\n\n集水區治理應先以地質圖、航照、現勘與鑽探辨識高風險地質單元，再配置排水、坡面保護、固床與土地利用管制。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "105-水土保持規劃設計-第二題", "year": "105", "subject": "水土保持規劃設計", "title": "第二題", "number": "第二題", "question": "二、欲進行河川集水區整體治理前，應先擬定整體治理計畫書。請問河川集水區整體治 理計畫書之擬定應包括那些項目？（20分）", "brief": "河川集水區整體治理計畫書應包含集水區現況、災害與土砂問題、治理目標、分區策略、工程與非工程措施、優先順序、經費期程、維護管理與監測評估。", "detail": "**表格補充**\n\n| 章節 | 內容 |\n|---|---|\n| 基本資料 | 範圍、地形、地質、水文、土地利用 |\n| 問題診斷 | 崩塌、土石流、沖淤、保全對象 |\n| 治理目標 | 防災、減砂、生態、水資源 |\n| 對策 | 山坡地、野溪、河道、滯洪沉砂 |\n| 執行 | 優先順序、經費、期程、維護監測 |\n\n整體治理不是單點工程，而是由上游源頭、中游輸移、下游保全系統規劃。需結合土地管理、預警避災、工程治理與生態復育。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "105-水土保持規劃設計-第三題", "year": "105", "subject": "水土保持規劃設計", "title": "第三題", "number": "第三題", "question": "三、防砂壩之目的為何？透過型壩相較於非透過型壩之功能有何不同之處？並說明透過 型壩設計時，應考慮那些壩體作用力。（20分）", "brief": "野溪與土石流治理應採源頭減砂、通道控流、下游保全，並兼顧生態廊道與維護管理。", "detail": "**表格補充**\n\n| 區位 | 治理重點 |\n|---|---|\n| 發生區 | 崩塌源頭控制、山腹工、植生、排水 |\n| 流動區 | 固床、護岸、導流、透過型防砂 |\n| 堆積區 | 沉砂、攔阻、清淤、導流堤、保全 |\n| 生態面 | 保留孔隙、粗糙度、魚道與濱溪植生 |\n\n野溪工程須先判斷土砂來源、洪峰、河床坡度、粒徑與保全對象。防砂壩、固床工、護岸、沉砂池與導流堤應配合配置，不宜只做單點工程。生態護岸或預鑄護岸需兼顧抗沖刷、基礎護腳、反濾排水、孔隙與植生。施工與完工後清淤維護同樣重要。\n\n**手冊補強：野溪治理與土砂控制**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 治理目標 | 穩定流心、控制縱橫向沖刷、調節土砂、維持通洪斷面並保護下游保全對象 |\n| 處理順序 | 先判斷上游供砂、中游輸砂與下游淤積，再決定源頭減砂、溪床穩定、清淤疏通或沉砂防砂 |\n| 清淤疏通 | 緊急清疏以恢復通洪與降低堰塞風險；計畫清疏則應配合河床坡降、土砂來源與上下游穩定 |\n| 工程配置 | 固床工、防砂壩、護岸、護坦、跌水消能、導流與沉砂空間須整體配置，不宜只做局部硬化 |\n| 維護管理 | 豪雨後巡查淤積、淘刷、堵塞與構造物損壞，並建立清淤、補強及棄土去化計畫 |\n\n作答時可強調手冊式觀念：野溪治理不是單純把河道挖深或截彎取直，而是要維持水流、泥砂與河床坡降的動態平衡；若只清除下游淤積而未處理上游供砂與坡面沖蝕，災害會反覆發生。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "105-水土保持規劃設計-第四題", "year": "105", "subject": "水土保持規劃設計", "title": "第四題", "number": "第四題", "question": "四、請說明針對岩石邊坡之穩定性如何評估？（20分）", "brief": "邊坡與擋土設計需檢核外力、地下水、滑動、傾倒、承載與整體穩定，並依規範安全係數。", "detail": "**表格補充**\n\n| 檢核項目 | 重點 |\n|---|---|\n| 滑動 | 抗滑力與水平推力比較 |\n| 傾倒 | 抗傾倒力矩與傾倒力矩比較 |\n| 承載 | 基底壓力不得超過容許承載力 |\n| 地下水 | 水壓與孔隙水壓會降低安全性 |\n| 整體穩定 | 潛在滑動面安全係數 |\n\n擋土牆須依土壓、水壓、超載與地震力計算外力，並檢核抗滑、抗傾倒、基礎承載力、偏心距與整體穩定。邊坡穩定則需先調查地形、地質、滑動面與地下水，再選擇削坡、排水、擋土、錨定、格梁、植生或坡腳保護。深層滑動區尤其應以地下排水降低孔隙水壓，並配合監測。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "105-水土保持規劃設計-第五題", "year": "105", "subject": "水土保持規劃設計", "title": "第五題", "number": "第五題", "question": "五、請說明依水土保持法水土保持義務人於山坡地或森林區內從事那些行為，應先擬具 水土保持計畫，送請主管機關核定後方可施工？（20分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "105-測量學-第一題", "year": "105", "subject": "測量學", "title": "第一題", "number": "第一題", "question": "一、請詳述全球定位系統（Global Positioning System, GPS）的定位原理，並說明進行GPS 定位測量時可能的誤差來源，以及消除或減弱這些誤差的方法。（20分）", "brief": "GPS 以多顆衛星偽距或載波相位交會，至少四顆衛星可解算三維坐標與接收機鐘差。誤差來源有衛星軌道鐘差、電離層、對流層、多路徑、接收機雜訊與幾何 DOP；可用雙頻、差分/RTK、精密星曆、開闊測站與重複觀測降低。", "detail": "**表格補充**\n\n| 誤差 | 減弱方法 |\n|---|---|\n| 衛星軌道/鐘差 | 精密星曆、差分改正 |\n| 電離層 | 雙頻觀測 |\n| 對流層 | 模型改正、氣象資料 |\n| 多路徑 | 避開反射物、良好天線 |\n| 幾何 | 選 PDOP 佳時段 |\n\nGPS 定位由衛星已知坐標與訊號傳播時間求距離，以空間交會求接收機位置。工程測量常用靜態、快速靜態或 RTK，成果需標明坐標基準、高程基準與精度。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "105-測量學-第二題", "year": "105", "subject": "測量學", "title": "第二題", "number": "第二題", "question": "二、水土保持技術規範中，平均坡度的計算方式有坵塊法及等高線法，請分別說明此兩 種方法之計算方式，並說明其差異性。（20分）", "brief": "坵塊法將基地劃分為小坵塊，由各坵塊高差與水平距離求坡度後面積加權；等高線法以等高線總長、等高距與面積估算平均坡度。坵塊法適合細部分區判定，等高線法適合整體地形快速估算。", "detail": "**表格補充**\n\n| 方法 | 計算概念 | 適用 |\n|---|---|---|\n| 坵塊法 | 各坵塊坡度面積加權 | 分區、法規坡度判定 |\n| 等高線法 | `S≈等高距×等高線總長/面積` | 大範圍平均坡度 |\n| 差異 | 坵塊法較細，等高線法較概略 | 視資料精度選用 |\n\n兩法都需注意比例尺、等高距與地形複雜度。坡度分級管制時，應依規範指定方法計算。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。"}, {"id": "105-測量學-第三題", "year": "105", "subject": "測量學", "title": "第三題", "number": "第三題", "question": "三、如圖，A、B 為平地上兩個已知控制點，其坐標分別為（EA,NA,HA）及（EB,NB,HB）， 其中（E,N）為平面坐標，H 為高程；P 點為坡地上的一個觀測樁，今於颱風後欲確 認 P 點（樁頂）之平面坐標及高程，卻因為交通阻斷致使觀測人員無法抵達 P 點架 設儀器或反射稜鏡。假設欲觀測之樁頂位置 P 可明確辨認，在僅能利用捲尺及全站 儀（Total Station）測量角度的情況下，該如何獲得P點坐標（EP,NP,HP）？請列出必 要之觀測量，並詳細說明計算公式。（20分）", "brief": "測量成果由觀測量轉為坐標、高程、面積或體積，並以閉合差、中誤差或檢核點確認精度。平面用方位角與距離求橫縱距，高程用水準或三角高程求高差，土方用方格、斷面、TIN 或等高線法計算。", "detail": "**表格補充**\n\n| 題型 | 作答重點 |\n|---|---|\n| 坐標/導線 | 方位角、橫距、縱距、閉合差與平差 |\n| 水準/高程 | 後視、前視、儀器高、閉合差 |\n| 土方 | 方格法、斷面法、等高線法或 TIN |\n| 航測/UAV | 控制點、空三、密點雲、DEM、正射、精度檢核 |\n| GIS | 圖層、屬性、坐標系統、資料庫與服務 |\n\n測量計算題要注意單位與坐標方向。全站儀可由斜距、垂直角與方位角求三維坐標；水準測量以高程差與閉合差檢核；土方可用平均斷面、方格法、稜柱體公式或等高線面積法。UAV/SfM 題需說明航線規劃、控制點、特徵匹配、束制平差、密點雲、DSM/DTM 與正射影像。若題目圖表未抽出，需回原 PDF 讀取數值後代入。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "105-測量學-第四題", "year": "105", "subject": "測量學", "title": "第四題", "number": "第四題", "question": "四、同一段直線距離以三種不同方法進行量測，其成果分別為 100.00 m ± 0.01 m、 100.02 m ± 0.02 m及 99.96 m ± 0.03 m。請計算： 此段距離之最或是值。（10分） 此段距離最或是值之標準偏差。（10分）", "brief": "不同精度距離成果應採加權平均，權與中誤差平方成反比。以 `x̄=Σpx/Σp` 求最或是值，以 `m_x=1/sqrt(Σp)` 求平均值中誤差，並用殘差檢核是否有粗差。", "detail": "**表格補充**\n\n| 步驟 | 公式 |\n|---|---|\n| 權 | `p=1/m²` |\n| 加權平均 | `x̄=Σpx/Σp` |\n| 平均中誤差 | `m_x=1/sqrt(Σp)` |\n| 殘差檢核 | `v=x-x̄` |\n\n精度高者中誤差小，權重大，對平均值影響較大。若殘差明顯超出其精度，應檢查粗差或系統誤差。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "105-測量學-第五題", "year": "105", "subject": "測量學", "title": "第五題", "number": "第五題", "question": "五、航空攝影測量（Aerial Photogrammetry）及空載光達（Airborne LiDAR）技術皆可用 來產製數值高程模型（Digital Elevation Model, DEM）資料，請說明： 以航空攝影測量技術產製 DEM資料的基本原理。（8分） 以空載光達技術產製 DEM資料的基本原理。（8分） 兩者所產製之 DEM資料有何差異？（4分） A B P", "brief": "航空攝影測量由影像重疊與空三建立立體模型，適合產製正射影像與地表模型；空載光達以雷射直接量距，可取得點雲並部分穿透植被，較適合森林或複雜地形 DEM。", "detail": "**表格補充**\n\n| 項目 | 航空攝影測量 | 空載光達 |\n|---|---|---|\n| 資料 | 影像 | 雷射點雲 |\n| 優點 | 影像紋理佳、正射圖品質高 | 可穿透植被、地形點取得佳 |\n| 限制 | 植被遮蔽地面、需紋理 | 成本高、點雲需分類 |\n| DEM | 由影像匹配/立測 | 由地面點分類內插 |\n\n兩者可互補：攝影測量提供影像判釋與正射，LiDAR 提供高精度地形點。成果均需控制點、坐標系統與精度檢核。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。"}, {"id": "104-土壤物理與沖蝕-第一題", "year": "104", "subject": "土壤物理與沖蝕", "title": "第一題", "number": "第一題", "question": "一、總體積為 Vt 之土體，其係由固相（ s）、液相（l）及氣相（g）所組成，若各組成 物之體積分別為 Vs、Vl及 Vg，重量分別為 Ws、Wl及 Wg，試以上述符號定義下列土 壤參數：孔隙率（porosity）、容積密度（bulk density）及顆粒密度（particle density）；並寫出三者間之關係式。（20分）", "brief": "金屬環體積 V=π×3²×8=226.19 cm³；烘乾土重 295 g，總體密度 ρb=295/226.19=1.30 g/cm³。重量含水量 w=(335-295)/295=13.6%；孔隙率 n=1-ρb/ρs=1-1.30/2.65=50.8%；水體積約 40 cm³，飽和度 S=40/(226.19-295/2.65)=34.8%。", "detail": "**表格補充**\n\n| 項目 | 公式 | 結果 |\n|---|---:|---:|\n| 金屬環體積 | `π×3²×8` | `226.19 cm³` |\n| 總體密度 | `295/226.19` | `1.30 g/cm³` |\n| 重量含水量 | `(335-295)/295` | `13.6%` |\n| 孔隙率 | `1-1.30/2.65` | `50.8%` |\n| 飽和度 | `40/(226.19-295/2.65)` | `34.8%` |\n\n土壤環體積由直徑與長度求得，乾土重除以總體積即總體密度。水重為濕重減乾重，假設水密度為 1 g/cm³，可得水體積。固體體積為乾土重除以顆粒密度，孔隙體積為總體積減固體體積，飽和度為水體積除以孔隙體積。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "104-土壤物理與沖蝕-第二題", "year": "104", "subject": "土壤物理與沖蝕", "title": "第二題", "number": "第二題", "question": "二、試以土壤理化性質說明泥岩之沖蝕型態。（20分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。"}, {"id": "104-土壤物理與沖蝕-第三題", "year": "104", "subject": "土壤物理與沖蝕", "title": "第三題", "number": "第三題", "question": "三、東北季風期間河口易產生揚塵危害，試以風蝕機制說明揚塵之成因。（20分）", "brief": "風蝕顆粒運動包含懸浮、跳躍與表面蠕移；防治原則為降低風速、固定砂源、增加覆蓋與提高地表粗糙度。", "detail": "**表格補充**\n\n| 風蝕運動 | 顆粒特性 | 防治重點 |\n|---|---|---|\n| 懸浮 | 細粉砂、黏粒，可遠距離搬運 | 覆蓋裸露地、濕潤與防風 |\n| 跳躍 | 中砂為主，撞擊造成連鎖剝離 | 草帶、防風林、粗糙化 |\n| 蠕移/滾動 | 較粗顆粒沿地表移動 | 固砂、植生、障礙物 |\n\n風蝕常發生於乾燥、裸露、細粒且缺乏植被的地表。海岸、河口沙洲、裸露工區或乾燥農地均可能發生。防治上可設防風林、防風籬、草方格、植生帶、敷蓋、噴覆穩定劑或灑水管理。海岸植生需選耐鹽、耐風、耐砂埋植物，並以前線草本定砂、後方灌木喬木防風的分帶方式建立。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "104-土壤物理與沖蝕-第四題", "year": "104", "subject": "土壤物理與沖蝕", "title": "第四題", "number": "第四題", "question": "四、土壤入滲率影響沖蝕頗鉅，試回答下列問題：（每小題 10分，共 20分） 某地之最終入滲率為 30 mm/hr：試計算在降雨強度為 100 mm/hr下之逕流係數？ 該場降雨之入滲量為 2.54 cm，僅增加表土 15 cm 土層之含水量，且其降雨前、 後之土壤含水量分別為 10%及 20%（重量比），請以 g/cm3 為單位，試求該土層 之容積密度（bulk density）。", "brief": "金屬環體積 V=π×3²×8=226.19 cm³；烘乾土重 295 g，總體密度 ρb=295/226.19=1.30 g/cm³。重量含水量 w=(335-295)/295=13.6%；孔隙率 n=1-ρb/ρs=1-1.30/2.65=50.8%；水體積約 40 cm³，飽和度 S=40/(226.19-295/2.65)=34.8%。", "detail": "**表格補充**\n\n| 項目 | 公式 | 結果 |\n|---|---:|---:|\n| 金屬環體積 | `π×3²×8` | `226.19 cm³` |\n| 總體密度 | `295/226.19` | `1.30 g/cm³` |\n| 重量含水量 | `(335-295)/295` | `13.6%` |\n| 孔隙率 | `1-1.30/2.65` | `50.8%` |\n| 飽和度 | `40/(226.19-295/2.65)` | `34.8%` |\n\n土壤環體積由直徑與長度求得，乾土重除以總體積即總體密度。水重為濕重減乾重，假設水密度為 1 g/cm³，可得水體積。固體體積為乾土重除以顆粒密度，孔隙體積為總體積減固體體積，飽和度為水體積除以孔隙體積。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "104-土壤物理與沖蝕-第五題", "year": "104", "subject": "土壤物理與沖蝕", "title": "第五題", "number": "第五題", "question": "五、何謂視質地（ apparent texture ）？並說明施用有機質對改善土壤物理性質減緩沖蝕 之效益。（20分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "104-坡地水文學-第一題", "year": "104", "subject": "坡地水文學", "title": "第一題", "number": "第一題", "question": "一、有一小型湖泊，表面積為 6×106 m2，由流量量測紀錄得到四月份平均入流量為 1.9 cms，出流量為1.3 cms，蓄水量為8×105 m3，若從氣象局雨量資料得知，該四月份 總雨量為35 cm，假設該湖泊滲漏損失為20 mm，求該月份湖水蒸發損失量？（15分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "15分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "104-坡地水文學-第二題", "year": "104", "subject": "坡地水文學", "title": "第二題", "number": "第二題", "question": "二、臺灣北部某集水區降雨延時之單位歷線 U(1, t)，在 7 年間之變化如圖 1 所示，若該 集水區有 1 cm 超滲降雨。請說明單位歷線會產生如圖 1 變化之可能原因？並計算 其集水區面積？（15分） 圖 1", "brief": "單位歷線表示單位有效降雨在集水區出口形成的直接逕流歷線。不同延時或不同雨量的逕流可利用比例性與疊加性推算：有效雨量倍數乘上單位歷線，再依降雨時間平移相加。", "detail": "**表格補充**\n\n| 原理 | 說明 |\n|---|---|\n| 比例性 | 2 單位有效雨量產生 2 倍流量 |\n| 疊加性 | 連續降雨之歷線可平移後相加 |\n| 基流 | 總流量需加回基流 |\n| 面積 | 單位歷線體積可反推集水區面積 |\n\n計算時先扣除入滲或損失求有效雨量，再將各時段有效雨量乘單位歷線並按時間延遲排列，加總為直接逕流歷線。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "15分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "104-坡地水文學-第三題", "year": "104", "subject": "坡地水文學", "title": "第三題", "number": "第三題", "question": "三、雨量計置於傾斜 °15 之斜坡上，若當天降雨為垂直落下，降雨量為 80 mm ，請問該 雨量計因置於傾斜坡地量測，少接收到之雨量為多少 mm？（15分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "15分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "104-坡地水文學-第四題", "year": "104", "subject": "坡地水文學", "title": "第四題", "number": "第四題", "question": "四、以人工模雨來量測某處入滲容量，配置如圖2，已知該試驗用地的面積為8 m×10 m， 模擬時雨量強度為 40 mm/hr，經 1.5 小時實驗後，得到模擬的人工降雨量 P 及流入 溝渠中的地表逕流R，如下表數值，試求出各時段的入滲率（cm/hr）。（15分） 圖 2 實驗時間 （min） 人工降雨量P （cm） 地表逕流 R （cm） 0 0 0 1 1 0.5 2 2 1 5 4 1.5 10 9 3.5 15 13 6 30 18 8 60 40 20 90 60 45 入滲量F 地表逕流 R 人工降雨 P 時間 t = 0~90min （7年前） （現在） 3hr 8hr 2hr 6hr 300cms 500cms 104年專門職業及技術人員高等考試建築師、技師、第二次 食品技師考試暨普通考試不動產經紀人、記帳士考試試題 代號：02850 等 別 ： 高等考試 類 科 ： 水土保持技師 科 目 ： 坡地水文學 全一張 （背面）", "brief": "土壤水分與孔隙決定入滲、保水、排水與逕流。大孔隙促進入滲與通氣，小孔隙提高保水；表面結皮、壓實與高初始含水量會降低入滲並增加逕流，接近飽和時孔隙水壓上升且邊坡穩定性下降。", "detail": "**表格補充**\n\n| 概念 | 技師考試作答重點 |\n|---|---|\n| 入滲 | 水由地表進入土壤，受雨強、孔隙、初始含水量與表面結皮影響 |\n| 滲透/水力傳導 | 水在土體內受水頭梯度流動 |\n| 田間含水量 | 重力水排除後土壤保留水分 |\n| 凋萎點 | 植物無法再吸水恢復之含水量 |\n| 水分特性曲線 | 含水量與基質吸力關係，砂土曲線陡、黏土保水高 |\n\n土壤水分可用重量含水量、體積含水量、飽和度與水勢表示。砂土大孔隙多，入滲快、排水快、保水差；黏土微孔隙多，保水高但入滲與排水慢。土壤水分特性曲線可用壓力板、張力計、砂箱、離心法或露點水勢儀測得，並有乾濕過程不同的遲滯現象。坡地上若入滲不足，地表逕流與片蝕增加；若土體接近飽和，孔隙水壓上升、有效應力降低，可能誘發崩塌。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "15分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "104-坡地水文學-第五題", "year": "104", "subject": "坡地水文學", "title": "第五題", "number": "第五題", "question": "五、圖 3中已知土壤滲透係數 KA = 0.5 cm/sec，KB = 0.06 cm/sec，KC = 0.008 cm/sec，若 土壤的斷面積為 300 cm2，求該土壤之平均滲透係數 K及滲流量 Q。（10分）", "brief": "土壤水分與孔隙決定入滲、保水、排水與逕流。大孔隙促進入滲與通氣，小孔隙提高保水；表面結皮、壓實與高初始含水量會降低入滲並增加逕流，接近飽和時孔隙水壓上升且邊坡穩定性下降。", "detail": "**表格補充**\n\n| 概念 | 技師考試作答重點 |\n|---|---|\n| 入滲 | 水由地表進入土壤，受雨強、孔隙、初始含水量與表面結皮影響 |\n| 滲透/水力傳導 | 水在土體內受水頭梯度流動 |\n| 田間含水量 | 重力水排除後土壤保留水分 |\n| 凋萎點 | 植物無法再吸水恢復之含水量 |\n| 水分特性曲線 | 含水量與基質吸力關係，砂土曲線陡、黏土保水高 |\n\n土壤水分可用重量含水量、體積含水量、飽和度與水勢表示。砂土大孔隙多，入滲快、排水快、保水差；黏土微孔隙多，保水高但入滲與排水慢。土壤水分特性曲線可用壓力板、張力計、砂箱、離心法或露點水勢儀測得，並有乾濕過程不同的遲滯現象。坡地上若入滲不足，地表逕流與片蝕增加；若土體接近飽和，孔隙水壓上升、有效應力降低，可能誘發崩塌。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "10分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "104-坡地水文學-第六題", "year": "104", "subject": "坡地水文學", "title": "第六題", "number": "第六題", "question": "六、何謂史托克定理（ Stoke’s law）？請以該定理，自行作合理假設並推導出坡地沉砂 池中，砂顆粒沉降的終端沉降速度（terminal fall velocity）。（15分）", "brief": "法規與規劃題應說明法定目的、適用對象、計畫內容、審查程序、設計原則與維護管理；精確條文需依最新法規核對。", "detail": "**表格補充**\n\n| 題型 | 作答架構 |\n|---|---|\n| 水土保持計畫 | 基地資料、環境調查、水文土砂、設施設計、施工維護 |\n| 法規程序 | 申請、審查、核定、開工、變更、完工與維護 |\n| 特定區 | 劃定目的、保護對象、管制事項、廢止條件 |\n| 簽證 | 技師對規劃、設計、監造或檢查負專業責任 |\n| 沉砂滯洪 | 容量、出流、清淤、維護與安全 |\n\n水土保持規劃設計須以基地調查為基礎，包含地形、坡度、地質、土壤、植生、水系、保全對象與災害潛勢。計畫內容要涵蓋開發前中後逕流、土壤流失、沉砂滯洪、排水、擋土、坡面保護、植生、施工中臨時防災與完工維護。法規題若問期限、規模或安全係數，應以考試當年度最新條文為準，答案可先寫原則並提醒核對。", "source_type": "past", "source_label": "歷屆考古題", "points": "15分", "hint": "水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "104-坡地水文學-第七題", "year": "104", "subject": "坡地水文學", "title": "第七題", "number": "第七題", "question": "七、若以十年為重現期距，只發生一次的水文事件為發生機率，試推算以下之機率值： （每小題 5分，共 15分） 十年內，只發生三次的機率。 前九年不發生，第十年才發生的機率。 十年內，會發生之機率。 KcKBKA 20 20 40 cmcmcm 140cm 60cm 圖 3 不透水層", "brief": "水文計算先決定設計雨量、集流時間、逕流係數與集水面積，再求洪峰或歷線；滯洪量由入流與出流歷線最大累積差決定。", "detail": "**表格補充**\n\n| 題型 | 常用公式或方法 |\n|---|---|\n| 合理化公式 | `Q = C I A / 360`，A 用 ha、I 用 mm/hr |\n| 頻率分析 | 由重現期決定超越機率與頻率因子 |\n| 單位歷線 | 有效雨量乘單位歷線並依時間疊加 |\n| 滯洪量 | `dS/dt = I(t)-O(t)`，取最大蓄水量 |\n| 降雨損失 | φ 指數、入滲率或有效雨量計算 |\n\n作答時應先畫出水文流程：降雨、損失、有效雨量、逕流、洪峰與蓄洪。合理化公式適用於小集水區洪峰估算，需以集流時間對應設計降雨強度。單位歷線題則將各時段有效雨量乘以單位歷線並平移疊加。滯洪池題應比較開發前後或允許放流量，利用入流與出流歷線差額求最大蓄水量。若題目只有洪峰而無歷線，不能唯一決定滯洪體積，應說明需雨型或歷線資料。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "104-植生工程-第一題", "year": "104", "subject": "植生工程", "title": "第一題", "number": "第一題", "question": "一、試說明石灰石原料礦區以階段式開採之步驟與方法，及開採後可能造成之採掘殘壁 與捨石場剖面圖。並分別就採掘殘壁與捨石場之立地環境條件、可應用之植生方法 與應用植物材料等分別說明之。（25分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "104-植生工程-第二題", "year": "104", "subject": "植生工程", "title": "第二題", "number": "第二題", "question": "二、試以苗高 4 公尺、米徑 15 公分之苗木栽植為例，分別說明從苗圃苗木斷根、挖苗 至現地穴植之作業流程與方法，包括斷根作業、植穴挖掘、栽植作業、支柱與樹木 保護及相關應注意事項等。（25分）", "brief": "植生工程的答案核心是立地條件與植物材料相配合：先改善排水與生育基盤，再選用適地、根系發達、耐逆境且不具入侵性的草灌木或喬木，最後以補植、灌溉、追肥與豪雨後修復確保覆蓋率與成活率。", "detail": "**表格補充**\n\n| 步驟 | 作答重點 |\n|---|---|\n| 立地調查 | 坡度、坡向、土壤、含水、pH、養分、沖蝕與穩定性 |\n| 基礎工 | 截排水、削坡、客土、土壤改良、網材或格框固定 |\n| 植物選擇 | 適地適種、根系發達、耐逆境、材料穩定、避免入侵 |\n| 導入方法 | 撒播、噴植、植生毯、植生袋、苗木、扦插 |\n| 養護 | 補植、灌溉、追肥、刈割、病蟲害與豪雨後修復 |\n\n植生工程不是單純播種，而是利用植物與基盤工程共同恢復坡面穩定與生態功能。崩塌地或道路邊坡需先處理排水與坡面穩定，再依土壤條件選擇草本、灌木或喬木。礦區與不良土壤須客土、調 pH、補有機質與養分。河溪護岸植栽需分區配置耐水、耐沖刷與根系發達植物。若為群落調查，應使用覆蓋度、密度、頻度、重要值、歧異度與相似性等指標評估。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "104-植生工程-第三題", "year": "104", "subject": "植生工程", "title": "第三題", "number": "第三題", "question": "三、坡面保護工程方法中，常應用於崩塌地治理之固定框有那些種類與規格？不同固定 框類型可配合那些植生工法？如期望固定框內木本植物快速發芽生長與正向植生演 替，如何進行規劃設計？試分別說明之。（25分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "104-植生工程-第四題", "year": "104", "subject": "植生工程", "title": "第四題", "number": "第四題", "question": "四、臺灣地區主要應用之草皮材料有那些種類？試舉三種草皮種類，分別說明其繁殖特 性、適用範圍、草皮培育及草皮舖植之施工作業方法等。（25分）", "brief": "植生工程的答案核心是立地條件與植物材料相配合：先改善排水與生育基盤，再選用適地、根系發達、耐逆境且不具入侵性的草灌木或喬木，最後以補植、灌溉、追肥與豪雨後修復確保覆蓋率與成活率。", "detail": "**表格補充**\n\n| 步驟 | 作答重點 |\n|---|---|\n| 立地調查 | 坡度、坡向、土壤、含水、pH、養分、沖蝕與穩定性 |\n| 基礎工 | 截排水、削坡、客土、土壤改良、網材或格框固定 |\n| 植物選擇 | 適地適種、根系發達、耐逆境、材料穩定、避免入侵 |\n| 導入方法 | 撒播、噴植、植生毯、植生袋、苗木、扦插 |\n| 養護 | 補植、灌溉、追肥、刈割、病蟲害與豪雨後修復 |\n\n植生工程不是單純播種，而是利用植物與基盤工程共同恢復坡面穩定與生態功能。崩塌地或道路邊坡需先處理排水與坡面穩定，再依土壤條件選擇草本、灌木或喬木。礦區與不良土壤須客土、調 pH、補有機質與養分。河溪護岸植栽需分區配置耐水、耐沖刷與根系發達植物。若為群落調查，應使用覆蓋度、密度、頻度、重要值、歧異度與相似性等指標評估。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "104-水土保持工程-第一題", "year": "104", "subject": "水土保持工程", "title": "第一題", "number": "第一題", "question": "一、已知拋物線形斷面草溝，溝寬 b = 2.0 m，水深 d = 0.3 m，溝底坡度 S = 0.03，種植 百喜草曼寧粗糙係數 n = 0.067，試求：（每小題 5分，共 20分） 草溝通水斷面積 A=多少 m2？ 草溝水力半徑 R=多少 m？ 平均流速 V=多少 m/sec？ 流量 Q=多少 m3/sec？", "brief": "草溝糙度係數會隨植生高度、密度、倒伏程度與水深而變化。低水深時水流穿過草叢，阻力大、糙度高；水深增加並淹沒植生後，相對粗糙度降低，糙度係數可能下降。草溝可降速、滯流、促進沉積並保護溝床。", "detail": "**表格補充**\n\n| 條件 | 糙度變化 |\n|---|---|\n| 草高且密 | 糙度大 |\n| 水深小於草高 | 阻力最大 |\n| 水深遠大於草高 | 相對糙度降低 |\n| 草倒伏 | 糙度降低但仍護床 |\n| 維護刈割 | 可控制通洪能力 |\n\n草溝設計需兼顧通洪與防蝕。糙度高可降低流速與沖刷，但也會抬高水位；若流量大，需檢核安全流速與溢流。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；USLE 題重點是 A=R K LS C P，並分清楚 C 為覆蓋管理、P 為保育措施效果。"}, {"id": "104-水土保持工程-第二題", "year": "104", "subject": "水土保持工程", "title": "第二題", "number": "第二題", "question": "二、試述農路設計規範，瀝青混凝土路面設計規定。（20分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "104-水土保持工程-第三題", "year": "104", "subject": "水土保持工程", "title": "第三題", "number": "第三題", "question": "三、試述山坡地水源設施的種類與適用範圍。（20分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "104-水土保持工程-第四題", "year": "104", "subject": "水土保持工程", "title": "第四題", "number": "第四題", "question": "四、試述打樁編柵的設計原則。（20分）", "brief": "測量成果由觀測量轉為坐標、高程、面積或體積，並以閉合差、中誤差或檢核點確認精度。平面用方位角與距離求橫縱距，高程用水準或三角高程求高差，土方用方格、斷面、TIN 或等高線法計算。", "detail": "**表格補充**\n\n| 題型 | 作答重點 |\n|---|---|\n| 坐標/導線 | 方位角、橫距、縱距、閉合差與平差 |\n| 水準/高程 | 後視、前視、儀器高、閉合差 |\n| 土方 | 方格法、斷面法、等高線法或 TIN |\n| 航測/UAV | 控制點、空三、密點雲、DEM、正射、精度檢核 |\n| GIS | 圖層、屬性、坐標系統、資料庫與服務 |\n\n測量計算題要注意單位與坐標方向。全站儀可由斜距、垂直角與方位角求三維坐標；水準測量以高程差與閉合差檢核；土方可用平均斷面、方格法、稜柱體公式或等高線面積法。UAV/SfM 題需說明航線規劃、控制點、特徵匹配、束制平差、密點雲、DSM/DTM 與正射影像。若題目圖表未抽出，需回原 PDF 讀取數值後代入。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "104-水土保持工程-第五題", "year": "104", "subject": "水土保持工程", "title": "第五題", "number": "第五題", "question": "五、依水土保持技術規範的規定，試述開闢施工便道應注意事項為何？（15分）", "brief": "法規與規劃題應說明法定目的、適用對象、計畫內容、審查程序、設計原則與維護管理；精確條文需依最新法規核對。", "detail": "**表格補充**\n\n| 題型 | 作答架構 |\n|---|---|\n| 水土保持計畫 | 基地資料、環境調查、水文土砂、設施設計、施工維護 |\n| 法規程序 | 申請、審查、核定、開工、變更、完工與維護 |\n| 特定區 | 劃定目的、保護對象、管制事項、廢止條件 |\n| 簽證 | 技師對規劃、設計、監造或檢查負專業責任 |\n| 沉砂滯洪 | 容量、出流、清淤、維護與安全 |\n\n水土保持規劃設計須以基地調查為基礎，包含地形、坡度、地質、土壤、植生、水系、保全對象與災害潛勢。計畫內容要涵蓋開發前中後逕流、土壤流失、沉砂滯洪、排水、擋土、坡面保護、植生、施工中臨時防災與完工維護。法規題若問期限、規模或安全係數，應以考試當年度最新條文為準，答案可先寫原則並提醒核對。", "source_type": "past", "source_label": "歷屆考古題", "points": "15分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "104-水土保持工程-第六題", "year": "104", "subject": "水土保持工程", "title": "第六題", "number": "第六題", "question": "六、已知蝕溝控制連續壩，堆石壩有效壩高 He = 0.6 m，原溝床坡降= 20%，計畫淤砂坡 降= 10%，試求連續壩之間距 L=多少 m？（5分） 草溝 d b", "brief": "草溝糙度係數會隨植生高度、密度、倒伏程度與水深而變化。低水深時水流穿過草叢，阻力大、糙度高；水深增加並淹沒植生後，相對粗糙度降低，糙度係數可能下降。草溝可降速、滯流、促進沉積並保護溝床。", "detail": "**表格補充**\n\n| 條件 | 糙度變化 |\n|---|---|\n| 草高且密 | 糙度大 |\n| 水深小於草高 | 阻力最大 |\n| 水深遠大於草高 | 相對糙度降低 |\n| 草倒伏 | 糙度降低但仍護床 |\n| 維護刈割 | 可控制通洪能力 |\n\n草溝設計需兼顧通洪與防蝕。糙度高可降低流速與沖刷，但也會抬高水位；若流量大，需檢核安全流速與溢流。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "5分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "104-水土保持規劃設計-第一題", "year": "104", "subject": "水土保持規劃設計", "title": "第一題", "number": "第一題", "question": "一、試闡釋水庫集水區劃定為特定水土保持區之優缺點。（10分）", "brief": "法規與規劃題應說明法定目的、適用對象、計畫內容、審查程序、設計原則與維護管理；精確條文需依最新法規核對。", "detail": "**表格補充**\n\n| 題型 | 作答架構 |\n|---|---|\n| 水土保持計畫 | 基地資料、環境調查、水文土砂、設施設計、施工維護 |\n| 法規程序 | 申請、審查、核定、開工、變更、完工與維護 |\n| 特定區 | 劃定目的、保護對象、管制事項、廢止條件 |\n| 簽證 | 技師對規劃、設計、監造或檢查負專業責任 |\n| 沉砂滯洪 | 容量、出流、清淤、維護與安全 |\n\n水土保持規劃設計須以基地調查為基礎，包含地形、坡度、地質、土壤、植生、水系、保全對象與災害潛勢。計畫內容要涵蓋開發前中後逕流、土壤流失、沉砂滯洪、排水、擋土、坡面保護、植生、施工中臨時防災與完工維護。法規題若問期限、規模或安全係數，應以考試當年度最新條文為準，答案可先寫原則並提醒核對。", "source_type": "past", "source_label": "歷屆考古題", "points": "10分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "104-水土保持規劃設計-第二題", "year": "104", "subject": "水土保持規劃設計", "title": "第二題", "number": "第二題", "question": "二、試述崩塌地處理之規劃設計原則，在自來水水質水量保護區內崩塌地處理之規劃設 計原則需要多注意那些事項？（20分）", "brief": "植生工程的答案核心是立地條件與植物材料相配合：先改善排水與生育基盤，再選用適地、根系發達、耐逆境且不具入侵性的草灌木或喬木，最後以補植、灌溉、追肥與豪雨後修復確保覆蓋率與成活率。", "detail": "**表格補充**\n\n| 步驟 | 作答重點 |\n|---|---|\n| 立地調查 | 坡度、坡向、土壤、含水、pH、養分、沖蝕與穩定性 |\n| 基礎工 | 截排水、削坡、客土、土壤改良、網材或格框固定 |\n| 植物選擇 | 適地適種、根系發達、耐逆境、材料穩定、避免入侵 |\n| 導入方法 | 撒播、噴植、植生毯、植生袋、苗木、扦插 |\n| 養護 | 補植、灌溉、追肥、刈割、病蟲害與豪雨後修復 |\n\n植生工程不是單純播種，而是利用植物與基盤工程共同恢復坡面穩定與生態功能。崩塌地或道路邊坡需先處理排水與坡面穩定，再依土壤條件選擇草本、灌木或喬木。礦區與不良土壤須客土、調 pH、補有機質與養分。河溪護岸植栽需分區配置耐水、耐沖刷與根系發達植物。若為群落調查，應使用覆蓋度、密度、頻度、重要值、歧異度與相似性等指標評估。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "104-水土保持規劃設計-第三題", "year": "104", "subject": "水土保持規劃設計", "title": "第三題", "number": "第三題", "question": "三、試述防砂壩壩址附近出現沖刷坑之原因，並提出有效處理對策。（20分）", "brief": "野溪與土石流治理應採源頭減砂、通道控流、下游保全，並兼顧生態廊道與維護管理。", "detail": "**表格補充**\n\n| 區位 | 治理重點 |\n|---|---|\n| 發生區 | 崩塌源頭控制、山腹工、植生、排水 |\n| 流動區 | 固床、護岸、導流、透過型防砂 |\n| 堆積區 | 沉砂、攔阻、清淤、導流堤、保全 |\n| 生態面 | 保留孔隙、粗糙度、魚道與濱溪植生 |\n\n野溪工程須先判斷土砂來源、洪峰、河床坡度、粒徑與保全對象。防砂壩、固床工、護岸、沉砂池與導流堤應配合配置，不宜只做單點工程。生態護岸或預鑄護岸需兼顧抗沖刷、基礎護腳、反濾排水、孔隙與植生。施工與完工後清淤維護同樣重要。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "104-水土保持規劃設計-第四題", "year": "104", "subject": "水土保持規劃設計", "title": "第四題", "number": "第四題", "question": "四、試提出植生護坡之定義。（ 5 分）並敘述打樁編柵、固定框植生和鋪網噴植之適用 範圍。（15分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "104-水土保持規劃設計-第五題", "year": "104", "subject": "水土保持規劃設計", "title": "第五題", "number": "第五題", "question": "五、請計算：（每小題 10分，共 30分） 有一雜有直徑 1.3 公分小石之野溪底寬 4 公尺，曼寧粗糙係數 n 為 0.022，兩側邊 坡坡度豎橫比為 1：0.5，河床坡度為 0.01。當設計流量為 11.48 立方公尺/秒時， 試問設計水深為多少公尺？ 針對均勻定量流流況野溪，當底床雜有直徑 1.3 公分小石，兩側邊坡為乾砌石護 岸時，假設底床和邊坡上之速度一樣，全面積為底床面積和邊坡面積之和，則綜 合曼寧粗糙係數（Composite Manning’s roughness coefficient）公式為何？ 有一雜有直徑 1.3 公分小石之野溪（ n=0.022）底寬 4 公尺，兩側乾砌石護岸 （n=0.03）邊坡坡度豎橫比為 1：0.5，河床坡度為 0.01。當設計流量為 11.48 立 方公尺/秒時，試問設計水深為多少公尺？", "brief": "水文計算先決定設計雨量、集流時間、逕流係數與集水面積，再求洪峰或歷線；滯洪量由入流與出流歷線最大累積差決定。", "detail": "**表格補充**\n\n| 題型 | 常用公式或方法 |\n|---|---|\n| 合理化公式 | `Q = C I A / 360`，A 用 ha、I 用 mm/hr |\n| 頻率分析 | 由重現期決定超越機率與頻率因子 |\n| 單位歷線 | 有效雨量乘單位歷線並依時間疊加 |\n| 滯洪量 | `dS/dt = I(t)-O(t)`，取最大蓄水量 |\n| 降雨損失 | φ 指數、入滲率或有效雨量計算 |\n\n作答時應先畫出水文流程：降雨、損失、有效雨量、逕流、洪峰與蓄洪。合理化公式適用於小集水區洪峰估算，需以集流時間對應設計降雨強度。單位歷線題則將各時段有效雨量乘以單位歷線並平移疊加。滯洪池題應比較開發前後或允許放流量，利用入流與出流歷線差額求最大蓄水量。若題目只有洪峰而無歷線，不能唯一決定滯洪體積，應說明需雨型或歷線資料。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "104-測量學-第一題", "year": "104", "subject": "測量學", "title": "第一題", "number": "第一題", "question": "一、在一個十字形水準網中，四個路線匯集至 P 點之高程觀測成果如下表所示，試求 P 點高程之最或然值及其中誤差。（15分） 路線 P 點之高程 路線長 1 92.675 m 2.0 km 2 92.650 m 2.5 km 3 92.640 m 4.0 km 4 92.655 m 2.5 km", "brief": "測量成果由觀測量轉為坐標、高程、面積或體積，並以閉合差、中誤差或檢核點確認精度。平面用方位角與距離求橫縱距，高程用水準或三角高程求高差，土方用方格、斷面、TIN 或等高線法計算。", "detail": "**表格補充**\n\n| 題型 | 作答重點 |\n|---|---|\n| 坐標/導線 | 方位角、橫距、縱距、閉合差與平差 |\n| 水準/高程 | 後視、前視、儀器高、閉合差 |\n| 土方 | 方格法、斷面法、等高線法或 TIN |\n| 航測/UAV | 控制點、空三、密點雲、DEM、正射、精度檢核 |\n| GIS | 圖層、屬性、坐標系統、資料庫與服務 |\n\n測量計算題要注意單位與坐標方向。全站儀可由斜距、垂直角與方位角求三維坐標；水準測量以高程差與閉合差檢核；土方可用平均斷面、方格法、稜柱體公式或等高線面積法。UAV/SfM 題需說明航線規劃、控制點、特徵匹配、束制平差、密點雲、DSM/DTM 與正射影像。若題目圖表未抽出，需回原 PDF 讀取數值後代入。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "15分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "104-測量學-第二題", "year": "104", "subject": "測量學", "title": "第二題", "number": "第二題", "question": "二、於測站 A 上架設經緯儀（儀器高為 1.250m），觀測水準點 B（高程為 55.500m）上 垂直豎立之標尺，經緯儀之望遠鏡向下傾斜 3∘時，讀得標尺讀數 2.670m，望遠鏡 向下傾斜 4∘時，讀得標 |---|---|\n| 入滲 | 水由地表進入土壤，受雨強、孔隙、初始含水量與表面結皮影響 |\n| 滲透/水力傳導 | 水在土體內受水頭梯度流動 |\n| 田間含水量 | 重力水排除後土壤保留水分 |\n| 凋萎點 | 植物無法再吸水恢復之含水量 |\n| 水分特性曲線 | 含水量與基質吸力關係，砂土曲線陡、黏土保水高 |\n\n土壤水分可用重量含水量、體積含水量、飽和度與水勢表示。砂土大孔隙多，入滲快、排水快、保水差；黏土微孔隙多，保水高但入滲與排水慢。土壤水分特性曲線可用壓力板、張力計、砂箱、離心法或露點水勢儀測得，並有乾濕過程不同的遲滯現象。坡地上若入滲不足，地表逕流與片蝕增加；若土體接近飽和，孔隙水壓上升、有效應力降低，可能誘發崩塌。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "103-土壤物理與沖蝕-第三題", "year": "103", "subject": "土壤物理與沖蝕", "title": "第三題", "number": "第三題", "question": "三、試說明沖蝕可造成之災害。（20分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "103-土壤物理與沖蝕-第四題", "year": "103", "subject": "土壤物理與沖蝕", "title": "第四題", "number": "第四題", "question": "四、西方有句諺語“Liming makes father rich and son poor. ”（施用石灰，富了父親窮了 兒子），試闡釋其意義。（20分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "103-土壤物理與沖蝕-第五題", "year": "103", "subject": "土壤物理與沖蝕", "title": "第五題", "number": "第五題", "question": "五、試說明如何推估一集水區之土砂生產量。（20分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "103-坡地水文學-第一題", "year": "103", "subject": "坡地水文學", "title": "第一題", "number": "第一題", "question": "一、已知氣溫為 25℃，相對濕度為 80 %，大氣壓力為 101 kPa，試求： 水汽壓力（vapor pressure）(N/m2)（5分） 露點溫度（dew point）(℃)（10分） 比濕度
