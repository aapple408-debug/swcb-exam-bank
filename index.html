帶可作為土砂、風害或噪音緩衝。生態廊道則連接破碎棲地，維持物種移動。營造時需選擇適地原生植物，配置喬灌草複層結構，並兼顧維護與防災功能。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。\n\n**手冊補強：河岸植生、濕地與防風定砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 河岸植生 | 需依水位、流速、沖刷、坡度與土壤含水配置草本、灌木、喬木與柔性護岸材料 |\n| 濕地護岸 | 宜營造緩坡、多孔隙、多水深與水陸交界帶，兼顧水質淨化、棲地與安全 |\n| 海岸定砂 | 先定砂、後防風、再造林，植物需耐鹽、耐旱、耐風砂掩埋 |\n| 防風林 | 林帶密度、寬度、高度與樹種配置影響防風距離與減風效果 |\n| 維護管理 | 需防止外來種入侵、枯死裸露、沖刷破壞與人為踩踏破壞 |\n\n生態與植生題可補充：護岸或綠帶設計應同時考慮防災功能與棲地功能，避免只追求硬體穩定而造成棲地破碎。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "110-植生工程-第三題：植生資材", "year": "110", "subject": "植生工程", "title": "第三題：植生資材", "number": "第三題", "question": "三、植生工程施工需配合應用多種資材，以達到植生綠化目的，請說明植生 資材選用之原則，並列表說明植生工程常用資材之分類、種類及其特性 為何？（20 分）", "brief": "選用原則為適合立地、能固定基材、保水保肥、耐久性適當、環境安全、施工可行與成本合理。資材包括種子苗木、客土基材、肥料、有機質、保水劑、黏著劑、纖維覆蓋材、植生網毯、植生袋、錨釘與排水材料。", "detail": "植生資材需依坡度、土壤、水分、沖蝕強度與目標群落選擇。植物材料包含草本種子、灌木苗、喬木苗、插穗與草皮。生育基材包含客土、泥炭、堆肥、腐植質、木纖維與土壤改良材，可提供根系環境。養分材料包含緩效肥、磷肥、微量元素與菌根菌。\n\n保護與固定材料包括稻草、木屑、椰纖網、黃麻網、不織布、三維網、植生毯、植生袋、蜂巢格室與錨釘。保水與黏著材料包括高分子保水劑、黏結劑與噴植纖維。選用時應避免有毒、污染或難分解造成二次問題；陡坡需重視抗沖刷與固定，乾旱地需保水，貧瘠地需客土與有機質。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "110-植生工程-第四題：道路邊坡植生調查與工法", "year": "110", "subject": "植生工程", "title": "第四題：道路邊坡植生調查與工法", "number": "第四題", "question": "四、請列表說明道路邊坡實施植生工程作業之調查項目及不同地質坡面（硬 岩、軟岩、石質土、礫質土、砂質土、黏質土或壤質土等）之護坡與適 用植生方法。（20 分）", "brief": "調查項目包括坡度坡向、地質岩性、風化、土層厚度、湧水、沖蝕、穩定性、日照、既有植生與施工可及性。硬岩用植生孔槽或掛網噴植；軟岩用厚層基材；礫砂土重保水與固定；黏土重排水與防滑；壤土可採一般噴植與苗木。", "detail": "道路邊坡調查須包含幾何條件、地質土壤、水文排水、生態與施工條件。硬岩坡土層少，可採鑿孔植生、植生槽、掛網客土噴植或藤灌木導入。軟岩易風化剝落，可用噴植基材、掛網、格框與排水。石質土與礫質土保水差，需客土、有機質、保水材與植生袋固定。\n\n砂質土易乾旱與沖刷，需敷蓋、網材、草本快速覆蓋與防風保水。黏質土入滲慢、易滑動，應先排水、表面粗糙化並選耐濕植物。壤質土條件較佳，可用水力噴植、草灌混播與苗木栽植。所有邊坡均需先處理坡頂截水與坡面排水，否則植生易被沖毀。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。\n\n**手冊補強：道路、農路與開挖整地**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 路線選擇 | 避免通過順向坡、崩塌地、湧水區及地質破碎帶，並減少大挖大填 |\n| 排水配置 | 山邊溝、路側溝、橫向排水、跌水消能與出口保護須配合道路縱坡配置 |\n| 邊坡保護 | 上邊坡重截水與護坡，下邊坡重填方穩定、排水與坡腳保護 |\n| 施工防災 | 土方工程應分期施工，裸露面即時覆蓋，臨時沉砂與臨時排水應先行完成 |\n| 維護管理 | 定期清理側溝、涵管、沉砂池與排水出口，豪雨後檢查沖刷、裂縫與邊坡變形 |\n\n道路水土保持答案可補一句總結：道路本身常成為集中逕流通道，因此設計重點不只在路面通行，還包括截水、導水、消能、沉砂與安全排放。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "110-植生工程-第五題：植生客土與土壤改良", "year": "110", "subject": "植生工程", "title": "第五題：植生客土與土壤改良", "number": "第五題", "question": "五、植生工程在施工基地針對植物生育有顯著障礙之酸鹼性土壤、土層淺 薄、石礫地或嚴重污染地等不良土壤，在前期作業常需實施客土或土壤 改良，請說明如何採用植生客土處理及實施土壤改良？（20 分）", "brief": "客土處理是將適合植物生長的土壤或人工基材覆於坡面，提供根系介質。土壤改良包括調 pH、增加有機質、施肥、保水、改善排水、降低鹽分或污染固定化。酸土施石灰，鹼土施硫磺或有機質，石礫地加客土與保水材，污染地需隔離、移除或穩定化。", "detail": "**表格補充**\n\n| 不良條件 | 主要問題 | 改良方式 |\n|---|---|---|\n| 酸性土 | 養分有效性低、鋁錳毒害 | 石灰、苦土石灰、有機質、耐酸植物 |\n| 鹼性土 | 微量元素缺乏、根系吸收差 | 硫磺、有機質、酸性改良材、適量淋洗 |\n| 土層淺薄 | 根域不足、保水差 | 客土、植生槽、植生袋、打穴栽植 |\n| 石礫地 | 保水保肥差、基材不穩 | 客土、有機質、保水材、網材固定 |\n| 污染地 | 重金屬或毒性抑制生長 | 移除、覆土隔離、固化穩定、耐性植物 |\n\n植生客土可採全面覆土、穴植客土、植生袋、植生槽、厚層基材噴植或格框填土。客土需具適當質地、無污染、含有機質、保水保肥且不含雜草與病蟲害。坡面陡時需網材、格框或錨釘固定，避免豪雨沖失。\n\n酸性土壤可施石灰或苦土石灰提高 pH；鹼性或鈉化土可施石膏、有機質並配合淋洗排水；土層淺薄可客土、打穴與保水；石礫地需增加細土與有機質；污染地需先檢測污染種類，採移除、覆土隔離、固化穩定或選耐性植物。改良後應選適地植物並持續養護，避免一次施工後因養分耗盡或基材流失而失敗。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "110-水土保持工程-第一題：預鑄生態槽護岸", "year": "110", "subject": "水土保持工程", "title": "第一題：預鑄生態槽護岸", "number": "第一題", "question": "一、請說明預鑄生態槽護岸工程設計之注意事項。（25 分）", "brief": "注意水理安全、抗沖刷、基礎護腳、反濾排水、塊體連結、植生槽尺寸、土壤基材、適地植物、維護更換與生態孔隙。不可為了植生犧牲通洪與穩定。", "detail": "預鑄生態槽護岸兼具護岸與植生功能。設計前需確認設計洪水位、流速、剪應力、河床沖刷深度、漂流木衝擊與邊坡穩定。基礎與護腳應防止淘刷，背後設反濾層與排水，避免細粒流失與水壓累積。塊體需有足夠重量、互鎖或錨定，並能適應局部沉陷。\n\n植生槽需有足夠深度與孔隙，填入適合基材並保水排水兼顧。植物選擇耐濕、耐旱、根系發達且不妨礙通洪的種類。設計應保留生物躲藏孔隙、水陸交錯帶與粗糙度。維護上需考慮補植、清淤、塊體修復與洪後檢查。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "110-水土保持工程-第二題：滯洪池與蓄洪池", "year": "110", "subject": "水土保持工程", "title": "第二題：滯洪池與蓄洪池", "number": "第二題", "question": "二、請以流量歷線圖與連續方程式說明滯洪池與蓄洪池之蓄洪量大小和防 洪效益。（25 分）", "brief": "連續方程式為 dS/dt = I - O。滯洪池主要削減洪峰並延遲出流，蓄洪量為入流歷線與出流歷線間的最大累積差；蓄洪池可長時間儲存水量，出流更小或延後，所需容量通常較大，防洪效益較高但用地需求也大。", "detail": "在流量歷線圖上，入流 I(t) 洪峰高且集中，出流 O(t) 經池體調節後洪峰降低、時間延後。蓄洪量 S(t) 由 dS/dt = I(t)-O(t) 控制，當 I>O 時蓄水增加，I<O 時蓄水減少；最大 S 即所需池容量。\n\n滯洪池 detention pond 通常在洪水期間暫存水量，洪後排空，目標是使開發後洪峰不超過開發前或下游允許值。蓄洪池 retention/storage pond 則可長期保留水量，兼具灌溉、景觀或水資源利用，出流可更小，因此削峰效果可能較大，但需較大庫容與水質管理。防洪效益取決於容量、出流口、水位-容量曲線、入流歷線與操作方式。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "110-水土保持工程-第三題：兼顧保全與鰕鯱溯溪", "year": "110", "subject": "水土保持工程", "title": "第三題：兼顧保全與鰕鯱溯溪", "number": "第三題", "question": "三、當 8 公尺寬之乾砌石護岸（邊坡豎橫比為 1：0.5）野溪上游溪床尚有大 量可移動土石，最下游鄰近河口處之既有潛壩約有 3 公尺高，潛壩溢洪 口有 10 公分高水深，潛壩與河口間之河床坡度平緩之情況時，請問如何 兼顧野溪周邊聚落保全和暢通生態廊道，讓鰕鯱（喜好水深 0.3 公尺； 喜好流速 0.8 公尺/秒）自河口溯溪成長？（25 分）", "brief": "應維持土砂安全與生態通道並重。上游以透過型防砂、固床與清淤管理控制可移動土石；下游潛壩需改善落差，設魚道、階梯式斜坡、低流速旁通道或自然式粗石斜坡，使水深約 0.3 m、流速接近 0.8 m/s，並維持連續水流。", "detail": "本溪上游仍有大量可移動土石，表示保全聚落需先控制土砂來源與洪水通道。可在上游配置透過型防砂壩、梳子壩或沉砂空間，攔阻大粒徑土石與漂流木，並以固床工穩定河床坡降。乾砌石護岸應檢查基礎與護腳，避免洪水淘刷破壞。\n\n對鰕鯱而言，3 m 潛壩形成縱向阻隔，而溢洪口僅 0.1 m 水深低於偏好 0.3 m。改善方式可設自然式魚道、旁通水路、階梯跌水、粗石斜坡或局部降低壩頂形成低流量通道。每階落差需小，流速控制在約 0.8 m/s，並形成休息池與粗糙底質。設計需在不降低防砂與防洪功能下，提供常時生態基流與連續通道，並定期清除堵塞。\n\n**手冊補強：野溪治理與土砂控制**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 治理目標 | 穩定流心、控制縱橫向沖刷、調節土砂、維持通洪斷面並保護下游保全對象 |\n| 處理順序 | 先判斷上游供砂、中游輸砂與下游淤積，再決定源頭減砂、溪床穩定、清淤疏通或沉砂防砂 |\n| 清淤疏通 | 緊急清疏以恢復通洪與降低堰塞風險；計畫清疏則應配合河床坡降、土砂來源與上下游穩定 |\n| 工程配置 | 固床工、防砂壩、護岸、護坦、跌水消能、導流與沉砂空間須整體配置，不宜只做局部硬化 |\n| 維護管理 | 豪雨後巡查淤積、淘刷、堵塞與構造物損壞，並建立清淤、補強及棄土去化計畫 |\n\n作答時可強調手冊式觀念：野溪治理不是單純把河道挖深或截彎取直，而是要維持水流、泥砂與河床坡降的動態平衡；若只清除下游淤積而未處理上游供砂與坡面沖蝕，災害會反覆發生。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "110-水土保持工程-第四題：野溪流量、粗糙係數與能量損失", "year": "110", "subject": "水土保持工程", "title": "第四題：野溪流量、粗糙係數與能量損失", "number": "第四題", "question": "四、有一寬度 20 公尺、溪床坡度 2.5%、兩側為乾砌石護岸，其邊坡豎橫比 為 1：0.3 之野溪。現在採取一段 30 公尺長之順直河段，起點為邊坡豎 橫比為 1：0.3 之潛壩。當潛壩溢流口水深 0.5 公尺，潛壩下游 10 公尺處 為 2.8 公尺水深之上游水位站；潛壩下游 30 公尺處為 2.6 公尺水深之下 游水位站，請計算流量和上下游水位站間之綜合曼寧粗糙係數，以及能 量損失水頭。（25 分）", "brief": "以矩形寬頂堰近似 Q = 1.704 B H^(3/2)，B=20 m、H=0.5 m，Q 約 12.05 cms。兩水位站相距 20 m，河床降 0.5 m，水深由 2.8 m 降至 2.6 m，水面降約 0.7 m；速度水頭差很小，能量損失約 0.70 m。依平均斷面代入曼寧式可反推 n，但結果對堰流係數與斷面假設極敏感，正式計算須採題目指定堰流公式。", "detail": "本題第一步需由潛壩溢流水深估算流量。若採常用寬頂堰近似 Q = 1.704BH^(3/2)，B = 20 m，H = 0.5 m，得 Q = 1.704×20×0.5^(3/2) = 12.05 cms。若題目或規範指定不同堰流係數，應替換計算。\n\n上下游水位站位於潛壩下游 10 m 與 30 m，間距 20 m。河床坡度 2.5%，床面高程下降 0.025×20 = 0.5 m；水深由 2.8 m 變 2.6 m，故水面高程下降 0.5 + 0.2 = 0.7 m。斷面若取底寬 20 m、邊坡 H:V = 0.3，面積 A = by + zy²，濕周 P = b + 2y√(1+z²)，可求水力半徑 R。能量損失 hL = (z1+y1+V1²/2g) - (z2+y2+V2²/2g)，因速度水頭約 0.002 m，hL 約 0.70 m。再以 n = A R^(2/3) S_f^(1/2) / Q 反推綜合曼寧 n。若依上述示範數值，因 Q 很小而水深大，反推 n 會偏大，顯示題目可能需採特定潛壩流量公式或斷面圖細節；考試時應清楚列式並依指定係數計算。\n\n**手冊補強：野溪治理與土砂控制**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 治理目標 | 穩定流心、控制縱橫向沖刷、調節土砂、維持通洪斷面並保護下游保全對象 |\n| 處理順序 | 先判斷上游供砂、中游輸砂與下游淤積，再決定源頭減砂、溪床穩定、清淤疏通或沉砂防砂 |\n| 清淤疏通 | 緊急清疏以恢復通洪與降低堰塞風險；計畫清疏則應配合河床坡降、土砂來源與上下游穩定 |\n| 工程配置 | 固床工、防砂壩、護岸、護坦、跌水消能、導流與沉砂空間須整體配置，不宜只做局部硬化 |\n| 維護管理 | 豪雨後巡查淤積、淘刷、堵塞與構造物損壞，並建立清淤、補強及棄土去化計畫 |\n\n作答時可強調手冊式觀念：野溪治理不是單純把河道挖深或截彎取直，而是要維持水流、泥砂與河床坡降的動態平衡；若只清除下游淤積而未處理上游供砂與坡面沖蝕，災害會反覆發生。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "110-水土保持規劃設計-第一題：地質調查、SPT 與 RQD", "year": "110", "subject": "水土保持規劃設計", "title": "第一題：地質調查、SPT 與 RQD", "number": "第一題", "question": "一、請說明坡地開發工程地質調查的項目為何？（5 分）而地質鑽探調查的 實施原則為何？（10 分）又請說明施鑽過程中所進行的 SPT 試驗與岩心 RQD 檢測各為何？（10 分）", "brief": "地質調查包括地形、岩性、構造、斷層節理、風化、地下水、崩塌、土層厚度與工程地質分區。鑽探應布設於代表性剖面、構造物、坡頂坡腳與異常區，深度需穿越潛在滑動面。SPT 為標準貫入試驗，以 N 值評估土層密實或強度；RQD 為完整岩心長度比例，評估岩體品質。", "detail": "坡地開發地質調查需蒐集地質圖、航照、地形、災害紀錄，現地調查岩性、層面、節理、斷層、破碎帶、風化程度、湧水、滑動跡象與保全對象。地質鑽探孔位應能建立工程剖面，配置於坡頂、坡面、坡腳、擋土牆、建築基礎、道路與排水設施位置；孔深需達穩定基盤或超過可能滑動面。\n\nSPT 是在鑽孔中以標準貫入器，由 63.5 kg 錘落距 76 cm 打入土層，記錄後 30 cm 所需擊數 N，用於判斷砂土密度、黏土稠度與承載力經驗估算。RQD 為長度大於 10 cm 的完整岩心總長除以鑽進長度的百分比，用於評估岩體完整性，RQD 高表示岩體品質較佳，低則表示破碎節理發達。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "110-水土保持規劃設計-第二題：水庫保護帶與特定區廢止", "year": "110", "subject": "水土保持規劃設計", "title": "第二題：水庫保護帶與特定區廢止", "number": "第二題", "question": "二、請說明特定水土保持區中水庫保護帶的劃設與管制原則為何？（15 分） 又特定水土保持廢止的原則為何？（10 分）", "brief": "水庫保護帶以維護水源涵養、水質、防砂與邊坡穩定為目的，依水庫集水區、岸邊、坡度、土壤、植生與污染風險劃設，限制開發、伐採、污染與高沖蝕行為。特定區廢止需確認原劃定原因消失、災害風險降低且不影響公益，並依法定程序辦理。", "detail": "水庫保護帶屬特定水土保持區中重要管理範圍，目的在減少泥砂入庫、維持水質、保護水源涵養與防止庫岸崩塌。劃設時應考量水庫滿水位周邊、主要入流溪流、坡度、土壤沖蝕性、崩塌潛勢、土地利用與保全需求。管制原則包括限制開發建築、採礦、濫墾、污染排放、破壞植生與高風險農業使用，必要時推動造林、植生緩衝帶與水土保持處理。\n\n特定水土保持區廢止應審慎。若原來需特別保護的原因已不存在，例如治理完成、危害解除、保全對象改變或經評估風險降低，且廢止後不致造成水土流失或公共危險，始可依程序檢討。仍需經調查、評估、公告與主管機關核定，不得因開發需求任意廢止。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "110-水土保持規劃設計-第三題：變更水土保持計畫", "year": "110", "subject": "水土保持規劃設計", "title": "第三題：變更水土保持計畫", "number": "第三題", "question": "三、請說明實際執行之坡地開發與核定水土保持計畫有差異時何種情況應 辦理變更水土保持計畫？（10 分）又何種情況可免辦理變更水土保持計 畫？（10 分）而何種情況變更僅應報主管機關備查？（5 分）", "brief": "涉及開發範圍、配置、排水系統、滯洪沉砂、擋土、邊坡穩定、土方量或安全功能重大改變者，應辦理變更。僅屬不影響水土保持功能的小調整可免變更或備查。具體類型須依最新審核監督辦法。", "detail": "核定計畫是施工與監督依據，若實際執行改變會影響水土保持功能或安全，即應辦理變更。例如基地範圍、開發面積、建築道路配置、挖填方量、排水方向、沉砂滯洪容量、擋土牆位置高度、邊坡坡度、施工分期或保全對象有重大變更，均應送主管機關審查。\n\n若變更只是材料同等級替代、局部尺寸微調、施工便利調整，且不降低排水、滯洪、沉砂、邊坡穩定與植生功能，可能免辦變更或報備查。僅報備查通常適用於不影響安全與功能的輕微變更。由於法規列舉項目會修訂，考試精確分類應依最新水土保持計畫審核監督相關規定作答。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "110-水土保持規劃設計-第四題：重力式擋土牆安定", "year": "110", "subject": "水土保持規劃設計", "title": "第四題：重力式擋土牆安定", "number": "第四題", "question": "四、請問水土保持技術規範中擋土牆設計的安定條件規定為何？（10 分）若 某開發基地設置有重力式擋土牆頂寬 0.6 m、牆有效高 3 m、入土深 2 m、 牆面坡度 1：0.3（牆背垂直）、載重 1 t/m2、土層單位重 2.0 t/m3、混凝土 單位重 2.4 t/m3、背填土坡度 0°、內摩擦角 30°、凝聚力 0.1 t/m2、土壤 極限承載力為 45 t/m2，請檢討其充分排水（或已設置足夠的洩水孔）時 的傾倒、滑動與承載安定性等是否符合要求。（15 分）", "brief": "充分排水時可不計牆背水壓。取水平回填、φ = 30°，Ka = tan²(45°-15°)=1/3；有效牆高 H = 3 m 時，土壓 Pa = 0.5×(1/3)×2.0×3² = 3.0 t/m，超載土壓 Pq = (1/3)×1×3 = 1.0 t/m，水平推力合計 4.0 t/m。若牆面坡度以總高 5 m 計，基底寬 B = 0.6+0.3×5 = 2.1 m，牆重 W = [(0.6+2.1)/2×5]×2.4 = 16.2 t/m。抗滑 FS 約 2.39，抗傾倒 FS 約 4.88，基底壓力 qmax 約 8.33 t/m²，小於極限承載力 45 t/m²，且 qmin 為正，故在此假設下傾倒、滑動與承載均安全。", "detail": "擋土牆安定檢核通常包括抗滑動、抗傾倒、基礎承載力、偏心距、合力落點及排水安全。充分排水且已設置足夠洩水孔時，可不計牆背靜水壓；若排水不良，水壓須另列為不利外力。規範安全係數應依最新水土保持技術規範採用，作答時至少要列出抗滑、抗傾倒及承載檢核。\n\n本題以保守方式忽略土壤凝聚力折減主動土壓，採 Rankine 主動土壓係數：\n\n| 項目 | 計算 | 結果 |\n|---|---:|---:|\n| 主動土壓係數 | `Ka = tan²(45°-30°/2)` | `1/3` |\n| 土壓 | `Pa = 0.5KaγH² = 0.5×(1/3)×2.0×3²` | `3.0 t/m` |\n| 超載土壓 | `Pq = KaqH = (1/3)×1×3` | `1.0 t/m` |\n| 水平推力 | `P = Pa + Pq` | `4.0 t/m` |\n| 傾倒力矩 | `Mo = Pa×H/3 + Pq×H/2` | `3×1 + 1×1.5 = 4.5 t-m/m` |\n\n牆身幾何依題目「頂寬 0.6 m、有效高 3 m、入土深 2 m、牆面坡度 1:0.3、牆背垂直」解讀為總高 5 m 之梯形重力牆，基底寬 B = 0.6 + 0.3×5 = 2.1 m。牆身斷面積 A = (0.6+2.1)/2×5 = 6.75 m²，牆重 W = 6.75×2.4 = 16.2 t/m。梯形牆重心距趾點約 x = 1.356 m，因此抗傾倒力矩 Mr = 16.2×1.356 = 21.96 t-m/m。\n\n| 檢核項目 | 計算 | 結果 | 判斷 |\n|---|---:|---:|---|\n| 抗傾倒安全係數 | `FS_ot = Mr/Mo = 21.96/4.5` | `4.88` | 大於常用要求，安全 |\n| 抗滑力 | `R = W tan30° + cB = 16.2×0.577 + 0.1×2.1` | `9.56 t/m` |  |\n| 抗滑安全係數 | `FS_s = R/P = 9.56/4.0` | `2.39` | 大於常用要求，安全 |\n| 合力位置 | `x_R = (Mr-Mo)/W` | `1.078 m` | 接近基底中央 |\n| 偏心距 | `e = B/2 - x_R = 1.05-1.078` | `-0.028 m` | `|e| < B/6 = 0.35 m` |\n| 平均壓力 | `q = W/B = 16.2/2.1` | `7.71 t/m²` |  |\n| 最大基底壓力 | `qmax = q(1+6|e|/B)` | `8.33 t/m²` | 小於 `45 t/m²` |\n| 最小基底壓力 | `qmin = q(1-6|e|/B)` | `7.10 t/m²` | 正值，無拉力 |\n\n因此，在上述幾何解讀、忽略被動土壓且充分排水之條件下，本擋土牆抗傾倒、抗滑動與承載力均符合安全要求。若考試圖面對入土部分、基底寬或回填作用高度另有指定，應以原圖幾何重新計算；但作答架構仍為主動土壓、牆重、抗滑、抗傾倒及承載壓力逐項檢核。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "110-測量學-第一題：地形測量工具選擇", "year": "110", "subject": "測量學", "title": "第一題：地形測量工具選擇", "number": "第一題", "question": "一、水土保持地形測量是以控制測量成果為依據，並依計畫區面積、精度、 密度、比例尺、水下資料及時程等要求條件下，請詳述如何選擇適用在 地面、水下、空中和衛星的測量工具及方法，進行量測地貌和地物的平 面位置及高程。（25 分）", "brief": "地面可用全站儀、GNSS RTK、水準儀；水下用測深儀、ADCP、聲納；空中用 UAV 攝影測量或航空 LiDAR；衛星用 GNSS、衛星影像與 InSAR。選擇依面積、精度、植被、地形複雜度、工期與成本決定。", "detail": "小範圍、高精度、遮蔽多的地區適合全站儀與水準儀，可量測地物細節與高程。開闊地可用 GNSS RTK 快速取得三維坐標。大範圍山坡地可用 UAV 攝影測量產製正射影像與 DEM，若植被濃密或需穿透林冠，航空 LiDAR 較佳。河道、水庫或農塘需水下地形時，可用單音束或多音束測深儀，配合 GNSS 定位；ADCP 可兼測流速。\n\n衛星方法如高解析衛星影像適合大範圍判釋，InSAR 可監測地表變形，GNSS 可作控制測量。實務上常採整合方式：GNSS 建控制，全站儀補測遮蔽細部，UAV 或 LiDAR 建 DEM，水下聲納補河床，最後統一坐標系統與精度檢核。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "110-測量學-第二題：取土區土方量", "year": "110", "subject": "測量學", "title": "第二題：取土區土方量", "number": "第二題", "question": "二、在取土區 A 點測站架設電子測距經緯儀，高程 108.60 m，測量地面 1, 2, 3, 4, 5 測點之方位角和水平距離，測量結果如下表，請計算測量範 圍內高程在 100.00 m 以上的土方量約有多少 m3？（25 分） 測站 測點 方位角讀數 水平距離（m） 高程（m） A 1 1808'02\\\" 52.89 100.56 2 8118'57\\\" 30.68 100.02 3 13658'34\\\" 68.96 100.29 4 21340'39\\\" 46.35 100.41 5 31235'58\\\" 32.28 100.38", "brief": "以 A 點與相鄰測點構成三角形，將方位角與距離轉為平面坐標，逐三角形計算面積，再以三角形三頂點高於 100 m 的平均高差乘面積求體積。依此計算總面積約 4668.87 m²，若 A 點高程 108.60 m 視為地面點，體積約 14,415 m³。", "detail": "先將各點以 ΔE = d sinα、ΔN = d cosα 轉為相對坐標，再按 1-2-3-4-5 順序與 A 點形成五個三角形。每一三角形面積 Ai = |x1y2-x2y1|/2。基準高程為 100.00 m，各點高差為 hi = Hi-100。每一三角形體積 Vi = Ai(hA+hi+hj)/3。\n\n依題目數據計算，五邊形總面積約 4668.87 m²。若測站 A 高程 108.60 m 為取土區地面高程，hA = 8.60 m，五個三角形累加體積約 14,415 m³。若 108.60 m 僅為儀器視準高而非地面點高程，則不可用作三角形高程，需題目另給 A 點地面高程；考試作答時應說明此判斷。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "110-測量學-第三題：凹形豎曲線", "year": "110", "subject": "測量學", "title": "第三題：凹形豎曲線", "number": "第三題", "question": "三、已知對稱二次拋物線之凹形豎曲線，第一縱坡度為6.0%，第二縱坡度為 +8.0%，豎曲線長度 Lc = 60 m，豎曲線交點 P.V .I.的樁號 2k + 300.50，高 程為 190.460 m。試求豎曲線起點 B.V .C.，豎曲線終點 E.V .C和整樁為 20 m 時豎曲線各中心樁的樁號和設計高程為若干？豎曲線最低點的樁 號和設計高程為若干？（25 分）", "brief": "BVC 樁號 2K+270.50，高程 192.260 m；EVC 樁號 2K+330.50，高程 192.860 m。公式 H = HBVC + g1x + (g2-g1)x²/(2L)。20 m 整樁高程：2K+280 約 191.795 m，2K+300 約 191.505 m，2K+320 約 192.149 m。最低點 x = -g1L/(g2-g1)=25.714 m，樁號 2K+296.214，高程 191.489 m。", "detail": "**表格補充**\n\n| 項目 | 結果 |\n|---|---:|\n| BVC 樁號 | `2K+270.50` |\n| BVC 高程 | `192.260 m` |\n| EVC 樁號 | `2K+330.50` |\n| EVC 高程 | `192.860 m` |\n| 最低點樁號 | `2K+296.214` |\n| 最低點高程 | `191.489 m` |\n\n| 樁號 | 距 BVC `x` | 設計高程 |\n|---|---:|---:|\n| `2K+270.50` | `0.0 m` | `192.260 m` |\n| `2K+280` | `9.5 m` | `191.795 m` |\n| `2K+300` | `29.5 m` | `191.505 m` |\n| `2K+320` | `49.5 m` | `192.149 m` |\n| `2K+330.50` | `60.0 m` | `192.860 m` |\n\nPVI 樁號 2300.50，高程 190.460 m，曲線長 L=60 m，故 BVC = 2300.50-30 = 2270.50，EVC = 2330.50。g1=-0.06，g2=+0.08。BVC 高程 = PVI 高程 - g1×30 = 190.460 - (-0.06×30) = 192.260 m；EVC 高程 = 190.460 + 0.08×30 = 192.860 m。\n\n以 x 為距 BVC 之距離，H = 192.260 -0.06x + (0.14)x²/(120)。代入整樁：2K+280，x=9.5，H=191.795 m；2K+300，x=29.5，H=191.505 m；2K+320，x=49.5，H=192.149 m。最低點在坡度為零處，g1 + (g2-g1)x/L = 0，x = 25.714 m，樁號 2296.214，即 2K+296.214，高程 191.489 m。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "110-測量學-第四題：單曲線切線支距", "year": "110", "subject": "測量學", "title": "第四題：單曲線切線支距", "number": "第四題", "question": "四、已 知 單 曲 線 交 點 I.P.點 的 樁 號 為 2k + 468.900 ， 交 角 （ 外 偏 角 ）  = 1540'30\\\"，曲線半徑 R = 200 m，整樁 20 m 時曲線各中心樁的樁號 為若干？以切線支距法計算曲線各中心樁切線橫距（X）與切線支距（Y） 為若干？（25 分）", "brief": "Δ = 15°40'30\\\" = 15.675°。切線長 T = R tan(Δ/2)=27.530 m，曲線長 L = πRΔ/180 = 54.716 m。BC 樁號 2K+441.370，EC 樁號 2K+496.086。中心樁為 2K+460、2K+480，加起終點。切線支距：2K+460，X=18.603 m、Y=0.867 m；2K+480，X=38.390 m、Y=3.719 m；EC，X=54.036 m、Y=7.438 m。", "detail": "**表格補充**\n\n| 項目 | 結果 |\n|---|---:|\n| 交角 `Δ` | `15°40'30\" = 15.675°` |\n| 半徑 `R` | `200 m` |\n| 切線長 `T` | `27.530 m` |\n| 曲線長 `Lc` | `54.716 m` |\n| PC 樁號 | `2K+441.370` |\n| PT 樁號 | `2K+496.086` |\n\n| 樁號 | 弧長 `l` | 切線橫距 `X` | 切線支距 `Y` |\n|---|---:|---:|---:|\n| `2K+441.370` | `0.000 m` | `0.000 m` | `0.000 m` |\n| `2K+460` | `18.630 m` | `18.603 m` | `0.867 m` |\n| `2K+480` | `38.630 m` | `38.390 m` | `3.719 m` |\n| `2K+496.086` | `54.716 m` | `54.036 m` | `7.438 m` |\n\n單曲線切線長 T = R tan(Δ/2)。Δ = 15 + 40/60 + 30/3600 = 15.675°，R=200 m，T = 27.530 m。曲線長 Lc = πRΔ/180 = 54.716 m。交點 IP 樁號 2468.900，故曲線起點 PC = 2468.900 - 27.530 = 2441.370，曲線終點 PT = 2441.370 + 54.716 = 2496.086。\n\n整樁 20 m 時，曲線內中心樁為 2460 與 2480，並列 PC、PT。切線支距法以弧長 l = 樁號 - PC，中央角 θ = l/R（弧度），X = R sinθ，Y = R(1-cosθ)。PC：X=0、Y=0。2K+460：l=18.630，X=18.603 m，Y=0.867 m。2K+480：l=38.630，X=38.390 m，Y=3.719 m。PT：l=54.716，X=54.036 m，Y=7.438 m。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "109-土壤物理與沖蝕-第一題", "year": "109", "subject": "土壤物理與沖蝕", "title": "第一題", "number": "第一題", "question": "請說明造成土壤表面結皮（surface crusting）的肇因。（20 分）", "brief": "地表覆蓋可吸收雨滴動能、避免結皮、增加粗糙度、降低逕流速度並攔截泥砂。", "detail": "**表格補充**\n\n| 作用對象 | 覆蓋功能 |\n|---|---|\n| 雨濺沖蝕 | 吸收雨滴能量，避免團粒破碎與孔隙堵塞 |\n| 片蝕 | 增加地表粗糙度，降低薄層流速度 |\n| 細溝蝕 | 分散逕流，降低集中水流 |\n| 水分管理 | 減少蒸發，促進入滲與種子發芽 |\n\n裸露地表受雨滴撞擊後，土粒分散並堵塞孔隙，形成結皮，使入滲下降、逕流增加。敷蓋、枯落物、植生毯、草生覆蓋與作物殘株可先吸收雨滴動能，減少濺蝕；同時增加地表粗糙度，使逕流流速與剪應力降低。活體植生根系還能改善團粒、增加孔隙與抗剪強度，因此兼具短期防沖蝕與長期土壤改良效果。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "109-土壤物理與沖蝕-第二題", "year": "109", "subject": "土壤物理與沖蝕", "title": "第二題", "number": "第二題", "question": "請說明影響土壤入滲性（infiltration）的關鍵因子。（25 分）", "brief": "土壤水分與孔隙決定入滲、保水、排水與逕流。大孔隙促進入滲與通氣，小孔隙提高保水；表面結皮、壓實與高初始含水量會降低入滲並增加逕流，接近飽和時孔隙水壓上升且邊坡穩定性下降。", "detail": "**表格補充**\n\n| 概念 | 技師考試作答重點 |\n|---|---|\n| 入滲 | 水由地表進入土壤，受雨強、孔隙、初始含水量與表面結皮影響 |\n| 滲透/水力傳導 | 水在土體內受水頭梯度流動 |\n| 田間含水量 | 重力水排除後土壤保留水分 |\n| 凋萎點 | 植物無法再吸水恢復之含水量 |\n| 水分特性曲線 | 含水量與基質吸力關係，砂土曲線陡、黏土保水高 |\n\n土壤水分可用重量含水量、體積含水量、飽和度與水勢表示。砂土大孔隙多，入滲快、排水快、保水差；黏土微孔隙多，保水高但入滲與排水慢。土壤水分特性曲線可用壓力板、張力計、砂箱、離心法或露點水勢儀測得，並有乾濕過程不同的遲滯現象。坡地上若入滲不足，地表逕流與片蝕增加；若土體接近飽和，孔隙水壓上升、有效應力降低，可能誘發崩塌。\n\n**手冊補強：農藝保育、覆蓋與草生措施**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 覆蓋功能 | 降低雨滴動能、減少表面結皮、增加入滲、降低逕流流速並攔阻泥砂 |\n| 覆蓋材料 | 可用敷蓋材料、覆蓋作物、草生帶、殘株、植生毯或有機覆蓋物 |\n| 農地排水 | 農路、平台、山邊溝、縱橫向排水與安全出口須整體規劃 |\n| 草生措施 | 草溝、草帶與緩衝帶可分散逕流、增加粗糙度、過濾泥砂並改善入滲 |\n| 管理維護 | 需定期修剪、補植、清淤，避免草生帶被車輛破壞或被集中水流切穿 |\n\n農地與坡面沖蝕題可補手冊式結論：以農藝方法先減少土砂生產，再以排水與沉砂設施控制土砂輸出，效果比單靠末端沉砂池更穩定。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "109-土壤物理與沖蝕-第三題", "year": "109", "subject": "土壤物理與沖蝕", "title": "第三題", "number": "第三題", "question": "一開發基地於整地期間除了剷除既有地表植生外，並將基地整理成為Ａ、Ｂ 兩分區，Ａ區位於Ｂ區的上坡面，基地總面積為 1.35 公頃。Ａ區的坡面長度 為 45 公尺、平均坡度為 9%；Ｂ區的坡面長度為 90 公尺、平均坡度為 5%。 已知開發基地所在位置的年平均降雨沖蝕指數 Rm = 10000 MJ-mm/ha-hr-yr、 土壤沖蝕性指數 Km = 0.023 ton-ha-hr-yr/MJ-mm-ha-yr。請利用 Foster & Wischmeier（1974）的土壤流失比例及通用土壤流失公式，估算該開發基地 於整地期間的土壤流失量（ton/yr）。（30 分）", "brief": "坵塊法將基地劃分為小坵塊，由各坵塊高差與水平距離求坡度後面積加權；等高線法以等高線總長、等高距與面積估算平均坡度。坵塊法適合細部分區判定，等高線法適合整體地形快速估算。", "detail": "**表格補充**\n\n| 方法 | 計算概念 | 適用 |\n|---|---|---|\n| 坵塊法 | 各坵塊坡度面積加權 | 分區、法規坡度判定 |\n| 等高線法 | `S≈等高距×等高線總長/面積` | 大範圍平均坡度 |\n| 差異 | 坵塊法較細，等高線法較概略 | 視資料精度選用 |\n\n兩法都需注意比例尺、等高距與地形複雜度。坡度分級管制時，應依規範指定方法計算。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。\n\n**手冊補強：道路、農路與開挖整地**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 路線選擇 | 避免通過順向坡、崩塌地、湧水區及地質破碎帶，並減少大挖大填 |\n| 排水配置 | 山邊溝、路側溝、橫向排水、跌水消能與出口保護須配合道路縱坡配置 |\n| 邊坡保護 | 上邊坡重截水與護坡，下邊坡重填方穩定、排水與坡腳保護 |\n| 施工防災 | 土方工程應分期施工，裸露面即時覆蓋，臨時沉砂與臨時排水應先行完成 |\n| 維護管理 | 定期清理側溝、涵管、沉砂池與排水出口，豪雨後檢查沖刷、裂縫與邊坡變形 |\n\n道路水土保持答案可補一句總結：道路本身常成為集中逕流通道，因此設計重點不只在路面通行，還包括截水、導水、消能、沉砂與安全排放。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "30分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；USLE 題重點是 A=R K LS C P，並分清楚 C 為覆蓋管理、P 為保育措施效果。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "109-土壤物理與沖蝕-第四題", "year": "109", "subject": "土壤物理與沖蝕", "title": "第四題", "number": "第四題", "question": "請闡述地表敷、覆蓋對於土壤沖蝕的土砂生產（sediment production）及 土砂產出（sediment yield）控制的影響。（25 分）", "brief": "地表覆蓋可吸收雨滴動能、避免結皮、增加粗糙度、降低逕流速度並攔截泥砂。", "detail": "**表格補充**\n\n| 作用對象 | 覆蓋功能 |\n|---|---|\n| 雨濺沖蝕 | 吸收雨滴能量，避免團粒破碎與孔隙堵塞 |\n| 片蝕 | 增加地表粗糙度，降低薄層流速度 |\n| 細溝蝕 | 分散逕流，降低集中水流 |\n| 水分管理 | 減少蒸發，促進入滲與種子發芽 |\n\n裸露地表受雨滴撞擊後，土粒分散並堵塞孔隙，形成結皮，使入滲下降、逕流增加。敷蓋、枯落物、植生毯、草生覆蓋與作物殘株可先吸收雨滴動能，減少濺蝕；同時增加地表粗糙度，使逕流流速與剪應力降低。活體植生根系還能改善團粒、增加孔隙與抗剪強度，因此兼具短期防沖蝕與長期土壤改良效果。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。\n\n**手冊補強：農藝保育、覆蓋與草生措施**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 覆蓋功能 | 降低雨滴動能、減少表面結皮、增加入滲、降低逕流流速並攔阻泥砂 |\n| 覆蓋材料 | 可用敷蓋材料、覆蓋作物、草生帶、殘株、植生毯或有機覆蓋物 |\n| 農地排水 | 農路、平台、山邊溝、縱橫向排水與安全出口須整體規劃 |\n| 草生措施 | 草溝、草帶與緩衝帶可分散逕流、增加粗糙度、過濾泥砂並改善入滲 |\n| 管理維護 | 需定期修剪、補植、清淤，避免草生帶被車輛破壞或被集中水流切穿 |\n\n農地與坡面沖蝕題可補手冊式結論：以農藝方法先減少土砂生產，再以排水與沉砂設施控制土砂輸出，效果比單靠末端沉砂池更穩定。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "109-坡地水文學-第一題", "year": "109", "subject": "坡地水文學", "title": "第一題", "number": "第一題", "question": "某坡地集水區之集流等時線（isochrons）如下左圖所示，O 點為集水區 下游出口，各等時線間之集水面積如下表所示。該集水區發生如下右圖 之降雨事件。 A1 A2 A3 A4 A5 A6 面積（平方公里） 0.2 0.8 1.0 1.2 1.2 1.0 假設該集水區之降雨損失以指數且 1 /5  公厘 分鐘計，且降雨事件在 空間上均勻降雨。  O 點在第 15 分鐘之直接逕流量是由集水區內那些地區貢獻而來？（5 分）", "brief": "水文計算先決定設計雨量、集流時間、逕流係數與集水面積，再求洪峰或歷線；滯洪量由入流與出流歷線最大累積差決定。", "detail": "**表格補充**\n\n| 題型 | 常用公式或方法 |\n|---|---|\n| 合理化公式 | `Q = C I A / 360`，A 用 ha、I 用 mm/hr |\n| 頻率分析 | 由重現期決定超越機率與頻率因子 |\n| 單位歷線 | 有效雨量乘單位歷線並依時間疊加 |\n| 滯洪量 | `dS/dt = I(t)-O(t)`，取最大蓄水量 |\n| 降雨損失 | φ 指數、入滲率或有效雨量計算 |\n\n作答時應先畫出水文流程：降雨、損失、有效雨量、逕流、洪峰與蓄洪。合理化公式適用於小集水區洪峰估算，需以集流時間對應設計降雨強度。單位歷線題則將各時段有效雨量乘以單位歷線並平移疊加。滯洪池題應比較開發前後或允許放流量，利用入流與出流歷線差額求最大蓄水量。若題目只有洪峰而無歷線，不能唯一決定滯洪體積，應說明需雨型或歷線資料。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "5分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "109-坡地水文學-第二題", "year": "109", "subject": "坡地水文學", "title": "第二題", "number": "第二題", "question": " O 點在第 45 分鐘之直接逕流量是由那些時間的降雨量貢獻而來？（5 分）", "brief": "O 點第 45 分鐘的直接逕流量，由「降雨時間 + 該等時區到達出口時間 = 45 分鐘」的有效降雨共同貢獻。若等時線間距為 5 分鐘，則包括第 40-45 分鐘落在最接近出口等時區、第 35-40 分鐘落在 5-10 分鐘等時區、第 30-35 分鐘落在 10-15 分鐘等時區，依此類推；各等時區有效雨量乘其面積後相加，即為 45 分鐘在 O 點的直接逕流來源。", "detail": "等時線法的核心是把集水區依「逕流到達出口所需時間」分區。O 點某一時刻的直接逕流，不是由同一時刻全流域降雨形成，而是由不同時間落在不同等時區的有效降雨同時抵達出口而形成。\n\n以本題問第 45 分鐘為例，判斷原則如下：\n\n| 到達出口時間 | 對應降雨時間 | 對 O 點 45 分鐘流量之貢獻 |\n|---:|---:|---|\n| `0-5 min` | `40-45 min` | 最下游等時區降雨 |\n| `5-10 min` | `35-40 min` | 次下游等時區降雨 |\n| `10-15 min` | `30-35 min` | 第三等時區降雨 |\n| `15-20 min` | `25-30 min` | 第四等時區降雨 |\n| `20-25 min` | `20-25 min` | 第五等時區降雨 |\n| `25-30 min` | `15-20 min` | 第六等時區降雨 |\n\n若題圖還有更上游等時區，則依同一規則繼續往前推。計算時可寫為 `Q45 = Σ Pe(ti) Ai / Δt`，其中 `Pe(ti)` 為對應時段有效雨量，`Ai` 為該等時區面積，`Δt` 為時間間隔。若題目提供各區面積與雨量，須逐格相乘並換算為 cms。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "5分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "109-坡地水文學-第三題", "year": "109", "subject": "坡地水文學", "title": "第三題", "number": "第三題", "question": " O 點之尖峰直接逕流量為若干？[請詳細說明計算過程，並務必以 立方米/秒表示之。]（15 分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "15分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "109-坡地水文學-第四題", "year": "109", "subject": "坡地水文學", "title": "第四題", "number": "第四題", "question": "5分鐘 10分鐘 15分鐘 20分鐘 25分鐘 30分鐘 0 5 10 15 20 25 30 35 40 分鐘 10 3 4 6 7 9 A1 A2 A3 A4 A5 A6 0 5 10 15 20 25 30 35 40分鐘 10 3 4 6 7 9 公厘/ 5分鐘 (mm/5-minute) O 代號：02850 頁次：2－2 某雨量站之降雨強度-延時-頻率曲線如下圖。該站 6 小時延時年最大降 雨量具對數常態分布。 該雨量站 6 小時延時年最大降雨量之中位數（median）為若干公厘？ （6 分）", "brief": "水文計算先決定設計雨量、集流時間、逕流係數 。\n\n在水土保持設計上，設計雨型可輸入單位歷線、合理化公式延伸法或水文模式，用來計算入流歷線、滯洪池容量、沉砂滯洪共構水位、排水路流量及施工中臨時防災需求。若雨峰集中在前段，洪峰通常較早出現；若雨峰集中且強度高，滯洪與排水設施需求會增加。", "source_type": "past", "source_label": "歷屆考古題", "points": "7分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "109-坡地水文學-第11題", "year": "109", "subject": "坡地水文學", "title": "第11題", "number": "第11題", "question": "河川演算（channel routing）（6 分）", "brief": "本題答案包含定義、主要機制、影響因子與工程應用四部分：先說明該概念的功能，再列出控制因素，最後連結至水土保持設計、調查、施工或維護管理上的用途。", "detail": "完整答案應包含定義、目的、機制、適用條件、優缺點與實務注意事項。若涉及計算，需列公式、統一單位、代入數值並寫出結論。", "source_type": "past", "source_label": "歷屆考古題", "points": "6分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "109-植生工程-第一題", "year": "109", "subject": "植生工程", "title": "第一題", "number": "第一題", "question": "試述坡地開發整地既有樹木之保留與處理原則。（20 分）", "brief": "植生工程的答案核心是立地條件與植物材料相配合：先改善排水與生育基盤，再選用適地、根系發達、耐逆境且不具入侵性的草灌木或喬木，最後以補植、灌溉、追肥與豪雨後修復確保覆蓋率與成活率。", "detail": "**表格補充**\n\n| 步驟 | 作答重點 |\n|---|---|\n| 立地調查 | 坡度、坡向、土壤、含水、pH、養分、沖蝕與穩定性 |\n| 基礎工 | 截排水、削坡、客土、土壤改良、網材或格框固定 |\n| 植物選擇 | 適地適種、根系發達、耐逆境、材料穩定、避免入侵 |\n| 導入方法 | 撒播、噴植、植生毯、植生袋、苗木、扦插 |\n| 養護 | 補植、灌溉、追肥、刈割、病蟲害與豪雨後修復 |\n\n植生工程不是單純播種，而是利用植物與基盤工程共同恢復坡面穩定與生態功能。崩塌地或道路邊坡需先處理排水與坡面穩定，再依土壤條件選擇草本、灌木或喬木。礦區與不良土壤須客土、調 pH、補有機質與養分。河溪護岸植栽需分區配置耐水、耐沖刷與根系發達植物。若為群落調查，應使用覆蓋度、密度、頻度、重要值、歧異度與相似性等指標評估。\n\n**手冊補強：道路、農路與開挖整地**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 路線選擇 | 避免通過順向坡、崩塌地、湧水區及地質破碎帶，並減少大挖大填 |\n| 排水配置 | 山邊溝、路側溝、橫向排水、跌水消能與出口保護須配合道路縱坡配置 |\n| 邊坡保護 | 上邊坡重截水與護坡，下邊坡重填方穩定、排水與坡腳保護 |\n| 施工防災 | 土方工程應分期施工，裸露面即時覆蓋，臨時沉砂與臨時排水應先行完成 |\n| 維護管理 | 定期清理側溝、涵管、沉砂池與排水出口，豪雨後檢查沖刷、裂縫與邊坡變形 |\n\n道路水土保持答案可補一句總結：道路本身常成為集中逕流通道，因此設計重點不只在路面通行，還包括截水、導水、消能、沉砂與安全排放。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "109-植生工程-第二題", "year": "109", "subject": "植生工程", "title": "第二題", "number": "第二題", "question": "試述海岸河口沙洲與沙丘之形成機制，並比較其土壤理化性質與揚塵抑 制工法之不同。（20 分）", "brief": "風蝕顆粒運動包含懸浮、跳躍與表面蠕移；防治原則為降低風速、固定砂源、增加覆蓋與提高地表粗糙度。", "detail": "**表格補充**\n\n| 風蝕運動 | 顆粒特性 | 防治重點 |\n|---|---|---|\n| 懸浮 | 細粉砂、黏粒，可遠距離搬運 | 覆蓋裸露地、濕潤與防風 |\n| 跳躍 | 中砂為主，撞擊造成連鎖剝離 | 草帶、防風林、粗糙化 |\n| 蠕移/滾動 | 較粗顆粒沿地表移動 | 固砂、植生、障礙物 |\n\n風蝕常發生於乾燥、裸露、細粒且缺乏植被的地表。海岸、河口沙洲、裸露工區或乾燥農地均可能發生。防治上可設防風林、防風籬、草方格、植生帶、敷蓋、噴覆穩定劑或灑水管理。海岸植生需選耐鹽、耐風、耐砂埋植物，並以前線草本定砂、後方灌木喬木防風的分帶方式建立。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。\n\n**手冊補強：河岸植生、濕地與防風定砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 河岸植生 | 需依水位、流速、沖刷、坡度與土壤含水配置草本、灌木、喬木與柔性護岸材料 |\n| 濕地護岸 | 宜營造緩坡、多孔隙、多水深與水陸交界帶，兼顧水質淨化、棲地與安全 |\n| 海岸定砂 | 先定砂、後防風、再造林，植物需耐鹽、耐旱、耐風砂掩埋 |\n| 防風林 | 林帶密度、寬度、高度與樹種配置影響防風距離與減風效果 |\n| 維護管理 | 需防止外來種入侵、枯死裸露、沖刷破壞與人為踩踏破壞 |\n\n生態與植生題可補充：護岸或綠帶設計應同時考慮防災功能與棲地功能，避免只追求硬體穩定而造成棲地破碎。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "109-植生工程-第三題", "year": "109", "subject": "植生工程", "title": "第三題", "number": "第三題", "question": "國土生態綠網所推動之河川綠帶可減低棲地破碎化的衝擊，試述如何規 劃濱水區植生緩衝帶寬度。（20 分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。\n\n**手冊補強：農藝保育、覆蓋與草生措施**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 覆蓋功能 | 降低雨滴動能、減少表面結皮、增加入滲、降低逕流流速並攔阻泥砂 |\n| 覆蓋材料 | 可用敷蓋材料、覆蓋作物、草生帶、殘株、植生毯或有機覆蓋物 |\n| 農地排水 | 農路、平台、山邊溝、縱橫向排水與安全出口須整體規劃 |\n| 草生措施 | 草溝、草帶與緩衝帶可分散逕流、增加粗糙度、過濾泥砂並改善入滲 |\n| 管理維護 | 需定期修剪、補植、清淤，避免草生帶被車輛破壞或被集中水流切穿 |\n\n農地與坡面沖蝕題可補手冊式結論：以農藝方法先減少土砂生產，再以排水與沉砂設施控制土砂輸出，效果比單靠末端沉砂池更穩定。\n\n**手冊補強：河岸植生、濕地與防風定砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 河岸植生 | 需依水位、流速、沖刷、坡度與土壤含水配置草本、灌木、喬木與柔性護岸材料 |\n| 濕地護岸 | 宜營造緩坡、多孔隙、多水深與水陸交界帶，兼顧水質淨化、棲地與安全 |\n| 海岸定砂 | 先定砂、後防風、再造林，植物需耐鹽、耐旱、耐風砂掩埋 |\n| 防風林 | 林帶密度、寬度、高度與樹種配置影響防風距離與減風效果 |\n| 維護管理 | 需防止外來種入侵、枯死裸露、沖刷破壞與人為踩踏破壞 |\n\n生態與植生題可補充：護岸或綠帶設計應同時考慮防災功能與棲地功能，避免只追求硬體穩定而造成棲地破碎。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "109-植生工程-第四題", "year": "109", "subject": "植生工程", "title": "第四題", "number": "第四題", "question": "試說明需研發無人飛行載具（Unmanned Aerial Vehicle, UA V）植生技術， 以及要引用外來草種進行航空噴植之理由。（20 分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "109-植生工程-第五題", "year": "109", "subject": "植生工程", "title": "第五題", "number": "第五題", "question": "試述植生工程施作工區可能發生之植生問題與因應對策。（20 分）", "brief": "植生透過截留、入滲、蒸散、土壤蓄水、根系固土與碳吸存，改善坡地水文與防災韌性。", "detail": "**表格補充**\n\n| 水文因子 | 植生作用 |\n|---|---|\n| 截留 | 樹冠與枯落物截留雨水，減少雨滴能量 |\n| 入滲 | 根系與有機質改善孔隙 |\n| 逕流 | 粗糙度增加，洪峰降低且延遲 |\n| 基流 | 土壤蓄水與地下水補注較穩定 |\n| 泥砂 | 覆蓋與根系減少沖蝕 |\n| 碳匯 | 增加生物量與土壤有機碳 |\n\n良好植生可降低洪峰、減少泥砂、維持基流並改善棲地。森林或草灌覆蓋先截留降雨，再由枯落物與根系增加入滲，使水分以壤中流或地下水方式緩慢匯出。以自然為本的解決方案 NbS 強調利用濕地、河岸林、滯洪綠地、坡地植生與生態廊道，同時達成防災、水質、棲地與碳匯效益。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "109-水土保持工程-第一題", "year": "109", "subject": "水土保持工程", "title": "第一題", "number": "第一題", "question": "請論述野溪特徵及其災害型態為何？（20分）", "brief": "野溪與土石流治理應採源頭減砂、通道控流、下游保全，並兼顧生態廊道與維護管理。", "detail": "**表格補充**\n\n| 區位 | 治理重點 |\n|---|---|\n| 發生區 | 崩塌源頭控制、山腹工、植生、排水 |\n| 流動區 | 固床、護岸、導流、透過型防砂 |\n| 堆積區 | 沉砂、攔阻、清淤、導流堤、保全 |\n| 生態面 | 保留孔隙、粗糙度、魚道與濱溪植生 |\n\n野溪工程須先判斷土砂來源、洪峰、河床坡度、粒徑與保全對象。防砂壩、固床工、護岸、沉砂池與導流堤應配合配置，不宜只做單點工程。生態護岸或預鑄護岸需兼顧抗沖刷、基礎護腳、反濾排水、孔隙與植生。施工與完工後清淤維護同樣重要。\n\n**手冊補強：野溪治理與土砂控制**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 治理目標 | 穩定流心、控制縱橫向沖刷、調節土砂、維持通洪斷面並保護下游保全對象 |\n| 處理順序 | 先判斷上游供砂、中游輸砂與下游淤積，再決定源頭減砂、溪床穩定、清淤疏通或沉砂防砂 |\n| 清淤疏通 | 緊急清疏以恢復通洪與降低堰塞風險；計畫清疏則應配合河床坡降、土砂來源與上下游穩定 |\n| 工程配置 | 固床工、防砂壩、護岸、護坦、跌水消能、導流與沉砂空間須整體配置，不宜只做局部硬化 |\n| 維護管理 | 豪雨後巡查淤積、淘刷、堵塞與構造物損壞，並建立清淤、補強及棄土去化計畫 |\n\n作答時可強調手冊式觀念：野溪治理不是單純把河道挖深或截彎取直，而是要維持水流、泥砂與河床坡降的動態平衡；若只清除下游淤積而未處理上游供砂與坡面沖蝕，災害會反覆發生。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "109-水土保持工程-第二題", "year": "109", "subject": "水土保持工程", "title": "第二題", "number": "第二題", "question": "在土石流潛勢溪流從事水土保持工程設計時應該如何估算土石流之 設計流量？（假設清水逕流之設計流量 Qw 及土石流之土砂體積濃度 Cd 為已知）（20分）", "brief": "水文計算先決定設計雨量、集流時間、逕流係數與集水面積，再求洪峰或歷線；滯洪量由入流與出流歷線最大累積差決定。", "detail": "**表格補充**\n\n| 題型 | 常用公式或方法 |\n|---|---|\n| 合理化公式 | `Q = C I A / 360`，A 用 ha、I 用 mm/hr |\n| 頻率分析 | 由重現期決定超越機率與頻率因子 |\n| 單位歷線 | 有效雨量乘單位歷線並依時間疊加 |\n| 滯洪量 | `dS/dt = I(t)-O(t)`，取最大蓄水量 |\n| 降雨損失 | φ 指數、入滲率或有效雨量計算 |\n\n作答時應先畫出水文流程：降雨、損失、有效雨量、逕流、洪峰與蓄洪。合理化公式適用於小集水區洪峰估算，需以集流時間對應設計降雨強度。單位歷線題則將各時段有效雨量乘以單位歷線並平移疊加。滯洪池題應比較開發前後或允許放流量，利用入流與出流歷線差額求最大蓄水量。若題目只有洪峰而無歷線，不能唯一決定滯洪體積，應說明需雨型或歷線資料。\n**計算或圖表注意**\n\n本題含數值、表格或圖形。作答時應先列公式、統一單位，再依原題圖表逐項代入；若 PDF 抽文字未含圖形尺寸，應回原 PDF 讀取圖上資料後完成最後數值。\n\n**手冊補強：野溪治理與土砂控制**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 治理目標 | 穩定流心、控制縱橫向沖刷、調節土砂、維持通洪斷面並保護下游保全對象 |\n| 處理順序 | 先判斷上游供砂、中游輸砂與下游淤積，再決定源頭減砂、溪床穩定、清淤疏通或沉砂防砂 |\n| 清淤疏通 | 緊急清疏以恢復通洪與降低堰塞風險；計畫清疏則應配合河床坡降、土砂來源與上下游穩定 |\n| 工程配置 | 固床工、防砂壩、護岸、護坦、跌水消能、導流與沉砂空間須整體配置，不宜只做局部硬化 |\n| 維護管理 | 豪雨後巡查淤積、淘刷、堵塞與構造物損壞，並建立清淤、補強及棄土去化計畫 |\n\n作答時可強調手冊式觀念：野溪治理不是單純把河道挖深或截彎取直，而是要維持水流、泥砂與河床坡降的動態平衡；若只清除下游淤積而未處理上游供砂與坡面沖蝕，災害會反覆發生。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "109-水土保持工程-第三題", "year": "109", "subject": "水土保持工程", "title": "第三題", "number": "第三題", "question": "防砂壩之溢洪口斷面大小如何設計？（假設斷面為矩形且設計流量 Qw 為已知）（20分）", "brief": "水文計算先決定設計雨量、集流時間、逕流係數與集水面積，再求洪峰或歷線；滯洪量由入流與出流歷線
