題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "113-測量學-第一題：先驗與後驗中誤差", "year": "113", "subject": "測量學", "title": "第一題：先驗與後驗中誤差", "number": "第一題", "question": "一、某段距離的三個觀測成果分別為 200.23 m 0.01 m 、200.25 m 0.04 m 及 200.28 m 0.02 m ，假設三個觀測成果彼此獨立不相關： 請分別計算此段距離的先驗（a priori）中誤差及後驗（a posteriori）中 誤差。（18 分） 請說明先驗及後驗中誤差在誤差處理上所代表的意義為何？（7 分）", "brief": "以權 p = 1/m² 計算，加權平均距離為 200.240 m。平均值先驗中誤差 m = 1/sqrt(Σp) = 0.0087 m。殘差為 -0.0105、0.0095、0.0395 m，後驗單位權中誤差約 1.5905，後驗平均中誤差為 0.0139 m。", "detail": "**表格補充**\n\n| 觀測 | 距離 `x` | 中誤差 `m` | 權 `p=1/m²` | 殘差 `v=x-x̄` |\n|---:|---:|---:|---:|---:|\n| 1 | `200.23` | `0.01` | `10000` | `-0.01048` |\n| 2 | `200.25` | `0.04` | `625` | `0.00952` |\n| 3 | `200.28` | `0.02` | `2500` | `0.03952` |\n\n| 項目 | 結果 |\n|---|---:|\n| 加權平均 `x̄=Σpx/Σp` | `200.240476 m` |\n| 先驗平均中誤差 `1/sqrt(Σp)` | `0.00873 m` |\n| 後驗單位權中誤差 `sqrt(Σpvv/(n-1))` | `1.5905` |\n| 後驗平均中誤差 | `0.01388 m` |\n\n三觀測值分別為 x1 = 200.23、x2 = 200.25、x3 = 200.28 m，中誤差為 0.01、0.04、0.02 m。取權 p = 1/m²，得 p1 = 10000、p2 = 625、p3 = 2500。加權平均 xbar = Σpx/Σp = 200.240476 m，約 200.240 m。\n\n先驗平均中誤差為 m_x = 1/sqrt(Σp) = 1/sqrt(13125) = 0.00873 m。殘差 vi = xi - xbar，分別為 -0.01048、0.00952、0.03952 m。後驗單位權中誤差 m0 = sqrt(Σpvv/(n-1)) = 1.5905。後驗平均中誤差為 m_x_post = m0/sqrt(Σp) = 0.01388 m。先驗中誤差代表觀測前由儀器、方法或已知精度給定的預期不確定度；後驗中誤差則由實際殘差估算，可反映觀測是否一致、有無粗差及權設定是否合理。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "113-測量學-第二題：真實正射影像", "year": "113", "subject": "測量學", "title": "第二題：真實正射影像", "number": "第二題", "question": "二、請說明真實正射影像（true orthoimage ）與傳統正射影像（traditional orthoimage）的差別？（13 分）以航空攝影測量技術製作真實正射影像 時，有時會出現如扭曲、重影或破洞等影像瑕疵（artifacts），請說明造成 這些影像瑕疵的原因為何？（12 分）", "brief": "傳統正射影像主要以 DEM 改正地形起伏，無法完全改正建物、橋梁、樹木等高出地表物造成的傾倒位移；真實正射影像使用 DSM 或三維模型改正地物高度，建物屋頂與地面位置較正確。瑕疵如扭曲、重影、破洞常由遮蔽、DSM 錯誤、影像匹配不良、拼接接縫及視角差造成。", "detail": "傳統正射影像的目的在消除像片傾斜與地形起伏造成的位移，使影像具有地圖量測性。但若只使用裸地 DEM，高樓、橋梁、樹木等地上物仍會有傾倒位移，建物屋頂可能偏離地面位置，且高物遮蔽區無法正確表現。真實正射影像則使用 DSM、密集匹配點雲或三維建物模型，將地上物高度納入微分糾正，使建物屋頂、道路與地物邊界位置更接近正射投影。\n\n真實正射製作常見 artifacts 包括扭曲、重影與破洞。扭曲可能來自 DSM 高程錯誤、匹配雜訊或幾何模型不準。重影常發生於多張影像鑲嵌時，同一高物在不同視角位置不一致，或遮蔽區被不同影像重複投影。破洞則因建物後方遮蔽區沒有影像資訊，或 DSM 與影像解析度不匹配。改善方法包括提高影像重疊率、使用品質較佳 DSM、遮蔽偵測、最佳視角選影、人工修補與接縫最佳化。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "113-測量學-第三題：API、WMS、WFS", "year": "113", "subject": "測量學", "title": "第三題：API、WMS、WFS", "number": "第三題", "question": "三、網路服務已成為近年來地理空間資料流通及分享的主要方式，請分別說 明 API（Application Programming Interface）、WMS（Web Map Service） 及 WFS（Web Feature Service）等三種網路服務之運作模式，並舉一種水 土保持地理資料為例，說明此三種服務所提供資料之形式及格式。（25 分）", "brief": "API 是系統間交換資料與功能的介面，可回傳 JSON、XML、GeoJSON 等；WMS 提供地圖影像服務，回傳 PNG/JPEG 圖磚或地圖圖像；WFS 提供向量圖徵服務，回傳 GML、GeoJSON 等可查詢屬性的圖徵資料。水土保持例子可用土石流潛勢溪流圖資。", "detail": "API 是應用程式介面，使用者透過 URL、參數、金鑰或請求方法向伺服器取得資料或執行功能。地理資料 API 可回傳 JSON、GeoJSON、XML 或自訂格式，適合系統整合與即時查詢。例如查詢某行政區土石流潛勢溪流清單，可回傳溪流編號、警戒值、位置與屬性。\n\nWMS 是 Web Map Service，使用者送出 GetMap 請求，指定圖層、範圍、坐標系統、比例尺與格式，伺服器回傳已渲染的地圖影像，如 PNG 或 JPEG。其優點是顯示快速、樣式一致，缺點是使用者通常不能直接編輯或取得完整向量屬性。WFS 是 Web Feature Service，回傳可解析的向量圖徵，如點、線、面及其屬性，格式可為 GML 或 GeoJSON。若以水土保持地理資料為例，WMS 可顯示土石流潛勢溪流線圖，WFS 則可取得每條溪流的線型幾何、流域面積、保全戶數與警戒資訊。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "113-測量學-第四題：土方測量方法", "year": "113", "subject": "測量學", "title": "第四題：土方測量方法", "number": "第四題", "question": "四、土方測量的方法包含橫斷面法（cross-section method）、借坑法（borrow- pit method）及等高線法（contour-area method），請分別說明其測量方法、 計算原理及適用場合。（25 分）", "brief": "橫斷面法沿路線定樁測橫斷面，以相鄰斷面平均面積乘距離求體積，適合道路、渠道等線形工程。借坑法以方格或坑區高程計算挖填，適合取土坑、整地場。等高線法由各等高線包圍面積與高差，用平均斷面或稜柱體公式求體積，適合水庫、滯洪池、山坡整地。", "detail": "橫斷面法先沿中心線每隔一定距離設樁，測量各樁左右地形橫斷面，依設計斷面計算每一樁之挖方面積與填方面積。相鄰斷面間體積可用平均端面法 V = L(A1 + A2)/2，或稜柱體公式 V = L(A1 + 4Am + A2)/6。適合道路、農路、溝渠、堤防等線形工程。\n\n借坑法常用於土石方採取區或整地區。可將區域劃分為方格，測量方格角點原地面高程與設計高程，求高差後以方格平均高差乘面積計算挖填體積。其優點是適合面狀場址，計算簡明；缺點是地形變化大時需縮小格距。等高線法則利用地形圖上各等高線所圍面積，依等高距計算相鄰高程間體積。可用平均斷面法或稜柱體公式，適合滯洪池、水庫庫容、山谷填築或大範圍地形體積估算。精度取決於等高線間距、測圖精度與地形複雜度。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "112-土壤物理與沖蝕-第一題：土壤可容許流失量", "year": "112", "subject": "土壤物理與沖蝕", "title": "第一題：土壤可容許流失量", "number": "第一題", "question": "一、請詳述土壤可容許流失量定義與影響因子。（20 分）", "brief": "土壤可容許流失量 T 值是指在不降低土地長期生產力、土壤功能及環境品質的前提下，單位面積每年可容忍的最大土壤流失量。影響因子包括土壤生成速率、土層厚度、土壤質地與構造、母質、坡度坡長、氣候、作物與覆蓋、土地利用、保育措施、土壤肥力、根系深度及下游環境承受能力。", "detail": "土壤可容許流失量（soil loss tolerance, T value）是水土保持規劃中判斷沖蝕是否可接受的重要基準。其意義不是土壤不會受害的絕對安全值，而是在長期尺度下，土壤流失量不超過土壤生成、風化補充與管理改良所能維持的範圍，使土壤厚度、有效根域、保水保肥力與作物生產力不致持續下降。\n\n影響 T 值的因子包括：第一，土壤生成速率與母質風化速度，生成快者容許量較高，生成慢者較低。第二，土層厚度與有效根域，深厚土壤較能承受表土流失，淺薄坡地、岩盤接近地表或有硬盤者容許量低。第三，土壤質地、構造、有機質與團粒穩定性會影響抗沖蝕能力與流失後恢復能力。第四，氣候與降雨強度影響沖蝕壓力。第五，坡度、坡長與地形位置影響逕流能量。第六，土地利用、耕作制度、植生覆蓋與保育措施會改變實際流失量。現代觀點還需考慮泥砂下游淤積、水質污染、碳儲存與生態功能，故 T 值應兼顧生產力與環境保全。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "112-土壤物理與沖蝕-第二題：坡面土壤改良", "year": "112", "subject": "土壤物理與沖蝕", "title": "第二題：坡面土壤改良", "number": "第二題", "question": "二、請詳述坡面土壤改良一般用於那些土壤特性的坡面，並會用何種方式處 理。（20 分）", "brief": "坡面土壤改良常用於貧瘠、酸鹼不適、壓實、硬度過高或過低、排水不良、保水保肥力差、鹽分或毒性物質高、團粒不穩定及缺乏表土的坡面。處理方式包括客土、施有機質、石灰或硫磺調 pH、肥料改良、深耕鬆土、排水、敷蓋、保水劑、土壤穩定劑、噴植基材與植生網材固定。", "detail": "坡面土壤改良的目的，是使坡面具備植物生長與抗沖蝕所需的物理、化學與生物條件。若坡面為砂質或礫質土，保水保肥力差，應增加有機質、客土、黏質材料或保水材料。若為黏重土、壓實土或硬盤土，根系穿透困難、入滲差，應鬆土、打孔、深耕、混入有機質並改善排水。若土壤過酸，可施石灰、苦土石灰或鹼性改良材；若過鹼或鈉化，需石膏、硫磺、有機質與淋洗排水。\n\n礦區、道路邊坡或崩塌地常缺乏表土與微生物，應採客土、厚層基材噴植、植生袋或植生毯，提供種子萌芽基盤。若坡面團粒不穩定、易結皮或沖蝕，應以敷蓋、纖維材料、土壤固化劑或高分子穩定劑保護。若地下水或滲水造成植生失敗，應先設截水溝、盲溝或水平排水。改良後需配合適地植物、養護灌溉與追肥，否則短期改善容易失效。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "112-土壤物理與沖蝕-第三題：土壤基本水分與密度名詞", "year": "112", "subject": "土壤物理與沖蝕", "title": "第三題：土壤基本水分與密度名詞", "number": "第三題", "question": "三、請詳述土壤顆粒密度、土壤含水量、飽和度、田間含水量與凋萎點定義。 （20 分）", "brief": "顆粒密度為土壤固體質量除以固體體積，常約 2.65 Mg/m³。土壤含水量為土壤含水多寡，可用重量含水量或體積含水量表示。飽和度為孔隙中被水充滿的比例。田間含水量是飽和土壤重力水排除後保留的水量。凋萎點是植物無法再吸水恢復膨壓時的土壤含水量。", "detail": "土壤顆粒密度 particle density 為土壤固體顆粒質量 Ms 除以固體顆粒體積 Vs，即 ρs = Ms/Vs，不包含孔隙體積。礦質土壤常約 2.65 g/cm³，有機質含量高時較低，鐵錳氧化物多時較高。土壤含水量可用重量含水量 w = Mw/Ms 表示，也可用體積含水量 θ = Vw/Vt 表示；兩者可用容重換算。\n\n飽和度 S 為水體積 Vw 與孔隙體積 Vv 之比，S = Vw/Vv × 100%。S = 100% 表示孔隙全被水充滿。田間含水量 field capacity 是土壤經充分濕潤後，重力水排出且排水速率明顯降低時保留的水分，常約對應 -1/10 至 -1/3 bar 基質勢，視質地而定。凋萎點 wilting point 是植物根系無法取得足夠水分、萎凋後置於飽和空氣仍不能恢復時的含水量，常以 -15 bar 或 -1500 kPa 作為永久凋萎點。田間含水量與凋萎點之差即為植物可用水的重要指標。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "112-土壤物理與沖蝕-第四題：土壤侵蝕控制方法", "year": "112", "subject": "土壤物理與沖蝕", "title": "第四題：土壤侵蝕控制方法", "number": "第四題", "question": "四、請詳述土壤侵蝕之控制方法。（20 分）", "brief": "控制方法包括減少雨滴打擊、降低逕流量與流速、增加入滲、縮短坡長、穩定坡面、攔阻泥砂及良好施工管理。具體措施有植生覆蓋、敷蓋、等高耕作、平台階段、截排水、草溝、沉砂池、護坡、坡腳保護、分期施工及裸露地即時保護。", "detail": "土壤侵蝕控制應依侵蝕機制處理。雨滴濺蝕與片蝕可用植生覆蓋、殘株覆蓋、稻草敷蓋、植生毯或噴覆材料降低雨滴動能。細溝與溝蝕則需控制地表逕流，透過坡頂截水、坡面分段排水、等高溝、草生水道、跌水與消能設施降低流速。坡面過長時，可用平台、階段、等高帶狀植生縮短有效坡長。\n\n在土壤性質方面，可增加有機質、改善團粒、避免壓實、提升入滲與抗蝕性。工程措施包括砌石護坡、格框、植生袋、固床工、沉砂池與滯洪沉砂設施。管理措施包括避開豪雨季施工、分區分期開挖、臨時排水、臨時沉砂、堆土覆蓋、施工道路穩定及豪雨前檢查。最佳策略通常是源頭減蝕、路徑控流、出口沉砂三者並用。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "112-土壤物理與沖蝕-第五題：分段坡面土壤流失量", "year": "112", "subject": "土壤物理與沖蝕", "title": "第五題：分段坡面土壤流失量", "number": "第五題", "question": "五、一裸露且無水土保持處理坡面，總坡長為 270m，可均分為上邊坡、中邊 坡及下邊坡三個等坡長坡面，坡面土壤沖蝕指數 Km 與坡度如下表所示。 當 地 降 雨 沖 蝕 指 數 為 24,912 MJ-mm/ha-hr-yr 。 請 採 用 Foster and Wischmeier（1974）年提出公式，推估全坡面土壤流失量（ton/ha-yr）， 並說明中邊坡的土壤流失比例（%）。（20 分） 參數值 上邊坡 中邊坡 下邊坡 土壤沖蝕指數 Km （tons-ha-hr-yr/ha-MJ-mm-yr） 0.03693 0.03857 0.03214 坡度（%） 7 20 9", "brief": "採 USLE 分段坡長概念，裸露且無保育處理故 C = P = 1，並取坡長指數 m = 0.5。以上、中、下坡段平均坡長因子與坡度因子計算後，三段土壤流失量約為 969.90、6601.13、2563.81 ton/ha-yr。全坡面面積平均土壤流失量為 (969.90+6601.13+2563.81)/3 = 3378.28 ton/ha-yr；中邊坡流失比例為 6601.13/(969.90+6601.13+2563.81)=65.13%。", "detail": "**表格補充**\n\n| 坡段 | 坡長範圍 | `K` | 坡度 | `S` 因子 | 平均 `L` 因子 | 土壤流失量 |\n|---|---:|---:|---:|---:|---:|---:|\n| 上邊坡 | `0-90 m` | `0.03693` | `7%` | `0.7842` | `1.3444` | `969.90 ton/ha-yr` |\n| 中邊坡 | `90-180 m` | `0.03857` | `20%` | `2.7948` | `2.4582` | `6601.13 ton/ha-yr` |\n| 下邊坡 | `180-270 m` | `0.03214` | `9%` | `1.0059` | `3.1832` | `2563.81 ton/ha-yr` |\n\n| 項目 | 計算 | 結果 |\n|---|---:|---:|\n| 全坡面平均流失量 | `(969.90+6601.13+2563.81)/3` | `3378.28 ton/ha-yr` |\n| 中邊坡流失比例 | `6601.13/(969.90+6601.13+2563.81)` | `65.13%` |\n\n依 Foster and Wischmeier 分段坡面處理，可將不均一坡面分成若干坡段，分別計算各段代表性 LS，再依坡段面積加權。裸露且無水土保持處理，取 C = 1、P = 1。採傳統 USLE 坡長因子 L = (λ/22.13)^m，坡度均大於 5%，取 m = 0.5。對長度 90 m 的第 i 段，以累積坡長 λ1、λ2 的段平均 L 因子表示為 Lbar = [λ2^(m+1)-λ1^(m+1)] / [(m+1)(λ2-λ1)22.13^m]。\n\n坡度因子採 S = 10.8 sinθ + 0.03（坡度 < 9%）及 S = 16.8 sinθ - 0.50（坡度 ≥ 9%）。上坡 7%，S = 0.7842，Lbar = 1.3444，A1 = R K S L = 24912×0.03693×0.7842×1.3444 = 969.90 ton/ha-yr。中坡 20%，S = 2.7948，Lbar = 2.4582，A2 = 6601.13 ton/ha-yr。下坡 9%，S = 1.0059，Lbar = 3.1832，A3 = 2563.81 ton/ha-yr。\n\n三段等長且假設等寬，面積相同，故全坡面平均流失量為 (A1+A2+A3)/3 = 3378.28 ton/ha-yr。若問各段對總流失量之貢獻，中邊坡比例為 A2/(A1+A2+A3)×100% = 65.13%。中坡貢獻最高，主因坡度 20% 使坡度因子大，且位於坡長累積後的中段，坡長因子亦較上坡大。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；USLE 題重點是 A=R K LS C P，並分清楚 C 為覆蓋管理、P 為保育措施效果。；邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。"}, {"id": "112-坡地水文學-第一題：名詞解釋", "year": "112", "subject": "坡地水文學", "title": "第一題：名詞解釋", "number": "第一題", "question": "一、請試述下列名詞之意涵：（每小題 5 分，共 20 分） 管湧（piping） 凋萎點（wilting point） 崩積土（colluvial soils） 受壓地下水", "brief": "管湧為地下滲流帶走細粒形成管狀孔道並可能導致塌陷；凋萎點為植物無法再吸水恢復的含水量；崩積土為坡面崩落、滑動或重力堆積形成的鬆散土體；受壓地下水為受上覆隔水層限制、具有壓力水頭的含水層地下水。", "detail": "管湧 piping 是地下水或滲流水沿土體弱面、裂隙或粗細粒交界流動，逐漸帶走細顆粒，形成管狀通道的內部侵蝕現象。它常發生於堤防、壩體、邊坡填土或崩積土中，可能造成地表陷穴、滲流濁水、坡面坍塌或結構破壞。\n\n凋萎點 wilting point 是植物因土壤水分不足而萎凋，且置於飽和空氣中仍不能恢復膨壓時的土壤含水量，常以 -1500 kPa 基質勢表示。崩積土 colluvial soils 是風化土、岩屑或表土因崩塌、土石滑動、落石與重力搬運堆積於坡腳或凹谷之土體，常具粒徑混雜、鬆散、孔隙大、厚度不均與穩定性差等特性。受壓地下水 confined groundwater 是含水層上下受低滲透層限制，地下水具有壓力，鑽井後水位可上升至含水層頂部以上，若高於地面則形成自流井。", "source_type": "past", "source_label": "歷屆考古題", "points": "", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "112-坡地水文學-第二題：入滲、滲漏與滲流", "year": "112", "subject": "坡地水文學", "title": "第二題：入滲、滲漏與滲流", "number": "第二題", "question": "二、試說明水文循環中，入滲（Infiltration）、滲漏（percolation）與滲流 （seepage）的差異，包括其定義、流動方式與方向？（20 分）", "brief": "入滲是水由地表進入土壤的過程，方向多為垂直向下；滲漏是水進入土壤後在未飽和層向下移動並補注地下水；滲流是水在土壤或岩層孔隙、裂隙中受水頭差驅動的流動，可向下、側向或向外出露。", "detail": "**表格補充**\n\n| 項目 | 入滲 Infiltration | 滲漏 Percolation | 滲流 Seepage |\n|---|---|---|---|\n| 發生位置 | 地表進入土壤表面 | 土壤剖面內向下移動 | 土壤或岩體孔隙、裂隙內 |\n| 主要方向 | 多為垂直向下 | 主要向下 | 可向下、側向或向外出露 |\n| 控制因素 | 雨強、表面狀態、孔隙、含水量 | 重力、基質勢、土層性質 | 水頭差、滲透性、裂隙與邊界 |\n| 水文意義 | 決定是否產生超滲逕流 | 影響地下水補注 | 影響湧水、坡面滲出與邊坡穩定 |\n\n入滲 infiltration 發生於地表，是降雨、灌溉水或地表積水穿過土壤表面的過程，受雨強、初始含水量、表面結皮、植生、孔隙與坡度影響。當雨強小於入滲能力時，多數水可進入土壤；當雨強超過入滲能力時，形成超滲逕流。\n\n滲漏 percolation 是入滲水進入土壤剖面後，在重力與基質勢作用下向下穿過未飽和層的過程，常與地下水補注相關。滲流 seepage 則泛指水在土壤或岩體孔隙、裂隙中受水頭梯度驅動的流動，可為飽和或未飽和，可垂直也可側向。坡地中常見壤中流、裂隙流、地下水滲出坡面或坡腳湧水，均可稱為滲流。三者差別在於入滲強調穿越地表，滲漏強調向下通過土層，滲流強調介質內任意方向的水流運動。\n\n**手冊補強：農藝保育、覆蓋與草生措施**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 覆蓋功能 | 降低雨滴動能、減少表面結皮、增加入滲、降低逕流流速並攔阻泥砂 |\n| 覆蓋材料 | 可用敷蓋材料、覆蓋作物、草生帶、殘株、植生毯或有機覆蓋物 |\n| 農地排水 | 農路、平台、山邊溝、縱橫向排水與安全出口須整體規劃 |\n| 草生措施 | 草溝、草帶與緩衝帶可分散逕流、增加粗糙度、過濾泥砂並改善入滲 |\n| 管理維護 | 需定期修剪、補植、清淤，避免草生帶被車輛破壞或被集中水流切穿 |\n\n農地與坡面沖蝕題可補手冊式結論：以農藝方法先減少土砂生產，再以排水與沉砂設施控制土砂輸出，效果比單靠末端沉砂池更穩定。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。"}, {"id": "112-坡地水文學-第三題：植生對水文環境", "year": "112", "subject": "坡地水文學", "title": "第三題：植生對水文環境", "number": "第三題", "question": "三、在山坡地中，植生對水文環境有很大的影響，用水文循環中的各個因子 來說明植生的重要性。（20 分）", "brief": "植生可截留降雨、降低雨滴動能、增加入滲、減少地表逕流、延緩集流、增加土壤蓄水、促進蒸散、穩定基流並減少沖蝕與泥砂。其作用貫穿降雨、截留、穿落雨、入滲、壤中流、地下水補注、蒸散與逕流各環節。", "detail": "在降雨到達地表前，樹冠與草灌層可截留部分降雨，截留水可能蒸發回大氣，減少到達坡面的水量。穿落雨與樹幹流雖仍到達地面，但植生與枯落物層可降低雨滴打擊，避免土壤團粒破壞與表面結皮。根系與有機質改善土壤構造，使孔隙增加、入滲能力提高，地表逕流減少。\n\n入滲後，水可成為土壤水、壤中流或地下水補注。森林土壤通常具有較高蓄水能力，使洪峰延遲且降低。植物蒸散會消耗土壤水分，降低部分時期地下水位，但也使雨前土壤有較大儲水空間。河岸植生可穩定岸坡、過濾泥砂與營養鹽，維持濱溪廊道生態。整體而言，良好植生能削減洪峰、減少沖蝕、改善水質、維持基流與提高坡地水文韌性。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "112-坡地水文學-第四題：坡地與濱溪廊道開發生態影響", "year": "112", "subject": "坡地水文學", "title": "第四題：坡地與濱溪廊道開發生態影響", "number": "第四題", "question": "四、山坡地中，土地及濱溪廊道的開發利用對生態會產生那些影響，說明評 估的步驟。（20 分）", "brief": "影響包括棲地破碎、植被移除、逕流增加、泥砂與污染輸出、水溫上升、河道棲地單調化、物種遷移阻隔及外來種入侵。評估步驟為界定範圍、蒐集資料、現地調查、辨識敏感棲地與保育物種、評估衝擊、提出迴避縮小減輕補償措施、監測與滾動修正。", "detail": "山坡地開發會改變地表覆蓋與排水路徑，使不透水面增加、洪峰變大、土壤沖蝕與濁度上升。濱溪廊道若被道路、護岸或建物切割，會降低遮蔭、提高水溫、破壞魚蝦棲地、阻斷動物移動並減少洪泛區功能。施工期間的濁水、噪音、夜間照明與人為干擾也會影響繁殖與覓食。\n\n評估步驟先界定工程與影響範圍，包括直接開發區、下游水域與生態廊道。其次蒐集地形、水文、植被、保育類、土地利用與歷史災害資料。第三進行現地調查，記錄植物群落、動物、棲地型態、水質、河床材料與連通性。第四辨識重要棲地、敏感季節與關鍵物種。第五評估施工與營運衝擊，包含面積損失、破碎化、水文改變與污染。最後提出迴避、縮小、減輕、補償策略，並建立施工及營運期監測。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "112-坡地水文學-第五題：降低合理化公式 C 值", "year": "112", "subject": "坡地水文學", "title": "第五題：降低合理化公式 C 值", "number": "第五題", "question": "五、利用水文學之合理化公式來計算尖峰逕流量，試說明如何降低規劃區的 C 值。（20 分） 合理化公式：Q=(1/360)CIA", "brief": "C 值代表降雨轉為逕流的比例。降低 C 值的方法包括增加植生與透水面、減少不透水鋪面、保留森林與表土、透水鋪面、雨水花園、滯留入滲設施、草溝、分散排水、屋頂雨水貯留、土壤改良及避免壓實。", "detail": "合理化公式 Q = (1/360)CIA 中，C 為逕流係數，受土地利用、土壤、坡度、植生、不透水率與前期含水量影響。降低 C 值的核心是提高截留、入滲、窪蓄與延滯能力。規劃上應保留原有林地、草地、表土與河岸緩衝帶，減少道路、屋頂與硬鋪面面積。必要鋪面可採透水鋪面、碎石鋪面或植草磚。\n\n排水設計應避免快速集中，可用草溝、滲透溝、雨水花園、入滲井、滯留池、分散式滯洪與屋頂雨水貯留，使雨水在源頭入滲或延遲。坡地開發應分區排水、保留微地形、降低整地壓實，並用有機質改良土壤。農地可採等高耕作、草生覆蓋與敷蓋。透過這些措施可降低有效逕流係數，進而降低尖峰流量與下游排水負擔。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "112-植生工程-第一題：植生前期基礎工", "year": "112", "subject": "植生工程", "title": "第一題：植生前期基礎工", "number": "第一題", "question": "一、請詳細說明植生之前期基礎工處理項目為何？（20 分）", "brief": "前期基礎工包括坡面安全檢查、削坡整形、坡頂截水、坡面排水、坡腳保護、表土保存與回鋪、客土或基盤改良、鬆土打穴、土壤酸鹼與肥力改良、敷蓋防沖蝕、網材固定及施工期臨時保護。", "detail": "植生成功與否常取決於前期基礎工。首先應確認坡面是否仍有滑動、落石、湧水或沖蝕溝，必要時先做削坡、坡腳支撐、擋土或排水。其次進行整坡，使坡面不過度陡峭，並形成可保留基材的粗糙面或階段。水分管理上，坡頂設截水溝，坡面設排水溝、盲溝或導水設施，避免逕流集中沖刷植生基材。\n\n土壤基盤方面，應保存表土，必要時客土、添加有機質、肥料、石灰或保水材料，改善 pH、養分與保水性。壓實或硬質坡面需鬆土、打穴或鑿溝；鬆散坡面需網材、植生毯、植生袋或格框固定。施工後應敷蓋稻草、椰纖網或水力噴植纖維，減少雨滴打擊並維持濕度。前期基礎工的目標是提供穩定、排水良好、具養分與保水能力的生育基盤。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "112-植生工程-第二題：種子導入或苗木栽植選擇", "year": "112", "subject": "植生工程", "title": "第二題：種子導入或苗木栽植選擇", "number": "第二題", "question": "二、請詳細說明種子導入或苗木栽植之選擇條件。（20 分）", "brief": "種子導入適合面積大、坡面較穩定、需快速覆蓋且成本較低之地；苗木栽植適合需快速建立灌木喬木、種子不易發芽、立地惡劣或需特定物種之地。選擇條件包括坡度、土壤、季節、水分、施工可及性、物種特性、復育目標、成本與養護能力。", "detail": "種子導入包含撒播、噴播、水力噴植與混播，優點是施工快速、成本低、適合大面積裸露坡面，且可混合草本、豆科與先驅種。其限制是受降雨、溫度、鳥獸取食、坡面沖刷與基盤條件影響大，對發芽率與初期養護要求高。適合坡面已穩定、土壤基材可保留、施工季節接近雨季但不逢豪雨時。\n\n苗木栽植適合建立長期群落結構，如灌木、喬木或特定原生種，也適合種子休眠強、不易採集或發芽率低的植物。苗木有較高初期存活機會，但成本、運輸與栽植工作較高，需挖穴、施基肥、支柱、保水與防草。陡坡、乾旱、貧瘠、強風或動物危害區應選耐逆境苗木並加保護。實務上常採草本種子快速覆蓋，搭配灌木喬木苗木建立中長期植生。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "112-植生工程-第三題：植生群落調查指標", "year": "112", "subject": "植生工程", "title": "第三題：植生群落調查指標", "number": "第三題", "question": "三、請詳細說明植生群落調查分析，常使用那些指數或介量參數做為定量評 估之依據？（20 分）", "brief": "常用參數包括密度、頻度、覆蓋度、優勢度、重要值指數、物種豐富度、歧異度、均勻度、相似性指數、生活型組成、地上部生物量及植生覆蓋率。這些指標可評估植生恢復、優勢種、群落穩定與生態多樣性。", "detail": "植生群落調查通常以樣區或樣線量測。密度為單位面積個體數，反映族群數量；頻度為某物種出現於樣區的比例，反映分布均勻程度；覆蓋度為植物垂直投影面積占地表比例，是坡面保護的重要指標；優勢度可用胸高斷面積或冠幅表示。重要值指數 IVI 常由相對密度、相對頻度與相對優勢度加總，表示物種在群落中的優勢程度。\n\n多樣性方面，物種豐富度表示物種數，Shannon 或 Simpson 指數表示歧異度，Pielou 均勻度表示個體分布是否平均。相似性指數如 Sorensen 或 Jaccard 可比較復育區與參考天然群落的接近程度。工程評估還常用植生覆蓋率、裸露率、根系發展、生物量、外來種比例、原生種比例與演替階段。這些指標可作為植生工程驗收、養護與復育成效判斷依據。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "112-植生工程-第四題：礦區植生困難與綠化計畫", "year": "112", "subject": "植生工程", "title": "第四題：礦區植生困難與綠化計畫", "number": "第四題", "question": "四、請詳細說明礦區植生困難之問題與其未來之綠化計畫。（20 分）", "brief": "礦區常有表土流失、坡面陡峭、基質貧瘠、酸鹼極端、重金屬、排水不良、保水差、高溫乾旱與沖蝕嚴重等問題。綠化計畫應含地形整治、排水與安全、客土與土壤改良、污染控制、先驅植物導入、原生種復育、分期施工與長期監測。", "detail": "礦區植生困難主要因採掘移除表土與種子庫，裸露岩盤或廢石堆缺乏細土、有機質與養分。部分礦區 pH 過酸或過鹼，含重金屬或鹽分，抑制根系與微生物。廢石堆孔隙大、保水差，坡面陡且不穩定，降雨時易沖蝕或崩塌；乾季又高溫乾燥。若有酸性礦山排水，還會污染下游水體。\n\n綠化計畫應先做地形安全處理，包括削坡、階段平台、坡腳穩定、截排水與沉砂。其次進行基盤改良，如客土、表土回鋪、有機質、石灰或適當改良材、肥料、保水材料與微生物接種。植物選擇應先用耐旱、耐瘠、耐酸鹼或耐重金屬的先驅草灌木快速覆蓋，再逐步導入原生喬灌木。污染區須隔離、覆土或穩定化重金屬。計畫應分期復育，並監測覆蓋率、存活率、土壤性質、水質及外來種。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "112-植生工程-第五題：崩塌地立地條件與植生工法", "year": "112", "subject": "植生工程", "title": "第五題：崩塌地立地條件與植生工法", "number": "第五題", "question": "五、請詳細說明崩塌地不同立地條件之植生工法及植物材料選用之原則。 （20 分）", "brief": "緩坡穩定土坡可撒播、噴植、植生毯；陡坡或鬆散坡面需掛網、植生袋、格框或厚層基材；岩盤坡可用植生孔、植生槽或客土噴植；濕潤湧水區需先排水並選耐濕植物；乾旱貧瘠區選耐旱耐瘠先驅種。植物應適地適種、根系發達、成活率高、以原生種為長期目標。", "detail": "崩塌地立地條件差異大，應先判斷坡度、基質、含水、穩定性與土壤厚度。緩坡且表土尚存者，可用撒播、草生覆蓋、植生毯與灌木苗栽植。陡坡或基材易流失者，需先以網材、植生袋、蜂巢格框、格梁或厚層基材噴植固定。岩盤或礫石坡缺乏生育基盤，可開鑿植生孔、植生槽、客土袋或掛網噴植。湧水或濕地化坡面應先設排水，再選耐濕植物。乾旱向陽坡需敷蓋、保水與選耐旱草灌木。\n\n植物材料選用原則為適合當地氣候與土壤、根系能固土、初期生長快、抗逆境強、材料來源穩定且不具入侵性。草本用於快速覆蓋，灌木提供中層根系與坡面穩定，喬木用於長期演替與生態恢復。初期可使用先驅種建立環境，中長期補植原生樹種，使群落由工程覆蓋走向自然演替。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "112-水土保持工程-第一題：水土保持計畫章節與大綱", "year": "112", "subject": "水土保持工程", "title": "第一題：水土保持計畫章節與大綱", "number": "第一題", "question": "一、水土保持義務人於山坡地從事開發建築用地時，依據水土保持法第十二 條之規定，應先擬具水土保持計畫送請主管機關核定，試詳述該水土保 持計畫章節名稱和大綱內容為何？（20 分）", "brief": "水土保持計畫通常包括計畫緣起與目的、基地位置與範圍、開發內容、環境現況調查、土地利用與水文分析、土砂與災害潛勢評估、水土保持設施規劃設計、施工計畫、維護管理、監測、安全防災、經費與圖說附錄。實際章節應依最新法規格式辦理。", "detail": "計畫內容應先說明申請人、水土保持義務人、開發目的、法令依據、基地位置、地籍、面積與開發期程。環境現況調查包含地形、坡度、地質、土壤、土地利用、植生、水系、降雨、災害紀錄、保全對象及交通出入。開發內容須說明整地、建築配置、道路、排水、挖填方、棄土與施工分區。\n\n分析設計部分包括集水區劃分、開發前中後逕流量、滯洪沉砂需求、土壤流失量、邊坡穩定、排水系統、擋土設施、沉砂滯洪池、截排水、坡面保護、植生工程、施工中臨時防災與永久設施。施工計畫需含施工順序、臨時排水、臨時沉砂、裸露地保護、豪雨應變及安全管理。維護管理應列設施巡查、清淤、修復與責任。附錄應含設計計算書、圖說、照片、地籍資料與相關證明。法定名稱與格式需依主管機關最新規定核對。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "112-水土保持工程-第二題：生態評估調查", "year": "112", "subject": "水土保持工程", "title": "第二題：生態評估調查", "number": "第二題", "question": "二、為減輕保育治理工程對生態環境造成的負面影響，以維護集水區生物多 樣性資源與棲地環境品質，試詳述「生態評估調查」的原則與方法為何？ （20 分）", "brief": "原則為資料蒐集、現地調查、重點物種與棲地辨識、迴避縮小減輕補償、民眾與專家參與、施工監測與適應性管理。方法包含植被、鳥類、兩棲爬蟲、魚蝦蟹、水生昆蟲、哺乳類、棲地、水質與河床調查。", "detail": "生態評估調查應在工程規劃早期進行，避免設計完成後才補救。首先蒐集既有生態資料、保育類紀錄、航照、土地利用、水系、河川棲地與災害治理資料。其次依工程影響範圍進行現地調查，涵蓋施工區、上下游、材料堆置區、便道及可能受濁水影響區。\n\n調查方法依類群選擇，如植物樣區與樣線調查、鳥類定點計數、兩棲爬蟲夜間穿越線、魚類電魚或網捕、水生昆蟲採樣、哺乳類痕跡與自動相機、水質與棲地快速評估。成果應標示敏感棲地、保育類、繁殖季、洄游通道與外來種。設計上依迴避、縮小、減輕、補償提出措施，如保留深潭淺瀨、維持生態基流、設魚道、控制濁水、避開繁殖季施工及復育原生植生。施工與完工後需監測措施成效。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "112-水土保持工程-第三題：透水性鋪面", "year": "112", "subject": "水土保持工程", "title": "第三題：透水性鋪面", "number": "第三題", "question": "三、試詳述「透水性鋪面」的規劃設計原則為何？（20 分）", "brief": "透水鋪面設計應評估土壤入滲、地下水位、承載力、交通荷重、坡度、污染風險與維護。原則為讓雨水透過面層、基層與蓄水層入滲或延滯排放，並設反濾、防堵塞、溢流與清淤維護。", "detail": "透水性鋪面可降低不透水面逕流、補注地下水並削減洪峰。規劃前需調查土壤滲透係數、地下水位、地基承載力、坡度、使用荷重與污染來源。若地下水位過高、土壤污染風險大、坡度過陡或重車頻繁，應審慎使用或採部分透水搭配排水。\n\n結構上包含透水面層、級配碎石基層、蓄水層、透水或不透水底層及排水管。面層可為透水混凝土、透水瀝青、植草磚、透水磚或碎石。設計需確保入滲容量大於設計降雨，並有溢流設施避免超量積水。基層應具足夠孔隙與承載力，並用不織布或級配反濾防止細粒上移堵塞。維護上需定期清掃、吸塵、除泥砂，避免施工泥水進入鋪面造成永久堵塞。\n\n**手冊補強：道路、農路與開挖整地**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 路線選擇 | 避免通過順向坡、崩塌地、湧水區及地質破碎帶，並減少大挖大填 |\n| 排水配置 | 山邊溝、路側溝、橫向排水、跌水消能與出口保護須配合道路縱坡配置 |\n| 邊坡保護 | 上邊坡重截水與護坡，下邊坡重填方穩定、排水與坡腳保護 |\n| 施工防災 | 土方工程應分期施工，裸露面即時覆蓋，臨時沉砂與臨時排水應先行完成 |\n| 維護管理 | 定期清理側溝、涵管、沉砂池與排水出口，豪雨後檢查沖刷、裂縫與邊坡變形 |\n\n道路水土保持答案可補一句總結：道路本身常成為集中逕流通道，因此設計重點不只在路面通行，還包括截水、導水、消能、沉砂與安全排放。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "112-水土保持工程-第四題：仿自然生態護岸", "year": "112", "subject": "水土保持工程", "title": "第四題：仿自然生態護岸", "number": "第四題", "question": "四、試詳述生態護岸，採用自然或人工資材的「仿自然護岸」之種類及工法 為何？（20 分）", "brief": "仿自然護岸包括乾砌石、石籠、箱籠、木樁編柵、柴束工、柳枝工、植生袋、椰纖毯、植生格框、塊石護腳搭配植生及緩坡濱溪帶。工法核心為保留孔隙、粗糙度、水陸交錯與植生生長空間。", "detail": "仿自然護岸的目的不是完全不做工程，而是以接近自然河岸的材料與形態達到防災與生態兼顧。自然資材工法包含塊石護腳、乾砌石、柳枝扦插、柴束、木樁編柵與椰纖植生毯。這些工法孔隙多、粗糙度高，可提供魚蝦躲藏、植物根系穿透與微棲地。\n\n人工資材可採箱籠、蛇籠、植生混凝土塊、植生袋、預鑄格框或多孔性護岸。流速較高處可用石籠或塊石保護坡腳，上部採緩坡植生；流速較低處可用植生毯、草溝與濱溪緩衝帶。設計時應避免全斷面光滑混凝土化，並維持河道蜿蜒、深潭淺瀨、灘地與洪泛空間。材料選擇需依流速、沖刷深度、坡度、維護及生態目標決定。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "112-水土保持工程-第五題：盲溝", "year": "112", "subject": "水土保持工程", "title": "第五題：盲溝", "number": "第五題", "question": "五、試詳述「盲溝」的種類與適用範圍，並請敘明規劃設計原則和施工注意 事項。（20 分）", "brief": "盲溝為地下排水設施，可分碎石盲溝、有孔管盲溝、截水盲溝、集水盲溝、坡腳盲溝與水平排水盲溝。適用於地下水、滲流水、坡面軟弱、擋土牆背水壓與農地排水。設計需考慮水源、坡度、濾層、防堵、出水口與維護。", "detail": "盲溝利用透水材料或有孔管收集地下水並導排。碎石盲溝以級配碎石形成排水通道，外包不織布或反濾層；有孔管盲溝在碎石中埋設 PVC 或 HDPE 有孔管，提高排水能力；截水盲溝設於坡頂或坡面上方攔截側向地下水；坡腳盲溝降低坡腳孔隙水壓；牆背盲溝排除擋土牆背水。\n\n設計原則包括確認地下水來源與流向，盲溝底坡需能自流排出，斷面容量足以排水，濾料粒徑符合反濾要求，避免細粒進入堵塞。出水口應安全排至排水系統並防止倒灌與沖刷。施工時溝底不得擾動過度，管孔方向與坡度需正確，不織布搭接充分，回填材料清潔，避免泥土混入碎石。完工後應設檢查口與清理口，並定期檢查出水量與堵塞。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "112-水土保持規劃設計-第一題：野溪河床質調查", "year": "112", "subject": "水土保持規劃設計", "title": "第一題：野溪河床質調查", "number": "第一題", "question": "一、請詳述野溪進行河床質調查的方法及繪製之圖示？又請問其調查之目 的為何？（25 分）", "brief": "方法包括樣區表面粒徑調查、線格法、卵礫石量測、採樣孔體積取樣、篩分析、照片粒徑分析與縱橫斷面測量。圖示包括粒徑累積曲線、河床質分布圖、縱斷面圖、橫斷面圖、採樣位置圖與河床材料分級圖。目的為掌握輸砂、沖淤、穩定坡降、防砂壩與護床設計粒徑。", "detail": "野溪河床質調查應先依河段坡度、寬度、彎道、淤積與沖刷特徵選定代表性樣點。表面粒徑可用 Wolman pebble count，沿樣線或格網隨機量測顆粒中軸粒徑，取得 D16、D50、D84 等代表粒徑。若需了解表層以下材料，則開挖採樣孔，量測體積或重量後篩分析。對粗顆粒河床可輔以照片判釋與影像分析。\n\n成果圖示包括採樣位置平面圖、河床質分布圖、粒徑累積曲線、代表粒徑表、縱斷面與橫斷面圖。調查目的在判斷河床抗沖能力、臨界起動條件、輸砂型態、河床粗化或淤積趨勢，並作為固床工、防砂壩、護岸、魚道與清疏計畫設計依據。粒徑資料也可用於曼寧粗糙係數估算與土石流材料來源分析。\n\n**手冊補強：野溪治理與土砂控制**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 治理目標 | 穩定流心、控制縱橫向沖刷、調節土砂、維持通洪斷面並保護下游保全對象 |\n| 處理順序 | 先判斷上游供砂、中游輸砂與下游淤積，再決定源頭減砂、溪床穩定、清淤疏通或沉砂防砂 |\n| 清淤疏通 | 緊急清疏以恢復通洪與降低堰塞風險；計畫清疏則應配合河床坡降、土砂來源與上下游穩定 |\n| 工程配置 | 固床工、防砂壩、護岸、護坦、跌水消能、導流與沉砂空間須整體配置，不宜只做局部硬化 |\n| 維護管理 | 豪雨後巡查淤積、淘刷、堵塞與構造物損壞，並建立清淤、補強及棄土去化計畫 |\n\n作答時可強調手冊式觀念：野溪治理不是單純把河道挖深或截彎取直，而是要維持水流、泥砂與河床坡降的動態平衡；若只清除下游淤積而未處理上游供砂與坡面沖蝕，災害會反覆發生。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "112-水土保持規劃設計-第二題：技師簽證規定", "year": "112", "subject": "水土保持規劃設計", "title": "第二題：技師簽證規定", "number": "第二題", "question": "二、請詳述並對應說明何謂水土保持處理與維護的技師簽證規定？又其簽 證的種類及規模為何？（25 分）", "brief": "技師簽證是由合格專業技師就水土保持計畫、設計、監造、檢查或完工成果負專業責任，確認符合法規與技術規範。種類可含規劃設計簽證、施工監造簽證、完工檢查簽證與維護檢查簽證；適用規模與項目須依最新水土保持法規及主管機關公告。", "detail": "水土保持處理與維護涉及坡地安全、排水、滯洪沉砂、擋土、植生與災害防治，故法規要求一定規模或性質之案件由專業技師簽證。簽證的意義是技師依其專業對調查、分析、設計、施工或維護成果負責，不只是形式用印。簽證內容應確認基地資料、設計參數、計算方法、圖說、施工材料與維護方式符合規範。\n\n簽證種類可分為水土保持計畫規劃設計簽證、簡易水土保持申報書簽證、施工監造或施工中檢查簽證、完工檢查簽證及維護管理檢查簽證。規模通常與開發面積、挖填方量、坡度、工程設施高度、滯洪沉砂容量或開發行為種類有關。由於簽證規模與種類會隨法規修正，考試作答可說明原則，實務辦理必須查核最新水土保持法、水土保持計畫審核監督辦法及技師簽證相關規定。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "112-水土保持規劃設計-第三題：水土保持計畫審核與開工", "year": "112", "subject": "水土保持規劃設計", "title": "第三題：水土保持計畫審核與開工", "number": "第三題", "question": "三、請說明水土保持計畫審核期限的規定為何？又為何往往水土保持計畫 提送後要三至六個月的時間才會核定？另請問核定的水土保持計畫或 簡易水土保持申報書在多久時間以內一定要申報開工？（25 分）", "brief": "審核期限與開工期限屬法規題，精確日數以最新水土保持相關辦法為準。審查常需三至六個月，原因包括文件補正、現勘、跨機關會審、地質水文資料不足、設計修正、法規競合與排會期程。核定後通常須於規定期限內申報開工，逾期須展延或重新辦理。", "detail": "水土保持計畫審核期限一般由主管機關依案件性質、書件完整性與法定程序辦理。若文件完整、無重大疑義，應於法定期限內審查；若需補正，補正期間通常不計入審查期間。計畫實務上常需三至六個月，是因為山坡地案件涉及地質安全、水文排水、滯洪沉砂、道路、建築配置、環境敏感區與保全對象，主管機關常需現勘、委員審查、跨局處意見及多次補正。\n\n常見延誤原因包括基地邊界或地籍不清、坡度分析錯誤、排水出口權責不明、滯洪沉砂容量不足、邊坡穩定資料不足、施工中臨時防災缺漏、圖說與計算不一致、涉及林地或河川區域等。核定後，水土保持義務人應於法規規定期限內申報開工，逾期未開工或計畫內容變更時，需依規定展延、變更或重新送審。考試若需精確日數，應以當年度最新法規條文為準。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "112-水土保持規劃設計-第四題：臨時與永久滯洪量", "year": "112", "subject": "水土保持規劃設計", "title": "第四題：臨時與永久滯洪量", "number": "第四題", "question": "四、某集水區面積為 15 公頃的一日、二日、三日暴雨重現期距（年）統計資 料，其集流時間 15 分鐘，開發前、中、後的逕流係數分別為 0.75、1.00、 0.95，請計算所需臨時與永久滯洪量體為何？（25 分） 暴雨量別 重現期距（年） 200 100 50 25 20 10 5 2 一日暴雨量 537 500 460 417 403 355 301 212 二日暴雨量 1045 926 810 698 662 553 444 291 三日暴雨量 1139 1016 897 779 741 625 507 337 單位：mm", "brief": "若以增加逕流體積法估算，控制暴雨為表中最大之三日 200 年暴雨 1139 mm。臨時滯洪量採開發中與開發前差值：Vt = (1.00-0.75)×1139/1000×150000 = 42,712.5 m³。永久滯洪量採開發後與開發前差值：Vp = (0.95-0.75)×1139/1000×150000 = 34,170 m³。", "detail": "**表格補充**\n\n| 項目 | 公式 | 代入 | 結果 |\n|---|---|---:|---:|\n| 面積 | `15 ha` |  | `150,000 m²` |\n| 控制暴雨 | 題表最大值 | 三日 200 年 `1139 mm` | `1.139 m` |\n| 臨時滯洪量 | `(C中-C前)PA` | `(1.00-0.75)×1.139×150000` | `42,712.5 m³` |\n| 永久滯洪量 | `(C後-C前)PA` | `(0.95-0.75)×1.139×150000` | `34,170 m³` |\n\n本題未明示應採何重現期及規範指定暴雨，因此先依題表取最不利總雨量，即三日 200 年暴雨 P = 1139 mm = 1.139 m，集水區面積 A = 15 ha = 150,000 m²。以開發增加逕流體積估算滯洪需求，開發前逕流係數 C0 = 0.75，開發中 C1 = 1.00，開發後 C2 = 0.95。\n\n臨時滯洪設施對應施工中裸露狀態，所需容量為施工中相對開發前增加逕流體積：Vt = (C1-C0)PA = (1.00-0.75)(1.139)(150000) = 42,712.5 m³。永久滯洪設施對應完工後狀態，所需容量為開發後相對開發前增加逕流體積：Vp = (C2-C0)PA = (0.95-0.75)(1.139)(150000) = 34,170 m³。\n\n若依合理化公式另設計出流口尖峰流量，可利用集流時間 15 分鐘將日暴雨轉換為 15 分鐘降雨強度，再以 Q = (1/360)CIA 計算開發前、中、後洪峰，並以入出流歷線差額檢核池容。正式送審時應依最新水土保持技術規範指定之重現期、雨型與滯洪演算方法辦理。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "112-測量學-第一題：無已知點三維坐標施測方案", "year": "112", "subject": "測量學", "title": "第一題：無已知點三維坐標施測方案", "number": "第一題", "question": "一、在臺灣本島某一空曠地區，今欲測得該區某待求點 A 之三維坐標，並使 其平面坐標及高程之精度控制在 5 公分以內。假設在 A 點方圓 10 公里 範圍內，無任何已知點位可供參考引用。試以實際較符合人力及成本效 益之方式，詳述你的施測方案（包含使用之儀器、方法…等）。（20 分）", "brief": "可採 GNSS 靜態或快速靜態測量，連測較遠之國家控制點或使用 e-GNSS/CORS 網路服務，以雙頻接收機觀測並後處理或網路 RTK 求得 TWD97/TWD97[2020] 坐標與橢球高，再用大地起伏模型轉正高。為達 5 cm，應延長觀測、檢核 DOP、多時段重測並做閉合或重複檢核。", "detail": "因 10 km 內無已知點，傳統導線或水準需長距離引測，成本高且累積誤差大。較合乎成本效益的方法為雙頻 GNSS。若現場有網路通訊，可使用內政部或合法 CORS 網路 RTK/RTN 服務，於 A 點架設 GNSS 接收機，設定正確坐標系統與天線高，觀測固定解，重複測量數次並取平均。若需更高可靠度，可採靜態觀測 1 至 2 小時，連接鄰近 CORS 或較遠國家控制點作後處理解算。\n\n高程方面，GNSS 直接得到橢球高 h，需透過臺灣大地起伏模型 N 轉換為正高 H = h - N。為控制 5 cm，應使用雙頻以上接收機、選擇開闊場地、避開多路徑、設定衛星遮蔽角、觀測足夠衛星數、檢查 PDOP、使用精密星曆或 CORS 資料，並進行不同時段重測。成果應附觀測紀錄、解算報表、坐標系統、天線高、精度指標及重複觀測差值。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "112-測量學-第二題：SfM 航拍地形圖流程", "year": "112", "subject": "測量學", "title": "第二題：SfM 航拍地形圖流程", "number": "第二題", "question": "二、請詳述航拍影像以計算機視覺之運動恢復結構（Structure from Motion, SfM）技術測製地形圖之作業方法流程。（20 分）", "brief": "流程為任務規劃、布設控制點、UAV 航拍、影像品質檢查、特徵點匹配、相機姿態解算、稀疏點雲、加入控制點空三平差、密集點雲、DSM/DTM、正射影像、等高線與地形圖製作、精度檢核。", "detail": "SfM 測圖首先規劃航高、地面解析度、航向與旁向重疊率、航線、光照與安全。現地布設明顯地面控制點 GCP，使用 GNSS 或全站儀測定坐標，另設檢核點。航拍時保持影像清晰、曝光一致並避免水面、樹影與動態物過多。資料處理先進行影像特徵點偵測與匹配，由多張影像重建相機位置與姿態，形成稀疏點雲。\n\n接著加入 GCP 進行束制平差，將模型轉至實際坐標系統。再進行密集匹配產生密集點雲，經分類濾除植被、建物或雜訊，製作 DSM 或 DTM。由 DTM 產生等高線、坡度、斷面與地形圖，並由影像製作正射影像。最後以檢核點計算平面與高程 RMSE，檢查破洞、扭曲、植被遮蔽與水面匹配失敗，必要時補測。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "112-測量學-第三題：坡度樁計算與測設", "year": "112", "subject": "測量學", "title": "第三題：坡度樁計算與測設", "number": "第三題", "question": "三、請詳述在路線測量時，如何計算欲釘定之坡度樁？（10 分）釘定坡度樁 之測設步驟為何？（10 分）", "brief": "坡度樁依設計縱坡 i 與水平距離 L 計算設計高程 H = H0 + iL，再與現地高程比較決定填挖。測設時先設站定向，放樣中心線樁號，量距至樁位，測得現地高程，依設計高程釘樁並標示填挖高度。", "detail": "**表格補充**\n\n| 步驟 | 內容 |\n|---|---|\n| 1 | 確認起點樁號、起點高程、設計坡度與樁距 |\n| 2 | 用 `H = H0 + iL` 計算各樁設計高程 |\n| 3 | 依控制點架站、後視定向 |\n| 4 | 放樣中心線樁位與坡度樁位置 |\n| 5 | 測現地高程並計算填挖值 |\n| 6 | 樁上標示樁號、設計高程、填挖值與坡向 |\n| 7 | 以相鄰樁高程差或往返測量檢核 |\n\n計算坡度樁時，需已知起點樁號、起點設計高程、設計縱坡及樁距。若坡度 i 以百分率表示，距起點水平距離 L 的設計高程為 H = H0 + iL，其中上坡 i 為正、下坡為負。若有豎曲線，需依豎曲線公式修正。現地測得地面高程 Hg 後，填挖值 = H - Hg；正值為填方，負值為挖方。\n\n測設步驟為：先檢核控制點與水準點，架設全站儀或經緯儀水準儀，定向後放樣路線中心線與樁號位置。再量測或放樣各坡度樁平面位置，測定現地高程。依設計高程計算填挖高度，在樁上標示樁號、設計高程、填挖值與坡向。最後進行往返檢核或相鄰樁高程差檢核，確保坡度連續。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "112-測量學-第四題：地面數值法測繪地形圖", "year": "112", "subject": "測量學", "title": "第四題：地面數值法測繪地形圖", "number": "第四題", "question": "四、請詳述如何以地面數值法測繪地形圖？並請詳述如何以數值法求得地 形、地物點坐標。（20 分）", "brief": "地面數值法以全站儀、GNSS 或水準儀直接測取地形地物點三維坐標，建立數值地形資料，再繪製等高線、地物線與地形圖。點坐標可由已知測站坐標、方位角、水平角、垂直角與距離計算得到。", "detail": "作業流程先建立控制測量，包括平面控制與高程控制。現地以全站儀設站於已知點，後視定向，測量地形特徵點如坡頂、坡腳、稜線、谷線、道路邊線、水溝、建物角點與地物變化點。每點記錄點號、編碼、水平角、垂直角、斜距或坐標。GNSS RTK 亦可直接測得開闊區地物點坐標。\n\n以數值法求坐標時，若測站坐標為 (E0,N0,H0)，後視方位已知，觀測得水平角、垂直角 α、斜距 S，先求水平距離 D = S cosα，高差 ΔH = S sinα + 儀器高 - 稜鏡高。依方位角 θ 求 ΔE = D sinθ、ΔN = D cosθ，故 E = E0 + ΔE，N = N0 + ΔN，H = H0 + ΔH。完成後將點資料輸入測量軟體或 GIS/CAD，建立 TIN 或 DEM，內插等高線並編修地物。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "112-測量學-第五題：下水道水情 GIS 資料庫", "year": "112", "subject": "測量學", "title": "第五題：下水道水情 GIS 資料庫", "number": "第五題", "question": "五、今需規劃開發 GIS 系統以進行下水道水情即時資訊收集，用以分析淹水 事件成因。請說明資料庫規劃需包含那些資料及圖資？請列舉並詳述其 內容及目的。（20 分）", "brief": "資料庫應包含下水道管線、人孔、抽水站、閘門、排水分區、集水區、地形 DEM、土地利用、不透水率、雨量站、水位流量感測、淹水紀錄、道路建物、河川潮位及維護紀錄。目的在即時監測、瓶頸分析、淹水模擬、預警與決策支援。", "detail": "基礎圖資包括行政界、道路、建物、地籍、DEM、坡度、土地利用、不透水面與集水分區，用於判斷逕流來源與保全對象。下水道設施圖資包括雨水管線、管徑、管材、坡度、管底高程、人孔、側溝、箱涵、滯洪池、抽水站、閘門、出水口與截流設施，目的在建立排水網路拓撲與容量分析。\n\n即時水情資料包括雨量站、雷達雨量、水位計、流量計、閘門開度、抽水機運轉、潮位與河川水位。歷史資料包括淹水範圍、深度、時間、災情通報、清淤紀錄、管線堵塞、施工與維修。資料庫需記錄坐標系統、時間戳記、資料品質與感測器狀態。系統可用於即時展示、淹水熱點分析、管網瓶頸判斷、水理模式輸入、預警發布與災後檢討。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "111-土壤物理與沖蝕-第一題：土壤沖蝕定義與動力", "year": "111", "subject": "土壤物理與沖蝕", "title": "第一題：土壤沖蝕定義與動力", "number": "第一題", "question": "一、試說明土壤沖蝕之定義及造成沖蝕之動力類型。（20 分）", "brief": "土壤沖蝕是土壤或母質受外力剝離、搬運與沉積的過程。主要動力包括水力、風力、重力及人為擾動，其中坡地最重要為雨滴打擊與地表逕流造成之濺蝕、片蝕、細溝、溝蝕與溪岸沖刷。", "detail": "土壤沖蝕是地表土壤顆粒或團粒被雨滴、逕流、風、重力或人為活動剝離，並由水流、風或重力搬運至他處沉積的現象。其結果會造成表土流失、土壤肥力下降、入滲能力降低、泥砂災害、河道淤積與水質惡化。\n\n造成沖蝕的動力可分為水力沖蝕、風蝕、重力侵蝕與人為加速侵蝕。水力沖蝕包括雨滴濺蝕、片蝕、細溝蝕、溝蝕、河岸沖刷與管湧；風蝕包括懸浮、跳躍與表面蠕移；重力作用包括崩塌、滑動與土石流；人為活動如整地、道路開挖、植被移除、超限利用與排水不當，會降低地表保護並集中逕流，使自然沖蝕加速。水土保持控制的核心是降低剝離力、增加土壤抗蝕力、控制逕流與攔截泥砂。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "111-土壤物理與沖蝕-第二題：土壤水分特性曲線與遲滯", "year": "111", "subject": "土壤物理與沖蝕", "title": "第二題：土壤水分特性曲線與遲滯", "number": "第二題", "question": "二、試說明獲得土壤水分特性曲線之方法及出現之遲滯現象（Hysteresis）。 （20 分）", "brief": "土壤水分特性曲線可用張力計、壓力板、砂箱、離心法、露點水勢儀或田間監測取得，表示含水量與基質勢關係。遲滯現象是同一吸力下，乾燥曲線與濕潤曲線含水量不同，通常乾燥過程含水量較高，原因包括孔隙瓶頸、接觸角差異、空氣滯留與土壤膨縮。", "detail": "土壤水分特性曲線描述體積含水量 θ 與基質勢或吸力 ψ 之關係，是未飽和水流、植物可用水與坡地入滲分析的重要資料。低吸力範圍可用砂箱或張力台測定，中等吸力常用壓力膜或壓力板儀，高吸力可用露點水勢儀、濾紙法或蒸氣平衡法。田間亦可用水分感測器配合張力計建立現地曲線。\n\n遲滯現象 hysteresis 是指土壤乾燥與濕潤過程不沿同一條曲線。通常在相同基質吸力下，乾燥曲線含水量高於濕潤曲線。原因包括墨水瓶效應，即大孔由小孔頸控制排水與進水；濕潤與乾燥時接觸角不同；濕潤時空氣被困在孔隙中；黏土膨脹收縮改變孔隙。工程上若忽略遲滯，可能誤估入滲、孔隙水壓與植物可用水。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "111-土壤物理與沖蝕-第三題：地表覆蓋防止雨濺與逕流沖蝕", "year": "111", "subject": "土壤物理與沖蝕", "title": "第三題：地表覆蓋防止雨濺與逕流沖蝕", "number": "第三題", "question": "三、試說明地表覆蓋分別在雨濺沖蝕及逕流沖蝕之防止功能。（20 分）", "brief": "對雨濺沖蝕，覆蓋可吸收雨滴動能，避免團粒破碎、孔隙堵塞與表面結皮。對逕流沖蝕，覆蓋可增加地表粗糙度、降低流速與剪應力、延長集流時間、促進入滲並攔阻泥砂。", "detail": "雨濺沖蝕主要由雨滴動能直接打擊裸露地表，使土粒分散、跳濺並堵塞孔隙。植生、枯落物、稻草、木屑、植生毯或礫石覆蓋可在雨滴到達土壤前吸收能量，使雨滴不直接破壞團粒，因而減少濺蝕、結皮與入滲能力下降。\n\n逕流沖蝕則與地表流量、流速、坡度、坡長與土壤抗蝕性有關。覆蓋可增加曼寧粗糙係數，降低坡面流速與剪應力，並使水流分散而不易形成細溝。覆蓋材料也可攔截搬運中的顆粒，使其沉積於坡面。活體植生根系進一步增加土壤孔隙與抗剪強度。故覆蓋兼具「減少剝離」與「減少搬運」兩種功能，是坡面沖蝕控制最有效的源頭措施之一。\n\n**手冊補強：農藝保育、覆蓋與草生措施**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 覆蓋功能 | 降低雨滴動能、減少表面結皮、增加入滲、降低逕流流速並攔阻泥砂 |\n| 覆蓋材料 | 可用敷蓋材料、覆蓋作物、草生帶、殘株、植生毯或有機覆蓋物 |\n| 農地排水 | 農路、平台、山邊溝、縱橫向排水與安全出口須整體規劃 |\n| 草生措施 | 草溝、草帶與緩衝帶可分散逕流、增加粗糙度、過濾泥砂並改善入滲 |\n| 管理維護 | 需定期修剪、補植、清淤，避免草生帶被車輛破壞或被集中水流切穿 |\n\n農地與坡面沖蝕題可補手冊式結論：以農藝方法先減少土砂生產，再以排水與沉砂設施控制土砂輸出，效果比單靠末端沉砂池更穩定。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "111-土壤物理與沖蝕-第四題：開發中、後土壤流失量", "year": "111", "subject": "土壤物理與沖蝕", "title": "第四題：開發中、後土壤流失量", "number": "第四題", "question": "四、某基地之降雨沖蝕指數 Rm 為 13145 MJ-mm/ha-hr-yr，而土壤沖蝕指數 Km 為 0.0342 ton-ha-hr-yr/MJ-mm-ha-yr，開發中代表坡面長度 34 公尺、 高差 1.2 公尺，開發為建築用地後之代表坡面長度 28 公尺、高差 0.1 公 尺，試依水土保持技術規範估算開發中、後之土壤流失量（ton/ha/yr）。 （20 分）", "brief": "以 A = Rm Km LS C P，裸露開發中取 C、P 依規範或保守為 1。開發中坡度 1.2/34 = 3.53%，計得 LS 約 0.488，A 約 219.36 ton/ha/yr。開發後坡度 0.1/28 = 0.357%，LS 約 0.0753，A 約 33.87 ton/ha/yr。若規範指定 C、P 值，應再乘入修正。", "detail": "**表格補充**\n\n| 階段 | 坡長 | 高差 | 坡度 | `L` | `S` | 土壤流失量 |\n|---|---:|---:|---:|---:|---:|---:|\n| 開發中 | `34 m` | `1.2 m` | `3.53%` | `1.1874` | `0.4109` | `219.36 ton/ha/yr` |\n| 開發後 | `28 m` | `0.1 m` | `0.357%` | `1.0987` | `0.06857` | `33.87 ton/ha/yr` |\n\n公式：`A = Rm × Km × L × S × C × P`，此表以題目未給 `C、P` 時保守取 `C=P=1`。\n\n依通用土壤流失公式概念，土壤流失量 A = Rm Km LS C P。題目只給 Rm、Km、坡長與高差，故以坡長坡度因子 LS 估算，並假設 C = P = 1。開發中坡長 λ = 34 m，高差 1.2 m，坡度 S = 1.2/34 = 0.03529，即 3.53%。坡度角 θ = arctan(0.03529)。坡度小於 9% 時，可採 S 因子 = 10.8 sinθ + 0.03 = 0.4109；坡長因子取 m = 0.4，L = (34/22.13)^0.4 = 1.1874。因此 LS = 0.488，A = 13145×0.0342×0.488 = 219.36 ton/ha/yr。\n\n開發後坡長 λ = 28 m，高差 0.1 m，坡度 = 0.357%。S 因子 = 10.8 sinθ + 0.03 = 0.06857；L = (28/22.13)^0.4 = 1.0987，LS = 0.0753。A = 13145×0.0342×0.0753 = 33.87 ton/ha/yr。結果顯示整地後若坡度大幅降低，坡長坡度因子與土壤流失量會顯著下降；正式作答應說明 C、P 需依水土保持技術規範按開發階段、覆蓋與保育措施取值。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；USLE 題重點是 A=R K LS C P，並分清楚 C 為覆蓋管理、P 為保育措施效果。"}, {"id": "111-土壤物理與沖蝕-第五題：人為因子與沖蝕控制", "year": "111", "subject": "土壤物理與沖蝕", "title": "第五題：人為因子與沖蝕控制", "number": "第五題", "question": "五、針對影響土壤沖蝕人為因子，試說明其土壤沖蝕控制方法。（20 分）", "brief": "人為因子包括植被移除、整地開挖、道路闢建、坡面壓實、排水集中、超限利用、施工期裸露與不當耕作。控制方法為分期施工、保留植生、臨時覆蓋、截排水、沉砂、等高耕作、透水鋪面、坡面保護、施工道路管理與維護檢查。", "detail": "人為活動會改變 C 因子與 P 因子，使原本穩定坡面快速變為高沖蝕風險。開發前應避免高敏感區，保留森林、表土與河岸緩衝帶。施工中應分區分期開挖，裸露地立即敷蓋、噴植或設臨時保護；堆土區需覆蓋、截水與圍籬；施工道路應鋪設穩定材料與洗車沉砂設施。\n\n排水方面，坡頂截水、坡面分段排水、草溝、跌水與消能可避免水流集中。農地可採等高耕作、帶狀栽培、草生覆蓋、保留殘株與減少翻耕。工程出口應設沉砂池或滯洪沉砂設施。完工後需建立植生覆蓋、定期清淤、檢查排水與修復沖蝕溝。人為沖蝕控制的重點是施工前規劃、施工中即時防護與完工後維護。\n\n**手冊補強：農藝保育、覆蓋與草生措施**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 覆蓋功能 | 降低雨滴動能、減少表面結皮、增加入滲、降低逕流流速並攔阻泥砂 |\n| 覆蓋材料 | 可用敷蓋材料、覆蓋作物、草生帶、殘株、植生毯或有機覆蓋物 |\n| 農地排水 | 農路、平台、山邊溝、縱橫向排水與安全出口須整體規劃 |\n| 草生措施 | 草溝、草帶與緩衝帶可分散逕流、增加粗糙度、過濾泥砂並改善入滲 |\n| 管理維護 | 需定期修剪、補植、清淤，避免草生帶被車輛破壞或被集中水流切穿 |\n\n農地與坡面沖蝕題可補手冊式結論：以農藝方法先減少土砂生產，再以排水與沉砂設施控制土砂輸出，效果比單靠末端沉砂池更穩定。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "111-坡地水文學-第一題：水土保持創造碳匯", "year": "111", "subject": "坡地水文學", "title": "第一題：水土保持創造碳匯", "number": "第一題", "question": "一、為因應氣候變遷之衝擊並永續發展，碳中和為全球未來發展之大方向， 其中「減少碳排、增加碳匯」為重要的手段之一，試說明集水區中如何 透過水土保持處理維護創造碳匯。（20 分）", "brief": "可透過造林、植生復育、河岸綠帶、崩塌地復育、草生覆蓋、土壤有機質提升、濕地與農塘管理、減少土壤侵蝕及低碳工程材料創造碳匯。核心是增加植生生物量與土壤有機碳，同時避免沖蝕造成碳流失。", "detail": "集水區碳匯包含植物生物量碳、枯落物碳、土壤有機碳及濕地或水域沉積碳。水土保持處理可藉由崩塌地植生復育、河岸林帶、坡地造林、草生覆蓋與生態廊道，增加地上部與地下部生物量。根系與枯落物可增加土壤有機質，改善團粒與保水，並使碳長期儲存在土壤中。\n\n減少沖蝕本身也是碳匯維護，因表土流失會帶走有機碳與養分。滯洪沉砂、植生緩衝帶、坡面覆蓋與農地保育可降低碳與泥砂輸出。工程面可採低碳材料、減少混凝土、就地取材、縮短運輸與延長設施壽命。管理面則需監測植生覆蓋率、生物量、土壤有機碳與沖蝕量，使水土保持由單純防災擴展為氣候調適與碳管理工具。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "111-坡地水文學-第二題：NbS 準則", "year": "111", "subject": "坡地水文學", "title": "第二題：NbS 準則", "number": "第二題", "question": "二、聯合國教科文組織（UNESCO）由過去研究發現，水文循環與生態系統 彼此連結緊密，欲建立良好建全的生態系統，要有完善的水文循環功能， 提出以「以自然為本的解決方案（Nature-based Solutions, NbS）」解決水 的問題及提高水資源設施的效益，亦強調管理思維轉變的必要性，試說 明運用 NbS 之準則有那些。（20 分）", "brief": "NbS 準則包括以自然過程為核心、兼顧防災與生物多樣性、因地制宜、維持水文連通、避免轉嫁風險、利害關係人參與、與灰色工程整合、全生命週期管理、監測成效及公平治理。", "detail": "以自然為本的解決方案強調利用或恢復自然生態系統功能來解決水資源、洪水、乾旱、水質與生態問題。運用時第一要確認問題與尺度，例如集水區洪峰、河岸沖刷、地下水補注或都市逕流。第二要以自然過程為優先，如保留洪泛區、恢復濕地、增加入滲、復育河岸林與建立滯洪綠地。\n\n第三要兼顧多重效益，包括減災、水質淨化、碳匯、生物棲地、景觀與社會福祉。第四要因地制宜，尊重地形、土壤、水文、原生物種與地方使用。第五要避免將洪水、污染或生態衝擊轉嫁下游。第六要讓社區、主管機關、專家與土地使用者共同參與。第七可與傳統工程結合，例如滯洪池結合濕地、護岸結合植生。最後需以監測指標評估成效，並採適應性管理。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "111-坡地水文學-第三題：平均入滲率", "year": "111", "subject": "坡地水文學", "title": "第三題：平均入滲率", "number": "第三題", "question": "三、某集水區面積為 29.8 km2，遭逢兩場延時均為 4 小時之連續降雨，降雨 量分別為 3.8 cm 及 2.8 cm，集水區出口之流量記錄（時間 hr, 流量 cms） 為（0, 5）、（6, 5）、（12, 13）、（18, 26）、（24, 21）、（30, 16）、（36, 12）、 （42, 9）、（48, 7）、（54, 5）、（60, 5），試推求降雨過程之平均入滲率。（20 分）", "brief": "基流取 5 cms。將流量歷線扣除基流後以梯形法積分，直接逕流體積約 1,490,400 m³。集水區面積 29.8 km²，逕流深 = 1,490,400/29.8×10⁶ = 0.0500 m = 5.00 cm。總雨量 6.6 cm，損失量 1.60 cm，兩場總延時 8 hr，平均入滲率 = 1.60/8 = 0.20 cm/hr。", "detail": "**表格補充**\n\n| 項目 | 計算 | 結果 |\n|---|---:|---:|\n| 基流 | 題目起訖流量 | `5 cms` |\n| 直接逕流體積 | 扣基流後梯形積分 | `1,490,400 m³` |\n| 集水區面積 | `29.8 km²` | `29.8×10⁶ m²` |\n| 直接逕流深 | `1490400 / 29.8×10⁶` | `5.00 cm` |\n| 總雨量 | `3.8 + 2.8` | `6.6 cm` |\n| 入滲總深 | `6.6 - 5.00` | `1.60 cm` |\n| 總降雨延時 | `4 + 4` | `8 hr` |\n| 平均入滲率 | `1.60 / 8` | `0.20 cm/hr` |\n\n題目流量在降雨前後均為 5 cms，可視為基流。先將各時刻流量扣除基流得到直接逕流流量，再以 6 小時間距梯形法求直接逕流體積。積分結果 Vd 約為 1,490,400 m³。集水區面積 A = 29.8 km² = 29.8×10⁶ m²，故直接逕流深 Re = Vd/A = 1,490,400/29.8×10⁶ = 0.0500 m = 5.00 cm。\n\n兩場降雨量合計 P = 3.8 + 2.8 = 6.6 cm。若忽略其他損失並以入滲代表降雨損失，入滲總深 F = P - Re = 6.6 - 5.00 = 1.60 cm。兩場降雨延時均 4 小時，總降雨延時為 8 小時，平均入滲率 f = 1.60/8 = 0.20 cm/hr。此法假設基流固定、降雨均勻且損失均視為入滲。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。\n\n**手冊補強：農藝保育、覆蓋與草生措施**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 覆蓋功能 | 降低雨滴動能、減少表面結皮、增加入滲、降低逕流流速並攔阻泥砂 |\n| 覆蓋材料 | 可用敷蓋材料、覆蓋作物、草生帶、殘株、植生毯或有機覆蓋物 |\n| 農地排水 | 農路、平台、山邊溝、縱橫向排水與安全出口須整體規劃 |\n| 草生措施 | 草溝、草帶與緩衝帶可分散逕流、增加粗糙度、過濾泥砂並改善入滲 |\n| 管理維護 | 需定期修剪、補植、清淤，避免草生帶被車輛破壞或被集中水流切穿 |\n\n農地與坡面沖蝕題可補手冊式結論：以農藝方法先減少土砂生產，再以排水與沉砂設施控制土砂輸出，效果比單靠末端沉砂池更穩定。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "111-坡地水文學-第四題：小水力可達最高效率日數", "year": "111", "subject": "坡地水文學", "title": "第四題：小水力可達最高效率日數", "number": "第四題", "question": "四、某一野溪之流量記錄如下，為了進行小水力發電，選用之水輪機在流量 為 30 cms 時有最高發電效率，試估算一年中有多少日數水輪機可以達 到最高發電效率。（20 分） 日流量 （cms） 140~ 120.1 120~ 100.1 100~ 80.1 80~ 60.1 60~ 50.1 50~ 40.1 40~ 30.1 30~ 25.1 25~ 20.1 20~ 15.1 15~ 10.1 10~ 5.1 發生次數 6 20 45 60 100 200 230 170 125 80 45 5", "brief": "水輪機在流量達 30 cms 時可達最高效率，故統計日流量大於等於約 30 cms 的組距。符合者為 40~30.1 以上各組，次數合計 6+20+45+60+100+200+230 = 661。全資料次數合計 1086，換算一年日數 = 661/1086×365 = 222 日，約 222 日/年。", "detail": "題目給的是流量頻度表，而各組發生次數合計不是 365，表示可能為多年統計或累積紀錄。水輪機最高效率流量為 30 cms，故可達最高效率的條件為流量至少約 30 cms。表中 30~25.1 組之部分流量低於 30，若無更細資料，保守不列入；列入 40~30.1 及更高流量各組。\n\n合計次數為 6 + 20 + 45 + 60 + 100 + 200 + 230 = 661。全表總次數為 1086。因此達最高效率比例為 661/1086 = 0.6087。換算一年日數為 0.6087×365 = 222.16 日。故估計一年約有 222 日可達最高發電效率。若考試解釋為流量「等於 30 cms」附近才最高，則應用流量延時曲線內插；但以水輪機額定流量而言，通常以流量達額定值以上為可滿載運轉。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "111-坡地水文學-第五題：25 年降雨強度與洪峰流量", "year": "111", "subject": "坡地水文學", "title": "第五題：25 年降雨強度與洪峰流量", "number": "第五題", "question": "五、有一坡地社區，區內均為建築與道路，面積為 0.80 km2，區內平均坡 度為 0.005 ，以往數據顯示重現期 25 年之最大降雨深度與延時之關 係如下表，區內水流最長行徑距離為 1.0 km，且集流時間 tc 可由公式 tc(min) = 0.02(L/S0.5)0.77（L 為坡長，單位 m）計算，試推求重現期 25 年 之最大降雨強度（10 分）與洪峰流量。（10 分） 延時（min） 5 10 20 30 40 60 最大降雨深度（mm） 17 26 40 50 57 62", "brief": "L = 1000 m，S = 0.005，tc = 0.02(1000/√0.005)^0.77 = 31.40 min。由 30 與 40 min 線性內插，31.40 min 雨深約 51.40 mm，降雨強度 I = 51.40/(31.40/60) = 98.22 mm/hr。建築道路區取 C = 1，A = 0.80 km² = 80 ha，Q = (1/360)CIA = 21.83 cms。", "detail": "**表格補充**\n\n| 步驟 | 公式或代入 | 結果 |\n|---|---:|---:|\n| 集流時間 | `tc=0.02(1000/sqrt(0.005))^0.77` | `31.40 min` |\n| 31.40 分雨深 | 30-40 分線性內插 | `51.40 mm` |\n| 雨強 | `51.40 / (31.40/60)` | `98.22 mm/hr` |\n| 面積 | `0.80 km²` | `80 ha` |\n| 逕流係數 | 建築道路區 | `C=1.0` |\n| 洪峰 | `Q=(1/360)CIA` | `21.83 cms` |\n\n集流時間公式為 tc = 0.02(L/S^0.5)^0.77。代入 L = 1000 m，S = 0.005，得 tc = 31.40 min。設計降雨延時取等於集流時間，因此需由表中 30 min 與 40 min 雨深內插。30 min 雨深 50 mm，40 min 雨深 57 mm，故 31.40 min 雨深 P = 50 + (31.40-30)/(40-30)(57-50) = 51.40 mm。\n\n降雨強度 I = P/(tc/60) = 51.40/0.5233 = 98.22 mm/hr。坡地社區均為建築與道路，可取逕流係數 C = 1.0。面積 0.80 km² = 80 ha。合理化公式 Q = (1/360)CIA = (1/360)(1)(98.22)(80) = 21.83 cms。若規範對建築道路區指定 C 小於 1，則可按指定 C 值比例修正。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "111-植生工程-第一題：臺灣植被生態特色", "year": "111", "subject": "植生工程", "title": "第一題：臺灣植被生態特色", "number": "第一題", "question": "一、請詳述臺灣地區的植被生態特色及植物群落特性，並列舉相關群落之代 表性植物。（20 分）", "brief": "臺灣受緯度、海拔、季風、地形與島嶼隔離影響，植被垂直分帶明顯，具有熱帶、亞熱帶、暖溫帶、冷溫帶及高山植群。代表群落包括海岸林、低海拔闊葉林、樟楠林、櫟林、針闊葉混合林、鐵杉雲杉林、冷杉林與高山草原。", "detail": "臺灣山高坡陡、降雨豐富且海拔落差大，形成高度多樣的植被帶。低海拔與南部近熱帶地區可見榕楠類、相思樹、血桐、構樹等先驅與常綠闊葉林。中低海拔亞熱帶常綠闊葉林以樟科、殼斗科、茶科植物為主，如樟樹、楠木、青剛櫟、木荷。中海拔暖溫帶至冷溫帶有櫟林、針闊葉混合林、臺灣杉、紅檜、扁柏等。\n\n高海拔則有鐵杉、雲杉、冷杉林，森林界線以上為玉山箭竹、高山草原與杜鵑灌叢。海岸地區受鹽霧、強風與砂埋影響，常見木麻黃、黃槿、草海桐、林投、濱刺麥等。植生工程應依海拔、坡向、土壤、水分、風害與演替階段選用適地植物，並以原生植物與群落恢復為長期目標。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "111-植生工程-第二題：河溪護岸植栽", "year": "111", "subject": "植生工程", "title": "第二題：河溪護岸植栽", "number": "第二題", "question": "二、請說明河溪護岸植栽設計之考量與植生導入之作業與方法，並列舉可應 用之植栽材料。（20 分）", "brief": "設計需考量洪水位、流速、沖刷、坡度、土壤含水、日照、維護及棲地功能。導入方法包括植生毯、植生袋、扦插、木樁編柵、石籠植生、草灌木栽植與河岸緩衝帶。材料可用甜根子草、五節芒、莎草類、柳枝、黃槿、九芎、水柳等適地原生植物。", "detail": "河溪護岸植栽應分水域、常水位附近、洪水擾動帶及高灘地分區設計。坡腳受沖刷強，需先用塊石、箱籠或木樁穩定，再於孔隙填土植生；中上部坡面可用植生毯、植生袋、草灌木混植；高灘地可建立喬灌草複層緩衝帶。植物需耐水濕、耐乾旱、根系發達、萌芽力強且不易被洪水拔除。\n\n作業流程為現地調查、分區設計、基盤整備、材料固定、種植與養護。可用草本如甜根子草、五節芒、莎草、香蒲；灌木如水柳、苦楝幼苗、月橘或九芎；海岸或下游可用黃槿、草海桐等。選種須避免入侵性外來種。護岸植栽應與水理安全並重，保留粗糙度、孔隙與水陸交錯帶，以提升魚蝦、昆蟲與鳥類棲地品質。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。\n\n**手冊補強：河岸植生、濕地與防風定砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 河岸植生 | 需依水位、流速、沖刷、坡度與土壤含水配置草本、灌木、喬木與柔性護岸材料 |\n| 濕地護岸 | 宜營造緩坡、多孔隙、多水深與水陸交界帶，兼顧水質淨化、棲地與安全 |\n| 海岸定砂 | 先定砂、後防風、再造林，植物需耐鹽、耐旱、耐風砂掩埋 |\n| 防風林 | 林帶密度、寬度、高度與樹種配置影響防風距離與減風效果 |\n| 維護管理 | 需防止外來種入侵、枯死裸露、沖刷破壞與人為踩踏破壞 |\n\n生態與植生題可補充：護岸或綠帶設計應同時考慮防災功能與棲地功能，避免只追求硬體穩定而造成棲地破碎。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。"}, {"id": "111-植生工程-第三題：海岸植物類型與逆境因應", "year": "111", "subject": "植生工程", "title": "第三題：海岸植物類型與逆境因應", "number": "第三題", "question": "三、請說明臺灣海岸依其區域之地形與地質差異可分為那些植物類型？並列 表說明海岸環境逆境與應力對於植物生長之植生方法因應措施。（20 分）", "brief": "海岸植物類型可分砂岸植物、岩岸植物、泥質灘地與紅樹林、礫石海岸植物、防風林及海岸草生灌叢。逆境包括鹽霧、強風、砂埋、乾旱、高溫、貧瘠、潮汐淹水與基質不穩，因應為選耐鹽耐風植物、防風定砂、敷蓋保水、客土改良、分帶栽植與初期養護。", "detail": "砂岸常見濱刺麥、馬鞍藤、濱豇豆、林投、草海桐等，可用於定砂與地被覆蓋。岩岸土層薄、鹽霧強，植物需耐旱耐鹽，如草海桐、黃槿、海檬果等。泥質灘地與河口可形成紅樹林，如水筆仔、海茄苳、欖李，受潮汐與鹽分控制。礫石海岸保水差且基質不穩，需耐旱深根植物。防風林常見木麻黃、黃槿、白千層或適地原生樹種。\n\n海岸逆境與因應可概括為：鹽霧高，選耐鹽植物並設防風林；強風，採低矮灌草先行、支柱固定與防風籬；砂埋，選匍匐或萌芽力強植物並用草方格定砂；乾旱貧瘠，客土、有機質、保水材與敷蓋；潮汐淹水，選紅樹林或耐水濕植物；基質不穩，先用網材、木樁或植生袋固定。植生應由前線草本定砂到後方灌木喬木分帶建立。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。\n\n**手冊補強：河岸植生、濕地與防風定砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 河岸植生 | 需依水位、流速、沖刷、坡度與土壤含水配置草本、灌木、喬木與柔性護岸材料 |\n| 濕地護岸 | 宜營造緩坡、多孔隙、多水深與水陸交界帶，兼顧水質淨化、棲地與安全 |\n| 海岸定砂 | 先定砂、後防風、再造林，植物需耐鹽、耐旱、耐風砂掩埋 |\n| 防風林 | 林帶密度、寬度、高度與樹種配置影響防風距離與減風效果 |\n| 維護管理 | 需防止外來種入侵、枯死裸露、沖刷破壞與人為踩踏破壞 |\n\n生態與植生題可補充：護岸或綠帶設計應同時考慮防災功能與棲地功能，避免只追求硬體穩定而造成棲地破碎。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "111-植生工程-第四題：植物選定與鄉土/外來植物比較", "year": "111", "subject": "植生工程", "title": "第四題：植物選定與鄉土/外來植物比較", "number": "第四題", "question": "四、請詳述植生工程適用植物選定之條件，並列表說明鄉土植物與外來植物 優點與缺點。（20 分）", "brief": "選定條件包括適應氣候土壤、根系發達、生長快速、抗逆境、繁殖容易、材料取得穩定、維護低、無入侵性且符合復育目標。鄉土植物生態適合度高但初期材料與生長速度可能受限；外來植物取得容易、覆蓋快，但有入侵與排擠原生種風險。", "detail": "植生工程植物選擇需同時考量工程功能與生態功能。工程功能包括快速覆蓋、抗沖蝕、根系固土、耐旱耐濕、耐瘠薄與坡面穩定；生態功能包括原生性、棲地價值、演替潛力與不造成入侵。還需考慮海拔、坡向、土壤 pH、鹽分、水分、施工季節、種苗來源與養護能力。\n\n鄉土植物優點為適應本地氣候、生態相容性高、可支持本土生物、長期穩定且入侵風險低；缺點是種苗量可能不足、初期生長較慢、栽培技術與成本較高。外來植物優點是種子易取得、發芽快、覆蓋迅速、成本低；缺點是可能入侵、排擠原生植物、降低多樣性，且長期群落不一定穩定。合理策略是短期可用非入侵且易控制草種快速覆蓋，中長期導入鄉土灌木與喬木。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "111-植生工程-第五題：10 年以上喬木斷根與移植", "year": "111", "subject": "植生工程", "title": "第五題：10 年以上喬木斷根與移植", "number": "第五題", "question": "五、請說明移植樹齡超過 10 年以上之喬木如何實施斷根及移植作業？（20 分）", "brief": "大樹移植須先調查樹勢、胸徑、根系與移植路線，於移植前分期斷根，促進細根形成。移植時保留足夠土球，修剪樹冠，包紮固定，吊運避免傷根傷幹，定植後支撐、澆水、覆蓋、修剪與養護監測。", "detail": "10 年以上喬木根系廣且樹冠大，直接挖掘易失水死亡。作業前應調查樹種、胸徑、樹高、冠幅、健康、病蟲害、根系限制與移植季節。斷根宜於移植前數月到一年分期進行，沿預定土球外緣開溝切斷粗根，回填良好介質並灌水，促使土球內產生新細根。斷根範圍依樹種與胸徑決定，土球直徑通常需為胸徑多倍，並保留主要根系。\n\n移植前適度修剪枝葉以降低蒸散，但不可過度破壞樹形。挖掘時保持土球完整，以草繩、麻布、鐵網或木箱包紮。吊運時受力點在土球，不可單吊樹幹。新植穴需排水良好、大小足夠，回填土改良但避免過肥。定植後設支架、防風、澆水、敷蓋、病蟲害防治與至少一年以上養護監測。成活關鍵在斷根時程、土球完整、水分管理與移植季節。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "111-水土保持工程-第一題：懸臂式擋土牆面版分析與安全係數", "year": "111", "subject": "水土保持工程", "title": "第一題：懸臂式擋土牆面版分析與安全係數", "number": "第一題", "question": "一、請詳述如何進行懸臂式擋土牆面版（stem）之鋼筋混凝土結構分析與配 筋？根據最新水土保持技術規範第 120 條規定，擋土牆設計針對滑動、 傾倒與基礎承載力等安全係數之要求分別為何？（20 分）", "brief": "面版視為固定於底版的懸臂梁，承受三角形主動土壓、水壓與超載土壓，計算各高度彎矩與剪力後配置主筋與剪力筋，並檢核裂縫、錨定與搭接。滑動、傾倒與承載安全係數屬規範數值，以當年度最新水土保持技術規範為準。", "detail": "懸臂式擋土牆面版 stem 下端與底版固結，上端自由，可視為垂直懸臂板。首先依回填土性質、牆高、地下水、地震與超載計算側向壓力。無水且水平回填時，主動土壓 pa = Kaγz，呈三角形分布；若有均佈超載 q，另加 Ka q 矩形壓力；若有水壓，需加靜水壓並設排水。\n\n在任一高度截面計算彎矩 M 與剪力 V，最大彎矩通常在牆底。依鋼筋混凝土設計求所需拉力鋼筋 As，主筋設於背土側或受拉側，並檢核最小鋼筋量、鋼筋間距、保護層、開裂、剪力、錨定長度與底版接頭。牆體整體還需檢核抗滑、抗傾倒、基礎承載力、偏心距與整體穩定。題目問之第 120 條安全係數因規範可能修訂，正式作答需列當年度規範值；若記憶不確定，應寫明需依最新規範核定，不宜自行杜撰。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。"}, {"id": "111-水土保持工程-第二題：土石流三區段與整治", "year": "111", "subject": "水土保持工程", "title": "第二題：土石流三區段與整治", "number": "第二題", "question": "二、某一卵礫石地層之野溪，因極端降雨引起崩塌、發生土石流，流動距離 約 600 公尺長，土石流寬度約為 30 到 50 公尺不等，該土石流尚未波及 其下游的 30 多戶保全對象，但也僅距離保全對象約 50 公尺。首先，請 說明土石流一般可分為那三個區段與其地形特徵？再者，請以前述的土 石流情況為例，詳述針對這三個區段應如何規劃整治工程？（20 分）", "brief": "土石流可分為發生區、流動區與堆積區。發生區坡陡、崩塌與鬆散土砂多；流動區溝谷狹窄、坡降大、沖刷搬運強；堆積區坡度變緩、扇狀堆積並威脅保全對象。治理上游穩坡與攔砂，中游導流固床與防沖，下游沉砂、導流、防護與警戒避難。", "detail": "發生區多位於上游崩塌地、源頭溝或陡坡，特徵是坡度大、破碎岩層與鬆散土砂豐富，降雨時易飽和崩落。此區治理以源頭減砂為主，包括坡面排水、崩塌地植生、坡腳保護、山腹工、攔砂壩或透過型防砂壩。流動區為土石流沿野溪高速流動的通道，常見側岸沖刷、河床下切與彎道衝擊，治理以穩定流路、固床、護岸、導流及防止堵塞為主。\n\n堆積區位於坡度變緩處，土石流能量下降而堆積，常形成扇狀地，對聚落、道路與橋梁威脅最大。本題保全對象距離堆積前緣僅 50 m，應優先設置下游攔阻、沉砂空間、導流堤、分流或保護堤，並建立警戒避難。整體規劃應先估算土砂量、流動深度、流速與影響範圍，採上游減源、中游控流、下游保全的系統治理，並保留清淤維護通道。\n\n**手冊補強：野溪治理與土砂控制**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 治理目標 | 穩定流心、控制縱橫向沖刷、調節土砂、維持通洪斷面並保護下游保全對象 |\n| 處理順序 | 先判斷上游供砂、中游輸砂與下游淤積，再決定源頭減砂、溪床穩定、清淤疏通或沉砂防砂 |\n| 清淤疏通 | 緊急清疏以恢復通洪與降低堰塞風險；計畫清疏則應配合河床坡降、土砂來源與上下游穩定 |\n| 工程配置 | 固床工、防砂壩、護岸、護坦、跌水消能、導流與沉砂空間須整體配置，不宜只做局部硬化 |\n| 維護管理 | 豪雨後巡查淤積、淘刷、堵塞與構造物損壞，並建立清淤、補強及棄土去化計畫 |\n\n作答時可強調手冊式觀念：野溪治理不是單純把河道挖深或截彎取直，而是要維持水流、泥砂與河床坡降的動態平衡；若只清除下游淤積而未處理上游供砂與坡面沖蝕，災害會反覆發生。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "111-水土保持工程-第三題：邊坡穩定工程設計流程", "year": "111", "subject": "水土保持工程", "title": "第三題：邊坡穩定工程設計流程", "number": "第三題", "question": "三、請繪流程圖說明邊坡穩定工程之設計流程。根據最新水土保持技術規範 第 73 條規定，對於永久性與臨時性邊坡穩定安全係數之要求分別為何？ （20 分）", "brief": "流程為資料蒐集、現地調查、地質鑽探與地下水調查、破壞機制判定、設計剖面建立、穩定分析、工法選擇、細部設計、施工監測與維護。永久性與臨時性邊坡穩定安全係數以最新技術規範第 73 條規定值為準。", "detail": "邊坡穩定設計可用流程表示：一、蒐集地形、地質、航照、災害、雨量及土地利用資料；二、現地調查裂縫、湧水、滑動跡象、坡腳沖刷與保全對象；三、鑽探、取樣、試驗與地下水觀測；四、建立地質模型與潛在滑動面；五、選定設計水位、地震力與荷重；六、以極限平衡或數值分析求安全係數；七、選擇削坡、排水、擋土、錨定、植生或護坡工法；八、細部設計與施工；九、監測與維護。\n\n永久性邊坡需滿足較高安全係數，臨時性邊坡因使用期間短可採較低要求，但仍須考量豪雨與施工安全。題目要求最新水土保持技術規範第 73 條，數值應依考試當年度規範填列；作答時可補充安全係數不得只看常時，也應檢核暴雨、地下水上升與地震狀況。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。"}, {"id": "111-水土保持工程-第四題：深層滑動區地下排水", "year": "111", "subject": "水土保持工程", "title": "第四題：深層滑動區地下排水", "number": "第四題", "question": "四、請詳述在深層滑動區，地下排水工程之規劃設計原則。如何進行該規劃 設計所需之調查工作？（20 分）", "brief": "原則是降低滑動面附近孔隙水壓、截斷補注、提供長期可維護排水。工法包括水平排水孔、集水井、排水廊道、盲溝、截水溝與深層排水管。調查需包含地形地質、鑽探、滑動面、地下水位、孔隙水壓、滲透性、降雨反應與監測。", "detail": "深層滑動常受地下水位上升與孔隙水壓控制，排水工程應先了解地下水補注來源、流向、含水層與滑動面位置。設計原則為有效降低滑動面水壓、避免排水設施被剪斷、確保出水口安全、便於清理維護，並與地表截排水及坡腳支撐配合。\n\n調查工作包括航照與 LiDAR 判釋滑動範圍、現地調查裂縫與湧水、鑽探確認土岩界面與滑動面、設置觀測井與孔隙水壓計、進行滲透試驗、抽水或注水試驗、地下水示蹤與雨量水位關係分析。工法選擇上，淺層地下水可用盲溝或截水溝；深層水壓可用水平排水孔、集水井或排水廊道。排水工程完工後需長期監測水位與位移，評估效果。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "111-水土保持工程-第五題：滯洪池設計與側流堰", "year": "111", "subject": "水土保持工程", "title": "第五題：滯洪池設計與側流堰", "number": "第五題", "question": "五、請繪流程圖說明滯洪池之設計流程。請說明以「側流堰」（side weir）配 合滯洪池運作的優缺點為何？如何運作？（20 分）", "brief": "滯洪池設計流程為集水區劃分、設計雨量、開發前後逕流、入流歷線、允許放流、容量演算、出流設施設計、溢洪安全、沉砂維護與景觀生態檢核。側流堰在主排水路水位超過堰頂時分流入池，平時不進流，優點是減少常時淤積，缺點是分流量受水位與堰長控制，設計較複雜。", "detail": "滯洪池流程可寫為：一、確定保護標準與重現期；二、劃定集水區與土地利用；三、計算集流時間與設計雨型；四、求開發前、中、後洪峰與歷線；五、設定下游允許放流量；六、進行水庫演算求所需容量；七、設計出流口、溢洪道、自由高與邊坡；八、檢核排空時間、沉砂、維護道路與安全設施；九、施工與維護管理。\n\n側流堰設於主排水路側邊，當洪水水位超過堰頂時，部分流量越過側堰進入滯洪池，待洪峰過後再由出流口排回下游。優點是平常小流量不進池，可減少淤積與水質問題；可保留主排水路輸水功能，池體只處理超量洪水。缺點是側堰分流量受主渠水位、流速、堰長與尾水影響，水理計算較複雜；若堰頂高程或長度設計不當，可能分流不足或過度分流。設計需檢核主渠不溢淹、池體容量與回排能力。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "111-水土保持規劃設計-第一題：溪岸土體崩塌", "year": "111", "subject": "水土保持規劃設計", "title": "第一題：溪岸土體崩塌", "number": "第一題", "question": "一、溪岸土體崩塌是野溪極為常見的災害類型之一。試述溪岸發生土體崩塌 之原因，以及其治理規劃原則？（25 分）", "brief": "原因包括坡腳淘刷、河道下切、彎道攻擊流、豪雨入滲、地下水壓、土體軟弱、植生破壞、地震與人為開挖。治理原則為先控水與護腳，再穩坡與復育，並保留河道通洪與生態空間。", "detail": "溪岸崩塌常由水流削弱坡腳開始。洪水時外彎攻擊坡剪應力大，河床下切或坡腳淘刷使岸坡失去支撐；豪雨入滲使土體重量增加、孔隙水壓上升、有效應力下降，導致圓弧滑動或塊體崩落。若岸坡為崩積土、砂礫互層、風化岩或有滲水層，崩塌更易發生。道路開挖、護岸不連續、排水出口集中也會誘發破壞。\n\n治理規劃應先調查河道沖淤、洪水位、流速、地質、地下水與保全對象。原則上坡腳保護優先，如塊石護腳、箱籠、固床工或導流減少淘刷；坡面則採削坡、排水、植生、格框或擋土；坡頂需截水並限制載重。河道治理不可只硬化單岸，需考慮上下游連續性、彎道水理、通洪斷面、泥砂輸送及生態棲地。\n\n**手冊補強：野溪治理與土砂控制**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 治理目標 | 穩定流心、控制縱橫向沖刷、調節土砂、維持通洪斷面並保護下游保全對象 |\n| 處理順序 | 先判斷上游供砂、中游輸砂與下游淤積，再決定源頭減砂、溪床穩定、清淤疏通或沉砂防砂 |\n| 清淤疏通 | 緊急清疏以恢復通洪與降低堰塞風險；計畫清疏則應配合河床坡降、土砂來源與上下游穩定 |\n| 工程配置 | 固床工、防砂壩、護岸、護坦、跌水消能、導流與沉砂空間須整體配置，不宜只做局部硬化 |\n| 維護管理 | 豪雨後巡查淤積、淘刷、堵塞與構造物損壞，並建立清淤、補強及棄土去化計畫 |\n\n作答時可強調手冊式觀念：野溪治理不是單純把河道挖深或截彎取直，而是要維持水流、泥砂與河床坡降的動態平衡；若只清除下游淤積而未處理上游供砂與坡面沖蝕，災害會反覆發生。\n\n**手冊補強：邊坡穩定與擋土排水**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 調查項目 | 地形、地質、弱面、地下水、滑動跡象、坡腳淘刷、既有構造物與保全對象 |\n| 分區治理 | 坡頂重截水與減載，坡面重排水、護坡與植生，坡腳重擋土、護腳與防淘刷 |\n| 擋土檢核 | 需檢核滑動、傾倒、承載、偏心、基底拉力、整體穩定與排水安全 |\n| 地下排水 | 水平排水孔、盲溝、集水井、排水廊道等可降低孔隙水壓，是深層滑動重要措施 |\n| 施工維護 | 施工中應避免坡腳過度開挖與排水中斷，完工後需監測位移、裂縫、湧水與排水功能 |\n\n申論題可用「調查診斷－水文地質判釋－穩定分析－工法選擇－施工監測－維護管理」作為完整架構，較符合手冊的工程設計邏輯。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。；野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "111-水土保持規劃設計-第二題：農塘滯洪與孔口水深", "year": "111", "subject": "水土保持規劃設計", "title": "第二題：農塘滯洪與孔口水深", "number": "第二題", "question": "二、農塘經過適當設計後可兼具蓄水和滯洪之功能。試述農塘滯洪與一般坡 地土地開發後之滯洪設施的主要差異為何？已知農塘 50 年重現期距入 流量達 64 cms，經過圓形孔口滯洪設施後之出流洪峰流量達 29 cms，而 圓形孔口直徑為 3.0 m，請計算：農塘所需滯洪量？圓形孔口有效 水深？（25 分）", "brief": "農塘兼具灌溉蓄水與滯洪，需在常水位以上保留防洪庫容；一般開發滯洪池主要為削減開發後洪峰。若僅以洪峰差表示需滯洪控制量，入流 64 cms、出流 29 cms，需削減洪峰 35 cms。孔口水深以 Q = Cd A √(2gH)，取 Cd = 0.6、D = 3 m，A = 7.069 m²，H = [29/(0.6×7.069)]²/(2g) = 2.38 m。", "detail": "**表格補充**\n\n| 項目 | 計算 | 結果 |\n|---|---:|---:|\n| 入流洪峰 | 題示 | `64 cms` |\n| 出流洪峰 | 題示 | `29 cms` |\n| 洪峰削減量 | `64 - 29` | `35 cms` |\n| 孔口面積 | `πD²/4 = π×3²/4` | `7.069 m²` |\n| 孔口公式 | `Q=Cd A sqrt(2gH)` |  |\n| 有效水深，`Cd=0.6` | `[29/(0.6×7.069)]²/(2g)` | `2.38 m` |\n| 有效水深，`Cd=0.62` | `[29/(0.62×7.069)]²/(2g)` | `2.23 m` |\n\n備註：僅給洪峰無法唯一求「滯洪體積」，需入流與出流歷線才能積分求容量。\n\n農塘滯洪與一般開發滯洪池的差異在於農塘原本有灌溉蓄水任務，平時可能維持較高水位，因此必須明確劃分灌溉庫容、滯洪庫容、沉砂庫容與安全自由高。一般土地開發滯洪設施則多以開發後洪峰不超過開發前為目的，常時可保持低水位以容納暴雨。農塘操作還需考量灌溉需求、枯旱供水、水質、淤積、堤岸安全與溢洪道。\n\n題目給入流洪峰 64 cms、經孔口後出流洪峰 29 cms，洪峰削減量為 35 cms。若要求「滯洪量」的體積，仍需入流與出流歷線或洪水延時才能積分求得；題目只給洪峰時，嚴格而言只能求洪峰削減量，不能唯一決定體積。圓形孔口有效水深可由孔口公式 Q = Cd A √(2gH) 求得。D = 3.0 m，A = πD²/4 = 7.069 m²。取常用 Cd = 0.6，H = [Q/(CdA)]²/(2g) = [29/(0.6×7.069)]²/(19.62) = 2.38 m。若規範採 Cd = 0.62，H 約 2.23 m，應依題目或規範指定值作答。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。"}, {"id": "111-水土保持規劃設計-第三題：複合粗糙係數", "year": "111", "subject": "水土保持規劃設計", "title": "第三題：複合粗糙係數", "number": "第三題", "question": "三、渠道兩岸及其底床因材質不同而有不同的粗糙係數，如下圖所示。已知 渠道綜合粗糙係數為 0.023，以及兩岸邊壁之粗糙係數為 0.014，試計算 底床粗糙係數。（25 分） 梯形渠道斷面圖", "brief": "本題需由圖讀取梯形渠道底寬、水深與邊坡，才能計算邊壁與底床濕周比例。可用 Horton-Einstein 複合粗糙係數公式：n = [(ΣPi ni^(3/2))/P]^(2/3)。已知 n、邊壁 n 與各段濕周後，可反求底床 n。", "detail": "複合斷面因底床與兩岸材料不同，不能直接算術平均粗糙係數。常用方法為依濕周加權的 Horton-Einstein 公式：n_c = [Σ(Pi n_i^(3/2))/P]^(2/3)，其中 Pi 為第 i 材料接觸水流之濕周，P 為總濕周。若兩側邊壁粗糙係數 n_s = 0.014，底床粗糙係數為 n_b，底床濕周為 Pb，兩岸濕周合計為 Ps，綜合 n_c = 0.023，則可寫成 0.023^(3/2)(Pb+Ps) = Pb n_b^(3/2) + Ps 0.014^(3/2)。\n\n整理可得 n_b = { [0.023^(3/2)(Pb+Ps) - Ps 0.014^(3/2)] / Pb }^(2/3)。因抽文字未包含圖形尺寸，無法唯一決定 Pb 與 Ps，故需回原 PDF 讀取梯形渠道底寬、水深與邊坡長後代入。作答時應畫出底床與兩岸濕周分段，列式反求底床粗糙係數。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；水理工程題要交代通水能力、安全高、消能防沖刷、淤砂清理與後續維護。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "111-水土保持規劃設計-第四題：土石流計畫土砂量", "year": "111", "subject": "水土保持規劃設計", "title": "第四題：土石流計畫土砂量", "number": "第四題", "question": "四、試舉出土石流潛勢溪流治理之計畫土砂量及其相應治理措施？同時，各 土砂量間之關係為何？（25 分）", "brief": "計畫土砂量可分為生產土砂量、流出土砂量、可控制土砂量、容許流出土砂量與需攔阻土砂量。治理措施包括源頭崩塌控制、山腹工、攔砂壩、透過型防砂壩、沉砂池、導流堤、護岸與清淤。關係上，需處理量通常為計畫流出土砂量扣除容許流出量與自然沉積量後之不足部分。", "detail": "土石流治理須先估算集水區可能產生與輸出的土砂。生產土砂量指崩塌、河床沖刷、岸坡崩落可供土石流搬運的總土砂。流出土砂量是設計事件中可能到達保全對象或下游控制點的土砂。容許流出土砂量是下游河道或保全區可承受而不致災的量。計畫攔阻量或需治理量則為需由工程或管理措施控制的土砂量。\n\n相應措施方面，源頭生產量大時，採坡面穩定、排水、植生、山腹工與源頭攔砂；流動區採固床、護岸、透過型防砂壩與導流，控制下切與側蝕；堆積區採沉砂池、攔砂壩、導流堤、分流與清淤，保護聚落道路。各土砂量關係可表示為：計畫生產土砂量經河道輸移、自然沉積與工程攔阻後，剩餘為下游流出土砂量；治理目標是使流出土砂量小於容許流出土砂量。\n\n**手冊補強：野溪治理與土砂控制**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 治理目標 | 穩定流心、控制縱橫向沖刷、調節土砂、維持通洪斷面並保護下游保全對象 |\n| 處理順序 | 先判斷上游供砂、中游輸砂與下游淤積，再決定源頭減砂、溪床穩定、清淤疏通或沉砂防砂 |\n| 清淤疏通 | 緊急清疏以恢復通洪與降低堰塞風險；計畫清疏則應配合河床坡降、土砂來源與上下游穩定 |\n| 工程配置 | 固床工、防砂壩、護岸、護坦、跌水消能、導流與沉砂空間須整體配置，不宜只做局部硬化 |\n| 維護管理 | 豪雨後巡查淤積、淘刷、堵塞與構造物損壞，並建立清淤、補強及棄土去化計畫 |\n\n作答時可強調手冊式觀念：野溪治理不是單純把河道挖深或截彎取直，而是要維持水流、泥砂與河床坡降的動態平衡；若只清除下游淤積而未處理上游供砂與坡面沖蝕，災害會反覆發生。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "野溪與土石流題可分成源頭供砂、溪床輸砂、下游保全，再配置防砂、固床、護岸與警戒。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "111-測量學-第一題：借坑水準土方量", "year": "111", "subject": "測量學", "title": "第一題：借坑水準土方量", "number": "第一題", "question": "一、某坡地欲估算崩塌量體而施以借坑水準測量（borrow-pit leveling），其網 格樁位分布及水準測量結果如圖所示，每一網格大小為20 m 30 m ，樁 位旁所標示數值為該樁位之觀測高程，單位為公尺（m）。請回答以下 問題： 請計算全區最低點以上之總土方量及土方平均高程。（10 分） 假設所有樁位之水平位置不存在誤差，而所觀測之高程誤差皆為 0.05 m ，請問所計算總土方量之誤差為何？（15 分）", "brief": "本題需由原圖讀取各網格樁高程。計算時以最低點高程為基準，各格點高差乘以權重面積求體積；平均高程為總體積除以總面積再加最低高程。體積誤差依各高程觀測誤差傳播，V = Σ wi hi，mV = sqrt(Σ(wi mh)^2)。", "detail": "借坑水準法將區域分成規則網格，每格面積 20×30 = 600 m²。先由圖中找出最低高程 Hmin，對每一樁點計算高差 di = Hi - Hmin。依樁點所在位置給予面積權重：內部點權重通常為一個完整格面積，邊界點為半格，角點為四分之一格；或逐格以四角平均高差乘以格面積求體積。總土方量 V = Σ(Agrid × 四角平均高差)。土方平均高程 Havg = Hmin + V/Atotal。\n\n誤差傳播方面，若各高程誤差獨立且 mh = 0.05 m，體積可寫為 V = Σ wi Hi，其中 wi 為該高程對體積的面積權重。則 mV = sqrt[Σ(wi mh)^2]。若以逐格平均法，每個角點的權重為其參與格數×Agrid/4。因題目圖未被 PDF 文字抽出，本題數值需回原圖讀取樁位高程與網格範圍後代入。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；邊坡題先寫調查與破壞機制，再列排水、減載、擋土、錨定與植生等處理。"}, {"id": "111-測量學-第二題：TWD97 與坐標轉換", "year": "111", "subject": "測量學", "title": "第二題：TWD97 與坐標轉換", "number": "第二題", "question": "二、關於國家坐標系統，請回答以下問題： 臺灣目前所使用之國家坐標系統為 TWD97，其基本定義為何？（10 分） 內政部分別於 101 年及 109 年公告 TWD97[2010]及 TWD97[2020]坐 標成果，其目的為何？此兩個坐標系統的定義及成果與 TWD97 有何 差異？（5 分）  若 欲 將 一 水 土 保 持 特 定 區 內 的 空 間 圖 資 坐 標 由 TWD97 轉 換 為 TWD97[2020]，請說明可能的轉換方法。（10 分） 代號：02860 頁次：2－2", "brief": "TWD97 以 GRS80 橢球及國家大地控制網為基礎，平面常用 TM2 投影。TWD97[2010]、TWD97[2020]是因地殼變動、地震與控制網重測所公告的坐標成果更新。轉換可採官方轉換參數或服務、共同點套合、七參數、仿射轉換或網格改正。", "detail": "TWD97 是臺灣常用國家坐標基準，採 GRS80 參考橢球，並以國家大地控制點建立坐標框架。平面坐標多採橫麥卡托二度分帶 TM2，中央經線依分帶設定，工程圖資常以公尺為單位。因臺灣位於板塊交界，地殼變動與重大地震會使控制點坐標隨時間改變，因此內政部公告 TWD97[2010]與 TWD97[2020]成果，以提供較符合現況的坐標成果。\n\n其差異主要在坐標成果的參考時元與控制點坐標值更新，坐標系統定義大致延續，但實際點位坐標會有公分至公尺級差異。若要將水土保持特定區圖資由 TWD97 轉換為 TWD97[2020]，可使用官方坐標轉換服務或參數；若區內有共同控制點，可用平面四參數、仿射轉換或七參數轉換；高精度需求可用網格改正模型。轉換後應以檢核點評估殘差，並保存原坐標基準與轉換紀錄。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "比較題建議用表格，欄位至少放定義、成因或機制、適用條件、優缺點與維護重點。"}, {"id": "111-測量學-第三題：IDW 與普通克利金", "year": "111", "subject": "測量學", "title": "第三題：IDW 與普通克利金", "number": "第三題", "question": "三、於集水區範圍進行降雨分析時，常須將離散點狀的雨量站觀測資料以空 間內插（spatial interpolation）的方式轉換為面狀資料。常見的空間內插 方法包含反距離權重法（inverse distance weighted, IDW ）及普通克利金 法（ordinary Kriging），請分別說明其基本原理及計算方式。（25 分）", "brief": "IDW 假設距離越近影響越大，以距離反比權重平均估計未知點。普通克利金利用半變異函數描述空間自相關，在無偏且估計變異最小條件下求權重，能提供估計值與估計誤差。", "detail": "IDW 估計式為 Z(x0)=ΣwiZ(xi)/Σwi，wi=1/di^p，其中 di 為未知點至測站距離，p 為距離衰減次方，常取 2。其優點是簡單、直觀、計算快；缺點是不考慮地形、風向與空間統計結構，且易受測站分布影響。\n\n普通克利金 ordinary Kriging 假設局部平均未知但固定，利用半變異函數 γ(h)=1/2 Var[Z(x)-Z(x+h)] 描述距離 h 下資料差異。先由雨量資料建立實驗半變異函數，再配適球狀、指數或高斯模型。估計時求一組權重 λi，使估計值 Z*(x0)=ΣλiZ(xi) 滿足 Σλi=1 且估計變異最小。克利金能反映空間自相關並提供估計誤差，但需足夠資料與合理變異函數模型。山區降雨分析可結合高程、坡向或雨型進一步改良。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；規劃管理題用調查、問題診斷、工程與植生配置、維護監測四段作答最穩。"}, {"id": "111-測量學-第四題：UAV 攝影測量 DEM", "year": "111", "subject": "測量學", "title": "第四題：UAV 攝影測量 DEM", "number": "第四題", "question": "四、今欲利用無人機攝影測量技術（UA V Photogrammetry）進行一山坡地的 地形測繪，並產製密點雲（dense point clouds）及數值地形模型（digital elevation model, DEM）資料，請說明整體作業程序及可能使用到的資料 處理方法。（25 分）", "brief": "流程為航拍規劃、控制點布設、影像獲取、影像檢查、空三/SfM、控制點平差、密集匹配、點雲分類、DSM/DTM/DEM 製作、正射影像、精度檢核與成果輸出。處理方法包括特徵匹配、束制平差、MVS、濾除植被與地物、內插與等高線產製。", "detail": "**表格補充**\n\n| 階段 | 作業內容 |\n|---|---|\n| 規劃 | 航高、解析度、重疊率、航線、光照與安全 |\n| 控制 | 布設 GCP 與檢核點，GNSS/全站儀測坐標 |\n| 航拍 | 取得高重疊影像，檢查模糊、漏拍與曝光 |\n| SfM | 特徵點匹配，解算相機位置姿態，產生稀疏點雲 |\n| 平差 | 加入控制點做束制平差 |\n| MVS | 產生密集點雲 |\n| 分類 | 地面點與非地面點分類，濾除植被與雜訊 |\n| 成果 | DSM、DTM/DEM、正射影像、等高線 |\n| 檢核 | 用檢核點計算平面與高程 RMSE |\n\n作業前需規劃航高、解析度、重疊率、航線、光照與安全，山坡地應提高旁向與航向重疊並注意地形高差。現地布設 GCP 與檢核點，以 GNSS RTK 或全站儀測定坐標。航拍後檢查影像模糊、曝光、重疊與漏拍。處理時以 SfM 偵測特徵點、匹配同名點，解算相機內外方位並產生稀疏點雲，再加入控制點做束制平差。\n\n接著以多視影像密集匹配 MVS 產生 dense point clouds。點雲需去除雜訊，並分類地面點與非地面點；山坡地植生覆蓋會影響地面點取得，必要時需人工編修或輔以 LiDAR。由地面點內插產生 DTM 或 DEM，由所有表面點可產生 DSM。再製作正射影像、等高線、坡度圖、斷面與土方分析。成果需以檢核點計算平面與高程 RMSE，並說明坐標系統、解析度與適用限制。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "110-土壤物理與沖蝕-第一題：土壤水分", "year": "110", "subject": "土壤物理與沖蝕", "title": "第一題：土壤水分", "number": "第一題", "question": "一、試說明土壤水分（Soil moisture）的表示方式、測定目的、直接測定方法 及對土壤沖蝕的影響。（20 分）", "brief": "土壤水分可用重量含水量、體積含水量、飽和度、水深或水勢表示。測定目的包括灌溉管理、入滲逕流分析、邊坡穩定、植物生長與沖蝕評估。直接法以烘乾法最典型。土壤水分影響入滲、團粒穩定、逕流產生、抗剪強度與雨滴剝離。", "detail": "土壤水分表示方式包括重量含水量 w = Mw/Ms、體積含水量 θ = Vw/Vt、飽和度 S = Vw/Vv，以及以水勢表示之基質勢、壓力勢與總水勢。水文上亦可用等效水深表示土層儲水量。測定土壤水分可掌握作物可用水、入滲能力、地下水補注、坡地崩塌潛勢與水土保持設施效果。\n\n直接測定方法以重量烘乾法為標準，採取土樣後秤濕重，於 105 至 110°C 烘至恆重，求水分重量差。其優點是準確，缺點是破壞性、耗時且只能代表採樣點。土壤水分對沖蝕有雙重影響：乾燥土壤團粒可能易被雨滴打散，但初期吸力大、入滲高；接近飽和時入滲能力下降、逕流增加，且孔隙水壓上升降低抗剪強度，易發生細溝、溝蝕或崩塌。適當水分與良好團粒可增加抗蝕性，過乾或過濕皆可能提高沖蝕風險。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "110-土壤物理與沖蝕-第二題：坡面地形特徵", "year": "110", "subject": "土壤物理與沖蝕", "title": "第二題：坡面地形特徵", "number": "第二題", "question": "二、試說明影響土壤沖蝕的坡面地形特徵。（20 分）", "brief": "主要地形特徵包括坡度、坡長、坡形、坡向、匯流面積、微地形、地形凹凸、坡腳條件與排水路徑。坡度愈陡、坡長愈長、凹形匯流愈明顯，逕流能量與沖蝕量通常愈大。", "detail": "坡度決定重力分量與逕流剪應力，坡度增加會使水流速度、剝離力與輸砂能力提高。坡長影響逕流累積，坡長愈長，流量與能量沿坡增加，細溝與溝蝕風險上升。坡形也很重要：凸坡上部易受濺蝕與薄層流失，凹坡與谷頭易匯流而形成溝蝕或崩塌，直線坡則逕流逐漸累積。\n\n坡向影響日照、蒸散、植生與土壤水分。迎風或多雨坡面沖蝕力較高，陰坡可能含水高而有崩塌風險。微地形、台階、壟溝與道路會改變流路；道路邊溝或排水口集中出流常造成局部沖刷。坡腳若受溪流淘刷，會降低邊坡穩定。水土保持設計應縮短坡長、分散逕流、降低坡度、保護坡腳並避免人工排水集中。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "110-土壤物理與沖蝕-第三題：降雨動能與沖蝕力", "year": "110", "subject": "土壤物理與沖蝕", "title": "第三題：降雨動能與沖蝕力", "number": "第三題", "question": "三、試說明利用降雨動能作為降雨沖蝕力的指標涵義及估算方式。（20 分）", "brief": "降雨沖蝕力反映雨滴動能與最大短延時雨強對土壤剝離的能力。USLE 常用 EI30，即單場降雨總動能 E 乘最大 30 分鐘雨強 I30。估算時由雨量歷線分段計算雨強、單位動能與雨量，再加總為 E。", "detail": "雨滴打擊是坡面沖蝕的起始機制，雨滴粒徑與落速決定動能。一般而言，雨強愈大，雨滴粒徑與動能愈大，濺蝕與表面結皮愈嚴重。因此降雨動能可作為降雨沖蝕力指標。USLE/RUSLE 中降雨沖蝕指數 R 由多場降雨 EI30 累加而成，EI30 = E × I30。\n\n估算方式為將一場降雨依時間分段，求各段雨強 i 與雨量 ΔP，再用經驗式求單位降雨動能 e，例如 e 隨 log i 或指數式增加。單場總動能 E = Σ e ΔP，再乘該場最大 30 分鐘雨強 I30 得 EI30。年降雨沖蝕指數為多年平均年 EI30 總和。其意義是同時考慮雨滴剝離力與短時間集中雨強造成逕流的能力。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "110-土壤物理與沖蝕-第四題：SEIM 與 USLE", "year": "110", "subject": "土壤物理與沖蝕", "title": "第四題：SEIM 與 USLE", "number": "第四題", "question": "四、試說明土壤侵蝕指標模式（Soil Erosion Index Model, SEIM）及其與通用 土壤流失公式（Universal Soil Loss Equation, USLE）之主要差別。（20 分）", "brief": "SEIM 屬土壤侵蝕潛勢或指標型評估模式，常以地形、土壤、降雨、土地利用等因子建立相對侵蝕指標，用於區域分級與熱點判釋。USLE 則以 A = RKLSCP 估算長期平均土壤流失量，輸出具 ton/ha/yr 意義。", "detail": "土壤侵蝕指標模式 SEIM 的重點在整合影響侵蝕的環境因子，建立相對指標或分級圖。其資料可來自 GIS、遙測、坡度坡長、土壤可蝕性、降雨、植生覆蓋與土地利用，適合大範圍快速判斷高風險區。SEIM 的結果通常是相對危險度或指標值，強調空間比較。\n\nUSLE 是經驗式土壤流失量模式，A = R K L S C P，估算長期平均年土壤流失量。USLE 需各因子具物理或經驗意義，結果可用於保育措施設計與容許流失量比較。兩者差異在於 SEIM 偏指標、分級與 GIS 評估，USLE 偏定量估算；SEIM 較適合區域篩選，USLE 較適合坡面土壤流失量計算，但兩者都需校正與適用性檢討。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。；USLE 題重點是 A=R K LS C P，並分清楚 C 為覆蓋管理、P 為保育措施效果。"}, {"id": "110-土壤物理與沖蝕-第五題：開挖整地沖蝕控制", "year": "110", "subject": "土壤物理與沖蝕", "title": "第五題：開挖整地沖蝕控制", "number": "第五題", "question": "五、試說明開挖整地時，針對坡面土壤沖蝕控制之現場施工方法與措施。 （20 分）", "brief": "措施包括分期開挖、縮小裸露面、避開雨季、坡頂截水、坡面臨時排水、沉砂池、臨時覆蓋、植生毯、噴植、堆土覆蓋、施工道路穩定、出口消能與豪雨前檢查。", "detail": "開挖整地最易造成裸露坡面與集中逕流，施工方法應以源頭減蝕為主。施工前先完成臨時截水、排水與沉砂設施，避免外水進入開挖面。施工採分區分期，完成一區即覆蓋或植生，不宜大面積長期裸露。坡面可使用稻草敷蓋、植生毯、不織布、噴植、臨時草籽或土壤穩定劑。\n\n排水溝需有足夠坡度與襯砌，跌水或出口需消能，避免排水口沖刷。堆土區應設圍籬、覆蓋與截排水。施工道路應鋪碎石或穩定材料，出入口設洗車與沉砂。豪雨前檢查排水、沉砂池容量與裸露面保護，豪雨後即時修復沖刷溝。完工後以永久排水、坡面保護與植生工程接續。\n\n**手冊補強：道路、農路與開挖整地**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 路線選擇 | 避免通過順向坡、崩塌地、湧水區及地質破碎帶，並減少大挖大填 |\n| 排水配置 | 山邊溝、路側溝、橫向排水、跌水消能與出口保護須配合道路縱坡配置 |\n| 邊坡保護 | 上邊坡重截水與護坡，下邊坡重填方穩定、排水與坡腳保護 |\n| 施工防災 | 土方工程應分期施工，裸露面即時覆蓋，臨時沉砂與臨時排水應先行完成 |\n| 維護管理 | 定期清理側溝、涵管、沉砂池與排水出口，豪雨後檢查沖刷、裂縫與邊坡變形 |\n\n道路水土保持答案可補一句總結：道路本身常成為集中逕流通道，因此設計重點不只在路面通行，還包括截水、導水、消能、沉砂與安全排放。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。\n\n**手冊補強：農藝保育、覆蓋與草生措施**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 覆蓋功能 | 降低雨滴動能、減少表面結皮、增加入滲、降低逕流流速並攔阻泥砂 |\n| 覆蓋材料 | 可用敷蓋材料、覆蓋作物、草生帶、殘株、植生毯或有機覆蓋物 |\n| 農地排水 | 農路、平台、山邊溝、縱橫向排水與安全出口須整體規劃 |\n| 草生措施 | 草溝、草帶與緩衝帶可分散逕流、增加粗糙度、過濾泥砂並改善入滲 |\n| 管理維護 | 需定期修剪、補植、清淤，避免草生帶被車輛破壞或被集中水流切穿 |\n\n農地與坡面沖蝕題可補手冊式結論：以農藝方法先減少土砂生產，再以排水與沉砂設施控制土砂輸出，效果比單靠末端沉砂池更穩定。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "110-坡地水文學-第一題：入滲過程與逕流體積", "year": "110", "subject": "坡地水文學", "title": "第一題：入滲過程與逕流體積", "number": "第一題", "question": "一、試述何謂雨量強度控制（rainfall intensity-controlled）之入滲過程及入 滲能力控制（infiltration capacity-controlled）之入滲過程？（10 分） 一流域其面積為 100 km2，在某一場 2 小時降雨，不同時間記錄所得 到的累積雨量如下表所示： 時間（min） 0 30 60 90 120 累積雨量（cm） 0 1 2.5 5.5 5.7 假設其入滲 ϕ 指數為 0.6 cm/hr，試計算該場降雨所造成的總地表逕流 的體積（m3）。（15 分）", "brief": "雨量強度控制表示雨強小於入滲能力，入滲量由雨強決定；入滲能力控制表示雨強大於入滲能力，超過部分成逕流。各 30 分鐘雨量為 1.0、1.5、3.0、0.2 cm，ϕ 損失每 30 分鐘為 0.3 cm，前三段有效雨量為 0.7、1.2、2.7 cm，末段雨強小於 ϕ 無逕流。總有效雨量 4.6 cm，面積 100 km²，逕流體積 4,600,000 m³。", "detail": "**表格補充**\n\n| 時段 | 累積雨量差 | 30 分鐘可入滲量 | 有效雨量 |\n|---|---:|---:|---:|\n| 0-30 min | `1.0 cm` | `0.3 cm` | `0.7 cm` |\n| 30-60 min | `1.5 cm` | `0.3 cm` | `1.2 cm` |\n| 60-90 min | `3.0 cm` | `0.3 cm` | `2.7 cm` |\n| 90-120 min | `0.2 cm` | `0.3 cm` | `0 cm` |\n\n| 項目 | 結果 |\n|---|---:|\n| 總有效雨量 | `4.6 cm` |\n| 流域面積 | `100 km² = 100×10⁶ m²` |\n| 地表逕流體積 | `0.046 × 100×10⁶ = 4,600,000 m³` |\n\n雨量強度控制入滲發生於降雨強度小於土壤入滲能力時，此時所有降雨可入滲，實際入滲率等於雨強，不產生超滲地表逕流。入滲能力控制發生於雨強大於入滲能力時，實際入滲率受土壤可入滲能力限制，超過部分形成地表逕流。\n\n題目 30 分鐘雨量分別為 1.0、1.5、3.0、0.2 cm。ϕ 指數 0.6 cm/hr，30 分鐘可入滲量為 0.3 cm。前三段雨量皆大於 0.3 cm，有效雨量分別為 1.0-0.3=0.7 cm、1.5-0.3=1.2 cm、3.0-0.3=2.7 cm；第四段雨量 0.2 cm 小於 0.3 cm，無超滲逕流。總有效雨量為 4.6 cm = 0.046 m。流域面積 100 km² = 100×10⁶ m²，地表逕流體積 V = 0.046×100×10⁶ = 4.6×10⁶ m³。\n\n**手冊補強：農藝保育、覆蓋與草生措施**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 覆蓋功能 | 降低雨滴動能、減少表面結皮、增加入滲、降低逕流流速並攔阻泥砂 |\n| 覆蓋材料 | 可用敷蓋材料、覆蓋作物、草生帶、殘株、植生毯或有機覆蓋物 |\n| 農地排水 | 農路、平台、山邊溝、縱橫向排水與安全出口須整體規劃 |\n| 草生措施 | 草溝、草帶與緩衝帶可分散逕流、增加粗糙度、過濾泥砂並改善入滲 |\n| 管理維護 | 需定期修剪、補植、清淤，避免草生帶被車輛破壞或被集中水流切穿 |\n\n農地與坡面沖蝕題可補手冊式結論：以農藝方法先減少土砂生產，再以排水與沉砂設施控制土砂輸出，效果比單靠末端沉砂池更穩定。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "110-坡地水文學-第二題：Stokes 沉降速度", "year": "110", "subject": "坡地水文學", "title": "第二題：Stokes 沉降速度", "number": "第二題", "question": "二、泥沙的運移及堆積影響河川的沖刷與淤積過程，試以史托克理論（Stokes law）推估某泥沙顆粒其密度為 2800 kg/m3 且半徑為 1 mm，在水中的終 端沉降速度（m/sec）。（25 分）", "brief": "Stokes 式 vt = 2(ρs-ρw)gr²/(9μ)。取 ρs=2800 kg/m³、ρw=1000 kg/m³、r=0.001 m、μ=0.001 N·s/m²，vt = 3.924 m/s。但此粒徑為 1 mm，雷諾數過大，已超出 Stokes 層流適用範圍，實務應用需改用較適合砂粒的阻力公式。", "detail": "史托克理論假設顆粒為球形、沉降速度小、流場為層流且顆粒雷諾數很小。終端沉降速度為 vt = [2(ρs-ρw)gr²]/(9μ)。代入 ρs = 2800 kg/m³，ρw = 1000 kg/m³，g = 9.81 m/s²，r = 1 mm = 0.001 m，水動力黏滯係數 μ = 0.001 N·s/m²，得 vt = 2×1800×9.81×10^-6/(9×0.001) = 3.924 m/s。\n\n需要注意的是，半徑 1 mm 即直徑 2 mm，屬粗砂至細礫尺度，沉降速度若達數 m/s，雷諾數遠大於 Stokes 適用範圍。因此此數值是依題目指定理論的形式計算結果，實務河川泥砂沉降應使用 Ferguson-Church、Rubey 或含阻力係數的通用沉降公式。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "申論題先寫核心定義或結論，再條列原因、方法、適用條件與注意事項。"}, {"id": "110-坡地水文學-第三題：溢壩機率與設計流量", "year": "110", "subject": "坡地水文學", "title": "第三題：溢壩機率與設計流量", "number": "第三題", "question": "三、某一擋水壩是以 10 年重現期距流量標準來做設計，試計算未來 5 年發 生溢壩洪水的機率。（10 分）假設該擋水壩的年最大流量（單位為 CMS） 滿足對數皮爾遜第 III 型分布（log-Pearson type III distribution ）。流量取 以 10 為底數的對數後，平均值為 3，標準偏差為 0.3，偏態係數為 0.6。 試計算該擋水壩之設計流量。 32 {[( ) 1] 1 }6 6 s s T s C CK z C   （ ）（15 分） 標準常態分布累積機率表 F(z) 0.8 0.9 0.95 0.98 0.99 z 0.84 1.28 1.65 2.05 2.33", "brief": "10 年重現期年超越機率為 0.1，5 年內至少發生一次機率 = 1-(1-0.1)^5 = 40.95%。10 年重現期非超越機率 0.9，z = 1.28。依對數皮爾遜 III 型頻率因子近似得 K 約 1.284，log10 Q = 3 + 1.284×0.3 = 3.385，Q = 10^3.385 = 2428 cms。", "detail": "**表格補充**\n\n| 項目 | 計算 | 結果 |\n|---|---:|---:|\n| 年超越機率 | `1/10` | `0.1` |\n| 5 年至少一次機率 | `1-(1-0.1)^5` | `40.95%` |\n| 10 年非超越機率 | `0.9` | `z=1.28` |\n| 偏態係數 | 題示 | `Cs=0.6` |\n| 頻率因子 | 題示公式 | `K≈1.284` |\n| `log10 Q` | `3 + 1.284×0.3` | `3.385` |\n| 設計流量 | `10^3.385` | `2428 cms` |\n\n若設計流量重現期 T = 10 年，任一年發生超越設計流量的機率 p = 1/T = 0.1。未來 5 年皆不發生的機率為 (1-p)^5 = 0.9^5 = 0.59049，故至少發生一次溢壩洪水的機率為 1-0.59049 = 0.40951，即 40.95%。\n\n對數皮爾遜 III 型計算中，10 年重現期之非超越機率為 0.9，由表得 z = 1.28。以題示偏態係數 Cs = 0.6 代入頻率因子公式，可得 K 約 1.284。故 log10 Q = 平均值 + K×標準偏差 = 3 + 1.284×0.3 = 3.385。Q = 10^3.385 = 2428 cms。答案約為 2.43×10³ cms。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "110-坡地水文學-第四題：非穩流率定曲線遲滯", "year": "110", "subject": "坡地水文學", "title": "第四題：非穩流率定曲線遲滯", "number": "第四題", "question": "四、河川在非穩流（unsteady flow）情況下，其水位及流量關係在洪水來臨及 退去時呈現遲滯（hysteresis）現象，試以圖形說明此現象，並試述造成 此現象之物理機制。（25 分）", "brief": "洪水上升段與退水段同一水位會對應不同流量，形成迴圈狀率定曲線。通常上升段能量坡降較大，同水位流量較大；退水段坡降較小或受回水影響，同水位流量較小。原因為流量與水位波傳、河道蓄水、加速度、回水及洪水波變形。", "detail": "穩流時，水位與流量可用單一率定曲線表示。但洪水為非穩流，流量峰值與水位峰值不一定同時到達，河道中有蓄水與動量效應，因此上升段與下降段關係不同。若以橫軸水位、縱軸流量作圖，洪水歷程會形成一個迴圈。\n\n物理上，洪水上升時上游水面坡降增加，推動水流加速，同一水位下流量較大；退水時水面坡降減小，河道蓄水釋放，流量相對較小。若下游有回水、潮汐、支流頂托或河床淤積，遲滯更明顯。此現象表示用單一水位-流量曲線推估洪水流量會有誤差，需用非穩流修正、迴圈率定或水理模式處理。\n\n**手冊補強：排水、消能與滯洪沉砂**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 排水系統 | 截水、集水、導水、消能與安全排放須連續配置，避免逕流在坡面任意集中 |\n| 斷面檢核 | 明渠以曼寧式檢核通水能力、流速、水力半徑及自由高，出口須檢核防沖刷 |\n| 消能設施 | 陡坡渠道、跌水、急流槽與排水出口應設消能池、護坦、砌石或粗糙化處理 |\n| 盲溝與地下排水 | 用於截排滲流水、降低孔隙水壓及改善坡體穩定，需注意反濾、防堵與維修 |\n| 滯洪沉砂 | 滯洪容量、沉砂容量及安全自由高應分別檢核；共構時不得讓淤砂侵占必要滯洪空間 |\n\n計算題除列公式外，答案宜補上工程判斷：流量足夠不代表設計完成，仍須檢查流速是否超過容許值、出口是否沖刷、沉砂是否易清淤、豪雨時是否有安全溢洪路徑。", "source_type": "past", "source_label": "歷屆考古題", "points": "25分", "hint": "計算題先列公式、統一單位，再代入數值；答案最後要寫單位與工程判讀。"}, {"id": "110-植生工程-第一題：植生材料導入與檢查", "year": "110", "subject": "植生工程", "title": "第一題：植生材料導入與檢查", "number": "第一題", "question": "一、請詳述實施坡面植生工程植生材料導入作業之植生方法為何？並說明 依據水土保持技術規範第 61 條「植生工程之檢查」之相關規定。（20 分）", "brief": "導入方法包括撒播、噴播、水力噴植、植生毯、草皮鋪植、扦插、苗木栽植、植生袋與厚層基材噴植。檢查項目通常包含材料品質、施工面處理、覆蓋率、發芽率、成活率、沖蝕、基材厚度與養護情形；規範條文數值需依最新版本核對。", "detail": "坡面植生材料導入需依坡度、土壤、含水、穩定性與復育目標選擇工法。緩坡可撒播或草皮鋪植；大面積裸露坡可水力噴植，將種子、肥料、纖維、黏著劑與水混合噴灑；陡坡或貧瘠坡可用厚層基材噴植、植生毯、植生袋或掛網噴植；需建立木本群落時採苗木栽植或扦插。\n\n植生工程檢查應確認施工前基盤整備、排水、坡面穩定與材料來源；施工中檢查種子種類、用量、肥料、客土厚度、網材固定、噴植均勻性；完工後檢查覆蓋率、成活率、裸露沖蝕、病蟲害及補植養護。題目指定第 61 條，若考試需條文數值，應依當年度水土保持技術規範填列。\n\n**手冊補強：坡面植生與植生基礎工**\n\n| 補強面向 | 可寫入答案的採分點 |\n|---|---|\n| 前期處理 | 先處理坡面穩定、截排水、坡面整形、表土固定與植生基盤，再導入植物 |\n| 導入方法 | 可依坡度與立地條件採撒播、噴播、厚層基材噴附、植生毯、植生袋、客土或苗木栽植 |\n| 資材功能 | 種子、肥料、有機質、保水材、黏著劑、纖維材、覆蓋材及網材各有保水、固土、供肥與抗沖蝕功能 |\n| 植物選擇 | 優先選適地、耐旱耐瘠、根系發達、覆蓋快且維護容易之草本、灌木與鄉土植物 |\n| 維護驗收 | 須檢查發芽、成活、覆蓋率、沖刷破壞、裸露補植及排水是否維持功能 |\n\n植生題作答時可強調：植生工程不是單純播種，而是「基礎工穩定坡面 + 植生資材建立生育基盤 + 適地植物長期覆蓋」的組合。", "source_type": "past", "source_label": "歷屆考古題", "points": "20分", "hint": "植生題先判斷立地條件，再寫基礎處理、材料配比、植物選擇、施工季節與養護驗收。"}, {"id": "110-植生工程-第二題：植生防災綠帶", "year": "110", "subject": "植生工程", "title": "第二題：植生防災綠帶", "number": "第二題", "question": "二、請詳述植生防災綠帶之分類，及其各分類營造之目的與功能為何？（20 分）", "brief": "防災綠帶可分為坡面保育綠帶、河岸緩衝綠帶、防風定砂綠帶、防火綠帶、道路邊坡綠帶、聚落保護綠帶與生態廊道。功能包括減少沖蝕、攔砂、滯洪、過濾污染、穩定岸坡、防風、防火、阻隔落石及維持棲地連通。", "detail": "坡面保育綠帶設於坡地農地、崩塌地或裸露坡面，目的為增加覆蓋、提升入滲、減少表土流失。河岸緩衝綠帶沿溪流兩側配置，可過濾泥砂與營養鹽、穩定岸坡、提供遮蔭與棲地。防風定砂綠帶設於海岸或裸露砂地，可降低風速、固定砂丘與減少鹽霧危害。\n\n防火綠帶以低燃性、含水高或耐修剪植物形成隔離帶，減緩火勢蔓延。道路邊坡綠帶穩定路基、減少落石與景觀衝擊。聚落保護綠
